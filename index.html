function renderCharacterMomentumTab() {
  recordMomentumHistory();
  const pts = calcMomentumPoints();
  const tier = getMomentumTier(pts);
  const today = todayStr();
  const c = state.character;
  const gameDay = getGameDay();

  // Inactivity decay banner
  let decayBanner = '';
  if(state.meta.lastActiveDate) {
    const inactive = diffDays(state.meta.lastActiveDate, today);
    if(inactive > 3) {
      const decayPts = (inactive - 3) * 8;
      decayBanner = `<div class="momentum-decay-banner">
        ⚠️ Momentum melemah! Tidak aktif selama <strong>${inactive} hari</strong>
        <small>-${decayPts} pts dari decay · Selesaikan quest atau habit untuk memulihkan momentum</small>
      </div>`;
    }
  }

  // Bar fill pct within tier range
  const [rMin, rMax] = tier.range;
  const withinPct = rMax === rMin ? 100 : Math.round(((pts - rMin) / (rMax - rMin)) * 100);
  const totalPct = pts;

  // Tier cards
  const tierCards = MOMENTUM_TIERS.map(t => {
    const isActive = t.level === tier.level;
    const past = pts >= t.range[1];
    const dotColor = past || isActive ? t.color : 'var(--muted-2)';
    return `<div class="momentum-tier-card ${isActive ? 'active' : ''}" style="${isActive ? '--momentum-card-color:'+t.color+';--momentum-card-glow:'+t.glow+';' : ''}">
      <div class="momentum-tier-dot" style="--tier-dot-color:${dotColor}; background:${dotColor}; box-shadow: 0 0 6px ${past || isActive ? t.glow : 'transparent'}"></div>
      <div class="momentum-tier-info">
        <div class="momentum-tier-num">TIER ${t.level}</div>
        <div class="momentum-tier-title" style="${isActive ? 'color:'+t.color : ''}">${t.name}</div>
      </div>
    </div>`;
  }).join('');

  // Momentum factors breakdown
  const streak = c.streak || 0;
  const streakPts = streak >= 30 ? 30 : streak >= 14 ? 22 : streak >= 7 ? 15 : streak >= 3 ? 10 : streak >= 1 ? 5 : 0;

  const todayAct = (state.meta.activityLog || {})[today] || 0;
  const questPts = Math.min(20, todayAct * 4);

  const totalQ = c.totalQuests || 0;
  const questBonusPts = totalQ >= 100 ? 8 : totalQ >= 50 ? 5 : totalQ >= 10 ? 3 : totalQ >= 1 ? 1 : 0;

  const habits = state.habits || [];
  let habitPts = 0;
  habits.forEach(h => { if(h.log && h.log[today]) habitPts += 3; });
  habitPts = Math.min(18, habitPts);

  const goalsC = c.goalsCompleted || 0;
  const goalPts = goalsC >= 10 ? 10 : goalsC >= 5 ? 7 : goalsC >= 1 ? 4 : 0;

  const week = 7 * 24 * 3600 * 1000;
  const weekAgoStr = new Date(Date.now() - week).toLocaleDateString('en-CA');
  const recentIncome = _getAllFinanceEntries().filter(e => e.type === 'in' && e.date >= weekAgoStr);
  const financePts = Math.min(8, recentIncome.length * 2);

  const factors = [
    { icon:'🔥', name:'Streak Harian', desc:`${streak} hari beruntun`, pts: streakPts, max: 30 },
    { icon:'⚡', name:'Quest Hari Ini', desc:`${todayAct} aktivitas selesai hari ini`, pts: questPts, max: 20 },
    { icon:'🔄', name:'Habit Konsisten', desc:`${habits.filter(h=>h.log&&h.log[today]).length} habit selesai hari ini`, pts: habitPts, max: 18 },
    { icon:'🎯', name:'Goal Selesai', desc:`${goalsC} goal telah diselesaikan`, pts: goalPts, max: 10 },
    { icon:'💰', name:'Aktivitas Finansial', desc:`${recentIncome.length} pemasukan dalam 7 hari`, pts: financePts, max: 8 },
    { icon:'📖', name:'Total Quest History', desc:`${totalQ} quest diselesaikan`, pts: questBonusPts, max: 8 },
  ];

  const factorRows = factors.map(f => `<div class="momentum-factor-row">
    <div class="momentum-factor-icon">${f.icon}</div>
    <div class="momentum-factor-body">
      <div class="momentum-factor-name">${f.name}</div>
      <div class="momentum-factor-desc">${f.desc} · maks ${f.max} pts</div>
    </div>
    <div class="momentum-factor-pts ${f.pts === 0 ? 'zero' : ''}">+${f.pts}</div>
  </div>`).join('');

  // History rows
  const hist = (state.momentum && state.momentum.history) || [];
  let histHTML = '';
  if(hist.length === 0) {
    histHTML = `<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px 0;">Belum ada riwayat. Buka tab ini setiap hari untuk mencatat!</div>`;
  } else {
    histHTML = hist.slice(0, 14).map(h => {
      const t = getMomentumTier(h.pts);
      const barW = Math.round(h.pts);
      return `<div class="momentum-hist-row">
        <div class="momentum-hist-date">${h.date.slice(5)}</div>
        <div class="momentum-hist-bar"><div class="momentum-hist-fill" style="width:${barW}%;background:${t.color};box-shadow:0 0 5px ${t.glow}"></div></div>
        <div class="momentum-hist-tier" style="color:${t.color}">${t.name}</div>
      </div>`;
    }).join('');
  }

  // Description per tier
  const tierDescs = [
    'Kamu belum aktif. Mulai hari ini dengan satu langkah kecil.',
    'Percikan sudah menyala. Jaga konsistensi untuk naik tier.',
    'Kamu dalam ritme. Terus aliri energimu setiap hari.',
    'Pikiranmu tajam dan terfokus. Ini saatnya mendorong lebih jauh.',
    'Tidak ada yang bisa menghentikanmu sekarang. Terus tancap gas.',
    '✦ Kamu mencapai puncak momentum. Ini adalah kondisi terbaik cultivatormu. ✦',
  ];

  return `<div class="momentum-wrapper">
    <div style="font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;">⚡ Momentum System</div>
    ${decayBanner}
    ${renderStreakMomentum()}
    <div class="momentum-hero" style="--momentum-color:${tier.color};--momentum-color-start:${tier.colorStart};--momentum-color-faint:${tier.glow}">
      <div class="momentum-aura"></div>
      <div class="momentum-tier-badge">TIER ${tier.level} — MOMENTUM · HARI KE-${gameDay}</div>
      <div class="momentum-tier-name">${tier.name}</div>
      <div class="momentum-pts-row">
        <div class="momentum-pts-num">${pts}</div>
        <div class="momentum-pts-lbl">/ 100 pts</div>
      </div>
      <div class="momentum-bar-wrap">
        <div class="momentum-bar-track">
          <div class="momentum-bar-fill" style="width:${totalPct}%"></div>
        </div>
        <div class="momentum-bar-labels"><span>0</span><span>50</span><span>100</span></div>
      </div>
      <div style="font-size:11.5px;color:rgba(255,255,255,0.6);margin-top:12px;font-family:var(--font-body);line-height:1.5;position:relative;z-index:1;">${tierDescs[tier.level]}</div>
    </div>

    <div class="momentum-tiers-grid">${tierCards}</div>

    <div class="momentum-factors-card">
      <div class="momentum-factors-title">📊 Sumber Momentum</div>
      ${factorRows}
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <span style="font-family:var(--font-system);font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Total</span>
        <span style="font-family:var(--font-scifi);font-size:16px;font-weight:800;color:${tier.color};text-shadow:0 0 10px ${tier.glow}">${pts} pts</span>
      </div>
    </div>

    <div class="momentum-history-card">
      <div class="momentum-history-title">📜 Riwayat Momentum (14 hari terakhir)</div>
      ${histHTML}
    </div>

    ${renderLifeHeatmap()}

    ${renderFinancialIntelligence()}

    ${renderCharHistory()}

    <div style="font-size:10px;color:var(--muted-2);text-align:center;margin-top:14px;line-height:1.5;font-family:var(--font-body);">
      Momentum tidak mempengaruhi EXP, level, atau data lainnya.<br>
      Ini hanya cerminan laju perkembangan karaktermu saat ini.
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// LIFE HEATMAP — Character Tab
// Tidak mengubah data apapun, hanya membaca state.
// ═══════════════════════════════════════════════════════════════

function getHeatmapDayScore(dateStr) {
  if (!state) return 0;
  let score = 0;
  score += (state.meta.activityLog || {})[dateStr] || 0;
  (state.habits || []).forEach(h => { if (h.log && h.log[dateStr]) score += 1; });
  (state.goalHistory || []).forEach(g => { if (g.completedAt === dateStr && g.status !== 'failed') score += 3; });
  _getAllFinanceEntries().forEach(e => { if (e.date === dateStr && e.type === 'in') score += 2; });
  // Hitung hari login: lastActiveDate (hari ini) atau ada entri streak di charHistory
  if (state.meta.lastActiveDate === dateStr) score = Math.max(score, 2);
  else if (((state.charHistory||{}).streak||[]).some(s => s.ts === dateStr)) score = Math.max(score, 2);
  return score;
}

function getHeatmapCellStyle(score, isToday) {
  let bg, shadow, textColor;
  if (score === 0)      { bg = '#1c1c2e'; shadow = 'none'; textColor = 'transparent'; }
  else if (score <= 2)  { bg = 'rgba(52,211,153,0.20)'; shadow = 'none'; textColor = 'rgba(52,211,153,0.7)'; }
  else if (score <= 5)  { bg = 'rgba(52,211,153,0.50)'; shadow = 'none'; textColor = 'rgba(255,255,255,0.8)'; }
  else if (score <= 9)  { bg = '#34D399'; shadow = '0 0 5px rgba(52,211,153,0.4)'; textColor = '#08080F'; }
  else                  { bg = '#F0B93B'; shadow = '0 0 8px rgba(240,185,59,0.6)'; textColor = '#08080F'; }
  const border = isToday ? '2px solid var(--arise-bright)' : '1px solid rgba(255,255,255,0.06)';
  return { bg, shadow, textColor, border };
}

function renderLifeHeatmap() {
  if (!state) return '';
  const today = todayStr();
  const tabBtns = [['weekly','Mingguan'],['monthly','Bulanan'],['yearly','Tahunan']]
    .map(([v,l]) => `<button class="btn btn-sm ${heatmapView===v?'btn-primary':'btn-secondary'}" onclick="setHeatmapView('${v}')">${l}</button>`).join('');

  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const MONTH_FULL  = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const DAY_SHORT   = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];

  let gridHTML = '';

  // ── WEEKLY ──
  if (heatmapView === 'weekly') {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push(d.toLocaleDateString('en-CA'));
    }
    gridHTML = `<div class="heatmap-weekly-grid">` +
      days.map(ds => {
        const d   = new Date(ds + 'T00:00:00');
        const sc  = getHeatmapDayScore(ds);
        const st  = getHeatmapCellStyle(sc, ds === today);
        const lbl = DAY_SHORT[d.getDay()];
        const isToday = ds === today;
        return `<div class="heatmap-weekly-cell">
          <div class="heatmap-weekly-box" onclick="openDailyHistory('${ds}')" title="${ds}"
            style="background:${st.bg};border:${st.border};box-shadow:${st.shadow};">
            ${sc > 0 ? `<span style="font-size:11px;font-weight:800;color:${st.textColor};pointer-events:none;">${sc}</span>` : ''}
          </div>
          <div style="font-size:9px;font-weight:700;color:${isToday?'var(--arise-bright)':'var(--muted)'};font-family:var(--font-system);">${lbl}</div>
          <div style="font-size:8px;color:var(--muted-2);font-family:var(--font-system);">${ds.slice(8)}</div>
        </div>`;
      }).join('') + `</div>`;

  // ── MONTHLY ──
  } else if (heatmapView === 'monthly') {
    const year = heatmapMonthYear; const month = heatmapMonthMonth;
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const firstDow = new Date(year, month, 1).getDay(); // 0=Sun
    const startOffset = (firstDow + 6) % 7; // Monday-first offset

    const headerRow = ['Sen','Sel','Rab','Kam','Jum','Sab','Min']
      .map(d => `<div style="text-align:center;font-size:9px;color:var(--muted);font-weight:700;font-family:var(--font-system);padding:2px 0;">${d}</div>`).join('');
    const emptyCells = Array(startOffset).fill(`<div></div>`).join('');
    const dayCells = Array.from({length: daysInMonth}, (_, i) => {
      const d = i + 1;
      const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const sc = getHeatmapDayScore(ds);
      const st = getHeatmapCellStyle(sc, ds === today);
      return `<div class="heatmap-monthly-cell" onclick="openDailyHistory('${ds}')" title="${ds}: ${sc} poin"
        style="background:${st.bg};border:${st.border};box-shadow:${st.shadow};
        color:${st.textColor};">${d}</div>`;
    }).join('');

    gridHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <button class="cal-nav-btn" onclick="changeHeatmapMonth(-1)"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div style="font-family:var(--font-system);font-size:12px;font-weight:700;color:var(--bone);">${MONTH_FULL[month]} ${year}</div>
        <button class="cal-nav-btn" onclick="changeHeatmapMonth(1)"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="heatmap-monthly-grid">${headerRow}${emptyCells}${dayCells}</div>`;

  // ── YEARLY ──
  } else {
    // Tahun kalender penuh Jan-Des (bukan lagi 364 hari bergulir), bisa dinavigasi mundur/maju per tahun.
    const year = heatmapYearYear;
    const weeks = [];
    for (let m = 0; m < 12; m++) {
      const daysInM = new Date(year, m+1, 0).getDate();
      const monthDates = Array.from({length: daysInM}, (_, i) => `${year}-${String(m+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`);
      // Pad awal bulan ke Senin-pertama biar sejajar per minggu (kosong = null, tidak dihitung).
      const firstDow = new Date(year, m, 1).getDay();
      const startOffset = (firstDow + 6) % 7;
      const padded = Array(startOffset).fill(null).concat(monthDates);
      for (let w = 0; w < padded.length; w += 7) weeks.push({ month: m, cells: padded.slice(w, w+7) });
    }

    const monthLabelCells = weeks.map(wk => {
      const hasFirst = wk.cells.some(ds => ds && ds.slice(8) === '01');
      return `<div class="heatmap-month-lbl">${hasFirst ? MONTH_NAMES[wk.month] : ''}</div>`;
    }).join('');

    const rows = Array.from({length:7}, (_, r) => {
      const cells = weeks.map(wk => {
        const ds = wk.cells[r];
        if (!ds) return `<div class="heatmap-yearly-cell" style="background:#1c1c2e;"></div>`;
        const sc = getHeatmapDayScore(ds);
        const st = getHeatmapCellStyle(sc, ds === today);
        return `<div class="heatmap-yearly-cell" onclick="openDailyHistory('${ds}')" title="${ds}: ${sc} poin"
          style="background:${st.bg};${st.shadow!=='none'?'box-shadow:'+st.shadow+';':''}
          ${ds===today?'border:1px solid var(--arise-bright);box-sizing:border-box;':''}"></div>`;
      }).join('');
      return `<div class="heatmap-yearly-row">${cells}</div>`;
    }).join('');

    gridHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <button class="cal-nav-btn" onclick="changeHeatmapYear(-1)"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div style="font-family:var(--font-system);font-size:12px;font-weight:700;color:var(--bone);">${year}</div>
        <button class="cal-nav-btn" onclick="changeHeatmapYear(1)"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="heatmap-yearly-scroll">
      <div class="heatmap-yearly-inner">
        <div class="heatmap-month-labels">${monthLabelCells}</div>
        ${rows}
      </div>
    </div>`;
  }

  // Legend
  const legendItems = [
    { bg: '#1c1c2e', label: 'Abu — Tidak ada' },
    { bg: 'rgba(52,211,153,0.20)', label: 'Hijau Muda — Rendah' },
    { bg: 'rgba(52,211,153,0.50)', label: 'Hijau — Sedang' },
    { bg: '#34D399', label: 'Hijau Terang — Tinggi' },
    { bg: '#F0B93B', label: 'Emas — Luar Biasa' },
  ].map(l => `<div class="heatmap-legend-item">
    <div class="heatmap-legend-dot" style="background:${l.bg};"></div>
    <span style="font-size:9.5px;color:var(--muted);font-family:var(--font-system);">${l.label}</span>
  </div>`).join('');

  return `<div class="heatmap-card">
    <div class="heatmap-card-title">🗺️ Heatmap Kehidupan</div>
    <div class="heatmap-tab-row">${tabBtns}</div>
    ${gridHTML}
    <div class="heatmap-legend">${legendItems}</div>
    <div style="font-size:10px;color:var(--muted-2);margin-top:8px;line-height:1.5;font-family:var(--font-body);">
      Ketuk hari manapun untuk melihat detail aktivitas: quest, habit, EXP, pemasukan, pengeluaran, dan goal.
    </div>
  </div>`;
}

function setHeatmapView(v) { heatmapView = v; render(); }

// ═══════════════════════════════════════════════════════════════
// STREAK MOMENTUM PRODUKTIVITAS
// Read-only — tidak mengubah state apapun.
// ═══════════════════════════════════════════════════════════════
function renderStreakMomentum() {
  if (!state) return '';
  const c = state.character || {};
  const streak = c.streak || 0;
  const longest = c.longestStreak || streak;
  const today = todayStr();
  const lastActive = (state.meta && state.meta.lastActiveDate) || today;
  const atRisk = lastActive !== today && streak > 0;
  const gameDay = getGameDay();

  const TIERS = [
    { min:0,  fires:0, name:'Belum Mulai',     color:'#5a5a7a', glow:'rgba(90,90,122,0)',    tagline:'Satu hari pertama mengubah segalanya. Mulai sekarang.' },
    { min:3,  fires:1, name:'Momentum Rendah',  color:'#F97316', glow:'rgba(249,115,22,0.5)', tagline:'Bara mulai menyala! Jaga agar tidak padam.' },
    { min:7,  fires:2, name:'Stabil',           color:'#F59E0B', glow:'rgba(245,158,11,0.5)', tagline:'Ritme sudah terbentuk. Terus pertahankan.' },
    { min:14, fires:3, name:'Tinggi',           color:'#34D399', glow:'rgba(52,211,153,0.5)', tagline:'Fokus tajam. Kamu sedang mendominasi harimu.' },
    { min:30, fires:4, name:'Dominan',          color:'#F0B93B', glow:'rgba(240,185,59,0.65)','tagline':'✦ Puncak momentum. Tidak ada yang bisa menghentikanmu.' },
  ];

  let tier = TIERS[0];
  for (let i = TIERS.length - 1; i >= 0; i--) {
    if (streak >= TIERS[i].min) { tier = TIERS[i]; break; }
  }

  // Fires
  let firesHTML;
  if (tier.fires === 0) {
    firesHTML = `<div class="smom-fire" style="font-size:36px;opacity:0.18;filter:grayscale(1) drop-shadow(0 0 0 transparent);animation:none;">🔥</div>`;
  } else {
    firesHTML = Array.from({length: tier.fires}, (_, i) =>
      `<div class="smom-fire" style="font-size:${32 + i * 6}px;animation-delay:${(i * 0.22).toFixed(2)}s;">🔥</div>`
    ).join('');
  }

  // Milestone bar
  const MARKS = [
    { days:3,  name:'Rendah',  color:'#F97316' },
    { days:7,  name:'Stabil',  color:'#F59E0B' },
    { days:14, name:'Tinggi',  color:'#34D399' },
    { days:30, name:'Dominan', color:'#F0B93B' },
  ];
  const fillPct = Math.min(100, (streak / 30) * 100);

  const dots = MARKS.map(m => {
    const lp = (m.days / 30) * 100;
    const reached = streak >= m.days;
    return `<div class="smom-milestone-dot" style="left:${lp}%;background:${reached ? m.color : 'var(--surface-2,#1a1a2e)'};border-color:${reached ? m.color : 'rgba(255,255,255,0.12)'};box-shadow:${reached ? '0 0 7px '+m.color : 'none'};"></div>`;
  }).join('');

  const lbls = MARKS.map(m => {
    const lp = (m.days / 30) * 100;
    const reached = streak >= m.days;
    return `<div class="smom-milestone-lbl" style="left:${lp}%;">
      <div class="smom-milestone-lbl-d" style="color:${reached ? m.color : 'var(--muted)'};">${m.days}h</div>
      <div class="smom-milestone-lbl-n">${m.name}</div>
    </div>`;
  }).join('');

  const nextM = MARKS.find(m => streak < m.days);
  const nextInfo = nextM
    ? `<span style="font-size:10px;color:var(--muted);font-family:var(--font-system);">→ <strong style="color:${nextM.color};">${nextM.name}</strong> dalam ${nextM.days - streak} hari</span>`
    : `<span style="font-size:10px;color:var(--gold);font-family:var(--font-system);font-weight:700;">🏆 Semua milestone dicapai!</span>`;

  // Risk / break badges
  let alertBadge = '';
  if (atRisk) {
    alertBadge = `<div class="smom-risk-badge">⚠️ Belum ada aktivitas hari ini — streak ${streak} hari terancam putus!</div>`;
  } else if (streak === 0 && longest > 2) {
    alertBadge = `<div class="smom-risk-badge" style="background:rgba(239,68,68,0.09);border-color:rgba(239,68,68,0.25);">💔 Streak putus · Rekor terbaikmu: <strong>${longest} hari</strong> · Bangun lagi mulai sekarang!</div>`;
  }

  // Total quests today as activity indicator
  const todayActs = (state.meta && state.meta.activityLog && state.meta.activityLog[today]) || 0;

  return `<div class="smom-card" style="background:var(--surface);border:1.5px solid ${tier.fires > 0 ? tier.color + '44' : 'var(--border)'};box-shadow:${tier.fires > 0 ? '0 0 24px ' + tier.glow.replace(/[\d.]+\)$/, '0.12)') : 'none'};">
    <div class="smom-hero-bg" style="background:linear-gradient(150deg,${tier.glow.replace(/[\d.]+\)$/, '0.13)')} 0%,transparent 65%);">
      <div class="smom-tier-label" style="color:${tier.color};">🔥 Momentum Produktivitas · HARI KE-${gameDay}</div>
      <div class="smom-body-row">
        <div class="smom-fires-row">${firesHTML}</div>
        <div class="smom-info">
          <div class="smom-tier-name" style="color:${tier.color};text-shadow:0 0 22px ${tier.glow};">${tier.name}</div>
          <div class="smom-streak-val">
            <div class="smom-streak-num" style="color:${tier.color};text-shadow:0 0 14px ${tier.glow};">${streak}</div>
            <span class="smom-streak-unit">hari beruntun</span>
          </div>
        </div>
      </div>
      <div class="smom-tagline">${tier.tagline}</div>
      ${streak !== gameDay ? `<div style="font-size:10px;color:var(--muted);margin-top:6px;font-family:var(--font-system);">📅 Akun berjalan hari ke-${gameDay} · streak beruntun saat ini ${streak} hari${streak < gameDay ? ' (pernah putus)' : ''}</div>` : ''}
      ${alertBadge}
    </div>

    <div class="smom-milestone-section">
      <div class="smom-milestone-header">
        <span class="smom-milestone-hdr-lbl">Milestone Streak</span>
        ${nextInfo}
      </div>
      <div class="smom-milestone-bar">
        <div class="smom-milestone-fill" style="width:${fillPct}%;background:linear-gradient(90deg,#F97316 0%,${tier.fires>0?tier.color:'#F97316'} 100%);box-shadow:0 0 8px ${tier.glow};"></div>
        ${dots}
      </div>
      <div class="smom-milestone-lbls">${lbls}</div>
    </div>

    <div class="smom-stats-row">
      <div class="smom-stat">
        <div class="smom-stat-num" style="color:${tier.color};">${streak}</div>
        <div class="smom-stat-lbl">Streak Kini</div>
      </div>
      <div class="smom-stat">
        <div class="smom-stat-num" style="color:var(--gold);">${longest}</div>
        <div class="smom-stat-lbl">Rekor Terbaik</div>
      </div>
      <div class="smom-stat">
        <div class="smom-stat-num" style="color:var(--jade);">${todayActs}</div>
        <div class="smom-stat-lbl">Aktivitas Hari Ini</div>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// FINANCIAL INTELLIGENCE — Character Tab
// Hanya membaca state (income, expense, saldo). Tidak mengubah data apapun.
// ═══════════════════════════════════════════════════════════════
function renderFinancialIntelligence() {
  if(!state) return '';
  const { rank, rankIdx, nextRank, pct, income, expense, saldo, savingsRate } = getFinancialRank();

  const RANK_NAMES = ['Poor','Stable','Growing','Investor','Tycoon'];

  const rankDots = RANK_NAMES.map((rn, i) => {
    const done    = i < rankIdx;
    const current = i === rankIdx;
    const col     = current ? rank.color : done ? 'var(--jade)' : 'var(--muted-2)';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;">
      <div style="width:28px;height:28px;border-radius:50%;
        background:${done ? 'rgba(52,211,153,0.2)' : current ? 'rgba(255,255,255,0.06)' : 'rgba(255,255,255,0.03)'};
        border:1.5px solid ${col};
        display:flex;align-items:center;justify-content:center;
        box-shadow:${current ? '0 0 10px '+rank.glow : 'none'};
        font-size:11px;">${done ? '✓' : (i+1)}</div>
      <div style="font-family:var(--font-system);font-size:8.5px;font-weight:700;color:${col};letter-spacing:0.3px;white-space:nowrap;">${rn}</div>
    </div>`;
  }).join('<div style="flex:0 0 auto;width:12px;height:1px;background:var(--border);margin-top:14px;"></div>');

  const savingsPct  = Math.max(0, Math.min(100, Math.round(savingsRate * 100)));
  const expenseRatio = income > 0 ? Math.round((expense / income) * 100) : 0;

  const nextHint = nextRank
    ? `<div style="font-size:10.5px;color:var(--muted);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5;">
        Menuju <b style="color:${nextRank.color}">${nextRank.name}</b> · ${pct}% tercapai
      </div>`
    : `<div style="font-size:10.5px;color:var(--gold);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">👑 Rank tertinggi telah dicapai!</div>`;

  return `<div class="finrank-card" style="border-color:${rank.color === 'var(--crimson)' ? 'rgba(255,71,104,0.3)' : 'var(--border)'}">
    <div class="finrank-header">💰 Financial Intelligence</div>

    <div class="finrank-badge">
      <div>
        <div class="finrank-name" style="color:${rank.color};text-shadow:0 0 16px ${rank.glow}">${rank.icon} ${rank.name}</div>
        <div style="font-family:var(--font-system);font-size:10px;color:var(--muted);font-weight:700;letter-spacing:0.5px;margin-top:2px;text-transform:uppercase;">Financial Rank</div>
      </div>
      <div style="font-size:38px;line-height:1;filter:drop-shadow(0 0 8px ${rank.glow})">${rank.icon}</div>
    </div>

    <div class="finrank-desc">${rank.desc}</div>

    <div style="display:flex;align-items:center;gap:0;justify-content:center;margin-bottom:14px;">
      ${rankDots}
    </div>

    <div class="finrank-metrics">
      <div class="finrank-metric">
        <div class="finrank-metric-lbl">Pemasukan</div>
        <div class="finrank-metric-val" style="color:var(--jade);">${income >= 1000000 ? (income/1000000).toFixed(1)+'Jt' : income.toLocaleString('id-ID')}</div>
      </div>
      <div class="finrank-metric">
        <div class="finrank-metric-lbl">Pengeluaran</div>
        <div class="finrank-metric-val" style="color:var(--crimson);">${expense >= 1000000 ? (expense/1000000).toFixed(1)+'Jt' : expense.toLocaleString('id-ID')}</div>
      </div>
      <div class="finrank-metric">
        <div class="finrank-metric-lbl">Tabungan</div>
        <div class="finrank-metric-val" style="color:${saldo>=0?'var(--gold)':'var(--crimson)'};">${saldo >= 1000000 ? (saldo/1000000).toFixed(1)+'Jt' : saldo >= 0 ? saldo.toLocaleString('id-ID') : '-'+Math.abs(saldo).toLocaleString('id-ID')}</div>
      </div>
    </div>

    <div class="finrank-track-wrap">
      <div class="finrank-track-label"><span>Rasio Tabungan</span><span style="color:${savingsPct>=20?'var(--jade)':'var(--muted)'};">${savingsPct}%</span></div>
      <div class="finrank-track"><div class="finrank-fill" style="width:${Math.min(100,savingsPct)}%;background:linear-gradient(90deg,var(--jade),var(--cyan));box-shadow:0 0 6px rgba(52,211,153,0.4);"></div></div>
    </div>
    <div class="finrank-track-wrap">
      <div class="finrank-track-label"><span>Rasio Pengeluaran</span><span style="color:${expenseRatio>70?'var(--crimson)':expenseRatio>40?'var(--gold)':'var(--jade)'};">${expenseRatio}%</span></div>
      <div class="finrank-track"><div class="finrank-fill" style="width:${Math.min(100,expenseRatio)}%;background:${expenseRatio>70?'linear-gradient(90deg,var(--crimson),var(--orange))':'linear-gradient(90deg,var(--jade),var(--gold))'};"></div></div>
    </div>

    ${nextHint}
  </div>`;
}
</script>

<!-- ── BOTTOM NAV ORDERING ── -->
<script>
var _NAV_GROUP_DEFS = {
  home:      { label:'Home',      svg:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>' },
  quest:     { label:'Quest',     svg:'<path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10V3.5C10 2.67 9.33 2 8.5 2S7 2.67 7 3.5 7.67 5 8.5 5z"/>' },
  progres:   { label:'Progres',   svg:'<path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/><line x1="2" y1="20" x2="22" y2="20"/>' },
  finansial: { label:'Finansial', svg:'<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/>' },
  profil:    { label:'Profil',    svg:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>' },
};
var _DEFAULT_NAV_ORDER = ['home','quest','progres','finansial','profil'];

function renderBottomNav() {
  var nav = document.getElementById('bottom-nav');
  if (!nav) return;
  var order = (state && state.settings && Array.isArray(state.settings.navGroupOrder))
    ? state.settings.navGroupOrder : _DEFAULT_NAV_ORDER.slice();
  nav.innerHTML = order.map(function(g) {
    var def = _NAV_GROUP_DEFS[g];
    if (!def) return '';
    return '<button class="nav-btn main-nav-btn" data-group="' + g + '" onclick="setMainTab(\'' + g + '\')">' +
           '<svg viewBox="0 0 24 24">' + def.svg + '</svg><span>' + def.label + '</span></button>';
  }).join('');
  if (typeof renderMainNav === 'function') renderMainNav();
}

function moveNavGroup(id, dir) {
  if (!state || !state.settings) return;
  if (!Array.isArray(state.settings.navGroupOrder)) state.settings.navGroupOrder = _DEFAULT_NAV_ORDER.slice();
  var order = state.settings.navGroupOrder;
  var idx = order.indexOf(id);
  if (idx < 0) return;
  var swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= order.length) return;
  var tmp = order[idx]; order[idx] = order[swapIdx]; order[swapIdx] = tmp;
  save();
  renderBottomNav();
  _refreshSecMgr();
}

function resetNavGroupOrder() {
  if (!state || !state.settings) return;
  state.settings.navGroupOrder = _DEFAULT_NAV_ORDER.slice();
  save();
  renderBottomNav();
  _refreshSecMgr();
}
</script>

<!-- ── MAIN TAB GROUP NAVIGATION ── -->
<script>
(function() {
  var MAIN_TAB_GROUPS = {
    home:      { tabs: ['home'] },
    quest:     { tabs: ['quests','goals','project','ritual','refleksi','evaluasiMingguan'] },
    progres:   { tabs: ['stats','character','enlight'] },
    finansial: { tabs: ['boss'] },
    profil:    { tabs: ['profile','hall','lifeenc','realmenc','riwayat'] }
  };

  var TAB_LABELS = {
    home:'Home', quests:'Quest', goals:'Goals', project:'Project',
    ritual:'Ritual', refleksi:'Refleksi', evaluasiMingguan:'Evaluasi', stats:'Stats', character:'Character',
    enlight:'Enlight', boss:'Finansial', profile:'Profile', hall:'Fame',
    lifeenc:'Life Enc', realmenc:'Realm', riwayat:'Riwayat'
  };

  // Ingat sub-tab terakhir per grup
  var _lastSubTab = {};

  function getActiveMainGroup() {
    var cur = (state && state.ui && state.ui.tab) ? state.ui.tab : 'home';
    for (var g in MAIN_TAB_GROUPS) {
      if (MAIN_TAB_GROUPS[g].tabs.indexOf(cur) !== -1) return g;
    }
    return 'home';
  }

  window.setMainTab = function(group) {
    var grp = MAIN_TAB_GROUPS[group];
    if (!grp) return;
    var last = _lastSubTab[group];
    var target = (last && grp.tabs.indexOf(last) !== -1) ? last : grp.tabs[0];
    setTab(target);
  };

  function renderSubNav() {
    var cur = (state && state.ui && state.ui.tab) ? state.ui.tab : 'home';
    var grpKey = getActiveMainGroup();
    var grp = MAIN_TAB_GROUPS[grpKey];
    var subNav = document.getElementById('sub-nav');
    if (!subNav) return;

    // Update ingatan sub-tab
    _lastSubTab[grpKey] = cur;

    // Tampilkan sub-nav hanya jika grup punya lebih dari 1 tab
    if (!grp || grp.tabs.length <= 1) {
      subNav.classList.remove('visible');
      subNav.innerHTML = '';
      return;
    }

    subNav.classList.add('visible');
    subNav.innerHTML = grp.tabs.map(function(t) {
      return '<button class="sub-tab-btn' + (cur === t ? ' active' : '') +
             '" onclick="setTab(\'' + t + '\')">' + (TAB_LABELS[t] || t) + '</button>';
    }).join('');

    // Posisikan tepat di bawah header sticky
    var header = document.querySelector('.app-header');
    if (header) subNav.style.top = header.offsetHeight + 'px';

    // Auto-scroll ke sub-tab aktif
    var activeBtn = subNav.querySelector('.sub-tab-btn.active');
    if (activeBtn) {
      subNav.scrollTo({ left: activeBtn.offsetLeft - (subNav.clientWidth / 2) + (activeBtn.clientWidth / 2), behavior: 'smooth' });
    }
  }

  function renderMainNav() {
    var grpKey = getActiveMainGroup();
    document.querySelectorAll('.main-nav-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.group === grpKey);
    });
    renderSubNav();
  }
  window.renderMainNav = renderMainNav;

  // Patch renderNav agar juga update main nav + sub-nav
  var _origRenderNav = window.renderNav;
  window.renderNav = function() {
    if (_origRenderNav) _origRenderNav();
    renderMainNav();
  };
})();
</script>
