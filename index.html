<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MYSISTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js" onerror="console.warn('Chart.js gagal dimuat dari CDN — fitur grafik/chart tidak akan berfungsi. Periksa koneksi internet.')"></script>
<style>
:root{
  --void:#08080F;
  --void-2:#0F1020;
  --surface:rgba(255,255,255,0.035);
  --surface-strong:rgba(255,255,255,0.07);
  --border:rgba(150,135,255,0.16);
  --border-strong:rgba(170,155,255,0.30);
  --glass:rgba(18,18,34,0.62);
  --arise:#7C5CFF;
  --arise-bright:#A48BFF;
  --cyan:#2DD4F4;
  --gold:#F0B93B;
  --gold-soft:#F7D27A;
  --jade:#34D399;
  --crimson:#FF4768;
  --orange:#FF8A3D;
  --bone:#ECEAF5;
  --muted:#9492AC;
  --muted-2:#615F78;
  --font-display:'Cinzel',serif;
  --font-system:'Rajdhani',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-head:'Cinzel',serif;
  --font-classic:'Playfair Display',serif;
  --font-scifi:'Orbitron',sans-serif;
  --font-epic:'Cinzel Decorative',serif;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(circle at 50% 30%, #1a1025 0%, #08080F 50%, #030305 100%);
  color:var(--bone);
  font-family:var(--font-body);
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background: radial-gradient(circle at 15% 70%, rgba(45,212,244,0.04) 0%, transparent 50%),
              radial-gradient(circle at 85% 20%, rgba(124,92,255,0.04) 0%, transparent 50%);
}

button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
::selection{background:var(--arise);color:#fff;}
a{color:var(--cyan);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

.holo-text {
    background: linear-gradient(90deg, var(--cyan), var(--arise-bright), var(--jade), var(--cyan));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: holoFlow 4s linear infinite;
    font-weight: 800;
    text-shadow: 0 0 15px rgba(45, 212, 244, 0.4);
}
@keyframes holoFlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

.name-holo-gold, .name-holo-rainbow, .name-holo-silver {
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: holoFlow 4s linear infinite;
}
.name-holo-gold { background-image: linear-gradient(90deg, #ffffff, #F0B93B, #fff9e6, #F7D27A, #ffffff); }
.name-holo-rainbow { background-image: linear-gradient(90deg, #FF4768, #F0B93B, #34D399, #2DD4F4, #7C5CFF, #FF4768); }
.name-holo-silver { background-image: linear-gradient(90deg, #cfd3da, #ffffff, #9aa0ab, #ffffff, #cfd3da); }
.name-holo-swatch { width:30px; height:30px; border-radius:50%; border:2px solid var(--border-strong); cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.name-holo-swatch.active { border-color: var(--arise-bright); box-shadow: 0 0 0 2px rgba(124,92,255,0.35); }
.name-holo-swatch.swatch-none { background: rgba(255,255,255,0.05); color: var(--muted); font-size:10px; }
.name-holo-swatch.swatch-gold { background: linear-gradient(135deg, #ffffff, #F0B93B, #F7D27A); }
.name-holo-swatch.swatch-rainbow { background: linear-gradient(135deg, #FF4768, #F0B93B, #34D399, #2DD4F4, #7C5CFF); }
.name-holo-swatch.swatch-silver { background: linear-gradient(135deg, #cfd3da, #ffffff, #9aa0ab); }

#bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

.click-ripple {
    position: fixed; border-radius: 50%; pointer-events: none;
    background: rgba(45, 212, 244, 0.4); transform: translate(-50%, -50%) scale(0);
    animation: rippleAnim 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; z-index: 9999;
    box-shadow: 0 0 15px var(--cyan);
}
@keyframes rippleAnim { 100% { transform: translate(-50%, -50%) scale(4); opacity: 0; } }

/* Sedekah reward FX — cahaya, partikel emas, floating text. Maks ~1s, tidak mengubah fitur/logika sedekah. */
.sedekah-flash{
    position:fixed; width:16px; height:16px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:9999;
    background:radial-gradient(circle, rgba(255,241,196,.95), rgba(240,185,59,.55) 45%, rgba(240,185,59,0) 72%);
    box-shadow:0 0 30px 10px rgba(240,185,59,.45), 0 0 60px 22px rgba(240,185,59,.20);
    animation: sedekahFlashAnim .5s ease-out forwards;
}
@keyframes sedekahFlashAnim{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.2); }
    30%{ opacity:1; transform:translate(-50%,-50%) scale(1.6); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(2.4); }
}
.sedekah-particle{
    position:fixed; width:5px; height:5px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:9999;
    background:radial-gradient(circle, #fff6d8, #f0b93b 60%, rgba(240,185,59,0) 100%);
    box-shadow:0 0 6px rgba(240,185,59,.9);
    animation: sedekahParticleAnim .9s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes sedekahParticleAnim{
    0%{ opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) translate(var(--dx), var(--dy)) scale(.3); }
}
.sedekah-float-text{
    position:fixed; pointer-events:none; z-index:9999;
    font-family:var(--font-epic); font-weight:800; font-size:13px; letter-spacing:.4px;
    color:#ffe9b0; text-shadow:0 0 8px rgba(240,185,59,.8), 0 0 16px rgba(240,185,59,.4);
    transform:translate(-50%,-50%);
    animation: sedekahFloatTextAnim 1s ease-out forwards;
}
@keyframes sedekahFloatTextAnim{
    0%{ opacity:0; transform:translate(-50%,-50%) translateY(0); }
    15%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-50%) translateY(-88px); }
}
.sedekah-blessing-aura{
    position:fixed; width:10px; height:10px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:9998;
    border:1px solid rgba(255,236,190,.55);
    box-shadow:0 0 18px rgba(240,185,59,.30), inset 0 0 14px rgba(255,236,190,.20);
    animation: sedekahAuraAnim .9s cubic-bezier(.15,.7,.25,1) forwards;
}
@keyframes sedekahAuraAnim{
    0%{ opacity:.9; transform:translate(-50%,-50%) scale(.3); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(6); }
}
.sedekah-sub-text{
    position:fixed; pointer-events:none; z-index:9999;
    font-family:var(--font-system); font-weight:600; font-size:10.5px; letter-spacing:.6px;
    color:rgba(255,236,190,.85); text-shadow:0 0 6px rgba(240,185,59,.5);
    transform:translate(-50%,-50%); white-space:nowrap;
    animation: sedekahSubTextAnim .95s ease-out forwards;
}
@keyframes sedekahSubTextAnim{
    0%{ opacity:0; transform:translate(-50%,-50%) translateY(0); }
    20%{ opacity:.95; }
    100%{ opacity:0; transform:translate(-50%,-50%) translateY(14px); }
}

.screen{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.app-header{
  position:sticky;top:0;z-index:20; padding:14px 16px 10px;
  background:linear-gradient(to bottom, rgba(8,8,20,0.72), rgba(8,8,20,0.28));
  backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid rgba(124,92,255,0.08);
}
.wordmark-row{display:flex;align-items:center;justify-content:space-between;}
.wordmark{
  font-family:var(--font-epic); font-size:19px; letter-spacing:2.5px; font-weight:900;
  text-transform:uppercase;
  background:linear-gradient(90deg, var(--gold-soft), var(--gold) 45%, var(--arise-bright));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 10px rgba(240,185,59,0.35)) drop-shadow(0 0 2px rgba(0,0,0,0.6));
}

.day-counter {
  font-family: var(--font-display); font-size: 14px;
  background: linear-gradient(90deg, var(--gold-soft), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  filter: drop-shadow(0 0 4px rgba(240, 185, 59, 0.4));
  display: flex; align-items: center; gap: 4px;
}

.recovery-banner{
  margin-top:8px;font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(90deg,rgba(255,71,104,0.35),rgba(255,71,104,0.12));
  border:1px solid rgba(255,71,104,0.5);
  border-radius:10px;padding:8px 10px;letter-spacing:0.3px;
}
.recovery-banner small{display:block;font-weight:400;color:#ffd9df;margin-top:2px;font-size:11px;}

.hp-zero-banner{
  margin-top:8px;font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(90deg,rgba(255,138,61,0.35),rgba(255,138,61,0.12));
  border:1px solid rgba(255,138,61,0.5);
  border-radius:10px;padding:8px 10px;letter-spacing:0.3px;
}
.hp-zero-banner small{display:block;font-weight:400;color:#ffe3cf;margin-top:2px;font-size:11px;}
.hp-low-warning{margin-top:8px;padding:8px 12px;border-radius:10px;background:rgba(240,185,59,0.12);border:1px solid rgba(240,185,59,0.4);color:#f0b93b;font-size:11.5px;font-weight:700;text-align:center;}
.consequence-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.consequence-box{max-width:420px;width:100%;background:#2a0505;border:2px solid #ff4768;border-radius:14px;padding:22px 20px;text-align:center;animation:consequenceBlink 1s infinite;box-shadow:0 0 30px rgba(255,71,104,0.6);}
@keyframes consequenceBlink{0%{box-shadow:0 0 12px rgba(255,71,104,0.4);border-color:#ff4768;}50%{box-shadow:0 0 34px rgba(255,71,104,0.9);border-color:#ffb3c0;}100%{box-shadow:0 0 12px rgba(255,71,104,0.4);border-color:#ff4768;}}
.consequence-box h3{color:#ff4768;font-family:var(--font-display);font-size:16px;margin-bottom:10px;letter-spacing:0.5px;}
.consequence-box p{color:#ffe3e3;font-size:13.5px;line-height:1.5;margin-bottom:16px;white-space:pre-wrap;}

.tab-content{flex:1;padding:16px 16px 110px;animation:tabIn 0.28s ease;}
@keyframes tabIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── Bottom Nav: Glass Hologram Cultivation UI ── */
.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:480px;margin:0 auto;display:flex;
  background:rgba(7,7,18,0.7);
  backdrop-filter:blur(28px) saturate(180%);
  border-top:1px solid rgba(124,92,255,0.14);
  box-shadow:0 -1px 0 rgba(255,255,255,0.025), 0 -10px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  padding:5px 2px calc(5px + env(safe-area-inset-bottom));
  overflow-x:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none;
}
.bottom-nav::-webkit-scrollbar{display:none;}

.nav-btn{
  flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;
  background:none;border:none;color:rgba(130,120,175,0.7);
  padding:7px 2px 4px;border-radius:12px;
  font-family:var(--font-system);font-size:9px;letter-spacing:0.3px;font-weight:600;
  transition:color .25s, transform .2s;
  position:relative;
  cursor:pointer;
}

/* Tier 1 — glass capsule behind every icon (inactive) */
.nav-btn::before{
  content:'';
  position:absolute;
  top:4px;left:50%;
  transform:translateX(-50%);
  width:34px;height:34px;
  border-radius:10px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);
  transition:all .28s cubic-bezier(.4,0,.2,1);
}

/* Tier 2 — energy ring (only animates when active) */
.nav-btn::after{
  content:'';
  position:absolute;
  top:3px;left:50%;
  transform:translateX(-50%);
  width:36px;height:36px;
  border-radius:11px;
  border:1px solid transparent;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}

.nav-btn svg{
  width:18px;height:18px;
  stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
  transition:filter .28s, transform .28s, stroke .28s;
  position:relative;z-index:1;
}

.nav-btn span{
  position:relative;z-index:1;
  transition:color .25s;
}

/* ── ACTIVE: Tier 2 Hologram ── */
.nav-btn.active{
  color:rgba(200,188,255,0.95);
}

.nav-btn.active::before{
  background:rgba(124,92,255,0.13);
  border-color:rgba(164,139,255,0.32);
  box-shadow:0 0 14px rgba(124,92,255,0.22), inset 0 0 10px rgba(124,92,255,0.07);
  transform:translateX(-50%) translateY(-1.5px);
}

.nav-btn.active::after{
  border-color:rgba(164,139,255,0.42);
  transform:translateX(-50%) translateY(-1.5px);
  animation:navAuraRing 2.4s ease-in-out infinite;
}

.nav-btn.active svg{
  stroke:rgba(215,205,255,0.97);
  filter:drop-shadow(0 0 4px rgba(164,139,255,1)) drop-shadow(0 0 10px rgba(124,92,255,0.55));
  transform:translateY(-1.5px);
}

@keyframes navAuraRing{
  0%,100%{box-shadow:0 0 8px rgba(124,92,255,0.28);opacity:.75;}
  50%{box-shadow:0 0 20px rgba(164,139,255,0.5), 0 0 5px rgba(210,195,255,0.25);opacity:1;}
}

.holo-box {
  background: rgba(255,255,255,0.02) !important;
  border: 1px solid rgba(45, 212, 244, 0.2) !important;
  box-shadow: inset 0 0 15px rgba(124, 92, 255, 0.05), 0 5px 20px rgba(0,0,0,0.5) !important;
  backdrop-filter: blur(12px) !important;
}

.glass-panel{
  background:var(--glass); border:1px solid var(--border); border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}
.card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:14px; }
.card-title{ font-family:var(--font-system);font-size:12.5px;letter-spacing:1.2px;font-weight:700; color:var(--muted);text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between; }
.section-title{
  font-family:var(--font-display); font-size:15.5px; font-weight:800; color:var(--bone);
  margin:24px 0 12px; letter-spacing:1px; text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
  text-shadow:0 0 12px rgba(164,139,255,0.25);
}
.section-title::before{
  content:''; width:3px; height:14px; border-radius:2px; flex-shrink:0;
  background:linear-gradient(180deg, var(--gold-soft), var(--arise-bright));
}
.section-title:first-child{margin-top:0;}

.btn{ font-family:var(--font-system);font-weight:700;letter-spacing:0.5px;font-size:13px; border-radius:12px;padding:10px 14px;border:1px solid transparent; display:inline-flex;align-items:center;justify-content:center;gap:6px; transition:transform .12s, opacity .12s; }
.btn-secondary { background:rgba(255,255,255,0.05); color:var(--bone); border:1px solid var(--border); }
.btn-secondary:hover { background:rgba(255,255,255,0.1); }
.btn:active{transform:scale(0.96);}
.btn-block{width:100%;}
.btn-primary{background:linear-gradient(90deg,var(--arise),var(--cyan));color:#0a0a14;}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);color:var(--bone);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}
.btn-danger{background:rgba(255,71,104,0.1);border:1px solid rgba(255,71,104,0.45);color:#ffb4c1;}
.btn-gold{background:linear-gradient(90deg,var(--gold),var(--orange));color:#1a1206;}
.btn-sm{padding:7px 10px;font-size:11.5px;border-radius:9px;}
.btn[disabled]{opacity:0.35;pointer-events:none;}

.icon-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:6px; display:inline-flex; align-items:center; justify-content:center; border-radius:8px; transition:all 0.2s ease; }
.icon-btn:hover { background:rgba(255,255,255,0.1); color:var(--bone); }
.icon-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

.pill{ font-family:var(--font-system);font-size:10px;font-weight:700;letter-spacing:0.6px; padding:3px 8px;border-radius:20px;display:inline-block;text-transform:uppercase; }
.row{display:flex;align-items:center;}
.row-between{display:flex;align-items:center;justify-content:space-between;}
.gap-6{gap:6px;} .gap-8{gap:8px;} .gap-10{gap:10px;}
.muted{color:var(--muted);} .small{font-size:11.5px;}
.mt-10{margin-top:10px;} .mt-14{margin-top:14px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:0.5px; text-transform:uppercase;}
.field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea,
.input, .shift-select, .realm-row input[type=text], .realm-row input[type=number], .num-input-sm {
  width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:12px 14px;color:#fff;font-size:14px;outline:none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
  color-scheme: dark;
}
.field input:focus,.field select:focus,.field textarea:focus,
.input:focus, .shift-select:focus, .realm-row input:focus, .num-input-sm:focus { border-color:var(--cyan); box-shadow: 0 0 0 3px rgba(45,212,244,0.2), inset 0 2px 5px rgba(0,0,0,0.5); }
.field textarea{resize:vertical;min-height:70px;}

.form-row { display:flex; gap:10px; }
.form-group { margin-bottom: 13px; }
.form-group.half { flex:1; }
.form-group label { display:block; font-size:11.5px; color:var(--muted); margin-bottom:5px; font-weight:600; letter-spacing:0.3px; }

.stat-row{margin-bottom:12px;}
.stat-row-top{display:flex;justify-content:space-between;font-family:var(--font-system);font-size:12.5px;margin-bottom:5px;}
.stat-name{color:var(--bone);font-weight:600;letter-spacing:0.3px;}
.stat-val{color:var(--muted);font-weight:700;}
.stat-track{height:7px;border-radius:6px;background:rgba(255,255,255,0.06);overflow:hidden;}
.stat-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.stat-group-label{font-family:var(--font-system);font-size:10.5px;color:var(--muted-2);letter-spacing:1.4px;text-transform:uppercase;margin:14px 0 8px;}

.ring-wrap{position:relative;width:168px;height:168px;margin:6px auto 4px;}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,0.07);stroke-width:9;}
.ring-fill{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(.2,.8,.2,1);}
.ring-orbit{ position:absolute;inset:8px;border-radius:50%; border:1px dashed rgba(164,139,255,0.35); animation:orbitSpin 14s linear infinite; }
@keyframes orbitSpin{to{transform:rotate(360deg);}}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-level-label{font-family:var(--font-system);font-size:10px;color:var(--muted);letter-spacing:1.5px;}

.title-banner {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 5;
    animation: floatBanner 6s ease-in-out infinite;
    text-align: center;
    transition: all 0.3s ease;
    will-change: transform;
}
@keyframes floatBanner { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

/* ═══════════════════════════════════
   HEAVEN TRAMPLING — Visual Effects
   ═══════════════════════════════════ */
@keyframes htAuraPulse {
  0%,100% { box-shadow: 0 0 16px rgba(255,215,0,0.3), 0 0 28px rgba(255,100,0,0.15); }
  50%      { box-shadow: 0 0 26px rgba(255,215,0,0.55), 0 0 45px rgba(255,100,0,0.28); }
}
@keyframes htBorderGlow {
  0%,100% { border-color: rgba(255,200,50,0.5); }
  50%      { border-color: rgba(255,255,180,0.95); }
}
@keyframes htTitleFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}
@keyframes htRingRotate {
  to { transform: rotate(360deg); }
}
@keyframes htShimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes htImmortalGlow {
  0%   { text-shadow: 0 0 12px #fff, 0 0 24px rgba(255,215,0,0.9), 0 0 40px rgba(255,100,0,0.5); }
  33%  { text-shadow: 0 0 18px #fff, 0 0 36px rgba(124,92,255,0.9), 0 0 60px rgba(45,212,244,0.6); }
  66%  { text-shadow: 0 0 16px #fff, 0 0 30px rgba(255,71,104,0.9), 0 0 50px rgba(255,215,0,0.7); }
  100% { text-shadow: 0 0 12px #fff, 0 0 24px rgba(255,215,0,0.9), 0 0 40px rgba(255,100,0,0.5); }
}
.ht-card {
  position: relative; overflow: hidden;
  background: linear-gradient(145deg, rgba(20,10,0,0.9), rgba(40,15,0,0.8), rgba(10,5,20,0.9)) !important;
  border: 1px solid rgba(255,200,50,0.5) !important;
  animation: htAuraPulse 8s ease-in-out infinite, htBorderGlow 8s ease-in-out infinite;
}
.ht-card::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.12) 0%, transparent 70%),
              radial-gradient(ellipse at 50% 100%, rgba(124,92,255,0.08) 0%, transparent 70%);
}
.ht-card::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,200,0.08), transparent);
  animation: htShimmer 10s linear infinite;
  pointer-events:none; z-index:1;
}
.ht-bridge-ring {
  position:absolute; border-radius:50%; pointer-events:none;
  border: 1px solid rgba(255,200,50,0.25);
}
.ht-bridge-ring.r1 { width:200px; height:200px; top:-50px; right:-50px; animation: htRingRotate 35s linear infinite; }
.ht-bridge-ring.r2 { width:150px; height:150px; bottom:-30px; left:-30px; animation: htRingRotate 28s linear infinite reverse; border-color: rgba(124,92,255,0.2); }
.ht-bridge-bar-wrap { position:relative; z-index:2; margin-top:10px; }
.ht-bridge-bar-track { height:8px; border-radius:6px; background:rgba(255,255,255,0.06); overflow:hidden; border:1px solid rgba(255,200,50,0.2); }
.ht-bridge-bar-fill {
  height:100%; border-radius:6px;
  background: linear-gradient(90deg, #f0b93b, #ff8a3d, #ff4768, #a48bff, #2dd4f4, #f0b93b);
  background-size: 300% 100%;
  animation: holoFlow 5s linear infinite;
  box-shadow: 0 0 8px rgba(255,185,59,0.5);

}
.ht-lv-badge {

  font-weight:800; text-transform:uppercase;
  box-shadow: 0 0 10px rgba(240,185,59,0.25);
}
.ht-bridge-dots { display:flex; gap:5px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
.ht-bridge-dot {
  width:22px; height:22px; border-radius:50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,200,50,0.25);

}
.ht-bridge-dot.done {
  background: linear-gradient(135deg, var(--gold), var(--orange));
  border-color: var(--gold-soft);
  color: #1a1206;

}

  border-color: rgba(255,255,200,0.9);

}

  position:relative; z-index:2;

@keyframes spiritSpin{from{transform:rotate(0deg);} to{transform:rotate(360deg);}}
.spirit-companion-bubble{opacity:0;transform:translateY(8px) scale(0.96);pointer-events:none;transition:opacity 0.25s ease,transform 0.25s ease;background:rgba(12,12,26,0.88);backdrop-filter:blur(20px) saturate(160%);border:1px solid rgba(124,92,255,0.35);border-radius:16px;padding:12px 14px;box-shadow:0 10px 30px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.04);width:100%;}
.spirit-companion-widget.expanded .spirit-companion-bubble{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.spirit-companion-bond{font-family:var(--font-system);font-size:11px;font-weight:700;letter-spacing:0.4px;color:var(--arise-bright);margin-bottom:6px;}
.spirit-companion-text{font-family:var(--font-system);font-size:13px;line-height:1.5;color:var(--bone);}
.spirit-companion-wisdom{font-family:var(--font-system);font-size:11px;line-height:1.5;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.08);font-style:italic;}

.empty-state{text-align:center;padding:30px 14px;color:var(--muted);font-size:12.5px;}
.empty-state .big{font-family:var(--font-display);font-size:14px;color:var(--bone);margin-bottom:5px;display:block;}

.live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); margin-right: 6px; animation: pulseOpacity 1.5s infinite; }
@keyframes pulseOpacity { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }

.life-principle-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; padding:2px 22px 2px; animation: lifePrincipleFadeIn 0.9s ease; }
.life-principle-line { width:26px; height:1px; background:linear-gradient(90deg, transparent, rgba(240,200,120,0.55), transparent); margin-bottom:8px; }
.life-principle-text { font-family:var(--font-display); font-style:italic; font-weight:500; font-size:12.5px; line-height:1.5; letter-spacing:0.3px; max-width:320px; background:linear-gradient(90deg, rgba(230,200,150,0.75), rgba(255,240,210,0.98), rgba(230,200,150,0.75)); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 14px rgba(240,200,120,0.15); animation: lifePrincipleShimmer 6s ease-in-out infinite; }
@keyframes lifePrincipleShimmer { 0%{background-position:0% center;} 50%{background-position:100% center;} 100%{background-position:0% center;} }
@keyframes lifePrincipleFadeIn { 0%{opacity:0; transform:translateY(-4px);} 100%{opacity:1; transform:translateY(0);} }
.life-principle-card { position:relative; margin-top:14px; border-color: rgba(240,200,120,0.28); background: linear-gradient(145deg, rgba(240,200,120,0.06), transparent); }
.life-principle-text.life-principle-empty { -webkit-text-fill-color:var(--muted); background:none; font-style:normal; font-size:12px; animation:none; text-shadow:none; }
.life-principle-edit-btn { position:absolute; top:8px; right:10px; background:none; border:none; font-size:13px; opacity:0.55; cursor:pointer; padding:4px; line-height:1; }
.life-principle-edit-btn:hover { opacity:1; }
.refleksi-section-title { font-family:var(--font-display); font-weight:900; font-size:15px; letter-spacing:2px; text-transform:uppercase; text-align:center; background:linear-gradient(90deg,#7a5c1e,#ffe680,#c8a84b,#fff5b0,#a07830,#ffe680,#7a5c1e); background-size:300% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:lifePrincipleShimmer 3.5s ease-in-out infinite; margin-bottom:6px; }
.refleksi-journal-card { border-color:rgba(200,168,75,0.32) !important; background:linear-gradient(145deg,rgba(200,168,75,0.07),transparent) !important; }
.refleksi-q-card { border-color:rgba(200,168,75,0.25) !important; background:linear-gradient(145deg,rgba(200,168,75,0.04),transparent) !important; }
.refleksi-home-card { border-color:rgba(200,168,75,0.38) !important; background:linear-gradient(145deg,rgba(200,168,75,0.08),transparent) !important; position:relative; margin-top:14px; }
.refleksi-home-quote { font-family:var(--font-display); font-style:italic; font-weight:700; font-size:13px; line-height:1.7; text-align:center; max-width:320px; background:linear-gradient(90deg,rgba(160,120,48,0.9),rgba(255,230,128,1),rgba(200,168,75,0.9)); background-size:200% auto; -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; animation:lifePrincipleShimmer 5s ease-in-out infinite; }
.refleksi-profile-chip { display:inline-flex; align-items:center; gap:5px; background:linear-gradient(135deg,rgba(200,168,75,0.13),rgba(200,168,75,0.04)); border:1px solid rgba(200,168,75,0.42); border-radius:14px; padding:5px 12px; font-family:var(--font-display); font-size:10.5px; font-weight:800; color:#c8a84b; cursor:pointer; margin-top:7px; letter-spacing:0.4px; }
.refleksi-history-item { padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.refleksi-history-item:last-child { border-bottom:none; }


.habit-row { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; gap: 10px; }
.habit-title { font-size: 13.5px; font-weight: 600; color: var(--bone); }
.habit-days { display: flex; justify-content: space-between; width: 100%; }
.habit-day { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.habit-day-lbl { font-size: 9.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.habit-day-lbl.today { color: var(--arise-bright); }
.habit-dot { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-strong); background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; transition: all 0.2s; cursor: pointer; }
.habit-dot.done { background: var(--jade); border-color: var(--jade); color: var(--void); box-shadow: 0 0 8px rgba(52,211,153,0.4); }
.habit-dot svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 3; opacity: 0; transition: opacity 0.2s; }
.habit-dot.done svg { opacity: 1; }

.calendar-card { padding: 16px; border-color: rgba(45,212,244,0.3); background: linear-gradient(145deg, rgba(45,212,244,0.03), transparent); margin-bottom: 14px; }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; font-family: var(--font-display); font-weight: 600; font-size: 16px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
.cal-day-name { font-size: 10.5px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
.cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; font-family: var(--font-system); font-weight: 700; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid transparent; color: var(--muted-2); transition: all 0.2s;}
.cal-cell.empty { background: transparent; border: none; }
.cal-cell.active-1 { background: rgba(52,211,153,0.15); color: var(--jade); border-color: rgba(52,211,153,0.3); }
.cal-cell.active-2 { background: rgba(52,211,153,0.3); color: var(--jade); border-color: rgba(52,211,153,0.4); }
.cal-cell.active-3 { background: rgba(52,211,153,0.5); color: #fff; border-color: rgba(52,211,153,0.8); }
.cal-cell.today { border-color: var(--cyan); box-shadow: inset 0 0 8px rgba(45,212,244,0.2), 0 0 8px rgba(45,212,244,0.4); color: var(--cyan); }
.cal-cell.missed { color: var(--crimson); text-decoration: line-through; background: rgba(255,71,104,0.1); }
.cal-nav-btn { background: var(--surface); border: 1px solid var(--border); color: var(--bone); padding: 6px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.cal-nav-btn:hover { background: var(--arise); border-color: var(--arise); color: #fff; }

.mini-dot-row{display:flex;gap:5px;margin-top:8px;}
.mini-dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);}
.mini-dot.done{background:var(--jade);box-shadow:0 0 6px rgba(52,211,153,0.7);}

.kanban-board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x mandatory; scrollbar-width: none; -ms-overflow-style: none; }
.kanban-board::-webkit-scrollbar { display: none; }
.kanban-col { min-width: 270px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 14px; padding: 12px; display: flex; flex-direction: column; scroll-snap-align: start; }
.kanban-col-title { font-family: var(--font-display); font-size: 13.5px; margin-bottom: 12px; border-bottom: 1px solid var(--border-strong); padding-bottom: 8px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.kanban-cards { flex: 1; min-height: 200px; display: flex; flex-direction: column; gap: 10px; }
.kanban-card { background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.5)); border: 1px solid var(--border-strong); border-left: 4px solid var(--cyan); padding: 12px; border-radius: 10px; color: var(--bone); cursor: grab; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.kanban-add-btn { margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.03); border: 1px dashed var(--border-strong); color: var(--muted); border-radius: 8px; cursor: pointer; font-family: var(--font-system); font-weight: 700; letter-spacing: 1px;}
/* ═══ BULLETIN BOARD — PAPAN PROJEK TERPADU ═══ */
.bp-board { background:linear-gradient(145deg,#2d1f0a,#1c1308,#251a09); border:2px solid rgba(160,110,35,0.35); border-radius:16px; padding:18px 14px 14px; position:relative; box-shadow:inset 0 2px 24px rgba(0,0,0,0.55),0 6px 24px rgba(0,0,0,0.45); overflow:hidden; }
.bp-board::before { content:''; position:absolute; inset:0; border-radius:14px; background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(255,255,255,0.012) 28px,rgba(255,255,255,0.012) 29px),repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,0.012) 28px,rgba(255,255,255,0.012) 29px); pointer-events:none; }
.bp-board-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; position:relative; z-index:1; }
.bp-board-title { font-family:var(--font-display); font-size:14px; font-weight:900; color:#c8a850; letter-spacing:1.5px; text-shadow:0 1px 4px rgba(0,0,0,0.6); }
.bp-summary { margin-bottom:14px; padding:8px 12px; background:rgba(0,0,0,0.3); border-radius:8px; border:1px solid rgba(160,110,35,0.25); position:relative; z-index:1; }
.bp-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; position:relative; z-index:1; }
.bp-card-wrap { display:flex; flex-direction:column; align-items:center; }
.bp-pin { width:15px; height:15px; background:radial-gradient(circle at 38% 32%,#ff8080,#c0392b,#8b0000); border-radius:50%; box-shadow:0 2px 6px rgba(0,0,0,0.7),inset 0 1px 2px rgba(255,255,255,0.35); position:relative; z-index:3; margin-bottom:-7px; flex-shrink:0; }
.bp-card { background:linear-gradient(160deg,#f5eed8,#ede5c8,#e6ddb8); border-radius:3px; padding:14px 11px 10px; width:100%; box-sizing:border-box; box-shadow:2px 6px 16px rgba(0,0,0,0.55),0 1px 3px rgba(0,0,0,0.25); position:relative; color:#2a1a05; transition:transform 0.2s; }
.bp-card.status-planning { transform:rotate(-1.2deg); }
.bp-card.status-building { transform:rotate(0.5deg); border-top:3px solid #0ea5e9; }
.bp-card.status-review { transform:rotate(-0.7deg); border-top:3px solid #a855f7; }
.bp-card.status-done { transform:rotate(-0.6deg); }
.bp-card-title { font-size:11.5px; font-weight:900; color:#1a0e00; margin-bottom:4px; line-height:1.3; font-family:var(--font-display); }
.bp-card-desc { font-size:9.5px; color:#6b4f1a; margin-bottom:5px; line-height:1.45; }
.bp-chip { display:inline-block; font-size:8.5px; font-weight:800; padding:2px 7px; border-radius:20px; margin-bottom:6px; letter-spacing:0.4px; }
.bp-chip.planning { background:rgba(180,130,10,0.18); color:#7a5500; border:1px solid rgba(180,130,10,0.35); }
.bp-chip.building { background:rgba(14,165,233,0.18); color:#0369a1; border:1px solid rgba(14,165,233,0.35); }
.bp-chip.review { background:rgba(168,85,247,0.15); color:#7e22ce; border:1px solid rgba(168,85,247,0.3); }
.bp-chip.done { background:rgba(22,163,74,0.18); color:#166534; border:1px solid rgba(22,163,74,0.35); }
.bp-divider { height:1px; background:rgba(100,74,20,0.18); margin:6px 0; }
.bp-checkins-label { font-size:8.5px; font-weight:800; color:#7a5500; margin-bottom:4px; letter-spacing:0.5px; }
.bp-checkins { display:flex; gap:3px; flex-wrap:wrap; margin-bottom:5px; }
.bp-day { width:17px; height:17px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:800; border:1px solid rgba(100,74,20,0.2); }
.bp-day.ok { background:rgba(22,163,74,0.25); color:#15803d; border-color:rgba(22,163,74,0.4); }
.bp-day.fail { background:rgba(220,38,38,0.2); color:#b91c1c; border-color:rgba(220,38,38,0.35); }
.bp-day.today-empty { border:1.5px solid #0ea5e9; background:rgba(14,165,233,0.1); color:#0369a1; }
.bp-day.empty { background:rgba(100,74,20,0.08); color:rgba(100,74,20,0.3); }
.bp-progress-bar { height:4px; background:rgba(100,74,20,0.15); border-radius:3px; margin:5px 0 4px; overflow:hidden; }
.bp-progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#0ea5e9,#22c55e); transition:width 0.4s; }
.bp-deadline { font-size:9px; color:#7a5500; margin-top:3px; }
.bp-deadline.overdue { color:#dc2626; font-weight:800; }
.bp-btn-row { display:flex; gap:3px; margin-top:6px; }
.bp-btn-row button { flex:1; padding:5px 2px; border-radius:4px; border:none; font-size:9px; font-weight:800; cursor:pointer; }
.bp-btn-ok { background:linear-gradient(90deg,#16a34a,#15803d); color:#fff; }
.bp-btn-fail { background:linear-gradient(90deg,#dc2626,#b91c1c); color:#fff; }
.bp-btn-edit { background:rgba(100,74,20,0.15); color:#5a3e0a; }
.bp-btn-next { background:rgba(14,165,233,0.18); color:#0369a1; }
.bp-btn-del { background:rgba(220,38,38,0.1); color:#991b1b; }
.bp-done-overlay { position:absolute; inset:0; border-radius:3px; background:rgba(10,18,8,0.78); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; z-index:2; }
.bp-stamp { border:2.5px solid #22c55e; border-radius:5px; padding:5px 11px; text-align:center; transform:rotate(-5deg); }
.bp-stamp-title { font-size:9px; font-weight:900; color:#22c55e; letter-spacing:2px; font-family:var(--font-display); }
.bp-stamp-exp { font-size:8.5px; color:rgba(34,197,94,0.85); margin-top:1px; font-weight:700; }
.bp-stamp-days { font-size:8px; color:rgba(34,197,94,0.65); }
.bp-add-btn { margin-top:14px; width:100%; padding:12px; background:rgba(160,110,35,0.08); border:1.5px dashed rgba(160,110,35,0.35); color:rgba(200,168,80,0.75); border-radius:10px; cursor:pointer; font-family:var(--font-system); font-weight:800; letter-spacing:1px; font-size:11.5px; box-sizing:border-box; }
.bp-empty-board { text-align:center; padding:40px 12px; color:rgba(200,168,80,0.4); font-size:11.5px; line-height:1.8; }
.bp-today-tag { font-size:8px; font-weight:900; color:#0ea5e9; background:rgba(14,165,233,0.12); border:1px solid rgba(14,165,233,0.3); border-radius:3px; padding:1px 4px; margin-left:3px; }

/* ── BLUEPRINT card variant (biru gelap, kertas teknis) ── */
.bp-pin.bp-pin-blue { background:radial-gradient(circle at 38% 32%,#60a5fa,#2563eb,#1e3a8a); }
.bp-card.bp-blueprint {
  background: linear-gradient(160deg,#0d1f35,#0a1929,#0e2340);
  color: #b8d4f0;
  border-radius: 3px;
  /* grid watermark seperti kertas blueprint asli */
  background-image:
    linear-gradient(160deg,#0d1f35,#0a1929,#0e2340),
    repeating-linear-gradient(0deg,transparent,transparent 18px,rgba(59,130,246,0.07) 18px,rgba(59,130,246,0.07) 19px),

  background-blend-mode: normal, normal, normal;
  border: 1px solid rgba(59,130,246,0.25);

}
.bp-card.bp-blueprint .bp-card-title { color:#e0efff; }
.bp-card.bp-blueprint .bp-card-desc  { color:#7eb8e8; }
.bp-card.bp-blueprint .bp-chip.planning { background:rgba(59,130,246,0.18); color:#93c5fd; border-color:rgba(59,130,246,0.4); }
.bp-card.bp-blueprint .bp-chip.building { background:rgba(14,165,233,0.18); color:#7dd3fc; border-color:rgba(14,165,233,0.4); }

.bp-card.bp-blueprint .bp-divider       { background:rgba(59,130,246,0.2); }
.bp-card.bp-blueprint .bp-checkins-label{ color:#7eb8e8; }
.bp-card.bp-blueprint .bp-deadline      { color:#7eb8e8; }
.bp-card.bp-blueprint .bp-deadline.overdue { color:#f87171; }
.bp-card.bp-blueprint .bp-progress-bar  { background:rgba(59,130,246,0.15); }
.bp-card.bp-blueprint .bp-progress-fill { background:linear-gradient(90deg,#3b82f6,#06b6d4); }
.bp-card.bp-blueprint > div[style*="color:#7a5500"] { color:#6ba3cc !important; }
.bp-card.bp-blueprint .bp-btn-edit { background:rgba(59,130,246,0.18); color:#93c5fd; }
.bp-card.bp-blueprint .bp-btn-next { background:rgba(6,182,212,0.18); color:#67e8f9; }
.bp-card.bp-blueprint .bp-btn-del  { background:rgba(239,68,68,0.12); color:#fca5a5; }
.bp-card.bp-blueprint .bp-day      { border-color:rgba(59,130,246,0.25); color:#7eb8e8; background:rgba(59,130,246,0.07); }
.bp-card.bp-blueprint .bp-day.ok   { background:rgba(52,211,153,0.2); color:#6ee7b7; border-color:rgba(52,211,153,0.4); }
.bp-card.bp-blueprint .bp-day.fail { background:rgba(239,68,68,0.18); color:#fca5a5; border-color:rgba(239,68,68,0.35); }
.bp-card.bp-blueprint .bp-day.today-empty { border-color:#60a5fa; background:rgba(96,165,250,0.12); color:#93c5fd; }

.chart-container { position: relative; width: 100%; height: 200px; margin-top: 14px; }
.commerce-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.commerce-metric { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; padding: 14px; text-align: center; }
.commerce-metric .lbl { font-family: var(--font-system); font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
.commerce-metric .val { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--bone); margin-top: 6px; }
.commerce-metric .val.highlight { color: var(--gold); text-shadow: 0 0 10px rgba(240,185,59,0.4); }

.stats-table { width:100%; border-collapse:collapse; font-family:var(--font-system); font-size:0.85rem; }
.stats-table th, .stats-table td { padding:0.4rem 0.6rem; border-bottom:1px solid var(--border); text-align:left; color:var(--bone); }
.stats-table thead th { color:var(--gold); font-family:var(--font-head); font-size:0.75rem; border-bottom:1px solid var(--border-strong); }

/* ═══ STATISTIK REKOR ═══ */
.rekor-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
.rekor-card { background:rgba(0,0,0,0.35); border:1px solid var(--border); border-radius:14px; padding:14px 12px; display:flex; flex-direction:column; align-items:center; text-align:center; position:relative; overflow:hidden; transition:border-color .2s; }
.rekor-card::before { content:''; position:absolute; inset:0; opacity:0.04; background:var(--rc-color,var(--arise)); border-radius:14px; }
.rekor-card-icon { font-size:22px; margin-bottom:6px; filter:drop-shadow(0 0 6px var(--rc-color,var(--arise))); }
.rekor-card-val { font-family:var(--font-display); font-size:20px; font-weight:800; color:var(--rc-color,var(--bone)); line-height:1.1; letter-spacing:0.5px; text-shadow:0 0 10px var(--rc-color,transparent); }
.rekor-card-lbl { font-family:var(--font-system); font-size:10px; color:var(--muted); font-weight:700; letter-spacing:0.8px; text-transform:uppercase; margin-top:5px; }
.rekor-card-sub { font-size:9.5px; color:var(--muted-2); margin-top:2px; }
.rekor-performa-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.rekor-perf-cell { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:10px 8px; text-align:center; }
.rekor-perf-cell .pv { font-family:var(--font-display); font-size:16px; font-weight:800; color:var(--bone); }
.rekor-perf-cell .pl { font-size:9.5px; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:0.5px; }

.todo-item { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; font-size:12.5px; line-height:1.4; padding:8px; border-radius:8px; background:rgba(255,255,255,0.02); border:1px solid var(--border); }
.todo-item.done { opacity:0.6; text-decoration:line-through; }
.quadrant { background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:12px; padding:10px; display:flex; flex-direction:column; }
.quadrant .q-header { font-family:var(--font-head); font-size:0.8rem; }
.quadrant .q-desc { font-size:0.7rem; color:var(--muted); margin-bottom:0.5rem; }
.todo-item-mini { display:flex; align-items:center; gap:0.4rem; padding:0.2rem 0; font-size:0.82rem; }
.todo-empty-mini { font-size:0.7rem; color:var(--muted); text-align:center; padding:0.5rem 0; }

.weekly-calendar { display:grid; grid-template-columns:repeat(7, 1fr); gap:0.3rem; margin:0.75rem 0; }
.weekly-cal-cell { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:6px; padding:0.4rem; cursor:pointer; font-size:0.72rem; text-align:center; transition:border-color 0.2s; }
.weekly-cal-cell.today { border-color:var(--arise-bright); box-shadow:0 0 6px rgba(164,139,255,0.3); }
.wc-day { font-family:var(--font-head); font-size:0.65rem; margin-bottom:0.2rem; text-transform:uppercase;}
.wc-badge { font-size:0.7rem; font-weight:bold; }
.time-block-mini { text-align:left; margin-top:0.3rem; font-size:0.65rem; border-top:1px dashed var(--border); padding-top:0.2rem; }
.tb-time { color:var(--gold); display:block; }
.tb-label { color:var(--bone); display:block; }

.timeline-container { border-left: 2px solid var(--border-strong); margin-left: 10px; padding-left: 14px; padding-bottom: 5px; margin-top: 10px; }
.timeline-item { position: relative; margin-bottom: 12px; }
.timeline-item::before { content:''; position: absolute; left: -21px; top: 3px; width: 12px; height: 12px; border-radius: 50%; background: var(--cyan); border: 2px solid var(--void); box-shadow: 0 0 5px var(--cyan); }
.timeline-item .time { font-family: var(--font-system); font-size: 12px; color: var(--arise-bright); font-weight: 700; margin-bottom: 2px; letter-spacing: 0.5px; }

/* ═══ LIFE TIMELINE ═══ */
.lt-year-block { margin-bottom: 24px; }
.lt-year-header { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--arise-bright); letter-spacing: 1px; margin: 18px 0 10px 4px; display: flex; align-items: center; gap: 8px; }
.lt-year-header::after { content:''; flex:1; height:1px; background: linear-gradient(90deg, var(--arise), transparent); margin-left: 6px; }
.lt-spine { border-left: 2px solid var(--border-strong); margin-left: 12px; padding-left: 16px; padding-bottom: 4px; }
.lt-entry { position: relative; margin-bottom: 11px; display: flex; flex-direction: column; gap: 2px; }
.lt-entry::before { content:''; position:absolute; left:-23px; top:5px; width:10px; height:10px; border-radius:50%; border:2px solid var(--void); box-shadow:0 0 6px currentColor; }
.lt-entry.type-goal::before   { background:var(--jade);         color:var(--jade); }
.lt-entry.type-ach::before    { background:var(--arise-bright); color:var(--arise-bright); }
.lt-entry.type-title::before  { background:var(--gold);         color:var(--gold); }
.lt-entry.type-realm::before  { background:var(--cyan);         color:var(--cyan); }
.lt-entry.type-heaven::before { background:var(--gold-soft);    color:var(--gold-soft); }
.lt-entry.type-level::before  { background:var(--arise);        color:var(--arise); }
.lt-entry-top { display:flex; align-items:center; gap:6px; }
.lt-icon { font-size:14px; line-height:1; }
.lt-desc { font-size:13px; font-weight:600; color:var(--bone); flex:1; }
.lt-date { font-family:var(--font-mono); font-size:10px; color:var(--muted); }
.lt-empty { text-align:center; color:var(--muted); font-size:12px; padding:24px 0; }

.settings-modal { max-height:90vh; overflow-y:auto; width:min(600px,95vw); }
.settings-section { border: 1px solid var(--border); border-radius:8px; margin-bottom:0.5rem; }
.settings-section summary { padding:0.75rem 1rem; cursor:pointer; font-family:var(--font-head); font-size:0.9rem; color:var(--arise-bright); }
.settings-body { padding:0.75rem 1rem; }
.toggle-row { display:flex; justify-content:space-between; align-items:center; padding:0.3rem 0; font-size:0.85rem;}
.settings-btn-row { display:flex; flex-wrap:wrap; gap:0.5rem; margin:0.5rem 0; }
.settings-divider { font-size:0.75rem; color:var(--muted); border-top:1px solid var(--border); padding-top:0.5rem; margin-top:0.75rem; }
.btn-group { display:flex; gap:0.2rem; margin-bottom:0.5rem;}
.btn-group .btn-secondary { flex:1; font-size:0.75rem; padding:0.4rem; }
.btn-group .btn-secondary.active { background:var(--arise); color:#fff; border-color:var(--arise); }

.realm-step-header { font-family:var(--font-head); font-size:0.8rem; font-weight:700; text-transform:uppercase; color:var(--arise-bright); border-bottom:1px dashed var(--border); padding-bottom:4px; margin:14px 0 8px; }
.realm-row.active { background:rgba(124,92,255,0.15); border:1px solid var(--arise-bright); border-radius:6px; padding:4px 8px; }
.realm-row.done { opacity:0.6; }
.realm-name-en { flex:1; font-size:12px; color:var(--bone); }
.realm-req { font-family:var(--font-mono); font-size:11px; color:var(--muted); }

.target-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 14px; }
.custom-target-card { border: 1px solid rgba(124,92,255,0.3); border-radius: 16px; padding: 16px; background: linear-gradient(135deg, rgba(124,92,255,0.05), transparent); position: relative;}
.ctc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.ctc-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; color: var(--arise-bright); display:flex; align-items:center; gap:6px;}
.ctc-actions { display: flex; gap: 4px; }

/* ── Safari webkit prefix ───────────────────────────────────────── */
.pac-0,.pac-1 { -webkit-backdrop-filter:blur(10px); }
.pac-2,.pac-3 { -webkit-backdrop-filter:blur(11px); }
.pac-4,.pac-5 { -webkit-backdrop-filter:blur(12px); }
.pac-6,.pac-7,.pac-8 { -webkit-backdrop-filter:blur(13px); }
.pac-9,.pac-10,.pac-11 { -webkit-backdrop-filter:blur(14px); }
.pac-12,.pac-13 { -webkit-backdrop-filter:blur(15px); }
.pac-14,.pac-15 { -webkit-backdrop-filter:blur(16px); }
.pac-16 { -webkit-backdrop-filter:blur(18px); }

/* ── Smooth loop: alternate so gradient reverses cleanly ─────────── */
.pac-9,.pac-10,.pac-11,.pac-12,.pac-13,.pac-14,.pac-15,.pac-16 {
  animation-direction:alternate !important; }

/* ── Reduce motion: disable animated shimmer ─────────────────────── */
@media (prefers-reduced-motion:reduce){
  .pac-9,.pac-10,.pac-11,.pac-12,.pac-13,.pac-14,.pac-15,.pac-16 { animation:none !important; }

.momentum-wrapper { padding: 0 0 16px; }

  margin-bottom: 16px;
}
.momentum-hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;

}

}

<script>
let state = null; let saveTimer = null; let daoChart = null; let financialMomentumChart = null; let lifeMomentumChart = null; let _finTradingRange = '30H'; let lifeMomentumRange = 'weekly'; let _sectionMgrTab = 'home'; let heatmapView = 'monthly'; let _ltExpanded = {};
// Navigasi Heatmap Kehidupan: Bulanan bisa mundur/maju bulan, Tahunan bisa mundur/maju tahun kalender penuh (Jan-Des).
let heatmapMonthYear = new Date().getFullYear(); let heatmapMonthMonth = new Date().getMonth();
let heatmapYearYear = new Date().getFullYear();
function changeHeatmapMonth(offset){ heatmapMonthMonth += offset; if(heatmapMonthMonth > 11){ heatmapMonthMonth = 0; heatmapMonthYear++; } if(heatmapMonthMonth < 0){ heatmapMonthMonth = 11; heatmapMonthYear--; } render(); }
function changeHeatmapYear(offset){ heatmapYearYear += offset; render(); }

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let runeParticles = [], sanctuaryFog = [], sanctuaryStars = [], sanctuaryLeaves = [], heavenClouds = [], heavenSparks = [];
let formationAngle = 0, heavenRayPhase = 0;
function initCanvas() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<45; i++) {
        particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*1.5});
    }
    runeParticles = [];
    for(let i=0; i<18; i++) {
        runeParticles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15, size: Math.random()*1.2+0.5, a: Math.random()*Math.PI*2});
    }
    sanctuaryFog = [];
    for(let i=0; i<5; i++) {
        sanctuaryFog.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.08, vy: (Math.random()-0.5)*0.05, r: 120+Math.random()*100});
    }
    sanctuaryStars = [];
    for(let i=0; i<40; i++) {
        sanctuaryStars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.3+0.3, tw: Math.random()*Math.PI*2, twSpeed: 0.01+Math.random()*0.02});
    }
    sanctuaryLeaves = [];
    for(let i=0; i<10; i++) {
        sanctuaryLeaves.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vy: 0.15+Math.random()*0.15, vr: (Math.random()-0.5)*0.01, rot: Math.random()*Math.PI*2});
    }
    heavenClouds = [];
    for(let i=0; i<6; i++) {
        heavenClouds.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height*0.5, vx: 0.05+Math.random()*0.08, r: 90+Math.random()*70});
    }
    heavenSparks = [];
    for(let i=0; i<25; i++) {
        heavenSparks.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vy: 0.08+Math.random()*0.1, vx: (Math.random()-0.5)*0.05, size: Math.random()*1.2+0.4});
    }
}
function drawVoidHologramBg() {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.strokeStyle = 'rgba(45, 212, 244, 0.15)';
    for(let i=0; i<particles.length; i++) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        for(let j=i+1; j<particles.length; j++) {
            let p2 = particles[j];
            let dist = Math.hypot(p.x-p2.x, p.y-p2.y);
            if(dist < 90) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
        }
    }
}
function drawFormationArrayBg() {
    // Nebula Galaxy — hologram nebula clouds + snow star particles
    formationAngle += 0.0012;
    const nebulaColors = [
        ['rgba(155,107,255,0.11)','rgba(155,107,255,0)'],
        ['rgba(45,212,244,0.09)', 'rgba(45,212,244,0)'],
        ['rgba(255,71,180,0.08)', 'rgba(255,71,180,0)'],
        ['rgba(80,160,255,0.09)', 'rgba(80,160,255,0)'],
        ['rgba(200,100,255,0.08)','rgba(200,100,255,0)'],
        ['rgba(100,230,200,0.07)','rgba(100,230,200,0)'],
    ];
    // Nebula blob clouds
    runeParticles.forEach((p, i) => {
        p.x += p.vx * 0.22; p.y += p.vy * 0.22; p.a += 0.003;
        if(p.x < -300) p.x = canvas.width+300; if(p.x > canvas.width+300) p.x = -300;
        if(p.y < -200) p.y = canvas.height+200; if(p.y > canvas.height+200) p.y = -200;
        const blobR = 95 + Math.sin(p.a)*38;
        const nc = nebulaColors[i % nebulaColors.length];
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, blobR);
        grad.addColorStop(0, nc[0]); grad.addColorStop(1, nc[1]);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, blobR, 0, Math.PI*2); ctx.fill();
    });
    // Snow / hologram star particles
    particles.forEach(p => {
        p.x += p.vx * 0.12; p.y += p.vy * 0.12;
        if(p.x < 0) p.x = canvas.width; if(p.x > canvas.width) p.x = 0;
        if(p.y < 0) p.y = canvas.height; if(p.y > canvas.height) p.y = 0;
        const flicker = 0.3 + Math.abs(Math.sin(formationAngle * 3 + p.x * 0.04)) * 0.7;
        ctx.globalAlpha = flicker;

            ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 0.5;
            ctx.beginPath();

function drawSanctuaryBg() {
    // Galaxy Nebula — deep space colored nebula cloud blobs + star field
    const t = Date.now() * 0.00030;
    const nebulaSpec = [
        ['rgba(120,70,255,0.10)','rgba(120,70,255,0)'],
        ['rgba(40,190,240,0.09)','rgba(40,190,240,0)'],
        ['rgba(255,80,170,0.08)','rgba(255,80,170,0)'],
        ['rgba(60,200,140,0.08)','rgba(60,200,140,0)'],
        ['rgba(200,110,255,0.09)','rgba(200,110,255,0)'],
    ];
    // Large nebula cloud blobs
    sanctuaryFog.forEach((f, fi) => {
        f.x += f.vx * 0.20; f.y += f.vy * 0.15;
        if(f.x < -260) f.x = canvas.width+260; if(f.x > canvas.width+260) f.x = -260;
        if(f.y < -210) f.y = canvas.height+210; if(f.y > canvas.height+210) f.y = -210;
        const r = (f.r + 65) * (1.6 + Math.sin(t * 0.75 + fi) * 0.35);
        const nc = nebulaSpec[fi % nebulaSpec.length];
        const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
        g.addColorStop(0, nc[0]); g.addColorStop(1, nc[1]);
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
    });
    // Smaller wispy nebula blobs (using leaves array)
    sanctuaryLeaves.forEach((l, li) => {
        l.x += Math.sin(t * 0.55 + li * 1.2) * 0.16;
        l.y += Math.cos(t * 0.45 + li) * 0.13;
        if(l.x < 0) l.x = canvas.width; if(l.x > canvas.width) l.x = 0;
        if(l.y < 0) l.y = canvas.height; if(l.y > canvas.height) l.y = 0;
        const r2 = 52 + Math.sin(t + li * 1.5) * 24;
        const nc2 = nebulaSpec[(li + 2) % nebulaSpec.length];
        const g2 = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r2);
        g2.addColorStop(0, nc2[0]); g2.addColorStop(1, nc2[1]);
        ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(l.x, l.y, r2, 0, Math.PI*2); ctx.fill();
    });
    // Star field with color flicker
    sanctuaryStars.forEach(s => {
        s.tw += s.twSpeed * 0.38;
        ctx.globalAlpha = 0.18 + Math.abs(Math.sin(s.tw)) * 0.44;
        ctx.fillStyle = 'rgba(228,222,255,1)';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 0.65, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
}
function drawHeavenPalaceBg() {
    // Galaxy Hologram — kristal es + bintang berkelip + planet mendekat-menjauh
    heavenRayPhase += 0.0007;
    const t = heavenRayPhase;
    const W = canvas.width, H = canvas.height;

    // --- Nebula clouds ---
    const nebulaColors = [
        ['rgba(20,40,160,0.07)','rgba(20,40,160,0)'],
        ['rgba(40,20,180,0.08)','rgba(40,20,180,0)'],
        ['rgba(10,80,180,0.06)','rgba(10,80,180,0)'],
        ['rgba(60,30,200,0.07)','rgba(60,30,200,0)'],
        ['rgba(80,60,220,0.05)','rgba(80,60,220,0)'],
        ['rgba(20,100,180,0.06)','rgba(20,100,180,0)'],
    ];
    heavenClouds.forEach((c, ci) => {
        c.x += c.vx * 0.10;
        if(c.x > W+200) c.x = -200; if(c.x < -200) c.x = W+200;
        const bs = nebulaColors[ci % nebulaColors.length];
        const r = c.r * 2.2;

        bg.addColorStop(0, bs[0]); bg.addColorStop(1, bs[1]);

        if(p.y < -8) { p.y = H+8; p.x = Math.random()*W; }
        if(p.x > W) p.x = 0; if(p.x < 0) p.x = W;
        const tw = 0.18 + Math.abs(Math.sin(t * 2.8 + p.x * 0.07 + p.y * 0.04)) * 0.72;

        sg.addColorStop(0, 'rgba(225,238,255,1)');
        sg.addColorStop(0.35, 'rgba(180,215,255,0.55)');
        sg.addColorStop(1, 'rgba(160,200,255,0)');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(p.x, p.y, sr + 1.8, 0, Math.PI*2); ctx.fill();
        if(p.size > 0.9) {
            ctx.globalAlpha = tw * 0.22;
            ctx.strokeStyle = 'rgba(210,232,255,1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(p.x - sr*3, p.y); ctx.lineTo(p.x + sr*3, p.y);
            ctx.moveTo(p.x, p.y - sr*3); ctx.lineTo(p.x, p.y + sr*3);
            ctx.stroke();
        }
    });
    ctx.globalAlpha = 1;

    // --- Kristal es heksagonal berputar pelan ---
    const crystals = [
        {bx:0.12, by:0.17, r:20, rot:0.08, ph:0.0},
        {bx:0.79, by:0.11, r:13, rot:0.13, ph:1.2},
        {bx:0.89, by:0.57, r:26, rot:0.06, ph:2.5},
        {bx:0.07, by:0.69, r:16, rot:0.16, ph:0.8},
        {bx:0.50, by:0.83, r:11, rot:0.19, ph:3.1},
        {bx:0.63, by:0.31, r:15, rot:0.11, ph:1.8},
        {bx:0.27, by:0.47, r:9,  rot:0.21, ph:4.0},
        {bx:0.93, by:0.81, r:18, rot:0.07, ph:2.0},
    ];
    crystals.forEach(cr => {
        const cx = cr.bx * W, cy = cr.by * H;
        const angle = t * cr.rot + cr.ph;
        const pulse = 0.09 + Math.abs(Math.sin(t * 0.55 + cr.ph)) * 0.19;
        ctx.globalAlpha = pulse;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.strokeStyle = 'rgba(155,218,255,1)';
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            if(i === 0) ctx.moveTo(Math.cos(a)*cr.r, Math.sin(a)*cr.r);
            else ctx.lineTo(Math.cos(a)*cr.r, Math.sin(a)*cr.r);
        }
        ctx.closePath(); ctx.stroke();
        ctx.strokeStyle = 'rgba(200,242,255,0.55)';
        ctx.lineWidth = 0.5;
        for(let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            ctx.beginPath(); ctx.moveTo(0,0);
            ctx.lineTo(Math.cos(a)*cr.r, Math.sin(a)*cr.r); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(180,235,255,0.28)';
        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            if(i===0) ctx.moveTo(Math.cos(a)*cr.r*0.5, Math.sin(a)*cr.r*0.5);
            else ctx.lineTo(Math.cos(a)*cr.r*0.5, Math.sin(a)*cr.r*0.5);
        }
        ctx.closePath(); ctx.stroke();
        ctx.restore();
    });
    ctx.globalAlpha = 1;

    // --- Planet mendekat-menjauh ---
    const planets = [
        {bx:0.18, by:0.27, baseR:30, c1:'rgba(100,70,210,', c2:'rgba(55,35,155,', ring:'rgba(148,108,255,', spd:0.15, ph:0.0},
        {bx:0.81, by:0.21, baseR:18, c1:'rgba(48,148,220,', c2:'rgba(28,88,168,', ring:'rgba(95,192,255,', spd:0.10, ph:2.1},
        {bx:0.67, by:0.76, baseR:24, c1:'rgba(188,88,68,',  c2:'rgba(138,48,38,', ring:'rgba(218,138,108,', spd:0.20, ph:4.2},
    ];
    planets.forEach(pl => {
        const scale = 0.58 + Math.abs(Math.sin(t * pl.spd + pl.ph)) * 0.62;
        const r = pl.baseR * scale;
        const px = pl.bx * W, py = pl.by * H;
        const a = 0.18 + scale * 0.40;
        ctx.globalAlpha = a;

        pg.addColorStop(0, pl.c1 + '0.95)');

        ctx.fillStyle = pg;

        ctx.beginPath(); ctx.arc(0, 0, r * 1.62, 0, Math.PI*2); ctx.stroke();

    });

function drawCanvas() {
    if(!state || state.settings?.showBackgroundAnim !== false) {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        const theme = state?.settings?.bgTheme || 'void';
        if(theme === 'formation') drawFormationArrayBg();
        else if(theme === 'sanctuary') drawSanctuaryBg();
        else if(theme === 'heaven') drawHeavenPalaceBg();
        else drawVoidHologramBg();
    } else {
        ctx.clearRect(0,0,canvas.width, canvas.height);
    }
    requestAnimationFrame(drawCanvas);
}

function todayStr(){ return new Date().toLocaleDateString('en-CA'); }

function monthKey(d){ return new Date(d).toLocaleDateString('en-CA').slice(0,7); }
function diffDays(a,b){ const A=new Date(a+'T00:00:00'), B=new Date(b+'T00:00:00'); return Math.round((B-A)/86400000); }
// Sumber tunggal hitungan "Hari ke-N" — dipakai oleh header DAY counter maupun kedua widget Momentum,

function getGameDay(){
  if(!state || !state.meta) return 1;
  return diffDays(state.meta.startDate||todayStr(), todayStr()) + 1;
}
function formatRupiah(n){
  const rounded = Math.round(n);
  const abs = Math.abs(rounded);
  const prefix = 'Rp' + (rounded < 0 ? '-' : '');
  function shortNum(val) { return parseFloat(val.toFixed(2)).toString(); }
  if(abs >= 1_000_000_000_000) return prefix + shortNum(abs / 1_000_000_000_000) + 'T';
  if(abs >= 1_000_000_000)     return prefix + shortNum(abs / 1_000_000_000) + 'B';
  return prefix + abs.toLocaleString('id-ID');
}

const AudioEngine = {
  ctx: null,
  init() { 
      if(!this.ctx) { const AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext(); } 
      if(this.ctx.state === 'suspended') this.ctx.resume(); 
  },
  // Efek suara TIDAK BOLEH PERNAH menggagalkan aksi utama (simpan transaksi, sinkron ke riwayat,
  // render ulang, dsb). Kalau audio gagal (misal browser/HP nge-block AudioContext, autoplay
  // policy, dll), kita cukup diamkan errornya di sini — jangan sampai bikin fungsi pemanggil
  // (mis. addFinanceTransaction) berhenti di tengah jalan sebelum sempat render()/save().
  play(freqs, type, dur, vol = 0.05) {
    try{
      if(!state || state.settings?.soundEnabled===false) return;
      this.init();
      freqs.forEach((f, i) => {
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.type = type; o.frequency.value = f;
        g.gain.setValueAtTime(vol, this.ctx.currentTime + i*dur);
        g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i*dur + dur);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(this.ctx.currentTime + i*dur); o.stop(this.ctx.currentTime + i*dur + dur);
      });
    }catch(err){ console.warn('SFX gagal diputar (diabaikan, tidak mengganggu aksi utama):', err); }
  }
};

function pickSpiritIndexAvoiding(poolLength, recentArr, historyCap){
  if(poolLength <= 0) return -1;
  let idx; let guard = 0;
  do { idx = Math.floor(Math.random() * poolLength); guard++; } while(recentArr.includes(idx) && guard < 50);
  recentArr.push(idx); while(recentArr.length > historyCap) recentArr.shift();
  return idx;
}

  sc.bondLevel = Math.max(1, Math.min(100, 1 + Math.floor(sc.bondExp / 100)));

const STORAGE_KEY = 'jian-ascension-state-vfinal-updated';

// ═══ FIREBASE REALTIME DATABASE — real-time sync antar device ═══
// Menggunakan REST API + SSE (Server-Sent Events) bawaan Firebase.
// Tidak perlu library/SDK tambahan.
const FIREBASE_DB_URL  = 'https://database-d9332-default-rtdb.asia-southeast1.firebasedatabase.app';
const FIREBASE_DATA_PATH = 'mysistem-jian-ascension';
let _fbSyncTimer   = null;
let _fbSyncing     = false;
let _fbErrNotified = false;
let _fbLastPushedTs    = 0;    // timestamp terakhir yang kita push, agar tidak echo sendiri
let _fbEventSource     = null; // referensi SSE connection
let _pendingRemoteState = null; // state dari device lain yang ditunda karena user sedang mengetik
let _fbPendingSnapshot  = null; // snapshot yang tertunda karena push sebelumnya masih berjalan
let _fbRetryAttempt    = 0;    // hitungan kegagalan berturut-turut, buat exponential backoff

function _fbUrl(){ return `${FIREBASE_DB_URL}/${FIREBASE_DATA_PATH}.json`; }

// ── PUSH: kirim state ke Firebase (debounced 800ms) ──
function firebasePush(snapshot){
  clearTimeout(_fbSyncTimer);
  _fbSyncTimer = setTimeout(() => _fbDoPush(snapshot), 800);
}

// Eksekusi push sesungguhnya. Kalau ada push lain yang masih berjalan (_fbSyncing),
// snapshot ini disimpan sebagai "pending" dan otomatis dikirim ulang begitu push yang
// sedang berjalan selesai — supaya tidak ada snapshot yang diam-diam terbuang.
async function _fbDoPush(snapshot){
  if(_fbSyncing){
    _fbPendingSnapshot = snapshot;
    return;
  }
  _fbSyncing = true;
  let _failed = false;
  try{
    const res = await fetch(_fbUrl(), {
      method : 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(snapshot),
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    _fbLastPushedTs = (snapshot.meta && snapshot.meta.updatedAt) || 0;
    _fbErrNotified  = false;
    _fbRetryAttempt = 0; // reset backoff — koneksi pulih
  } catch(e){
    _failed = true;
    console.error('[FIREBASE] Gagal push:', e);
    // Simpan kembali sebagai pending supaya tetap dicoba lagi (bukan cuma dibuang),
    // kecuali sudah ada snapshot pending yang lebih baru menunggu.
    if(!_fbPendingSnapshot || (snapshot.meta && snapshot.meta.updatedAt) >= ((_fbPendingSnapshot.meta && _fbPendingSnapshot.meta.updatedAt) || 0)){
      _fbPendingSnapshot = snapshot;
    }
    if(!_fbErrNotified){
      _fbErrNotified = true;
      showToast('⚠️ Gagal sinkron ke cloud. Data tetap tersimpan di perangkat ini.', 'bad');
    }
  } finally {
    _fbSyncing = false;
    if(_fbPendingSnapshot){
      const next = _fbPendingSnapshot;
      _fbPendingSnapshot = null;
      if(_failed){
        // Backoff eksponensial (1s, 2s, 4s, ... dibatasi maks 30s) supaya offline berkepanjangan
        // tidak memicu banjir request gagal berturut-turut tanpa jeda — dulu retry langsung
        // dipanggil ulang seketika di sini.
        _fbRetryAttempt++;
        const delay = Math.min(1000 * Math.pow(2, _fbRetryAttempt - 1), 30000);
        setTimeout(() => _fbDoPush(next), delay);
      } else {
        // Snapshot ini masuk sebagai antrean normal (bukan hasil kegagalan) — misalnya ada
        // perubahan baru saat push sebelumnya masih berjalan — jadi tidak perlu ditunda.
        _fbDoPush(next);
      }
    }
  }
}

// ── PULL: ambil snapshot sekali (untuk load awal) ──
async function firebasePull(){
  try{
    const res = await fetch(_fbUrl(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return (await res.json()) || null;
  } catch(e){ console.error('[FIREBASE] Gagal pull:', e); return null; }
}

// ── RESOLVE ON LOAD: ambil snapshot cloud mentah-mentah (kalau ada) ──
// Sengaja TIDAK memilih/menimpang salah satu sisi di sini lagi (dulu: return cloud ATAU
// localState, memilih salah satu utuh) — pemanggil (init()) yang menentukan mana yang lebih
// baru dan memanggil mergeRemoteState(newer, older) dengan `cloud` dan `localState` sebagai dua
// objek terpisah. Kalau fungsi ini yang memilih, saat localState menang maka nilai baliknya persis
// == localState, sehingga mergeRemoteState(loaded, resolved) di pemanggil jadi mergeRemoteState
// (loaded, loaded) — merge dengan diri sendiri, entri yang cuma ada di cloud tidak pernah ikut
// masuk. Dengan mengembalikan cloud apa adanya, pemanggil selalu punya dua sisi yang berbeda.
async function firebaseResolveOnLoad(localState){
  return await firebasePull(); // null kalau tidak ada data / gagal fetch
}

// ── REAL-TIME LISTENER: SSE Firebase → update UI otomatis dari device lain ──
// Terapkan state dari device lain: replace state, simpan lokal, re-render.
function _applyRemoteState(incoming){
  // Sama seperti resolve-on-load: kalau state lokal saat ini sudah di-rollover untuk hari ini,
  // bawa penanda itu ke state remote sebelum di-apply, supaya rollover() di bawah tidak
  // menghitung ulang penalti hari-berganti (HP/EXP/streak) yang sudah pernah diterapkan.
  const _rolledDate = state && state.meta ? state.meta.lastActiveDate : null;
  const _rolledWeekKey = state && state.meta ? state.meta.lastWeekKey : null;
  const _rolledMonthKey = state && state.meta ? state.meta.lastMonthKey : null;
  // `incoming` sudah dipastikan lebih baru dari `state` saat ini oleh pemanggil (cek timestamp
  // di listener SSE) — gabungkan (bukan replace total) supaya entri yang baru saja ditambah di
  // device ini (belum sempat ter-push saat update remote ini datang) tidak ikut hilang.
  const merged = mergeRemoteState(incoming, state);
  state = migrateState(deepMerge(DEFAULT_STATE(), merged));
  if(_rolledDate === todayStr()){
    state.meta.lastActiveDate = _rolledDate;
    state.meta.lastWeekKey = _rolledWeekKey;
    state.meta.lastMonthKey = _rolledMonthKey;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  rollover(); recomputeLifeScore(); render();
  sweepHistoryArchive(state);
  showToast('🔄 Disinkron dari perangkat lain', 'good');
}

// Cek apakah user sedang aktif mengetik di input / textarea / contenteditable.
function _isUserEditing(){
  const el = document.activeElement;
  if(!el) return false;
  const tag = el.tagName;
  return tag === 'INPUT' || tag === 'TEXTAREA' || el.isContentEditable;
}

// Terapkan segera jika user tidak sedang mengetik; tunda jika sedang aktif di form.
// State yang ditunda disimpan di _pendingRemoteState dan diterapkan saat focusout.
function _scheduleRemoteApply(incoming){
  if(_isUserEditing()){
    // Simpan selalu yang paling baru — kalau ada dua update berturut-turut saat mengetik,
    // yang berlaku adalah update terakhir.
    _pendingRemoteState = incoming;
  } else {
    _applyRemoteState(incoming);
  }
}

function firebaseStartRealTimeSync(){
  if(_fbEventSource) _fbEventSource.close();

  // Firebase SSE endpoint — streaming perubahan secara real-time
  _fbEventSource = new EventSource(_fbUrl());

  _fbEventSource.addEventListener('put', function(e){
    try{
      const payload = JSON.parse(e.data);
      const incoming = payload && payload.data;
      if(!incoming || !incoming.meta) return;

      const incomingTs = incoming.meta.updatedAt || 0;
      const currentTs  = (state && state.meta && state.meta.updatedAt) || 0;

      // Abaikan kalau ini echo dari push kita sendiri
      if(incomingTs === _fbLastPushedTs) return;
      // Abaikan kalau data yang masuk lebih lama dari state sekarang
      if(incomingTs <= currentTs) return;

      // Data dari device lain lebih baru → terapkan (atau tunda jika user sedang mengetik)
      _scheduleRemoteApply(incoming);
    } catch(err){ console.error('[FIREBASE SSE] Error parse event:', err); }
  });

  _fbEventSource.addEventListener('patch', function(e){
    // patch event — perlakukan sama seperti put (full re-fetch lebih aman)
    firebasePull().then(cloud => {
      if(!cloud || !cloud.meta) return;
      const incomingTs = cloud.meta.updatedAt || 0;
      const currentTs  = (state && state.meta && state.meta.updatedAt) || 0;
      if(incomingTs === _fbLastPushedTs) return;
      if(incomingTs <= currentTs) return;
      _scheduleRemoteApply(cloud);
    }).catch(()=>{});
  });

  _fbEventSource.onerror = function(){
    console.warn('[FIREBASE SSE] Koneksi terputus, mencoba reconnect...');
    // EventSource otomatis reconnect — tidak perlu tindakan manual
  };
}

// Listener global: saat user meninggalkan input/textarea, terapkan remote state yang tertunda.
// Pakai setTimeout agar focusout yang terjadi karena pindah antar input (bukan keluar form)
// tidak memicu sync prematur — jika activeElement berikutnya masih input, batalkan.
document.addEventListener('focusout', function(){
  if(!_pendingRemoteState) return;
  setTimeout(function(){
    if(_isUserEditing()) return; // pindah ke input lain, tunda lagi
    const toApply = _pendingRemoteState;
    _pendingRemoteState = null;
    _applyRemoteState(toApply);
  }, 150);
});
