function submitGoalProgress(){
  const id = document.getElementById('ug-goal-id').value; const amount = parseFloat(document.getElementById('ug-amount').value);
  const g = state.goals.find(x=>x.id===id); if(!g || isNaN(amount) || amount===0) return;
  // Goal yang sudah selesai tidak bisa diubah (mencegah duplikat riwayat)
  if(g.status==='done'){ closeModal('modal-update-goal'); showToast('Goal ini sudah tercapai dan tercatat di Riwayat.', 'ach'); return; }
  g.current = Math.max(0, g.current + amount); if(amount>0) gainExp(5);
  if(g.current >= g.target){ 
      if(g.status!=='done'){ 
          g.status='done'; state.character.goalsCompleted = (state.character.goalsCompleted||0)+1; 
          const createdDate = new Date(g.createdAt).toLocaleDateString('en-CA');
          const duration = Math.max(1, diffDays(createdDate, todayStr()));
          const deadlineDays = g.deadline ? Math.max(1, diffDays(createdDate, g.deadline)) : Math.max(1, duration);
          const _ri = Math.max(0, state.character.realmIndex || 0);
          const _mult = 1 + _ri * 0.15;
          const rewardExp = Math.round(deadlineDays * 20 * _mult);
          // Mana bonus tergantung durasi goal: pendek (<7 hari) +5, menengah (7-27 hari) +15, panjang (28+ hari, ~1 bulan) +50.
          const goalManaGain = deadlineDays >= 28 ? 50 : deadlineDays >= 7 ? 15 : 5;
          gainMana(goalManaGain, `Goal selesai: ${g.title}`);
          gainExp(rewardExp); addRealmEnergy(40); showToast(`Goal tercapai: ${g.title} (+${rewardExp} EXP)`,'ach'); SFX.levelUp(); checkAchievements();
          gainBondExp(15); spiritSay(SPIRIT_GOAL_DONE_LINES[Math.floor(Math.random()*SPIRIT_GOAL_DONE_LINES.length)], true);
          // Catat ke Timeline Kehidupan
          addTimelineEvent('goal', 'Goal "' + g.title + '" selesai', '🎯');
          // Simpan ke Riwayat Goal Permanen
          if(!Array.isArray(state.goalHistory)) state.goalHistory = [];
          const _goalDone = {
              id: g.id,
              title: g.title,
              notes: g.notes || '',
              createdAt: g.createdAt,
              deadline: g.deadline || '',
              completedAt: todayStr(),
              rewardExp: rewardExp,
              rewardMoney: 0,
              status: 'done',
              target: g.target,
              unit: g.unit
          };
          state.goalHistory.unshift(_goalDone);
          _riwayatArchivePush('goal', _goalDone);
      } 
  } else {
      g.status='active'; SFX.success();
      const pct = g.target > 0 ? (g.current / g.target) : 0;
      if(pct >= 0.8) spiritSay(SPIRIT_GOAL_NEAR_LINES[Math.floor(Math.random()*SPIRIT_GOAL_NEAR_LINES.length)], false);
      gainBondExp(1);
  }
  closeModal('modal-update-goal'); render(); save();
}

function getCurrentTimeBlockInfo() {
    const shift = getTodayActiveShift() === 'libur' ? state.character.shift : getTodayActiveShift();
    const blocks = state.schedule[shift] || []; if (!blocks.length) return null;
    const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
    for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i]; if (!b.time) continue; const parts = b.time.split(/\s*[-–—]\s*/);
        if (parts.length === 2) {
            const [sh, sm] = parts[0].split(':').map(Number); const [eh, em] = parts[1].split(':').map(Number);
            if (isNaN(sh) || isNaN(eh)) continue; let startMins = sh * 60 + (sm || 0); let endMins = eh * 60 + (em || 0);
            if (endMins < startMins) { if (currentMins >= startMins || currentMins < endMins) return { current: b, next: blocks[(i + 1) % blocks.length] }; } 
            else { if (currentMins >= startMins && currentMins < endMins) return { current: b, next: blocks[(i + 1) % blocks.length] }; }
        }
    } return null;
}

function getTimeRemainingMins(block) {
    if(!block || !block.time) return null;
    const parts = block.time.split(/\s*[-–—]\s*/);
    if(parts.length !== 2) return null;
    const [eh, em] = parts[1].split(':').map(Number);
    if(isNaN(eh)) return null;
    const now = new Date();
    const endMins = eh * 60 + (isNaN(em) ? 0 : em);
    const curMins = now.getHours() * 60 + now.getMinutes();
    const rem = endMins - curMins;
    return rem > 0 ? rem : null;
}

function addSedekah(evt){
  const nominal = parseInt(document.getElementById('sedekah-nominal').value, 10); if(!nominal || nominal <= 0) return;
  const today = todayStr(); if(state.sedekah.lastExpDate !== today){ state.sedekah.dailyExpGained = 0; state.sedekah.lastExpDate = today; }
  const expGained = Math.floor(nominal / 1000) * 10;
  const _sedekahEntry = { id: Date.now().toString(), nominal, date: document.getElementById('sedekah-date').value || today, note: document.getElementById('sedekah-note').value.trim(), expGained, createdAt: new Date().toISOString() };
  state.sedekah.entries.unshift(_sedekahEntry);
  _riwayatArchivePush('sedekah', _sedekahEntry);
  // Catatan: entri tidak lagi dipotong di sini — riwayat aktif tetap 30 hari terakhir via
  // sweepHistoryArchive() (dijalankan tiap rollover harian), entri lebih lama diarsipkan permanen.
  state.sedekah.totalLifetime += nominal; state.sedekah.dailyExpGained += expGained;
  
  // lifetimeIncome TIDAK dikurangi di sini — sedekah hanya dicatat sebagai transaksi 'out'
  // di financeLog. Mengurangi lifetimeIncome sekaligus mencatat 'out' menyebabkan double-deduct.
  const _sedekahAkun = (document.getElementById('sedekah-akun') || {}).value || 'cash';
  const _sedekahFin = {id: uid('fin'), date: today, amount: nominal, note: 'Sedekah: ' + document.getElementById('sedekah-note').value.trim(), type: 'out', akun: _sedekahAkun};
  state.financeLog.unshift(_sedekahFin);
  _riwayatArchivePush('finansial', _sedekahFin);
  if(state.settings.financeTargetSync !== false) applyExpenseToTargets(nominal);

  if(expGained > 0){
    state.spiritual.exp = (state.spiritual.exp || 0) + expGained;
    let leveled = false;
    while(state.spiritual.exp >= spiritualNeeded(state.spiritual.level)){ state.spiritual.exp -= spiritualNeeded(state.spiritual.level); state.spiritual.level += 1; leveled = true; }
    if(leveled){ showToast('Spiritual Level Up! Lv.'+state.spiritual.level, 'ach'); SFX.levelUp(); }
    bumpStat('spirituality', 1); showFloatingExp(expGained);
  }

function renderDailyTimeline() {
  const shift = getTodayActiveShift() === 'libur' ? state.character.shift : getTodayActiveShift();
  const blocks = state.schedule[shift] || [];
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nowStr = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
  const today = todayStr();

  function parseMins(s) { const [h,m] = (s||'').split(':').map(Number); return isNaN(h) ? null : h*60+(m||0); }
  function fmtDur(m) { return m>=60 ? Math.floor(m/60)+'j'+(m%60?(' '+(m%60)+'m'):'') : m+'m'; }

  if (!blocks.length) return `<div class="section-title">🕐 Time Blocking Harian</div><div class="card glass-panel" style="text-align:center;padding:24px;color:var(--muted);">Belum ada jadwal untuk shift ini.<br><button class="btn btn-ghost mt-10" onclick="setTab('profile')">Atur Jadwal di Profil →</button></div>`;

  const rowsHTML = blocks.map((b, i) => {
    const parts = (b.time||'').split(/\s*[-–—]\s*/);
    const startMins = parts[0] ? parseMins(parts[0]) : null;
    const endMins   = parts[1] ? parseMins(parts[1]) : null;
    let durMins = null;
    let isNow   = false;
    if (startMins !== null && endMins !== null) {
      durMins = endMins > startMins ? endMins - startMins : 1440 - startMins + endMins;
      isNow   = endMins > startMins
        ? (nowMins >= startMins && nowMins < endMins)
        : (nowMins >= startMins || nowMins < endMins);
    }
    const blockKey = (b.time||'') + '|' + (b.label||'');
    const isDone = !!(state.completedBlocks && state.completedBlocks[today] && state.completedBlocks[today].includes(blockKey));
    const col        = isNow ? 'var(--cyan)' : isDone ? 'var(--jade)' : 'var(--muted)';
    const barStyle   = isNow ? 'background:var(--cyan);box-shadow:0 0 5px var(--cyan);'
                     : isDone ? 'background:rgba(52,211,153,0.4);' : 'background:rgba(255,255,255,0.1);';
    const boxing     = b.boxing;
    const boxStr     = boxing ? `<span class="tb-boxing-badge">📦 ${typeof boxing==='number'&&boxing<1 ? Math.round(boxing*60)+'m' : boxing+'j'} fokus</span>` : '';
    const durStr     = durMins ? `<span class="tb-dur">${fmtDur(durMins)}</span>` : '';
    const nowDot     = isNow ? `<span class="tb-now-pulse"></span>` : '';
    return `<div class="tb-row ${isNow?'tb-row-active':''} ${isDone&&!isNow?'tb-row-done':''}">
      <div class="tb-time-col">
        <div class="tb-time-start" style="color:${col};">${escapeHtml(parts[0]||b.time)}</div>
        ${parts[1] ? `<div class="tb-time-end">${escapeHtml(parts[1])}</div>` : ''}
      </div>
      <div class="tb-indicator" style="${barStyle}"></div>
      <div class="tb-content">
        <div class="tb-label" style="color:${isNow?'var(--bone)':isDone?'var(--jade)':'var(--muted-2)'};">${nowDot}${isDone&&!isNow?'✓ ':''}${escapeHtml(b.label)}</div>
        <div class="tb-meta">${durStr}${boxStr}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="section-title row-between">🕐 Time Blocking Harian<span class="small muted">${shift.toUpperCase()} · ${nowStr}</span></div>
  <div class="card glass-panel tb-container">${rowsHTML}</div>`;
}

function renderRitualButton(item, isCustom = false) {
    const today = todayStr();
    const logData = state.spiritual.dailyLog?.[today]?.[item.id || item.key];

    if (logData) {
        const ok = logData === 'success';
        return `<div class="spirit-btn" style="opacity:0.65;border-color:${ok?'var(--jade)':'var(--crimson)'};">
            <div style="font-size:15px;">${item.icon} ${escapeHtml(item.label)}</div>
            <small style="color:${ok?'var(--jade)':'var(--crimson)'}">${ok?'✓ Berhasil':'✗ Gagal'}</small>
        </div>`;
    }
    const keyParam  = isCustom ? `'${item.id}',true,true`  : `'${item.key}',true`;
    const keyParamF = isCustom ? `'${item.id}',false,true` : `'${item.key}',false`;
    return `<div class="spirit-btn" style="position:relative;">
        <div style="font-size:14px;margin-bottom:6px;">${item.icon} ${escapeHtml(item.label)}</div>
        <div style="display:flex;gap:4px;margin-top:auto;">
            <button class="btn btn-secondary btn-sm" style="flex:1;color:var(--jade);border-color:rgba(52,211,153,0.3);" onclick="logSpiritual(${keyParam})">✓</button>
            <button class="btn btn-secondary btn-sm" style="flex:1;color:var(--crimson);border-color:rgba(255,71,104,0.3);" onclick="logSpiritual(${keyParamF})">✗</button>
        </div>
        ${isCustom?`<button class="icon-btn" style="position:absolute;top:2px;right:2px;padding:2px;" onclick="deleteCustomRitual('${item.id}')"><svg viewBox="0 0 24 24" width="12" height="12"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2"/></svg></button>`:''}
    </div>`;
}

  function getLevelGradient(lvl) {
      const tiers = [ 
          ['#00f2fe', '#4facfe'], ['#43e97b', '#38f9d7'], ['#fa709a', '#fee140'], 
          ['#b12a5b', '#ff8177'], ['#c471f5', '#fa71cd'], ['#f83600', '#f9d423'], 
          ['#00c6ff', '#0072ff'], ['#16a085', '#f4d03f'], ['#ff0844', '#ffb199'], 
          ['#30cfd0', '#330867'], ['#ff0000', '#ffea00', '#00ff00', '#00ffff']

      let idx = Math.floor((lvl - 1) / 10); if (idx >= tiers.length) idx = tiers.length - 1; if (idx < 0) idx = 0;
      const colors = tiers[idx];
      if (colors.length === 2) return `<stop offset="0%" stop-color="${colors[0]}" /><stop offset="100%" stop-color="${colors[1]}" />`;
      return colors.map((col, i) => `<stop offset="${(i/(colors.length-1))*100}%" stop-color="${col}"/>`).join('');
  }

  const spiritFrac = Math.min(100, Math.round(100*state.spiritual.exp/spiritualNeeded(state.spiritual.level)));

    </div>
    ${c.equippedTitle ? `<div class="title-banner" style="${getTitleStyle(c.equippedTitle)}">${escapeHtml(c.equippedTitle)}</div>` : ''}
    ${renderHofMedalBar(7, 'centered hof-medal-row-home')}
    <div class="realm-name ${!htActive ? 'holo-text' : 'ht-title-zone'}" style="font-size:${htActive ? 20 : 18}px; margin-top:14px; ${htActive ? heavenTramplingNameStyle(c.heavenBridges) : 'font-family:var(--font-display);font-weight:800;'}">${realm.nameID}${(!htActive && subName) ? ' · ' + subName : ''}</div>

    ${bridgeInfo}
    ${!htActive ? (() => {
      // Hitung LV yang dibutuhkan untuk masuk realm berikutnya
      const realmIdx = c.realmIndex;
      const nextRealmStartLv = realmIdx === 0 ? 16 : (15 + realmIdx * 15 + 1); // LV pertama realm berikutnya

    })() : `<div class="small muted" style="text-align:center;margin-top:2px;"><span style="font-family:var(--font-epic);color:var(--gold-soft);font-size:11px;letter-spacing:1.5px;text-shadow:0 0 10px rgba(255,215,0,0.7);">✦ PUNCAK SURGAWI ✦</span></div>`}
    <div class="realm-energy-wrap">
      ${htActive
        ? `<div class="row-between" style="font-size:10px; color:var(--muted); margin-bottom:3px;"><span>⚡ Realm Energy</span><span>${c.realmEnergy.toLocaleString()} / ${nextRealm ? nextRealm.reqEnergy.toLocaleString() : '∞'}</span></div>`

            return `<div class="row-between" style="font-size:10px; color:var(--muted); margin-bottom:3px;"><span>⚔ Progress Realm</span><span>${phaseLabel}</span></div>`;
          })()

    </div>
    
    <div class="spiritual-bar-wrap">
      <div class="row-between small" style="margin-bottom:5px;"><span class="muted">Spiritual Lv.${state.spiritual.level} · <span style="${sr.style}">${sr.label}</span></span><span class="muted">${spiritFrac}%</span></div>
      <div class="spiritual-track"><div class="spiritual-fill" style="width:${spiritFrac}%"></div></div>
    </div>
    <div class="mana-bar-wrap" style="margin-top:10px;">
      <div class="row-between small" style="margin-bottom:5px;"><span class="muted" style="font-weight:700; color:#4fa8ff;">Mana (Tameng)</span><span class="muted" style="color:#4fa8ff;">${c.mana ?? 0}/${c.maxMana ?? 200}</span></div>

      <div class="stat-track" style="background:rgba(255,71,104,0.1);"><div class="stat-fill" style="width:${(c.hp/Math.max(1,c.maxHp))*100}%; background:linear-gradient(90deg, #8a1c1c, var(--crimson)); box-shadow: 0 0 8px rgba(255,71,104,0.5);"></div></div>

function questCardHTML(q, compact){
  const tmeta = TYPE_META[q.type] || TYPE_META.daily; const exp = rewardFor(q);
  const statsHtml = (q.stats||[]).map(s=> statDef(s) ? `<span class="stat-chip">${statDef(s).label}${STAT_ID_LABELS[s] ? `<span style="font-size:8.5px;color:var(--muted);font-weight:400;display:block;line-height:1.3;">${STAT_ID_LABELS[s]}</span>` : ''}</span>` : '').join('');
  let actions = ''; const remaining = getRemainingCompletions(q); const isDailyDone = q.dailyLimit && !canCompleteQuestToday(q);
  const badgeHTML = isDailyDone ? `<span class="pill" style="background:rgba(52,211,153,0.15);color:var(--jade);">✓ Selesai Hari Ini</span>` : (q.dailyLimit ? `<span class="pill" style="background:rgba(255,255,255,0.05);color:var(--muted);">Sisa: ${remaining}x</span>` : '');
  const btnDisabled = isDailyDone ? 'disabled' : '';

  // Deadline display untuk Heaven Quest manual
  let deadlineHtml = '';
  if(q.type === 'heaven_trampling' && q.deadline && q.status !== 'done'){
    const dLeft = diffDays(todayStr(), q.deadline);
    if(dLeft < 0) deadlineHtml = `<div class="small mt-10" style="color:var(--crimson);font-weight:700;">🚨 TERLAMBAT ${Math.abs(dLeft)} hari</div>`;
    else if(dLeft === 0) deadlineHtml = `<div class="small mt-10" style="color:var(--orange);font-weight:700;animation:pulseOpacity 1s infinite;">⚠️ DEADLINE HARI INI!</div>`;
    else deadlineHtml = `<div class="small mt-10" style="color:var(--muted);">⏳ Sisa: ${dLeft} hari</div>`;
  }

  if(q.status==='pending'){
    actions = `<button class="btn btn-primary btn-sm" ${btnDisabled} onclick="completeQuest('${q.id}')">✓ Selesai</button><button class="btn btn-ghost btn-sm" onclick="postponeQuest('${q.id}')">Tunda</button><button class="btn btn-danger btn-sm" onclick="failQuest('${q.id}')">Gagal</button>`;
  } else if(q.status==='done'){ actions = `<span class="pill" style="background:rgba(52,211,153,0.15);color:var(--jade);">✓ Selesai</span>`; } 
  else if(q.status==='failed'){ actions = `<span class="pill" style="background:rgba(255,71,104,0.15);color:var(--crimson);">✕ Gagal</span>`; } 
  else if(q.status==='postponed'){ actions = `<button class="btn btn-ghost btn-sm" onclick="resetQuestStatus('${q.id}')">↺ Aktifkan</button>`; }
  const editFn = q.type === 'heaven_trampling' ? `openEditHeavenQuestModal('${q.id}')` : `openEditQuest('${q.id}')`;
  const _dragAttrs = compact ? '' : `draggable="true" data-qid="${q.id}" ondragstart="qDragStart('${q.id}',event)" ondragover="qDragOver('${q.id}',event)" ondrop="qDrop('${q.id}',event)" ondragend="qDragEnd(event)"`;
  return `
  <div class="quest-card ${tmeta.cls} status-${q.status} ${q.type==='legendary'||q.type==='heaven_trampling'?'is-legendary':q.type==='mythic'?'is-mythic':''}" ${_dragAttrs}>
    <div class="quest-title-row">
      <div class="quest-title">${escapeHtml(q.title)}${q.isCore?'<div class="quest-core-tag">CORE HABIT</div>':''}</div>
      <div>
        ${compact ? '' : `<button class="icon-btn quest-drag-handle" title="Seret untuk reorder" style="cursor:grab;color:var(--muted);font-size:15px;padding:2px 4px;" onmousedown="qHandleDown()">☰</button>`}

function renderQuests(){
  const filter = state.ui.questFilter || 'all';
  const baseFilters = [['all','Semua'],['daily','Daily · Harian'],['weekly','Weekly · Mingguan'],['monthly','Monthly · Bulanan'],['special','Special · Spesial'],['mythic','⚔️ Mythic'],['legendary','👑 Legendary']];

  const htActive = isHeavenTrampling();
  const filters = htActive ? [...baseFilters, ['heaven_trampling','🌉 Heaven Trampling']] : baseFilters;
  // Pisahkan quest buatan user tipe HT dari normalQuests — hanya tampil di htSection (HT realm)
  let list = state.quests.slice().filter(q=>q.type!=='heaven_trampling');
  if(filter!=='all') list = list.filter(q=>q.type===filter);
  let htSection = '';
  if(htActive && (filter==='all' || filter==='heaven_trampling')){
    const today = todayStr();
    // Heaven Quest buatan user manual
    const userHtList = state.quests.filter(q=>q.type==='heaven_trampling');
    const ord2 = {pending:0,postponed:1,failed:2,done:3};
    userHtList.sort((a,b)=>(ord2[a.status]-ord2[b.status])||(b.createdAt-a.createdAt));

  }
  const order = {pending:0, postponed:1, failed:2, done:3}; const _qo = state.meta.questOrder || []; list.sort((a,b)=>{ const sd=order[a.status]-order[b.status]; if(sd!==0) return sd; const ia=_qo.indexOf(a.id),ib=_qo.indexOf(b.id); if(ia===-1&&ib===-1) return b.createdAt-a.createdAt; if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib; });
  const normalQuests = list.length===0 && filter==='heaven_trampling' ? '' : (list.length===0 ? `<div class="empty-state card"><span class="big">Tidak ada quest</span>Coba filter lain atau tambahkan quest baru.</div>` : list.map(q=>questCardHTML(q,false)).join(''));

let _goalDetailId = null;
function openGoalDetail(id) {
  const h = (state.goalHistory || []).find(x => x.id === id);

  _goalDetailId = id;
  const createdDate = h.createdAt ? new Date(h.createdAt).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'}) : '-';
  const completedDate = h.completedAt ? new Date(h.completedAt + 'T00:00:00').toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'}) : '-';
  const deadlineDisplay = h.deadline ? new Date(h.deadline + 'T00:00:00').toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'}) : 'Tidak ada';
  let durasi = '-';
  if (h.createdAt && h.completedAt) {
    const start = new Date(h.createdAt).toLocaleDateString('en-CA');

    durasi = Math.max(1, diffDays(start, end)) + ' Hari';
  }
  const el = document.getElementById('gd-nama'); if(el) el.textContent = h.title;
  const el2 = document.getElementById('gd-deskripsi'); if(el2) el2.textContent = h.notes || '-';

  const el5 = document.getElementById('gd-selesai'); if(el5) el5.textContent = completedDate;
  const el6 = document.getElementById('gd-durasi'); if(el6) el6.textContent = durasi;
  const isFailed = h.status === 'failed';
  const el7 = document.getElementById('gd-exp'); if(el7) el7.textContent = isFailed ? '-EXP (Terkuras)' : ('+' + (h.rewardExp||0).toLocaleString() + ' EXP');

  openModal('modal-goal-detail');
}

// ── FINANCIAL MOMENTUM — grafik tambahan (kurva pemasukan, kurva pengeluaran, tren harian).
// Menggunakan data state.financeLog yang sudah ada, tidak membuat sistem finansial baru.
// ── GRAFIK TRADING: saldo berjalan per transaksi, segmen hijau/merah ─────────
function initFinancialMomentumChart() {
    if(typeof Chart === 'undefined') {
        const c = document.getElementById('financialMomentumChart');
        if(c) c.parentElement.innerHTML = '<div class="small muted" style="text-align:center;padding:20px;">📊 Grafik tidak tersedia (perlu koneksi internet)</div>';
        return;
    }
    const ctx = document.getElementById('financialMomentumChart');
    if(!ctx) return;
    if(financialMomentumChart) { financialMomentumChart.destroy(); financialMomentumChart = null; }

    const rng = _finTradingRange || '30H';

    // Ambil semua transaksi (in/out), abaikan transfer, sort ascending
    const allTx = _getAllFinanceEntries()
        .filter(e => e.type !== 'transfer' && e.amount > 0 && e.date)
        .sort((a, b) => {
            if(a.date !== b.date) return a.date < b.date ? -1 : 1;
            const ta = a.createdAt || a.id || '', tb = b.createdAt || b.id || '';
            return ta < tb ? -1 : 1;
        });

    // Filter rentang waktu
    let filtered = allTx;
    if(rng === '7H' || rng === '30H') {
        const days = rng === '7H' ? 7 : 30;
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
        const cutStr = cutoff.toLocaleDateString('en-CA');
        filtered = allTx.filter(e => e.date >= cutStr);
    }

    // Hitung saldo awal sebelum rentang (untuk running balance garis)
    let initBalance = 0;
    if(rng !== 'All') {
        const cutStr = filtered.length > 0 ? filtered[0].date : '';
        allTx.forEach(e => {
            if(cutStr && e.date < cutStr)
                initBalance += e.type === 'in' ? e.amount : -e.amount;
        });
    }

    if(filtered.length === 0) {
        ctx.parentElement.innerHTML = '<div class="small muted" style="text-align:center;padding:30px;line-height:1.8;">Belum ada transaksi pada periode ini.<br><small>Coba pilih "All Time".</small></div>';
        return;
    }

    Chart.defaults.color = '#9492AC';
    Chart.defaults.font.family = "'Rajdhani', sans-serif";

    // ── SELALU per hari: batang = total harian, garis = saldo berjalan per hari ──
    const dateMap = {};
    filtered.forEach(e => {
        if(!dateMap[e.date]) dateMap[e.date] = { income: 0, expense: 0 };
        if(e.type === 'in') dateMap[e.date].income += e.amount;
        else                dateMap[e.date].expense += e.amount;
    });
    const dates = Object.keys(dateMap).sort();
    const labels = dates.map(d => {
        try { return new Date(d + 'T00:00:00').toLocaleDateString('id-ID', {day:'numeric', month:'short'}); }
        catch(ex) { return d; }
    });
    const incomeData  = dates.map(d => dateMap[d].income);
    const expenseData = dates.map(d => dateMap[d].expense);
    // net harian (+ = hari positif, - = hari negatif) → untuk label di titik garis
    const netData     = dates.map(d => dateMap[d].income - dateMap[d].expense);
    // saldo berjalan kumulatif → untuk posisi titik garis (sumbu kanan)
    let running = initBalance;
    const balanceData = dates.map(d => {
        running += dateMap[d].income - dateMap[d].expense;
        return running;
    });
    _buildFinMixedChart(ctx, labels, incomeData, expenseData, balanceData, netData, dates, dateMap);
}

// ── Helper: render mixed chart — batang harian (kiri) + garis saldo berjalan (kanan) ──
function _buildFinMixedChart(ctx, labels, incomeData, expenseData, balanceData, netData, dates, dateMap) {
    // Warna titik garis: hijau jika hari net positif, merah jika negatif
    const ptColors = netData.map(n => n >= 0 ? '#34D399' : '#FF4768');
    const ptRadius = labels.length > 40 ? 2 : 5;

    financialMomentumChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [
                {
                    type: 'bar',
                    label: 'Pemasukan',
                    data: incomeData,
                    backgroundColor: 'rgba(52,211,153,0.55)',
                    borderColor: 'rgba(52,211,153,0.85)',
                    borderWidth: 1,
                    borderRadius: 3,
                    borderSkipped: false,
                    yAxisID: 'y',
                    order: 2,
                },
                {
                    type: 'bar',
                    label: 'Pengeluaran',
                    data: expenseData,
                    backgroundColor: 'rgba(255,71,104,0.55)',
                    borderColor: 'rgba(255,71,104,0.85)',
                    borderWidth: 1,
                    borderRadius: 3,
                    borderSkipped: false,
                    yAxisID: 'y',
                    order: 2,
                },
                {
                    type: 'line',
                    label: 'Saldo Berjalan',
                    data: balanceData,
                    borderColor: '#A48BFF',
                    backgroundColor: 'transparent',
                    fill: false,
                    tension: 0.4,
                    borderWidth: 2.5,
                    pointBackgroundColor: ptColors,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 1.5,
                    pointRadius: ptRadius,
                    pointHoverRadius: 8,
                    yAxisID: 'y2',
                    order: 1,
                }
            ]
        },
        plugins: [{
            id: 'finNetLabels',
            afterDatasetsDraw(chart) {
                if(labels.length > 15) return; // sembunyikan jika terlalu padat
                const c = chart.ctx;
                const meta = chart.getDatasetMeta(2); // Saldo Berjalan (line)
                if(!meta || !meta.data) return;
                meta.data.forEach((pt, i) => {
                    const net = netData[i];
                    if(net === undefined || net === null) return;
                    const isPos  = net >= 0;
                    const color  = isPos ? '#34D399' : '#FF4768';
                    const sign   = isPos ? '+' : '−';
                    const absVal = Math.abs(net);
                    const lbl    = sign + (absVal >= 1000000 ? (absVal/1000000).toFixed(1)+'M'
                                        : absVal >= 1000    ? (absVal/1000).toFixed(0)+'K'
                                        : String(absVal));
                    c.save();
                    c.font      = "bold 9px 'Rajdhani', sans-serif";
                    c.fillStyle = color;
                    c.textAlign = 'center';
                    c.fillText(lbl, pt.x, pt.y - 11);
                    c.restore();
                });
            }
        }],
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                y: {
                    type: 'linear',
                    position: 'left',
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    ticks: {
                        callback: v => {
                            const a = Math.abs(v);
                            if(a >= 1000000) return (v/1000000).toFixed(1)+'M';
                            if(a >= 1000)    return (v/1000).toFixed(0)+'K';
                            return v;
                        },
                        font: { size: 9 }
                    }
                },
                y2: {
                    type: 'linear',
                    position: 'right',
                    grid: { drawOnChartArea: false }, // jangan timpa grid kiri
                    ticks: {
                        callback: v => {
                            const a = Math.abs(v);
                            if(a >= 1000000) return (v/1000000).toFixed(1)+'M';
                            if(a >= 1000)    return (v/1000).toFixed(0)+'K';
                            return v;
                        },
                        font: { size: 9 },
                        color: '#A48BFF',
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: { font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:8 }
                }
            },
            plugins: {
                legend: {
                    display: true,
                    position: 'top',
                    labels: {
                        boxWidth: 10, boxHeight: 10,
                        font: { size: 9 },
                        color: '#9492AC',
                        padding: 10,
                    }
                },
                tooltip: {
                    callbacks: {
                        title: items => labels[items[0].dataIndex],
                        label: item => {
                            if(item.dataset.label === 'Saldo Berjalan') {
                                return `Saldo: ${formatRupiah(item.raw)}`;
                            }
                            return `${item.dataset.label}: ${formatRupiah(item.raw)}`;
                        }
                    }
                }
            },
            onClick: (evt, elements) => {
                const infoEl = document.getElementById('fm-point-info');
                if(!infoEl || !elements || !elements.length) return;
                const idx  = elements[0].index;
                const date = dates[idx];
                const day  = dateMap[date];
                const bal  = balanceData[idx];
                const net  = netData[idx];
                const netColor = net >= 0 ? 'var(--jade)' : 'var(--crimson)';
                const netSign  = net >= 0 ? '+' : '−';
                infoEl.innerHTML = `
                    <span style="font-size:11px;color:var(--muted);">${labels[idx]}</span>
                    &nbsp;<span style="font-weight:700;color:${netColor};">${netSign}${formatRupiah(Math.abs(net))}</span><br>
                    <span style="color:var(--jade);font-weight:700;">▲ ${formatRupiah(day.income)}</span>
                    <span style="color:var(--muted);margin:0 5px;">·</span>
                    <span style="color:var(--crimson);font-weight:700;">▼ ${formatRupiah(day.expense)}</span><br>
                    <span style="font-size:10px;color:var(--muted);">Saldo kumulatif: <b style="color:${bal>=0?'var(--jade)':'var(--crimson)'};">${formatRupiah(bal)}</b></span>`;
            }
        }
    });
}

    _finTradingRange = r;

    const ctx = document.getElementById('daoChart'); if(!ctx) return; if(daoChart) daoChart.destroy();
    const dailyIncome = {}; _getAllFinanceEntries().forEach(l => { if(l.type === 'in') { if(!dailyIncome[l.date]) dailyIncome[l.date] = 0; dailyIncome[l.date] += l.amount; }});
    const labels = []; const data = []; for(let i=6; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); labels.push(d.toLocaleDateString('id-ID', {weekday:'short'})); data.push(dailyIncome[d.toLocaleDateString('en-CA')] || 0); }

    daoChart = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: [{ label: 'Pemasukan (Rp)', data: data, borderColor: '#F0B93B', backgroundColor: 'rgba(240, 185, 59, 0.15)', borderWidth: 2, tension: 0.4, fill: true, pointBackgroundColor: '#F0B93B', pointBorderColor: '#fff' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: function(value) { if(value >= 1000000) return (value / 1000000).toFixed(1) + 'M'; if(value >= 1000) return (value / 1000).toFixed(1) + 'K'; return value; }, font:{size:10} } }, x: { grid: { display: false } } }, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => formatRupiah(ctx.raw) } } } } });

function _mkSegColor(data){ return ctx=>{ const i=ctx.p0DataIndex; const a=data[i], b=data[i+1]; return b>a?'#34D399':b<a?'#FF4768':'#9492AC'; }; }
function _mkPtColors(data){ return data.map((v,i)=>{ if(i===0) return '#9492AC'; return v>data[i-1]?'#34D399':v<data[i-1]?'#FF4768':'#9492AC'; }); }

function initProjectCharts(){
    if(typeof Chart==='undefined') return;
    Chart.defaults.color='#9492AC'; Chart.defaults.font.family="'Rajdhani',sans-serif";
    // ── Line chart: tren progres harian 14 hari
    const lineCtx = document.getElementById('projectLineChart'); if(!lineCtx) return;
    if(_projectLineChart){ _projectLineChart.destroy(); _projectLineChart=null; }
    const numDays=14; const lineLabels=[]; const lineData=[];
    const progressLog = state.projectProgressLog || {};
    const completedCards = (state.kanban.cards||[]).filter(c=>c.col==='selesai' && c.completedAt);
    for(let i=numDays-1;i>=0;i--){
        const d=new Date(); d.setDate(d.getDate()-i);
        const ds=d.toLocaleDateString('en-CA');
        lineLabels.push(d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'}));
        const progUpdates = progressLog[ds]||0;
        const completions = completedCards.filter(c=>c.completedAt===ds).length * 3;
        lineData.push(progUpdates + completions);
    }
    const yMax = Math.max(5, ...lineData)+1;
    _projectLineChart = new Chart(lineCtx,{type:'line',data:{labels:lineLabels,datasets:[{label:'Aktivitas Projek',data:lineData,borderColor:'#7C5CFF',backgroundColor:'rgba(124,92,255,0.10)',borderWidth:2,tension:0.4,fill:true,pointBackgroundColor:_mkPtColors(lineData),pointBorderColor:'rgba(255,255,255,0.6)',pointRadius:3,segment:{borderColor:_mkSegColor(lineData)}}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{grid:{color:'rgba(255,255,255,0.07)'},ticks:{stepSize:1,font:{size:9}},min:0,max:yMax},x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{maxTicksLimit:7,font:{size:9}}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} aktivitas`}}}}});
    // ── Bar chart: jumlah kartu per kolom

    if(_projectBarChart){ _projectBarChart.destroy(); _projectBarChart=null; }

    const colBorder=['#94A3B8','#2DD4F4','#F0B93B','#34D399'];
    const counts=colIds.map(id=>(state.kanban.cards||[]).filter(c=>c.col===id).length);
    const barMax=Math.max(3,...counts)+1;
    _projectBarChart = new Chart(barCtx,{type:'bar',data:{labels:colLabels,datasets:[{data:counts,backgroundColor:colColors,borderColor:colBorder,borderWidth:1.5,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{grid:{color:'rgba(255,255,255,0.07)'},ticks:{stepSize:1,font:{size:9}},min:0,max:barMax},x:{grid:{display:false},ticks:{font:{size:9}}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} projek`}}}}});
    // ── Doughnut chart: distribusi status
    const pieCtx = document.getElementById('projectPieChart'); if(!pieCtx) return;
    if(_projectPieChart){ _projectPieChart.destroy(); _projectPieChart=null; }

    const total=(state.kanban.cards||[]).length||0;
    _projectPieChart = new Chart(pieCtx,{type:'doughnut',data:{labels:['Mau','Sedang','Review','Selesai'],datasets:[{data:pieData,backgroundColor:['rgba(148,163,184,0.80)','rgba(45,212,244,0.80)','rgba(240,185,59,0.80)','rgba(52,211,153,0.80)'],borderColor:['#94A3B8','#2DD4F4','#F0B93B','#34D399'],borderWidth:1.5,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:true,position:'right',labels:{boxWidth:8,font:{size:9},padding:4}},tooltip:{callbacks:{label:c=>total>0?`${c.label}: ${c.raw} (${Math.round(c.raw/total*100)}%)`:c.label}}}}});

function renderProjectKanban() {
    const today = todayStr();

    // ── Analitik (tetap sama, hanya judul disesuaikan) ──────────────────────────
    const chartsHtml = `
    <div class="section-title" style="margin-top:0;">📊 Analitik Projek & Pengetahuan</div>
    <div class="card" style="padding:12px;margin-bottom:10px;">
      <div class="card-title" style="margin-bottom:6px;">📈 Tren Check-in Harian (14 Hari)</div>
      <div style="position:relative;width:100%;height:120px;"><canvas id="projectLineChart"></canvas></div>
    </div>
    <div class="card" style="padding:10px;margin-bottom:8px;">
      <div class="card-title" style="margin-bottom:6px;font-size:11px;">Proporsi Status Projek</div>
      <div style="position:relative;width:100%;height:100px;"><canvas id="projectBarChart"></canvas></div>
    </div>
    <div class="card" style="padding:10px;margin-bottom:14px;">
      <div class="card-title" style="margin-bottom:6px;font-size:11px;">Distribusi Projek & Blueprint</div>
      <div style="position:relative;width:100%;height:100px;"><canvas id="projectPieChart"></canvas></div>
    </div>`;

    // ── Data aktif & selesai ────────────────────────────────────────────────────
    const activeCards = (state.kanban.cards || []).filter(c => c.col !== 'selesai');
    const doneCards   = (state.kanban.cards || []).filter(c => c.col === 'selesai');
    const activeBp    = (state.kanban.blueprint || []).filter(b => b.status !== 'done');
    const doneBp      = (state.kanban.blueprint || []).filter(b => b.status === 'done');

    const totalAll    = activeCards.length + doneCards.length + activeBp.length + doneBp.length;
    const totalDone   = doneCards.length + doneBp.length;
    const boardPct    = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;

    // ── Ringkasan papan ─────────────────────────────────────────────────────────
    const summaryHtml = totalAll > 0 ? `
      <div class="bp-summary">
        <div class="row-between small" style="margin-bottom:5px;">
          <span style="color:rgba(200,168,80,0.7);font-weight:800;font-size:9.5px;letter-spacing:1px;">TOTAL PROGRES</span>
          <span style="font-weight:800;color:#c8a850;font-size:10.5px;">${totalDone}/${totalAll} Selesai · ${boardPct}%</span>
        </div>
        <div style="height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${boardPct}%;background:linear-gradient(90deg,#c8a850,#22c55e);border-radius:3px;transition:width 0.5s;"></div>
        </div>
        <div style="margin-top:4px;font-size:9.5px;color:rgba(200,168,80,0.55);">
          ${activeCards.length} projek · ${activeBp.length} blueprint aktif · ${totalDone} selesai
        </div>
      </div>` : '';

    // ── Helper: kartu pin untuk kanban card ─────────────────────────────────────
    function _kanbanPinCard(c) {
        const colMap = {
            mau_dipelajari:   { label:'📋 Perencanaan', cls:'planning' },
            sedang_dipelajari:{ label:'🔨 Berjalan',    cls:'building' },
            direview:         { label:'🔍 Review',       cls:'review'   },
        };
        const sm = colMap[c.col] || colMap.mau_dipelajari;
        const checkins = c.dailyCheckins || [];
        const todayEntry = checkins.find(x => x.date === today);
        const shownCheckins = checkins.slice(-10);
        const totalDays = (c.dateStart && c.dateTarget) ? Math.max(1, diffDays(c.dateStart, c.dateTarget)) : 0;
        const incr = totalDays > 0 ? +(100 / totalDays).toFixed(1) : 10;
        const successDays = checkins.filter(x => x.ok).length;
        const prog = Math.min(100, Math.round(c.progress || 0));
        const ri = Math.max(0, state.character.realmIndex || 0);
        const expPrev = Math.max(100, Math.round(successDays * 20 * (1 + ri * 0.15)));
        const isOverdue = c.dateTarget && c.dateTarget < today;

        const dotHtml = shownCheckins.map(x =>
            x.ok ? `<div class="bp-day ok" title="${x.date}">✓</div>`
                 : `<div class="bp-day fail" title="${x.date}">✗</div>`
        ).join('') + (!todayEntry ? `<div class="bp-day today-empty">?</div>` : '');

        return `<div class="bp-card-wrap">
          <div class="bp-pin"></div>
          <div class="bp-card status-${sm.cls}">
            <div class="bp-chip ${sm.cls}">${sm.label}</div>
            <div class="bp-card-title">${escapeHtml(c.title)}</div>
            ${c.type ? `<div class="bp-card-desc">📦 ${escapeHtml(c.type)}</div>` : ''}
            ${c.dateTarget ? `<div class="bp-deadline ${isOverdue?'overdue':''}">
              ${isOverdue?'⚠️ Terlambat':'📅'} ${c.dateTarget}
              ${!isOverdue?`<span style="font-size:8.5px;color:#0ea5e9;"> · ${diffDays(today,c.dateTarget)} hari lagi</span>`:''}
            </div>` : ''}
            <div class="bp-progress-bar"><div class="bp-progress-fill" style="width:${prog}%"></div></div>
            <div style="font-size:8.5px;color:#7a5500;margin-bottom:4px;">${prog}% · +${incr}%/hari · preview: +${expPrev} EXP</div>
            <div class="bp-divider"></div>
            <div class="bp-checkins-label">PROGRES HARIAN${!todayEntry?` <span class="bp-today-tag">HARI INI</span>`:''}</div>
            <div class="bp-checkins">${dotHtml}</div>
            <div class="bp-btn-row">
              <button class="bp-btn-ok" onclick="checkKanbanDay('${c.id}',true)" ${todayEntry&&todayEntry.ok?'style="opacity:0.5;"':''}>
                ${todayEntry&&todayEntry.ok?'✓ Tercatat':'✓ Berhasil'}
              </button>
              <button class="bp-btn-fail" onclick="checkKanbanDay('${c.id}',false)" ${todayEntry&&!todayEntry.ok?'style="opacity:0.5;"':''}>
                ${todayEntry&&!todayEntry.ok?'✗ Tercatat':'✗ Gagal'}
              </button>
            </div>
            <div class="bp-btn-row">
              <button class="bp-btn-edit" onclick="openEditCard('${c.id}')">✏️ Edit</button>
              <button class="bp-btn-next" onclick="cycleKanbanStatus('${c.id}')">↻ Status</button>
              <button class="bp-btn-del" onclick="deleteKanbanCard('${c.id}')">🗑</button>
            </div>
          </div>
        </div>`;
    }

    // ── Helper: kartu pin untuk blueprint ───────────────────────────────────────
    function _bpPinCard(item) {
        const chipMap = { planning:'📋 Perencanaan', building:'🔨 Building' };
        const chipCls = item.status || 'planning';
        const checkins = item.dailyCheckins || [];
        const todayEntry = checkins.find(x => x.date === today);
        const shownCheckins = checkins.slice(-10);
        const totalDays = (item.dateStart && item.deadline) ? Math.max(1, diffDays(item.dateStart, item.deadline)) : 0;
        const incr = totalDays > 0 ? +(100 / totalDays).toFixed(1) : 10;
        const successDays = checkins.filter(x => x.ok).length;
        const prog = Math.min(100, Math.round(item.progress || (totalDays > 0 ? successDays * (100/totalDays) : 0)));
        const ri = Math.max(0, state.character.realmIndex || 0);
        const expPrev = Math.max(200, Math.round(successDays * 20 * (1 + ri * 0.15)));
        const isOverdue = item.deadline && item.deadline < today;

        const dotHtml = shownCheckins.map(x =>
            x.ok ? `<div class="bp-day ok" title="${x.date}">✓</div>`
                 : `<div class="bp-day fail" title="${x.date}">✗</div>`
        ).join('') + (!todayEntry ? `<div class="bp-day today-empty">?</div>` : '');

        return `<div class="bp-card-wrap">
          <div class="bp-pin bp-pin-blue"></div>
          <div class="bp-card bp-blueprint status-${chipCls}">
            <div class="bp-chip ${chipCls}">📐 ${(chipMap[chipCls]||'📋 Perencanaan').replace(/^[^\s]+\s/,'')} <span style="font-size:7.5px;opacity:0.65;">blueprint</span></div>
            <div class="bp-card-title">${escapeHtml(item.label)}</div>
            ${item.desc ? `<div class="bp-card-desc">${escapeHtml(item.desc)}</div>` : ''}
            ${item.deadline ? `<div class="bp-deadline ${isOverdue?'overdue':''}">
              ${isOverdue?'⚠️ Overdue':'📅'} ${item.deadline}
              ${!isOverdue?`<span style="font-size:8.5px;color:#0ea5e9;"> · ${diffDays(today,item.deadline)} hari lagi</span>`:''}
            </div>` : ''}
            <div class="bp-progress-bar"><div class="bp-progress-fill" style="width:${prog}%"></div></div>
            <div style="font-size:8.5px;color:#6ba3cc;margin-bottom:4px;">${prog}% · +${incr}%/hari · preview: +${expPrev} EXP</div>
            <div class="bp-divider"></div>
            <div class="bp-checkins-label">PROGRES HARIAN${!todayEntry?` <span class="bp-today-tag">HARI INI</span>`:''}</div>
            <div class="bp-checkins">${dotHtml}</div>
            <div class="bp-btn-row">
              <button class="bp-btn-ok" onclick="checkBlueprintDay('${item.id}',true)" ${todayEntry&&todayEntry.ok?'style="opacity:0.5;"':''}>
                ${todayEntry&&todayEntry.ok?'✓ Tercatat':'✓ Berhasil'}
              </button>
              <button class="bp-btn-fail" onclick="checkBlueprintDay('${item.id}',false)" ${todayEntry&&!todayEntry.ok?'style="opacity:0.5;"':''}>
                ${todayEntry&&!todayEntry.ok?'✗ Tercatat':'✗ Gagal'}
              </button>
            </div>
            <div class="bp-btn-row">
              <button class="bp-btn-edit" onclick="openBlueprintModal('${item.id}')">✏️ Edit</button>
              <button class="bp-btn-next" onclick="cycleBlueprintStatus('${item.id}')">↻ Status</button>
              <button class="bp-btn-del" onclick="deleteBlueprintItem('${item.id}')">🗑</button>
            </div>
          </div>
        </div>`;
    }

    // ── Gabung & urutkan aktif (terbaru duluan) ────────────────────────────────
    const allActive = [
        ...activeCards.map(c  => ({ type:'kanban', data:c,    ts: c.createdAt || 0 })),
        ...activeBp.map(b     => ({ type:'bp',     data:b,    ts: b.createdAt || 0 }))
    ].sort((a, b) => b.ts - a.ts);

    const boardGrid = allActive.length === 0
        ? `<div class="bp-empty-board">📌 Papan masih kosong.<br>
           <small style="font-size:10px;opacity:0.7;">Tempel projek atau blueprint baru di sini.</small></div>`
        : `<div class="bp-grid">${allActive.map(x =>
            x.type === 'kanban' ? _kanbanPinCard(x.data) : _bpPinCard(x.data)
          ).join('')}</div>`;

    // ── Papan pin ────────────────────────────────────────────────────────────────
    const boardHtml = `
      <div class="bp-board">
        <div class="bp-board-header">
          <span class="bp-board-title">📌 PAPAN PROJEK</span>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-primary btn-sm" style="font-size:10px;padding:5px 10px;" onclick="openAddCard('mau_dipelajari')">+ Projek</button>
            <button class="btn btn-secondary btn-sm" style="font-size:10px;padding:5px 10px;" onclick="openBlueprintModal()">+ Blueprint</button>
          </div>
        </div>
        ${summaryHtml}
        ${boardGrid}
      </div>`;

    // ── Riwayat selesai ─────────────────────────────────────────────────────────
    function _riwayatItem(icon, title, sub, expGained, deleteBtn) {
        return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);">
          <div style="font-size:20px;">${icon}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:12px;color:var(--bone);">${escapeHtml(title)}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${sub}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:11px;font-weight:800;color:var(--gold);">+${expGained} EXP</div>
            ${deleteBtn}
          </div>
        </div>`;
    }

    const ri = Math.max(0, state.character.realmIndex || 0);
    const mult = 1 + ri * 0.15;

    const doneCardItems = doneCards.map(c => {
        const ok = (c.dailyCheckins||[]).filter(x=>x.ok).length;
        const tot = (c.dailyCheckins||[]).length;
        const exp = c.expGained || Math.max(100, Math.round(ok * 20 * mult));
        return _riwayatItem('🏆', c.title,
            `📦 ${c.type||'Projek'} · ✅ ${c.completedAt||'-'} · ✓ ${ok}/${tot} hari`,
            exp,
            `<button class="btn btn-ghost btn-sm" style="font-size:9px;margin-top:3px;color:var(--crimson);" onclick="deleteKanbanCard('${c.id}')">🗑 Hapus</button>`
        );
    });

    const doneBpItems = doneBp.map(b => {
        const ok = (b.dailyCheckins||[]).filter(x=>x.ok).length;
        const tot = (b.dailyCheckins||[]).length;
        const exp = b.expGained || Math.max(200, Math.round(ok * 20 * mult));
        return _riwayatItem('📐', b.label,
            `Blueprint · ✅ ${b.completedAt||'-'} · ✓ ${ok}/${tot} hari`,
            exp,
            `<button class="btn btn-ghost btn-sm" style="font-size:9px;margin-top:3px;color:var(--crimson);" onclick="deleteBlueprintItem('${b.id}')">🗑 Hapus</button>`
        );
    });

    const allDone = [...doneCardItems, ...doneBpItems];
    const riwayatHtml = `
      <div class="section-title" style="margin-top:4px;">🏆 Riwayat Projek Selesai <span class="small muted" style="font-weight:600;">${allDone.length} item</span></div>
      <div class="card">
        ${allDone.length === 0
          ? `<div class="empty-state"><span class="big">🏅</span><br>Belum ada projek selesai.<br>
             <span style="font-size:10px;opacity:0.6;">Tandai projek selesai dari papan untuk dicatat di sini.</span></div>`
          : allDone.join('')
        }
      </div>`;

    return `<div data-sec-tab="project" data-sec-id="project-analytics">${chartsHtml}</div>`
         + `<div data-sec-tab="project" data-sec-id="project-kanban">${boardHtml}</div>`
         + `<div data-sec-tab="project" data-sec-id="project-blueprint">${riwayatHtml}</div>`;
}

// ═══════════════════════════════════
// PATCH 2 — Reward EXP Project berdasarkan durasi pengerjaan (saat Project selesai)
// 1–3 Hari: +100 | 4–7 Hari: +300 | 8–14 Hari: +700 | 15–30 Hari: +1500 | >30 Hari: +3000
// ═══════════════════════════════════
function projectDurationDays(card){
  const start = (card && (card.dateStart || card.createdAt)) || todayStr();
  return Math.max(1, diffDays(start, todayStr()));
}
function getProjectExpReward(days){
  const d = Math.max(1, days || 1);
  const ri = Math.max(0, state.character.realmIndex || 0);
  const mult = 1 + ri * 0.15;
  return Math.round(d * 20 * mult);
}
function getProjectDeadlineDays(card){
  if(!card) return 1;
  const start = card.dateStart || (card.createdAt ? new Date(card.createdAt).toLocaleDateString('en-CA') : todayStr());
  const deadline = card.dateTarget;
  if(deadline && deadline > start) return Math.max(1, diffDays(start, deadline));
  return projectDurationDays(card);
}

function addProjectProgress(id) {
    const c = (state.kanban.cards||[]).find(x=>x.id===id); if(!c) return;
    c.progress = Math.min(100, (c.progress||0) + 10);
    state.projectProgressLog = state.projectProgressLog || {};
    state.projectProgressLog[todayStr()] = (state.projectProgressLog[todayStr()]||0)+1;
    gainExp(10);
    if(c.progress >= 100 && c.col !== 'selesai') {
        cycleKanbanStatus(id); return;
    }
    SFX.click(); render(); save();
}

// ── Check-in harian kanban card ────────────────────────────────────────────────
function checkKanbanDay(id, ok) {
    const c = (state.kanban.cards||[]).find(x=>x.id===id);
    if(!c || c.col==='selesai') return;
    if(!Array.isArray(c.dailyCheckins)) c.dailyCheckins = [];
    const today = todayStr();
    const existing = c.dailyCheckins.find(x=>x.date===today);
    if(existing) {
        if(existing.ok === ok) { render(); return; }
        existing.ok = ok;
    } else {
        c.dailyCheckins.push({date:today, ok});
        if(ok) {
            const totalDays = (c.dateStart && c.dateTarget)
                ? Math.max(1, diffDays(c.dateStart, c.dateTarget)) : 10;
            c.progress = Math.min(100, Math.round((c.progress||0) + (100/totalDays)));
            if(c.progress >= 100 && c.col !== 'selesai') { cycleKanbanStatus(id); return; }
        }
    }
    showToast(ok?'✅ Check-in berhasil!':'❌ Hari gagal dicatat.', ok?'ach':'bad');
    ok ? SFX.click() : SFX.error();
    render(); save();
}

// ── Ganti status kanban card (planning→building→review→selesai) ───────────────
function cycleKanbanStatus(id) {
    const c = (state.kanban.cards||[]).find(x=>x.id===id);
    if(!c) return;
    const order = ['mau_dipelajari','sedang_dipelajari','direview','selesai'];
    const next = order[(order.indexOf(c.col)+1) % order.length];
    if(next === 'selesai') {
        if(!Array.isArray(c.dailyCheckins)) c.dailyCheckins = [];
        const successDays = c.dailyCheckins.filter(x=>x.ok).length;
        const ri = Math.max(0, state.character.realmIndex||0);
        const expGain = Math.max(100, Math.round(successDays * 20 * (1 + ri*0.15)));
        c.expGained = expGain; c.col = 'selesai';
        c.completedAt = todayStr(); c.progress = 100;
        gainExp(expGain);
        // Sync ke riwayat permanen
        ensureHistoryArchive(state);
        if(!Array.isArray(state.historyArchive.projek)) state.historyArchive.projek = [];
        if(!state.historyArchive.projek.find(x=>x.id===c.id))
            state.historyArchive.projek.push({id:c.id, title:c.title, type:c.type||'Projek',
                completedAt:c.completedAt, expGained:expGain, successDays,
                _sourceType:'kanban', _archived:true});
        addTimelineEvent('projek', `Projek "${c.title}" selesai!`, '📌');
        showToast(`🏆 MISSION COMPLETE! +${expGain} EXP`, 'ach');
        SFX.levelUp();
    } else {
        c.col = next; SFX.click();
    }
    render(); save();
}

// ── Hapus kanban card ─────────────────────────────────────────────────────────
function deleteKanbanCard(id) {
    const c = (state.kanban.cards||[]).find(x=>x.id===id);
    if(!c) return;
    openConfirm(`Hapus projek "${escapeHtml(c.title)}"?`, ()=>{
        markDeleted('kanbanCards', id);
        state.kanban.cards = state.kanban.cards.filter(x=>x.id!==id);
        if(Array.isArray(state.historyArchive?.projek))
            state.historyArchive.projek = state.historyArchive.projek.filter(x=>x.id!==id);
        render(); save();
    });
}

// ── Check-in harian blueprint ─────────────────────────────────────────────────
function checkBlueprintDay(id, ok) {
    const item = (state.kanban.blueprint||[]).find(x=>x.id===id);
    if(!item || item.status==='done') return;
    if(!Array.isArray(item.dailyCheckins)) item.dailyCheckins = [];
    const today = todayStr();
    const existing = item.dailyCheckins.find(x=>x.date===today);
    if(existing) {
        if(existing.ok === ok) { render(); return; }
        existing.ok = ok;
    } else {
        item.dailyCheckins.push({date:today, ok});
        if(ok) {
            const totalDays = (item.dateStart && item.deadline)
                ? Math.max(1, diffDays(item.dateStart, item.deadline)) : 10;
            item.progress = Math.min(100, Math.round((item.progress||0) + (100/totalDays)));
        }
    }
    showToast(ok?'✅ Check-in berhasil!':'❌ Hari gagal dicatat.', ok?'ach':'bad');
    ok ? SFX.click() : SFX.error();
    render(); save();
}

function cycleBlueprintStatus(id) {

function saveJournal(){
  const el = document.getElementById('rf-journal-input'); if(!el) return;
  const content = el.value.trim(); if(!content){ showToast('Tulis dulu isi jurnalmu.','bad'); return; }
  if(!state.refleksi) state.refleksi={journals:[],questions:[]};
  // Mode edit — perbarui entri yang ada
  if(_rfJournalEditId){
    const j = state.refleksi.journals.find(x=>x.id===_rfJournalEditId);
    if(j){ j.content = content; j._edited = Date.now(); }
    const arc = (state.historyArchive?.refleksi||[]).find(x=>x.id===_rfJournalEditId&&x._sourceType==='journal');
    if(arc) arc.content = content;
    _rfJournalEditId = null;
    el.value=''; save(); render(); showToast('Jurnal diperbarui! ✦','ach'); return;
  }
  const now = new Date(); const ts = now.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const date = now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  // _archived:true dipasang sejak awal supaya sweepHistoryArchive tidak menyalin ulang nanti
  const _rfJournal = {id:uid('rf'), date, content, ts, pinnedHome:false, _ts:Date.now(), _archived:true};
  state.refleksi.journals.push(_rfJournal);
  _riwayatArchivePush('refleksi', {..._rfJournal, _sourceType:'journal'});
  gainMana(10, 'Menulis Jurnal');
  el.value=''; save(); render(); showToast('Jurnal tersimpan! ✦','ach');
}
function deleteRefleksiJournal(jId){
  if(!state.refleksi) return;
  state.refleksi.journals = state.refleksi.journals.filter(j=>j.id!==jId);
  // Sinkron hapus dari historyArchive.refleksi supaya tidak ada "data hantu" di Sejarah Riwayat
  if(state.historyArchive && Array.isArray(state.historyArchive.refleksi))
    state.historyArchive.refleksi = state.historyArchive.refleksi.filter(e=>!(e.id===jId && e._sourceType==='journal'));
  save(); render();
}
function pinJournalHome(jId){
  if(!state.refleksi) return;
  // Cek apakah jurnal masih ada di active array
  const activeJournal = state.refleksi.journals.find(j=>j.id===jId);
  let isPinned;
  if(activeJournal){
    // Jurnal aktif: toggle di active array, sisanya unpin
    state.refleksi.journals.forEach(j=>{ j.pinnedHome = j.id===jId ? !j.pinnedHome : false; });
    isPinned = !!state.refleksi.journals.find(j=>j.id===jId)?.pinnedHome;
  } else {
    // Jurnal archive-only: toggle langsung di historyArchive, tidak ada di active array
    const archEntry = (state.historyArchive?.refleksi||[]).find(e=>e._sourceType==='journal' && e.id===jId);
    if(!archEntry){ save(); render(); return; }
    isPinned = !archEntry.pinnedHome;
  }
  // Sinkron flag pinnedHome ke historyArchive.refleksi (satu yang aktif, sisanya false)
  (state.historyArchive?.refleksi||[]).forEach(e=>{
    if(e._sourceType==='journal') e.pinnedHome = isPinned && e.id===jId;
  });
  save(); render(); showToast(isPinned ? '✅ Dipakai di Home!':'↩️ Dilepas dari Home','ach');
}

function saveRefleksiAnswer(qId){

  const el = document.getElementById('rf-ans-'+qId); if(!el) return;
  const answer = el.value.trim(); if(!answer){ showToast('Jawaban tidak boleh kosong.','bad'); return; }
  const q = state.refleksi.questions.find(x=>x.id===qId); if(!q) return;
  // Mode edit — perbarui jawaban yang ada
  if(_rfAnswerEditCtx && _rfAnswerEditCtx.qId === qId){
    const a = (q.answers||[]).find(x=>x.id===_rfAnswerEditCtx.answerId);
    if(a){ a.text = answer; a._edited = Date.now(); }
    const arc = (state.historyArchive?.refleksi||[]).find(x=>x.id===_rfAnswerEditCtx.answerId&&x._sourceType==='answer');
    if(arc) arc.text = answer;
    _rfAnswerEditCtx = null;
    el.value=''; save(); render(); showToast('Jawaban diperbarui! ✦','ach'); return;
  }
  const now = new Date();
  const ts = now.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const date = now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  if(!Array.isArray(q.answers)) q.answers = [];
  // _archived:true dipasang sejak awal supaya sweepHistoryArchive tidak menyalin ulang nanti
  const _rfAnswer = {id:uid('ra'), text:answer, ts, date, pinnedProfile:false, _ts:now.getTime(), _archived:true};
  q.answers.push(_rfAnswer);
  _riwayatArchivePush('refleksi', {..._rfAnswer, _sourceType:'answer', questionId:q.id, questionText:q.q||''});
  if(q.answers.length > 50) q.answers = q.answers.slice(-50);
  q.answer = ''; q.ts = ts;
  el.value='';
  save(); render(); showToast('Jawaban tersimpan! ✦','ach');
}
function deleteRefleksiQuestion(qId){
  if(!state.refleksi) return;
  state.refleksi.questions = state.refleksi.questions.filter(q=>q.id!==qId);
  save(); render();
}
function pinRefleksiAnswer(qId, answerId){
  if(!state.refleksi) return;
  let currentlyPinned = false;
  let foundInActive = false;
  // Unpin semua jawaban aktif, toggle yang ditarget
  state.refleksi.questions.forEach(q => {
    (q.answers||[]).forEach(a => {
      if(q.id===qId && a.id===answerId){
        a.pinnedProfile = !a.pinnedProfile;
        currentlyPinned = a.pinnedProfile;
        foundInActive = true;
      } else {
        a.pinnedProfile = false;
      }
    });
  });
  // Jika jawaban archive-only, toggle langsung di archive
  if(!foundInActive){
    const archEntry = (state.historyArchive?.refleksi||[]).find(e=>e._sourceType==='answer' && e.id===answerId);
    if(archEntry){
      currentlyPinned = !archEntry.pinnedProfile;
    }
  }
  // Sinkron pinnedProfile ke semua entri archive (satu aktif, sisanya false)
  (state.historyArchive?.refleksi||[]).forEach(e=>{
    if(e._sourceType==='answer') e.pinnedProfile = (e.id===answerId && currentlyPinned);
  });
  save(); render(); showToast(currentlyPinned ? '✅ Dipakai di Profil!':'↩️ Dilepas dari Profil','ach');
}
function deleteRefleksiAnswer(qId, answerId){
  if(!state.refleksi) return;
  // Hapus dari active array jika pertanyaan masih ada (tidak early-return agar archive tetap bersih)
  const q = state.refleksi.questions.find(x=>x.id===qId);
  if(q && Array.isArray(q.answers)) q.answers = q.answers.filter(a=>a.id!==answerId);
  // Hapus dari historyArchive — termasuk jawaban archive-only yang pertanyaannya tidak ditemukan
  if(state.historyArchive && Array.isArray(state.historyArchive.refleksi))
    state.historyArchive.refleksi = state.historyArchive.refleksi.filter(e=>!(e.id===answerId && e._sourceType==='answer'));
  save(); render();
}
// Cari jawaban yang di-pin untuk profil: cek active array dulu, lalu arsip sebagai fallback.
// Sebelumnya hanya cek active — kalau jawaban sudah tersapu ke historyArchive (>30 hari /
// overflow), klik "Pakai di Profil" sudah menyimpan pinnedProfile di arsip tapi chip tidak
// pernah membacanya sehingga tampilan profil selalu kosong.
function _findPinnedRefleksiAnswer(){
  const rf = state.refleksi || {};
  // 1) Active questions array
  for(const q of (rf.questions||[])){
    const a = (q.answers||[]).find(x=>x.pinnedProfile);
    if(a) return { pinnedAnswer: a, pinnedQ: q, fromArchive: false };
  }
  // 2) historyArchive fallback — jawaban yang sudah tersapu dari active tapi masih pinned
  const archAns = (state.historyArchive?.refleksi||[]).find(e=>e._sourceType==='answer' && e.pinnedProfile);
  if(archAns){
    // Bangun objek pertanyaan sintetis dari data yang tersimpan di arsip
    const syntheticQ = { id: archAns.questionId||'', q: archAns.questionText||'(pertanyaan dihapus)' };
    return { pinnedAnswer: archAns, pinnedQ: syntheticQ, fromArchive: true };
  }
  return null;
}

function openLihatPenuhModal(idx){
  const entry = _lihatPenuhLookup[idx];
  if(!entry) return;
  document.getElementById('lpm-judul').textContent   = entry.judul;
  document.getElementById('lpm-konten').textContent  = entry.konten;
  document.getElementById('lpm-tanggal').textContent = entry.tanggal ? '📅 '+entry.tanggal : '';
  openModal('modal-lihat-penuh');
}

function renderRefleksi(){
  if(!state.refleksi) state.refleksi={journals:[],questions:[]};
  const rf = state.refleksi;
  const questions = rf.questions||[];
  const c = state.character;

  // === Bangun riwayat gabungan dari semua sumber ===
  // Prioritas: active array dulu (punya full action support), lalu archive-only
  // (entri yang sudah disapu dari active array tapi harus tetap tampil di feed).
  const allHistory = [];
  const _seenIds = new Set();

  // — Active entries (edit/pin/delete semua tersedia) —
  (rf.journals||[]).forEach(j => {
    allHistory.push({...j, _type:'journal'});
    _seenIds.add(j.id);
  });
  (c.lifePrincipleHistory||[]).forEach(h => {
    allHistory.push({...h, _type:'principle'});
    _seenIds.add(h.id);
  });
  questions.forEach(q => {
    (q.answers||[]).forEach(a => {
      allHistory.push({...a, _type:'answer', _qId:q.id, _qText:q.q});
      _seenIds.add(a.id);
    });
  });

  // — Archive-only entries (sudah disapu dari active, tampil read-only) —
  // Gunakan questionId/questionText dari arsip sebagai _qId/_qText untuk jawaban.
  (state.historyArchive?.refleksi||[]).forEach(e => {
    if(_seenIds.has(e.id)) return; // sudah ada di active, skip agar tidak dobel
    if(e._sourceType === 'journal'){
      allHistory.push({...e, _type:'journal', _archiveOnly:true});
    } else if(e._sourceType === 'answer'){
      allHistory.push({...e, _type:'answer', _qId:e.questionId, _qText:e.questionText, _archiveOnly:true});
    } else if(e._sourceType === 'principle'){
      allHistory.push({...e, _type:'principle', _archiveOnly:true});
    }
  });

  allHistory.sort((a,b) => (b._ts||0) - (a._ts||0));

  // === Render satu entri riwayat ===
  function histEntryHtml(entry){
    const textStr = entry.content || entry.text || '';
    const preview = textStr.length > 150 ? textStr.slice(0,150)+'…' : textStr;
    let lihatBtn = '';
    if(textStr.length > 150){
      const judul = entry._type==='journal' ? '📔 Jurnal · '+entry.date :
                    entry._type==='principle' ? '✒️ Prinsip · '+entry.date :
                    '💬 Jawaban · '+entry.date;
      const lIdx = _lihatPenuhLookup.push({judul, konten:textStr, tanggal:entry.ts||''}) - 1;
      lihatBtn = `<button class="btn btn-ghost btn-sm" onclick="openLihatPenuhModal(${lIdx})" style="margin-top:5px;font-size:10px;padding:2px 10px;">🔍 Lihat Penuh</button>`;
    }
    const typeLabel = entry._type==='journal'
      ? `<span style="font-size:9px;font-weight:800;color:rgba(200,168,75,0.7);letter-spacing:0.8px;text-transform:uppercase;">📔 Jurnal</span>`
      : entry._type==='principle'
      ? `<span style="font-size:9px;font-weight:800;color:rgba(200,168,75,1);letter-spacing:0.8px;text-transform:uppercase;">✒️ Prinsip</span>`
      : `<span style="font-size:9px;font-weight:800;color:rgba(200,168,75,0.6);letter-spacing:0.8px;text-transform:uppercase;">💬 Jawaban</span>`;
    const qLabel = entry._type==='answer'
      ? `<div style="font-size:10.5px;font-style:italic;color:rgba(200,168,75,0.75);line-height:1.4;margin-bottom:5px;font-family:var(--font-display);">"${escapeHtml((entry._qText||'').slice(0,80)+((entry._qText||'').length>80?'…':''))}"</div>`
      : '';
    // Badge arsip — penanda visual saja, tidak membatasi aksi apapun
    const archiveBadge = entry._archiveOnly
      ? `<span style="font-size:8.5px;font-weight:700;padding:1px 6px;border-radius:5px;background:rgba(124,92,255,0.15);color:var(--arise-bright);margin-left:5px;letter-spacing:0.3px;">📦 Arsip</span>`
      : '';

    // Semua tombol tampil penuh untuk semua entri (active maupun archive-only).
    // Fungsi-fungsi di balik tombol sudah di-extend untuk handle archive-only.
    let actions = '';
    if(entry._type==='journal'){
      const isEditing = _rfJournalEditId === entry.id;
      actions = `<button class="btn btn-sm btn-xs ${isEditing?'btn-primary':'btn-ghost'}" onclick="editRefleksiJournal('${entry.id}')" style="font-size:10px;padding:3px 8px;">${isEditing?'✏️ Sedang Diedit':'✏️ Edit'}</button>
        <button class="btn btn-sm btn-xs ${entry.pinnedHome?'btn-primary':'btn-ghost'}" onclick="pinJournalHome('${entry.id}')" style="font-size:10px;padding:3px 8px;">${entry.pinnedHome?'✅ Di Home':'✅ Pakai di Home'}</button>
        <button class="btn btn-sm btn-xs btn-ghost" onclick="deleteRefleksiJournal('${entry.id}')" style="font-size:11px;padding:3px 7px;">🗑</button>`;
    } else if(entry._type==='principle'){

        <button class="btn btn-sm btn-xs btn-ghost" onclick="editLifePrinciple('${entry.id}')" style="font-size:10px;padding:3px 8px;">✏️ Edit</button>

  function questionAnswerHistoryHtml(q){

            <button class="btn btn-sm btn-xs ${a.pinnedProfile?'btn-primary':'btn-ghost'}" onclick="pinRefleksiAnswer('${q.id}','${a.id}')" style="font-size:9.5px;padding:2px 7px;">${a.pinnedProfile?'✅ Di Profil':'📌 Pakai di Profil'}</button>
            <button class="btn btn-sm btn-xs btn-ghost" onclick="deleteRefleksiAnswer('${q.id}','${a.id}')" style="font-size:10px;padding:2px 6px;">🗑</button>
          </div>

      ? `<button class="btn btn-ghost btn-sm btn-block" style="font-size:10.5px;margin-top:4px;" onclick="toggleRiwayatMonth('${expandKey}')">${isOpen ? 'Sederhanakan ↑' : `Lihat Semua ${answers.length} Jawaban Sebelumnya →`}</button>`
      : '';
    return `<div style="margin-top:10px;">
      <div style="font-size:10px;font-weight:800;color:rgba(200,168,75,0.7);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:2px;">📜 Riwayat Jawaban (${answers.length})</div>

  }

  // === Pertanyaan: daftar tetap tampil, textarea kosong ===
  const qHtml = questions.length===0
    ? `<div class="small muted" style="text-align:center;padding:14px 0;">Belum ada pertanyaan. Tambahkan pertanyaan refleksimu di atas.</div>`
    : questions.map(q=>`<div class="card refleksi-q-card" style="margin-bottom:12px;padding:14px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;">
          <div style="font-family:var(--font-display);font-weight:800;font-size:12.5px;color:rgba(200,168,75,0.9);line-height:1.5;flex:1;">${escapeHtml(q.q)}</div>
          <button class="btn btn-sm btn-xs btn-ghost" onclick="deleteRefleksiQuestion('${q.id}')" style="font-size:11px;padding:3px 7px;">🗑</button>
        </div>
        <textarea id="rf-ans-${q.id}" class="input" rows="4" placeholder="Tulis jawabanmu secara jujur dan mendalam..." style="font-family:var(--font-body);resize:vertical;min-height:70px;line-height:1.6;"></textarea>
        <div style="margin-top:8px;text-align:right;">
          <button class="btn btn-secondary btn-sm" onclick="saveRefleksiAnswer('${q.id}')">💾 Simpan Jawaban</button>
        </div>
      </div>`).join('');

  return `<div>
    <div class="refleksi-section-title" style="margin-top:4px;">✦ REFLEKSI DIRI ✦</div>
    <div class="small muted" style="text-align:center;margin-bottom:20px;line-height:1.6;font-family:var(--font-body);">Ruang mengenal dirimu lebih dalam.<br>Jurnal & pertanyaanmu membentuk kebijaksanaan sejati.</div>

    <div data-sec-tab="refleksi" data-sec-id="refleksi-principle">
      <div class="card glass-panel refleksi-journal-card" style="margin-bottom:14px;">
        <div style="font-family:var(--font-display);font-weight:800;font-size:13px;color:rgba(200,168,75,0.9);margin-bottom:6px;">✒️ Prinsip & Nilai Hidup</div>
        <div class="small muted" style="margin-bottom:12px;">Motto pribadi yang memandu langkahmu. Setelah disimpan, teks masuk ke Riwayat.</div>
        <textarea id="rf-life-principle" class="input" rows="4" placeholder="Contoh: Disiplin mengalahkan motivasi." style="resize:vertical;min-height:80px;font-family:var(--font-body);line-height:1.7;font-size:13px;"></textarea>

        <div class="small muted" style="margin-bottom:12px;">Curahkan pikiranmu secara bebas — tidak ada format, tidak ada penilaian.</div>
        <textarea id="rf-journal-input" class="input" rows="6" placeholder="Apa yang ada di pikiranmu hari ini? Apa yang kamu rasakan? Apa yang kamu syukuri?..." style="resize:vertical;min-height:100px;font-family:var(--font-body);line-height:1.7;font-size:13px;"></textarea>

    <div data-sec-tab="refleksi" data-sec-id="refleksi-questions">
      <div class="card glass-panel" style="border-color:rgba(200,168,75,0.25);margin-bottom:14px;padding:14px 16px;">

        <div class="small muted" style="margin-bottom:12px;line-height:1.5;">Buat pertanyaan mendalam untukmu sendiri. Jawab dengan jujur. Jawaban terbaik bisa dipajang di Profil.</div>

      ${histHtml}

// ═══════════════════════════════════════════════════════════════
// SEJARAH RIWAYAT — sub-tab ke-5 di grup Profil. Arsip permanen semua riwayat
// (Finansial, Momentum, Goal, Sedekah, Jurnal, Refleksi, Timeline) yang sudah lewat 30 hari.
// Isinya diambil realtime dari state.historyArchive (diisi oleh sweepHistoryArchive()).
// ═══════════════════════════════════════════════════════════════
let _riwayatCat = 'finansial';
let _riwayatExpanded = {};
let _riwayatSelectMode = false;
let _riwayatSelected = {}; // { [key]: true }
let _rfJournalEditId = null;      // ID jurnal yang sedang diedit
let _rfAnswerEditCtx = null;      // { qId, answerId } jawaban yang sedang diedit
const RIWAYAT_CATS = [
  {key:'finansial', icon:'💰', label:'Finansial'},
  {key:'momentum',  icon:'📈', label:'Momentum'},
  {key:'goal',      icon:'🏆', label:'Goal'},
  {key:'projek',    icon:'📌', label:'Projek'},
  {key:'sedekah',   icon:'🌟', label:'Sedekah'},
  {key:'jurnal',    icon:'📓', label:'Jurnal'},
  {key:'refleksi',  icon:'🪞', label:'Refleksi'},
  {key:'evaluasi',  icon:'📋', label:'Evaluasi'},
  {key:'timeline',  icon:'📆', label:'Timeline'},
  {key:'vitalitas', icon:'❤️', label:'Vitalitas'},
  {key:'karakter',  icon:'📊', label:'Karakter'},
];
// BUGFIX: Vitalitas dulu HANYA mengambil dari state.hpEventLog + state.manaEventLog, yang
// dibatasi 100 entri masing-masing dan entri lebih lama DIBUANG PERMANEN — beda dari semua
// kategori riwayat lain yang diarsipkan selamanya ke state.historyArchive. Sekarang entri baru
// diarsipkan realtime saat dibuat (lihat logHpChange/logManaChange + _trimVitalitasLog), jadi
// daftar di sini menggabungkan arsip permanen (state.historyArchive.vitalitas) dengan entri aktif
// yang belum sempat diarsipkan (data lama sebelum bugfix ini, sebelum sempat ke-trim).
function _riwayatVitalitasList(){
  ensureHistoryArchive(state);
  const archived = state.historyArchive.vitalitas || [];
  const activeHp = (state.hpEventLog || []).filter(e => !e._archived).map(e => ({...e, _vType:'hp'}));
  const activeMana = (state.manaEventLog || []).filter(e => !e._archived).map(e => ({...e, _vType:'mana'}));
  return archived.concat(activeHp, activeMana);
}
// Karakter juga beda sumber data: gabungan langsung dari state.charHistory (level/hp/realm/streak),
// yang tersimpan PERMANEN tanpa batas jumlah (beda dengan hpEventLog/manaEventLog yang dibatasi 100).
function _riwayatKarakterList(){
  ensureCharHistory(state);
  const ch = state.charHistory;
  const lvl = (ch.level||[]).map(e=>({...e,_kType:'level'}));
  const hp = (ch.hp||[]).map(e=>({...e,_kType:'hp'}));
  const realm = (ch.realm||[]).map(e=>({...e,_kType:'realm'}));
  const streak = (ch.streak||[]).map(e=>({...e,_kType:'streak'}));
  return lvl.concat(hp, realm, streak);
}
// ts di charHistory formatnya tidak konsisten: level/realm pakai locale string "dd/mm/yyyy, hh:mm",
// sedangkan hp/streak pakai ISO "yyyy-mm-dd". Helper ini menormalkan keduanya jadi Date object.
function _parseCharTs(ts){
  if(!ts) return null;
  let m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(ts);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = /^(\d{2})\/(\d{2})\/(\d{4}),?\s*(\d{2}):(\d{2})$/.exec(ts);
  if(m) return new Date(+m[3], +m[2]-1, +m[1], +m[4], +m[5]);
  const d = new Date(ts);
  return isNaN(d) ? null : d;
}
const _RIWAYAT_MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function setRiwayatCat(cat){ _riwayatCat = cat; _riwayatSelectMode = false; _riwayatSelected = {}; render(); }
function toggleRiwayatMonth(key){ _riwayatExpanded[key] = !_riwayatExpanded[key]; render(); }

// ── Kunci unik per entri (dipakai untuk seleksi & sinkron hapus) ──────────────
function _riwayatEntryKey(cat, e){
  if(cat==='finansial') return e.id || (e.date+'|'+e.type+'|'+e.amount+'|'+(e.note||''));
  if(cat==='sedekah')   return e.id || (e.date+'|'+e.nominal);
  if(cat==='momentum')  return e.date || (e.id||'');
  if(cat==='goal')      return e.id || (e.completedAt+'|'+(e.title||''));
  if(cat==='jurnal')    return e.date || '';
  if(cat==='refleksi')  return e.id || (e._ts+'|'+(e._sourceType||''));
  if(cat==='evaluasi')  return e.id || (e.date+'|'+(e.weekKey||''));
  if(cat==='timeline')  return e.id || e.ts || (e.date+'|'+(e.desc||''));
  if(cat==='projek')    return e.id || (e.completedAt+'|'+(e.title||''));
  // Vitalitas: pakai ts|_vType sebagai kunci stabil — tidak bergantung pada keberadaan _archived
  // supaya key antara entri aktif (hpEventLog) dan salinan di historyArchive selalu cocok.
  if(cat==='vitalitas') return String(e.ts||'') + '|' + (e._vType||'');
  return e.id || JSON.stringify(e);
}

// ── Hapus dari permanen + sinkron ke tab aktif ────────────────────────────────
function deleteFromPermanen(cat, keys){
  const ks = new Set(keys);
  // Hapus dari historyArchive
  if(state.historyArchive && state.historyArchive[cat]){
    state.historyArchive[cat] = state.historyArchive[cat].filter(e=>!ks.has(_riwayatEntryKey(cat,e)));
  }
  // Sinkron hapus dari sumber aktif
  if(cat==='finansial'){
    (state.financeLog||[]).forEach(e=>{ if(ks.has(_riwayatEntryKey('finansial',e)) && e.id!=null) markDeleted('financeLog', e.id); });
    state.financeLog = (state.financeLog||[]).filter(e=>!ks.has(_riwayatEntryKey('finansial',e)));
  } else if(cat==='sedekah'){
    if(state.sedekah){
      (state.sedekah.entries||[]).forEach(e=>{ if(ks.has(_riwayatEntryKey('sedekah',e)) && e.id!=null) markDeleted('sedekahEntries', e.id); });
      state.sedekah.entries = (state.sedekah.entries||[]).filter(e=>!ks.has(_riwayatEntryKey('sedekah',e)));
    }
  } else if(cat==='momentum'){
    state.lifeMomentum = (state.lifeMomentum||[]).filter(e=>!ks.has(_riwayatEntryKey('momentum',e)));
  } else if(cat==='goal'){
    state.goalHistory = (state.goalHistory||[]).filter(e=>!ks.has(_riwayatEntryKey('goal',e)));
  } else if(cat==='jurnal'){
    keys.forEach(k=>{ if(state.dailyJournal) delete state.dailyJournal[k]; });
  } else if(cat==='refleksi'){
    if(state.refleksi){
      state.refleksi.journals = (state.refleksi.journals||[]).filter(e=>!ks.has(_riwayatEntryKey('refleksi',e)));
      (state.refleksi.questions||[]).forEach(q=>{
        q.answers = (q.answers||[]).filter(a=>!ks.has(_riwayatEntryKey('refleksi',a)));
      });
    }
    if(state.character){
      state.character.lifePrincipleHistory = (state.character.lifePrincipleHistory||[]).filter(h=>!ks.has(_riwayatEntryKey('refleksi',h)));
    }
  } else if(cat==='evaluasi'){
    if(state.evaluasiMingguan){
      state.evaluasiMingguan.entries = (state.evaluasiMingguan.entries||[]).filter(e=>!ks.has(_riwayatEntryKey('evaluasi',e)));
    }
  } else if(cat==='vitalitas'){
    // Hapus entri yang cocok dari hpEventLog & manaEventLog (entri lama tanpa _archived
    // masih muncul di tampilan aktif via _riwayatVitalitasList — perlu dibersihkan juga).
    state.hpEventLog   = (state.hpEventLog  ||[]).filter(e=>!ks.has(_riwayatEntryKey('vitalitas', e)));
    state.manaEventLog = (state.manaEventLog||[]).filter(e=>!ks.has(_riwayatEntryKey('vitalitas', e)));
  } else if(cat==='timeline'){
    state.lifeTimeline = (state.lifeTimeline||[]).filter(e=>!ks.has(_riwayatEntryKey('timeline',e)));
  }
  _riwayatSelected = {}; _riwayatSelectMode = false;
  save(); render();
}

function editRefleksiAnswerBtn(qId, answerId){

function pakaiLifePrincipleHistory(lpId){
  if(!state.character || !Array.isArray(state.character.lifePrincipleHistory)) return;
  // Cari di active array dulu; kalau tidak ada, cari di archive (prinsip archive-only)
  let entry = state.character.lifePrincipleHistory.find(h=>h.id===lpId);
  if(!entry) entry = (state.historyArchive?.refleksi||[]).find(e=>e._sourceType==='principle' && e.id===lpId);
  if(!entry) return;
  // Set pinnedHome: hanya satu yang aktif, sisanya false
  state.character.lifePrincipleHistory.forEach(h => { h.pinnedHome = h.id === lpId; });
