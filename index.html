<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MYSISTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js" onerror="console.warn('Chart.js gagal dimuat dari CDN — fitur grafik/chart tidak akan berfungsi. Periksa koneksi internet.')"></script>
<style>
:root{
  --void:#08080F;
  --void-2:#0F1020;
  --surface:rgba(255,255,255,0.035);
  --surface-strong:rgba(255,255,255,0.07);
  --border:rgba(150,135,255,0.16);
  --border-strong:rgba(170,155,255,0.30);
  --glass:rgba(18,18,34,0.62);
  --arise:#7C5CFF;
  --arise-bright:#A48BFF;
  --cyan:#2DD4F4;
  --gold:#F0B93B;
  --gold-soft:#F7D27A;
  --jade:#34D399;
  --crimson:#FF4768;
  --orange:#FF8A3D;
  --bone:#ECEAF5;
  --muted:#9492AC;
  --muted-2:#615F78;
  --font-display:'Cinzel',serif;
  --font-system:'Rajdhani',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-head:'Cinzel',serif;
  --font-classic:'Playfair Display',serif;
  --font-scifi:'Orbitron',sans-serif;
  --font-epic:'Cinzel Decorative',serif;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background: radial-gradient(circle at 50% 30%, #1a1025 0%, #08080F 50%, #030305 100%);
  color:var(--bone);
  font-family:var(--font-body);
  overflow-x:hidden;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
  background: radial-gradient(circle at 15% 70%, rgba(45,212,244,0.04) 0%, transparent 50%),
              radial-gradient(circle at 85% 20%, rgba(124,92,255,0.04) 0%, transparent 50%);
}

button,input,select,textarea{font-family:inherit;}
button{cursor:pointer;}
::selection{background:var(--arise);color:#fff;}
a{color:var(--cyan);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

.holo-text {
    background: linear-gradient(90deg, var(--cyan), var(--arise-bright), var(--jade), var(--cyan));
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: holoFlow 4s linear infinite;
    font-weight: 800;
    text-shadow: 0 0 15px rgba(45, 212, 244, 0.4);
}
@keyframes holoFlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

.name-holo-gold, .name-holo-rainbow, .name-holo-silver {
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: holoFlow 4s linear infinite;
}
.name-holo-gold { background-image: linear-gradient(90deg, #ffffff, #F0B93B, #fff9e6, #F7D27A, #ffffff); }
.name-holo-rainbow { background-image: linear-gradient(90deg, #FF4768, #F0B93B, #34D399, #2DD4F4, #7C5CFF, #FF4768); }
.name-holo-silver { background-image: linear-gradient(90deg, #cfd3da, #ffffff, #9aa0ab, #ffffff, #cfd3da); }
.name-holo-swatch { width:30px; height:30px; border-radius:50%; border:2px solid var(--border-strong); cursor:pointer; flex:0 0 auto; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
.name-holo-swatch.active { border-color: var(--arise-bright); box-shadow: 0 0 0 2px rgba(124,92,255,0.35); }
.name-holo-swatch.swatch-none { background: rgba(255,255,255,0.05); color: var(--muted); font-size:10px; }
.name-holo-swatch.swatch-gold { background: linear-gradient(135deg, #ffffff, #F0B93B, #F7D27A); }
.name-holo-swatch.swatch-rainbow { background: linear-gradient(135deg, #FF4768, #F0B93B, #34D399, #2DD4F4, #7C5CFF); }
.name-holo-swatch.swatch-silver { background: linear-gradient(135deg, #cfd3da, #ffffff, #9aa0ab); }

#bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

.click-ripple {
    position: fixed; border-radius: 50%; pointer-events: none;
    background: rgba(45, 212, 244, 0.4); transform: translate(-50%, -50%) scale(0);
    animation: rippleAnim 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; z-index: 9999;
    box-shadow: 0 0 15px var(--cyan);
}
@keyframes rippleAnim { 100% { transform: translate(-50%, -50%) scale(4); opacity: 0; } }

/* Sedekah reward FX — cahaya, partikel emas, floating text. Maks ~1s, tidak mengubah fitur/logika sedekah. */
.sedekah-flash{
    position:fixed; width:16px; height:16px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:9999;
    background:radial-gradient(circle, rgba(255,241,196,.95), rgba(240,185,59,.55) 45%, rgba(240,185,59,0) 72%);
    box-shadow:0 0 30px 10px rgba(240,185,59,.45), 0 0 60px 22px rgba(240,185,59,.20);
    animation: sedekahFlashAnim .5s ease-out forwards;
}
@keyframes sedekahFlashAnim{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.2); }
    30%{ opacity:1; transform:translate(-50%,-50%) scale(1.6); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(2.4); }
}
.sedekah-particle{
    position:fixed; width:5px; height:5px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:9999;
    background:radial-gradient(circle, #fff6d8, #f0b93b 60%, rgba(240,185,59,0) 100%);
    box-shadow:0 0 6px rgba(240,185,59,.9);
    animation: sedekahParticleAnim .9s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes sedekahParticleAnim{
    0%{ opacity:1; transform:translate(-50%,-50%) translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-50%) translate(var(--dx), var(--dy)) scale(.3); }
}
.sedekah-float-text{
    position:fixed; pointer-events:none; z-index:9999;
    font-family:var(--font-epic); font-weight:800; font-size:13px; letter-spacing:.4px;
    color:#ffe9b0; text-shadow:0 0 8px rgba(240,185,59,.8), 0 0 16px rgba(240,185,59,.4);
    transform:translate(-50%,-50%);
    animation: sedekahFloatTextAnim 1s ease-out forwards;
}
@keyframes sedekahFloatTextAnim{
    0%{ opacity:0; transform:translate(-50%,-50%) translateY(0); }
    15%{ opacity:1; }
    100%{ opacity:0; transform:translate(-50%,-50%) translateY(-88px); }
}
.sedekah-blessing-aura{
    position:fixed; width:10px; height:10px; border-radius:50%;
    transform:translate(-50%,-50%); pointer-events:none; z-index:9998;
    border:1px solid rgba(255,236,190,.55);
    box-shadow:0 0 18px rgba(240,185,59,.30), inset 0 0 14px rgba(255,236,190,.20);
    animation: sedekahAuraAnim .9s cubic-bezier(.15,.7,.25,1) forwards;
}
@keyframes sedekahAuraAnim{
    0%{ opacity:.9; transform:translate(-50%,-50%) scale(.3); }
    100%{ opacity:0; transform:translate(-50%,-50%) scale(6); }
}
.sedekah-sub-text{
    position:fixed; pointer-events:none; z-index:9999;
    font-family:var(--font-system); font-weight:600; font-size:10.5px; letter-spacing:.6px;
    color:rgba(255,236,190,.85); text-shadow:0 0 6px rgba(240,185,59,.5);
    transform:translate(-50%,-50%); white-space:nowrap;
    animation: sedekahSubTextAnim .95s ease-out forwards;
}
@keyframes sedekahSubTextAnim{
    0%{ opacity:0; transform:translate(-50%,-50%) translateY(0); }
    20%{ opacity:.95; }
    100%{ opacity:0; transform:translate(-50%,-50%) translateY(14px); }
}

.screen{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.app-header{
  position:sticky;top:0;z-index:20; padding:14px 16px 10px;
  background:linear-gradient(to bottom, rgba(8,8,20,0.72), rgba(8,8,20,0.28));
  backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid rgba(124,92,255,0.08);
}
.wordmark-row{display:flex;align-items:center;justify-content:space-between;}
.wordmark{
  font-family:var(--font-epic); font-size:19px; letter-spacing:2.5px; font-weight:900;
  text-transform:uppercase;
  background:linear-gradient(90deg, var(--gold-soft), var(--gold) 45%, var(--arise-bright));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 10px rgba(240,185,59,0.35)) drop-shadow(0 0 2px rgba(0,0,0,0.6));
}

.day-counter {
  font-family: var(--font-display); font-size: 14px;
  background: linear-gradient(90deg, var(--gold-soft), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  filter: drop-shadow(0 0 4px rgba(240, 185, 59, 0.4));
  display: flex; align-items: center; gap: 4px;
}

.recovery-banner{
  margin-top:8px;font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(90deg,rgba(255,71,104,0.35),rgba(255,71,104,0.12));
  border:1px solid rgba(255,71,104,0.5);
  border-radius:10px;padding:8px 10px;letter-spacing:0.3px;
}
.recovery-banner small{display:block;font-weight:400;color:#ffd9df;margin-top:2px;font-size:11px;}

.hp-zero-banner{
  margin-top:8px;font-size:12px;font-weight:600;color:#fff;
  background:linear-gradient(90deg,rgba(255,138,61,0.35),rgba(255,138,61,0.12));
  border:1px solid rgba(255,138,61,0.5);
  border-radius:10px;padding:8px 10px;letter-spacing:0.3px;
}
.hp-zero-banner small{display:block;font-weight:400;color:#ffe3cf;margin-top:2px;font-size:11px;}

.tab-content{flex:1;padding:16px 16px 110px;animation:tabIn 0.28s ease;}
@keyframes tabIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* ── Bottom Nav: Glass Hologram Cultivation UI ── */
.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;max-width:480px;margin:0 auto;display:flex;
  background:rgba(7,7,18,0.7);
  backdrop-filter:blur(28px) saturate(180%);
  border-top:1px solid rgba(124,92,255,0.14);
  box-shadow:0 -1px 0 rgba(255,255,255,0.025), 0 -10px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.03);
  padding:5px 2px calc(5px + env(safe-area-inset-bottom));
  overflow-x:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none;
}
.bottom-nav::-webkit-scrollbar{display:none;}

.nav-btn{
  flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;
  background:none;border:none;color:rgba(130,120,175,0.7);
  padding:7px 2px 4px;border-radius:12px;
  font-family:var(--font-system);font-size:9px;letter-spacing:0.3px;font-weight:600;
  transition:color .25s, transform .2s;
  position:relative;
  cursor:pointer;
}

/* Tier 1 — glass capsule behind every icon (inactive) */
.nav-btn::before{
  content:'';
  position:absolute;
  top:4px;left:50%;
  transform:translateX(-50%);
  width:34px;height:34px;
  border-radius:10px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(255,255,255,0.05);
  transition:all .28s cubic-bezier(.4,0,.2,1);
}

/* Tier 2 — energy ring (only animates when active) */
.nav-btn::after{
  content:'';
  position:absolute;
  top:3px;left:50%;
  transform:translateX(-50%);
  width:36px;height:36px;
  border-radius:11px;
  border:1px solid transparent;
  transition:all .28s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}

.nav-btn svg{
  width:18px;height:18px;
  stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
  transition:filter .28s, transform .28s, stroke .28s;
  position:relative;z-index:1;
}

.nav-btn span{
  position:relative;z-index:1;
  transition:color .25s;
}

/* ── ACTIVE: Tier 2 Hologram ── */
.nav-btn.active{
  color:rgba(200,188,255,0.95);
}

.nav-btn.active::before{
  background:rgba(124,92,255,0.13);
  border-color:rgba(164,139,255,0.32);
  box-shadow:0 0 14px rgba(124,92,255,0.22), inset 0 0 10px rgba(124,92,255,0.07);
  transform:translateX(-50%) translateY(-1.5px);
}

.nav-btn.active::after{
  border-color:rgba(164,139,255,0.42);
  transform:translateX(-50%) translateY(-1.5px);
  animation:navAuraRing 2.4s ease-in-out infinite;
}

.nav-btn.active svg{
  stroke:rgba(215,205,255,0.97);
  filter:drop-shadow(0 0 4px rgba(164,139,255,1)) drop-shadow(0 0 10px rgba(124,92,255,0.55));
  transform:translateY(-1.5px);
}

@keyframes navAuraRing{
  0%,100%{box-shadow:0 0 8px rgba(124,92,255,0.28);opacity:.75;}
  50%{box-shadow:0 0 20px rgba(164,139,255,0.5), 0 0 5px rgba(210,195,255,0.25);opacity:1;}
}

.holo-box {
  background: rgba(255,255,255,0.02) !important;
  border: 1px solid rgba(45, 212, 244, 0.2) !important;
  box-shadow: inset 0 0 15px rgba(124, 92, 255, 0.05), 0 5px 20px rgba(0,0,0,0.5) !important;
  backdrop-filter: blur(12px) !important;
}

.glass-panel{
  background:var(--glass); border:1px solid var(--border); border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
}
.card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:14px; }
.card-title{ font-family:var(--font-system);font-size:12.5px;letter-spacing:1.2px;font-weight:700; color:var(--muted);text-transform:uppercase;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between; }
.section-title{
  font-family:var(--font-display); font-size:15.5px; font-weight:800; color:var(--bone);
  margin:24px 0 12px; letter-spacing:1px; text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
  text-shadow:0 0 12px rgba(164,139,255,0.25);
}
.section-title::before{
  content:''; width:3px; height:14px; border-radius:2px; flex-shrink:0;
  background:linear-gradient(180deg, var(--gold-soft), var(--arise-bright));
}
.section-title:first-child{margin-top:0;}

.btn{ font-family:var(--font-system);font-weight:700;letter-spacing:0.5px;font-size:13px; border-radius:12px;padding:10px 14px;border:1px solid transparent; display:inline-flex;align-items:center;justify-content:center;gap:6px; transition:transform .12s, opacity .12s; }
.btn-secondary { background:rgba(255,255,255,0.05); color:var(--bone); border:1px solid var(--border); }
.btn-secondary:hover { background:rgba(255,255,255,0.1); }
.btn:active{transform:scale(0.96);}
.btn-block{width:100%;}
.btn-primary{background:linear-gradient(90deg,var(--arise),var(--cyan));color:#0a0a14;}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid var(--border-strong);color:var(--bone);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}
.btn-danger{background:rgba(255,71,104,0.1);border:1px solid rgba(255,71,104,0.45);color:#ffb4c1;}
.btn-gold{background:linear-gradient(90deg,var(--gold),var(--orange));color:#1a1206;}
.btn-sm{padding:7px 10px;font-size:11.5px;border-radius:9px;}
.btn[disabled]{opacity:0.35;pointer-events:none;}

.icon-btn { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:6px; display:inline-flex; align-items:center; justify-content:center; border-radius:8px; transition:all 0.2s ease; }
.icon-btn:hover { background:rgba(255,255,255,0.1); color:var(--bone); }
.icon-btn svg { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

.pill{ font-family:var(--font-system);font-size:10px;font-weight:700;letter-spacing:0.6px; padding:3px 8px;border-radius:20px;display:inline-block;text-transform:uppercase; }
.row{display:flex;align-items:center;}
.row-between{display:flex;align-items:center;justify-content:space-between;}
.gap-6{gap:6px;} .gap-8{gap:8px;} .gap-10{gap:10px;}
.muted{color:var(--muted);} .small{font-size:11.5px;}
.mt-10{margin-top:10px;} .mt-14{margin-top:14px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:0.5px; text-transform:uppercase;}
.field input[type=text],.field input[type=number],.field input[type=date],.field select,.field textarea,
.input, .shift-select, .realm-row input[type=text], .realm-row input[type=number], .num-input-sm {
  width:100%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:12px 14px;color:#fff;font-size:14px;outline:none; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
  color-scheme: dark;
}
.field input:focus,.field select:focus,.field textarea:focus,
.input:focus, .shift-select:focus, .realm-row input:focus, .num-input-sm:focus { border-color:var(--cyan); box-shadow: 0 0 0 3px rgba(45,212,244,0.2), inset 0 2px 5px rgba(0,0,0,0.5); }
.field textarea{resize:vertical;min-height:70px;}

.form-row { display:flex; gap:10px; }
.form-group { margin-bottom: 13px; }
.form-group.half { flex:1; }
.form-group label { display:block; font-size:11.5px; color:var(--muted); margin-bottom:5px; font-weight:600; letter-spacing:0.3px; }

.stat-row{margin-bottom:12px;}
.stat-row-top{display:flex;justify-content:space-between;font-family:var(--font-system);font-size:12.5px;margin-bottom:5px;}
.stat-name{color:var(--bone);font-weight:600;letter-spacing:0.3px;}
.stat-val{color:var(--muted);font-weight:700;}
.stat-track{height:7px;border-radius:6px;background:rgba(255,255,255,0.06);overflow:hidden;}
.stat-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.stat-group-label{font-family:var(--font-system);font-size:10.5px;color:var(--muted-2);letter-spacing:1.4px;text-transform:uppercase;margin:14px 0 8px;}

.ring-wrap{position:relative;width:168px;height:168px;margin:6px auto 4px;}
.ring-wrap svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,0.07);stroke-width:9;}
.ring-fill{fill:none;stroke-width:9;stroke-linecap:round;transition:stroke-dashoffset 0.7s cubic-bezier(.2,.8,.2,1);}
.ring-orbit{ position:absolute;inset:8px;border-radius:50%; border:1px dashed rgba(164,139,255,0.35); animation:orbitSpin 14s linear infinite; }
@keyframes orbitSpin{to{transform:rotate(360deg);}}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-level-label{font-family:var(--font-system);font-size:10px;color:var(--muted);letter-spacing:1.5px;}

.title-banner {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 13.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 5;
    animation: floatBanner 6s ease-in-out infinite;
    text-align: center;
    transition: all 0.3s ease;
    will-change: transform;
}
@keyframes floatBanner { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

.realm-name{font-family:var(--font-display);text-align:center;font-size:16px;font-weight:800;letter-spacing:0.8px;margin-top:6px;text-transform:uppercase;}
.spiritual-bar-wrap{margin-top:14px;}
.spiritual-track{height:6px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;}
.spiritual-fill{
  height:100%;border-radius:5px;
  background: linear-gradient(90deg, #34D399, #2DD4F4, #A48BFF, #34D399);
  background-size: 200% 200%;
  animation: holoFlow 8s ease infinite;
  transition:width .5s ease;
}

/* ═══════════════════════════════════
   HEAVEN TRAMPLING — Visual Effects
   ═══════════════════════════════════ */
@keyframes htAuraPulse {
  0%,100% { box-shadow: 0 0 16px rgba(255,215,0,0.3), 0 0 28px rgba(255,100,0,0.15); }
  50%      { box-shadow: 0 0 26px rgba(255,215,0,0.55), 0 0 45px rgba(255,100,0,0.28); }
}
@keyframes htBorderGlow {
  0%,100% { border-color: rgba(255,200,50,0.5); }
  50%      { border-color: rgba(255,255,180,0.95); }
}
@keyframes htTitleFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}
@keyframes htRingRotate {
  to { transform: rotate(360deg); }
}
@keyframes htShimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes htImmortalGlow {
  0%   { text-shadow: 0 0 12px #fff, 0 0 24px rgba(255,215,0,0.9), 0 0 40px rgba(255,100,0,0.5); }
  33%  { text-shadow: 0 0 18px #fff, 0 0 36px rgba(124,92,255,0.9), 0 0 60px rgba(45,212,244,0.6); }
  66%  { text-shadow: 0 0 16px #fff, 0 0 30px rgba(255,71,104,0.9), 0 0 50px rgba(255,215,0,0.7); }
  100% { text-shadow: 0 0 12px #fff, 0 0 24px rgba(255,215,0,0.9), 0 0 40px rgba(255,100,0,0.5); }
}
.ht-card {

  background: linear-gradient(145deg, rgba(20,10,0,0.9), rgba(40,15,0,0.8), rgba(10,5,20,0.9)) !important;

}
.ht-card::before {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.12) 0%, transparent 70%),
              radial-gradient(ellipse at 50% 100%, rgba(124,92,255,0.08) 0%, transparent 70%);
}
.ht-card::after {
  content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,200,0.08), transparent);
  animation: htShimmer 10s linear infinite;
  pointer-events:none; z-index:1;
}
.ht-bridge-ring {
  position:absolute; border-radius:50%; pointer-events:none;
  border: 1px solid rgba(255,200,50,0.25);
}

.ht-bridge-ring.r2 { width:150px; height:150px; bottom:-30px; left:-30px; animation: htRingRotate 28s linear infinite reverse; border-color: rgba(124,92,255,0.2); }
.ht-bridge-bar-wrap { position:relative; z-index:2; margin-top:10px; }
.ht-bridge-bar-track { height:8px; border-radius:6px; background:rgba(255,255,255,0.06); overflow:hidden; border:1px solid rgba(255,200,50,0.2); }
.ht-bridge-bar-fill {
  height:100%; border-radius:6px;

.ht-lv-badge {

.ht-bridge-dots { display:flex; gap:5px; justify-content:center; margin-top:8px; flex-wrap:wrap; }

.fx-overlay{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;visibility:hidden;overflow:hidden;}
.fx-overlay.active{opacity:1;visibility:visible;}

.todo-item { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; font-size:12.5px; line-height:1.4; padding:8px; border-radius:8px; background:rgba(255,255,255,0.02); border:1px solid var(--border); }

/* Tiers 0–11: purely static box-shadow, zero animation */
/* Evolusi warna Profile Card mengikuti tahap Realm — dikelompokkan jadi 9 tahap besar
   (bukan 16 warna berbeda) supaya makin tinggi realm makin eksklusif, bukan makin ramai:
   Qi Condensation(ungu transparan) → Foundation Establishment(biru kristal) →
   Core Formation(cyan hologram) → Nascent Soul(hijau jade) → Soul Formation(cyan jade) →
   Soul Transformation(indigo) → Nirvana(merah premium) → Void(silver hologram) →
   Heaven Trampling(divine gold, sistem ht-card terpisah, tidak diubah). */
.rv-qc  { background: linear-gradient(135deg, rgba(139,92,246,.045), rgba(18,18,34,.60), rgba(139,92,246,.025)) !important; box-shadow: 0 0 0 1px rgba(139,92,246,.12), 0 0 12px rgba(139,92,246,.08), 0 10px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(139,92,246,.05) !important; backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important; }

.pac-2,.pac-3 { -webkit-backdrop-filter:blur(11px); }
.pac-4,.pac-5 { -webkit-backdrop-filter:blur(12px); }
.pac-6,.pac-7,.pac-8 { -webkit-backdrop-filter:blur(13px); }
.pac-9,.pac-10,.pac-11 { -webkit-backdrop-filter:blur(14px); }
.pac-12,.pac-13 { -webkit-backdrop-filter:blur(15px); }
.pac-14,.pac-15 { -webkit-backdrop-filter:blur(16px); }
.pac-16 { -webkit-backdrop-filter:blur(18px); }

/* ── Smooth loop: alternate so gradient reverses cleanly ─────────── */
.pac-9,.pac-10,.pac-11,.pac-12,.pac-13,.pac-14,.pac-15,.pac-16 {
  animation-direction:alternate !important; }

/* ── Reduce motion: disable animated shimmer ─────────────────────── */
@media (prefers-reduced-motion:reduce){
  .pac-9,.pac-10,.pac-11,.pac-12,.pac-13,.pac-14,.pac-15,.pac-16 { animation:none !important; }
  .pav-11,.pav-12,.pav-13,.pav-14,.pav-15,.pav-16 { animation:none !important; }
}
.rv-ht-bridge.pulsing  { animation: rvHtPulse var(--htb-pulse,5s) ease-in-out infinite; }
.rv-ht-bridge.legendary::after {
  content:''; position:absolute; width:200%; height:200%; top:-50%; left:-50%;
  border-radius:50%; pointer-events:none;
  background: conic-gradient(from 0deg at 50% 50%, var(--htb-conic,rgba(255,200,0,.1) 0deg,transparent 360deg));
  animation: rvHtSpin var(--htb-speed,8s) linear infinite;
  opacity: var(--htb-conic-opa,.18);
}

/* ══════════════════════════════════════════
   MOMENTUM SYSTEM — Character Tab
   ══════════════════════════════════════════ */
.momentum-wrapper { padding: 0 0 16px; }
.momentum-hero {
  position: relative; border-radius: 20px; overflow: hidden;
  padding: 24px 20px 20px;
  background: var(--surface); border: 1px solid var(--border);
  margin-bottom: 16px;
}
.momentum-hero::before {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  border-radius: 20px; opacity: 0.4;
  background: radial-gradient(circle at 50% 20%, var(--momentum-color, var(--arise)) 0%, transparent 65%);
}
.momentum-tier-badge {
  font-family: var(--font-epic); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--momentum-color, var(--arise-bright));
  opacity: 0.8; margin-bottom: 6px;
}
.momentum-tier-name {
  font-family: var(--font-display); font-size: 26px; font-weight: 800;
  letter-spacing: 1px; line-height: 1.1;
  color: var(--momentum-color, var(--arise-bright));
  text-shadow: 0 0 20px var(--momentum-color, var(--arise));
  margin-bottom: 16px; position: relative; z-index: 1;
}
.momentum-pts-row {
  display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px;
  position: relative; z-index: 1;
}
.momentum-pts-num {
  font-family: var(--font-scifi); font-size: 38px; font-weight: 800;
  color: var(--bone); line-height: 1;
}
.momentum-pts-lbl {
  font-family: var(--font-system); font-size: 13px; font-weight: 700;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
}
.momentum-bar-wrap { position: relative; z-index: 1; }
.momentum-bar-track {
  height: 10px; border-radius: 8px;
  background: rgba(255,255,255,0.07); overflow: hidden;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
}
.momentum-bar-fill {
  height: 100%; border-radius: 8px; transition: width 0.8s cubic-bezier(.22,.68,0,1.2);
  background: linear-gradient(90deg, var(--momentum-color-start, var(--arise)), var(--momentum-color, var(--arise-bright)));
  box-shadow: 0 0 10px var(--momentum-color, var(--arise));
}
.momentum-bar-labels {
  display: flex; justify-content: space-between; margin-top: 5px;
  font-family: var(--font-system); font-size: 10px; color: var(--muted); font-weight: 700;
}
.momentum-aura {
  position: absolute; inset: -1px; border-radius: 20px; pointer-events: none;
  border: 1.5px solid var(--momentum-color, transparent);
  box-shadow: 0 0 18px var(--momentum-color, transparent), inset 0 0 12px var(--momentum-color-faint, transparent);
  animation: momentumAuraPulse 3s ease-in-out infinite;
}
@keyframes momentumAuraPulse {
  0%, 100% { opacity: 0.5; } 50% { opacity: 1; }
}
.momentum-tiers-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
}
.momentum-tier-card {
  border-radius: 14px; padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; transition: all 0.2s;
}
.momentum-tier-card.active {
  background: var(--surface-strong); border-color: var(--momentum-card-color, var(--arise));
  box-shadow: 0 0 12px var(--momentum-card-glow, transparent);
}
.momentum-tier-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: var(--tier-dot-color, var(--muted-2));
  box-shadow: 0 0 6px var(--tier-dot-color, transparent);
}
.momentum-tier-info { min-width: 0; }
.momentum-tier-num {
  font-family: var(--font-scifi); font-size: 9px; color: var(--muted); margin-bottom: 1px;
}
.momentum-tier-title {
  font-family: var(--font-system); font-size: 12px; font-weight: 700;
  color: var(--bone); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.momentum-factors-card {
  border-radius: 16px; padding: 16px; margin-bottom: 16px;
  background: var(--surface); border: 1px solid var(--border);
}
.momentum-factors-title {
  font-family: var(--font-system); font-size: 11px; font-weight: 800;
  color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 12px;
}
.momentum-factor-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.momentum-factor-row:last-child { border-bottom: none; }
.momentum-factor-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.momentum-factor-body { flex: 1; min-width: 0; }
.momentum-factor-name {
  font-family: var(--font-system); font-size: 12px; font-weight: 700; color: var(--bone);
}
.momentum-factor-desc {
  font-size: 10.5px; color: var(--muted); margin-top: 1px;
}
.momentum-factor-pts {
  font-family: var(--font-scifi); font-size: 13px; font-weight: 800;
  color: var(--jade); flex-shrink: 0;
}
.momentum-factor-pts.zero { color: var(--muted-2); }
.momentum-history-card {
  border-radius: 16px; padding: 16px;
  background: var(--surface); border: 1px solid var(--border);
}
.momentum-history-title {
  font-family: var(--font-system); font-size: 11px; font-weight: 800;
  color: var(--arise-bright); letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 12px;
}
.momentum-hist-row {
  display: flex; align-items: center; gap: 10px; padding: 7px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.momentum-hist-row:last-child { border-bottom: none; }
.momentum-hist-date { font-size: 10.5px; color: var(--muted); font-family: var(--font-system); width: 68px; flex-shrink: 0; }
.momentum-hist-bar { flex: 1; height: 6px; border-radius: 4px; background: rgba(255,255,255,0.06); overflow: hidden; }
.momentum-hist-fill { height: 100%; border-radius: 4px; }
.momentum-hist-tier { font-family: var(--font-system); font-size: 10px; font-weight: 700; width: 80px; text-align: right; flex-shrink: 0; }
.momentum-decay-banner {
  border-radius: 12px; padding: 10px 13px; margin-bottom: 14px;
  background: linear-gradient(90deg, rgba(255,71,104,0.18), rgba(255,71,104,0.06));
  border: 1px solid rgba(255,71,104,0.35);
  font-size: 11.5px; color: var(--bone); font-weight: 600;
}
.momentum-decay-banner small { display: block; color: rgba(255,217,223,0.7); font-weight: 400; margin-top: 2px; font-size: 10.5px; }

/* ══════════════════════════════════════════
   LIFE HEATMAP — Character Tab
   ══════════════════════════════════════════ */
.heatmap-card {
  border-radius: 16px; background: var(--surface); border: 1px solid var(--border);
  padding: 16px; margin-bottom: 16px;
}
.heatmap-card-title {
  font-family: var(--font-system); font-size: 11px; font-weight: 800;
  color: var(--jade); letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 12px;
}
.heatmap-tab-row {
  display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
}
.heatmap-weekly-grid {
  display: flex; gap: 6px; justify-content: center; padding: 4px 0;
}
.heatmap-weekly-cell {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.heatmap-weekly-box {
  width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.heatmap-weekly-box:active { transform: scale(0.92); }
.heatmap-monthly-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
}
.heatmap-monthly-cell {
  aspect-ratio: 1; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 800; transition: transform 0.12s;
  border: 1px solid rgba(255,255,255,0.06);
}
.heatmap-monthly-cell:active { transform: scale(0.88); }
.heatmap-yearly-scroll {
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 6px; margin: 0 -4px; padding: 0 4px 6px;
}
.heatmap-yearly-inner {
  display: inline-flex; flex-direction: column; gap: 2px;
}
.heatmap-yearly-row { display: flex; gap: 2px; }
.heatmap-yearly-cell {
  width: 10px; height: 10px; border-radius: 2px; cursor: pointer;
  flex-shrink: 0; transition: transform 0.1s;
}
.heatmap-yearly-cell:active { transform: scale(0.8); }
.heatmap-month-labels {
  display: flex; gap: 2px; margin-bottom: 3px;
}
.heatmap-month-lbl {
  width: 10px; font-size: 7px; color: var(--muted); font-family: var(--font-system);
  text-align: left; flex-shrink: 0; overflow: visible; white-space: nowrap;
}
.heatmap-legend {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
}
.heatmap-legend-item { display: flex; align-items: center; gap: 4px; }
.heatmap-legend-dot {
  width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,0.1);
}

   STREAK MOMENTUM PRODUKTIVITAS

.smom-card {

}
.smom-hero-bg {
  padding: 20px 18px 14px; position: relative;
}
.smom-tier-label {

.smom-body-row {

.smom-fire:nth-child(2) { animation-delay: 0.22s; filter: drop-shadow(0 0 6px rgba(245,158,11,0.8)); }

.smom-tier-name {

   TIME BLOCKING VISUAL  (enlight / daily-timeline)
   ══════════════════════════════════════════════════════ */
.tb-container { padding: 0 !important; overflow: hidden; }
.tb-row {
  display: flex; align-items: stretch; padding: 11px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04); transition: background .18s;
  gap: 0;
}
.tb-row:last-child { border-bottom: none; }
.tb-row-active { background: rgba(45,212,244,0.05); }
.tb-row-done   { opacity: 0.55; }
.tb-time-col {
  width: 68px; flex-shrink: 0; display: flex; flex-direction: column;
  justify-content: center;
}
.tb-time-start {
  font-family: var(--font-scifi); font-size: 11px; font-weight: 800;
  letter-spacing: 0.3px;
}
.tb-time-end {
  font-family: var(--font-system); font-size: 9px; color: var(--muted);
  margin-top: 1px;
}
.tb-indicator {
  width: 3px; border-radius: 2px; flex-shrink: 0;
  margin: 2px 10px 2px 4px;
}
.tb-content {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  justify-content: center; gap: 4px;
}
.tb-label { font-size: 13px; font-weight: 600; line-height: 1.3; }
.tb-meta  { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.tb-dur   {
  font-size: 10px; color: var(--muted); font-family: var(--font-system);
  font-weight: 600;
}
.tb-boxing-badge {
  font-size: 10px; font-weight: 700; font-family: var(--font-system);
  background: rgba(240,185,59,0.12); border: 1px solid rgba(240,185,59,0.28);
  border-radius: 6px; padding: 1px 7px; color: var(--gold-soft);
}
.tb-now-pulse {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--cyan); margin-right: 4px;
  animation: tbNowPulse 1.5s ease-in-out infinite;
}
@keyframes tbNowPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(0.7);} }
.tb-boxing-section {
  background: rgba(240,185,59,0.06); border: 1px solid rgba(240,185,59,0.2);
  border-radius: 12px; padding: 14px; margin-top: 12px;
}
.tb-boxing-row {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.tb-boxing-row:last-child { border-bottom: none; }

/* ══════════════════════════════════════════════════════
   TIMELINE KEHIDUPAN — jam & collapse
   ══════════════════════════════════════════════════════ */
.lt-time {
  font-family: var(--font-mono); font-size: 9px; color: var(--muted-2);
  font-weight: 600; white-space: nowrap; margin-left: 2px;
}
.lt-show-more {
  width: 100%; background: none;
  border: 1px dashed rgba(255,255,255,0.12); border-radius: 8px;
  color: var(--muted); font-size: 11px; font-family: var(--font-system);
  font-weight: 700; padding: 7px; cursor: pointer; margin-top: 4px;
  transition: border-color .2s, color .2s;
}
.lt-show-more:active { color: var(--arise-bright); border-color: var(--arise-bright); }

/* ── Sub-Navigation Bar ── */
#sub-nav {
  position: sticky;
  top: 0;
  z-index: 19;
  background: rgba(7,7,18,0.92);
  backdrop-filter: blur(22px) saturate(170%);
  border-bottom: 1px solid rgba(124,92,255,0.14);
  padding: 7px 12px;
  display: none;
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
  white-space: nowrap;
  gap: 6px;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}
#sub-nav::-webkit-scrollbar { display: none; }
#sub-nav.visible { display: flex; }
.sub-tab-btn {
  flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(150,135,255,0.16);
  color: rgba(130,120,175,0.8);
  padding: 5px 14px;
  border-radius: 20px;
  font-family: var(--font-system);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(.4,0,.2,1);
  white-space: nowrap;
}
.sub-tab-btn.active {
  background: rgba(124,92,255,0.18);
  border-color: rgba(164,139,255,0.48);
  color: rgba(215,205,255,0.97);
  box-shadow: 0 0 12px rgba(124,92,255,0.28), inset 0 0 8px rgba(124,92,255,0.08);
}
.sub-tab-btn:active { transform: scale(0.95); }
</style>

<body>

<canvas id="bg-canvas"></canvas>

<div class="screen">

        <button class="icon-btn" title="Riwayat Harian" onclick="openDailyHistory(todayStr())" style="color:var(--muted); padding:0;"><svg viewBox="0 0 24 24" style="width:18px;height:18px; fill:none; stroke:currentColor; stroke-width:2;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
        <button class="icon-btn" onclick="openModal('modal-settings')" style="color:var(--muted); padding:0;"><svg viewBox="0 0 24 24" style="width:18px;height:18px; fill:none; stroke:currentColor; stroke-width:2;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></button>

</div>

<div id="fx-breakthrough" class="fx-overlay">
  <div class="fx-ring"></div><div class="fx-ring r2"></div><div class="fx-ring r3"></div>
  <div class="fx-flash"></div>

<div id="toast-container"></div>

<script>
let state = null; let saveTimer = null; let daoChart = null; let financialMomentumChart = null; let lifeMomentumChart = null; let lifeMomentumRange = 'weekly'; let _sectionMgrTab = 'home'; let heatmapView = 'monthly'; let _ltExpanded = {};

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let runeParticles = [], sanctuaryFog = [], sanctuaryStars = [], sanctuaryLeaves = [], heavenClouds = [], heavenSparks = [];
let formationAngle = 0, heavenRayPhase = 0;
function initCanvas() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    particles = [];
    for(let i=0; i<45; i++) {
        particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*1.5});
    }
    runeParticles = [];
    for(let i=0; i<18; i++) {
        runeParticles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15, size: Math.random()*1.2+0.5, a: Math.random()*Math.PI*2});
    }
    sanctuaryFog = [];
    for(let i=0; i<5; i++) {
        sanctuaryFog.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.08, vy: (Math.random()-0.5)*0.05, r: 120+Math.random()*100});
    }
    sanctuaryStars = [];
    for(let i=0; i<40; i++) {
        sanctuaryStars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.3+0.3, tw: Math.random()*Math.PI*2, twSpeed: 0.01+Math.random()*0.02});
    }
    sanctuaryLeaves = [];
    for(let i=0; i<10; i++) {
        sanctuaryLeaves.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vy: 0.15+Math.random()*0.15, vr: (Math.random()-0.5)*0.01, rot: Math.random()*Math.PI*2});
    }
    heavenClouds = [];
    for(let i=0; i<6; i++) {
        heavenClouds.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height*0.5, vx: 0.05+Math.random()*0.08, r: 90+Math.random()*70});
    }
    heavenSparks = [];
    for(let i=0; i<25; i++) {
        heavenSparks.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vy: 0.08+Math.random()*0.1, vx: (Math.random()-0.5)*0.05, size: Math.random()*1.2+0.4});
    }
}
function drawVoidHologramBg() {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.strokeStyle = 'rgba(45, 212, 244, 0.15)';
    for(let i=0; i<particles.length; i++) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        for(let j=i+1; j<particles.length; j++) {
            let p2 = particles[j];
            let dist = Math.hypot(p.x-p2.x, p.y-p2.y);
            if(dist < 90) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
        }
    }
}
function drawFormationArrayBg() {
    // Nebula Galaxy — hologram nebula clouds + snow star particles
    formationAngle += 0.0012;
    const nebulaColors = [
        ['rgba(155,107,255,0.11)','rgba(155,107,255,0)'],
        ['rgba(45,212,244,0.09)', 'rgba(45,212,244,0)'],
        ['rgba(255,71,180,0.08)', 'rgba(255,71,180,0)'],
        ['rgba(80,160,255,0.09)', 'rgba(80,160,255,0)'],
        ['rgba(200,100,255,0.08)','rgba(200,100,255,0)'],
        ['rgba(100,230,200,0.07)','rgba(100,230,200,0)'],
    ];
    // Nebula blob clouds
    runeParticles.forEach((p, i) => {
        p.x += p.vx * 0.22; p.y += p.vy * 0.22; p.a += 0.003;
        if(p.x < -300) p.x = canvas.width+300; if(p.x > canvas.width+300) p.x = -300;
        if(p.y < -200) p.y = canvas.height+200; if(p.y > canvas.height+200) p.y = -200;
        const blobR = 95 + Math.sin(p.a)*38;
        const nc = nebulaColors[i % nebulaColors.length];
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, blobR);
        grad.addColorStop(0, nc[0]); grad.addColorStop(1, nc[1]);
        ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(p.x, p.y, blobR, 0, Math.PI*2); ctx.fill();
    });
    // Snow / hologram star particles
    particles.forEach(p => {
        p.x += p.vx * 0.12; p.y += p.vy * 0.12;
        if(p.x < 0) p.x = canvas.width; if(p.x > canvas.width) p.x = 0;
        if(p.y < 0) p.y = canvas.height; if(p.y > canvas.height) p.y = 0;
        const flicker = 0.3 + Math.abs(Math.sin(formationAngle * 3 + p.x * 0.04)) * 0.7;
        ctx.globalAlpha = flicker;
        const hue = (200 + (p.x / canvas.width) * 160) % 360;
        ctx.fillStyle = `hsla(${hue},85%,82%,1)`;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 0.75, 0, Math.PI*2); ctx.fill();
        if(p.size > 1.1) {
            ctx.globalAlpha = flicker * 0.28;
            ctx.strokeStyle = ctx.fillStyle; ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(p.x-3,p.y); ctx.lineTo(p.x+3,p.y);
            ctx.moveTo(p.x,p.y-3); ctx.lineTo(p.x,p.y+3);
            ctx.stroke();
        }
    });
    ctx.globalAlpha = 1;
}
function drawSanctuaryBg() {
    // Galaxy Nebula — deep space colored nebula cloud blobs + star field
    const t = Date.now() * 0.00030;
    const nebulaSpec = [
        ['rgba(120,70,255,0.10)','rgba(120,70,255,0)'],
        ['rgba(40,190,240,0.09)','rgba(40,190,240,0)'],
        ['rgba(255,80,170,0.08)','rgba(255,80,170,0)'],
        ['rgba(60,200,140,0.08)','rgba(60,200,140,0)'],
        ['rgba(200,110,255,0.09)','rgba(200,110,255,0)'],
    ];
    // Large nebula cloud blobs
    sanctuaryFog.forEach((f, fi) => {
        f.x += f.vx * 0.20; f.y += f.vy * 0.15;
        if(f.x < -260) f.x = canvas.width+260; if(f.x > canvas.width+260) f.x = -260;
        if(f.y < -210) f.y = canvas.height+210; if(f.y > canvas.height+210) f.y = -210;
        const r = (f.r + 65) * (1.6 + Math.sin(t * 0.75 + fi) * 0.35);
        const nc = nebulaSpec[fi % nebulaSpec.length];
        const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
        g.addColorStop(0, nc[0]); g.addColorStop(1, nc[1]);
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, Math.PI*2); ctx.fill();
    });
    // Smaller wispy nebula blobs (using leaves array)
    sanctuaryLeaves.forEach((l, li) => {
        l.x += Math.sin(t * 0.55 + li * 1.2) * 0.16;
        l.y += Math.cos(t * 0.45 + li) * 0.13;
        if(l.x < 0) l.x = canvas.width; if(l.x > canvas.width) l.x = 0;
        if(l.y < 0) l.y = canvas.height; if(l.y > canvas.height) l.y = 0;
        const r2 = 52 + Math.sin(t + li * 1.5) * 24;
        const nc2 = nebulaSpec[(li + 2) % nebulaSpec.length];
        const g2 = ctx.createRadialGradient(l.x, l.y, 0, l.x, l.y, r2);
        g2.addColorStop(0, nc2[0]); g2.addColorStop(1, nc2[1]);
        ctx.fillStyle = g2; ctx.beginPath(); ctx.arc(l.x, l.y, r2, 0, Math.PI*2); ctx.fill();
    });
    // Star field with color flicker
    sanctuaryStars.forEach(s => {
        s.tw += s.twSpeed * 0.38;
        ctx.globalAlpha = 0.18 + Math.abs(Math.sin(s.tw)) * 0.44;
        ctx.fillStyle = 'rgba(228,222,255,1)';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 0.65, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
}
function drawHeavenPalaceBg() {
    // Galaxy Hologram — kristal es + bintang berkelip + planet mendekat-menjauh
    heavenRayPhase += 0.0007;
    const t = heavenRayPhase;
    const W = canvas.width, H = canvas.height;

    // --- Nebula clouds ---
    const nebulaColors = [
        ['rgba(20,40,160,0.07)','rgba(20,40,160,0)'],
        ['rgba(40,20,180,0.08)','rgba(40,20,180,0)'],
        ['rgba(10,80,180,0.06)','rgba(10,80,180,0)'],
        ['rgba(60,30,200,0.07)','rgba(60,30,200,0)'],
        ['rgba(80,60,220,0.05)','rgba(80,60,220,0)'],
        ['rgba(20,100,180,0.06)','rgba(20,100,180,0)'],
    ];
    heavenClouds.forEach((c, ci) => {
        c.x += c.vx * 0.10;
        if(c.x > W+200) c.x = -200; if(c.x < -200) c.x = W+200;
        const bs = nebulaColors[ci % nebulaColors.length];
        const r = c.r * 2.2;
        const bg = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, r);
        bg.addColorStop(0, bs[0]); bg.addColorStop(1, bs[1]);
        ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, Math.PI*2); ctx.fill();
    });

    // --- Bintang berkelip dengan cross-lens flare ---
    heavenSparks.forEach(p => {
        p.x += (p.vx || 0) * 0.05;
        p.y -= p.vy * 0.03;
        if(p.y < -8) { p.y = H+8; p.x = Math.random()*W; }
        if(p.x > W) p.x = 0; if(p.x < 0) p.x = W;
        const tw = 0.18 + Math.abs(Math.sin(t * 2.8 + p.x * 0.07 + p.y * 0.04)) * 0.72;
        const sr = p.size * 0.85;
        ctx.globalAlpha = tw * 0.85;
        const sg = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sr + 1.8);
        sg.addColorStop(0, 'rgba(225,238,255,1)');
        sg.addColorStop(0.35, 'rgba(180,215,255,0.55)');
        sg.addColorStop(1, 'rgba(160,200,255,0)');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(p.x, p.y, sr + 1.8, 0, Math.PI*2); ctx.fill();
        if(p.size > 0.9) {
            ctx.globalAlpha = tw * 0.22;
            ctx.strokeStyle = 'rgba(210,232,255,1)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(p.x - sr*3, p.y); ctx.lineTo(p.x + sr*3, p.y);
            ctx.moveTo(p.x, p.y - sr*3); ctx.lineTo(p.x, p.y + sr*3);
            ctx.stroke();
        }
    });
    ctx.globalAlpha = 1;

    // --- Kristal es heksagonal berputar pelan ---
    const crystals = [
        {bx:0.12, by:0.17, r:20, rot:0.08, ph:0.0},
        {bx:0.79, by:0.11, r:13, rot:0.13, ph:1.2},
        {bx:0.89, by:0.57, r:26, rot:0.06, ph:2.5},
        {bx:0.07, by:0.69, r:16, rot:0.16, ph:0.8},
        {bx:0.50, by:0.83, r:11, rot:0.19, ph:3.1},
        {bx:0.63, by:0.31, r:15, rot:0.11, ph:1.8},
        {bx:0.27, by:0.47, r:9,  rot:0.21, ph:4.0},
        {bx:0.93, by:0.81, r:18, rot:0.07, ph:2.0},
    ];
    crystals.forEach(cr => {
        const cx = cr.bx * W, cy = cr.by * H;
        const angle = t * cr.rot + cr.ph;
        const pulse = 0.09 + Math.abs(Math.sin(t * 0.55 + cr.ph)) * 0.19;
        ctx.globalAlpha = pulse;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.strokeStyle = 'rgba(155,218,255,1)';
        ctx.lineWidth = 0.9;
        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            if(i === 0) ctx.moveTo(Math.cos(a)*cr.r, Math.sin(a)*cr.r);
            else ctx.lineTo(Math.cos(a)*cr.r, Math.sin(a)*cr.r);
        }
        ctx.closePath(); ctx.stroke();
        ctx.strokeStyle = 'rgba(200,242,255,0.55)';
        ctx.lineWidth = 0.5;
        for(let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            ctx.beginPath(); ctx.moveTo(0,0);
            ctx.lineTo(Math.cos(a)*cr.r, Math.sin(a)*cr.r); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(180,235,255,0.28)';
        ctx.beginPath();
        for(let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            if(i===0) ctx.moveTo(Math.cos(a)*cr.r*0.5, Math.sin(a)*cr.r*0.5);
            else ctx.lineTo(Math.cos(a)*cr.r*0.5, Math.sin(a)*cr.r*0.5);
        }
        ctx.closePath(); ctx.stroke();
        ctx.restore();
    });
    ctx.globalAlpha = 1;

    // --- Planet mendekat-menjauh ---
    const planets = [
        {bx:0.18, by:0.27, baseR:30, c1:'rgba(100,70,210,', c2:'rgba(55,35,155,', ring:'rgba(148,108,255,', spd:0.15, ph:0.0},
        {bx:0.81, by:0.21, baseR:18, c1:'rgba(48,148,220,', c2:'rgba(28,88,168,', ring:'rgba(95,192,255,', spd:0.10, ph:2.1},
        {bx:0.67, by:0.76, baseR:24, c1:'rgba(188,88,68,',  c2:'rgba(138,48,38,', ring:'rgba(218,138,108,', spd:0.20, ph:4.2},
    ];
    planets.forEach(pl => {
        const scale = 0.58 + Math.abs(Math.sin(t * pl.spd + pl.ph)) * 0.62;
        const r = pl.baseR * scale;
        const px = pl.bx * W, py = pl.by * H;
        const a = 0.18 + scale * 0.40;
        ctx.globalAlpha = a;
        const pg = ctx.createRadialGradient(px - r*0.30, py - r*0.30, 0, px, py, r);
        pg.addColorStop(0, pl.c1 + '0.95)');
        pg.addColorStop(1, pl.c2 + '0.50)');
        ctx.fillStyle = pg;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
        ctx.save();
        ctx.translate(px, py);
        ctx.scale(1, 0.27);
        ctx.strokeStyle = pl.ring + (0.28 * a) + ')';
        ctx.lineWidth = Math.max(0.8, r * 0.13);
        ctx.beginPath(); ctx.arc(0, 0, r * 1.62, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
        ctx.globalAlpha = 1;
    });
}

function formatRupiah(n){
  const rounded = Math.round(n);
  const abs = Math.abs(rounded);
  const prefix = 'Rp' + (rounded < 0 ? '-' : '');
  function shortNum(val) { return parseFloat(val.toFixed(2)).toString(); }
  if(abs >= 1_000_000_000_000) return prefix + shortNum(abs / 1_000_000_000_000) + 'T';
  if(abs >= 1_000_000_000)     return prefix + shortNum(abs / 1_000_000_000) + 'B';
  return prefix + abs.toLocaleString('id-ID');
}

  ctx: null,
  init() { 
      if(!this.ctx) { const AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext(); } 
      if(this.ctx.state === 'suspended') this.ctx.resume(); 
  },
  play(freqs, type, dur, vol = 0.05) {
    if(!state || state.settings?.soundEnabled===false) return;
    this.init();

      const o = this.ctx.createOscillator(), g = this.ctx.createGain();

      g.gain.setValueAtTime(vol, this.ctx.currentTime + i*dur);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i*dur + dur);
      o.connect(g); g.connect(this.ctx.destination);
      o.start(this.ctx.currentTime + i*dur); o.stop(this.ctx.currentTime + i*dur + dur);
    });
  }
};

const STORAGE_KEY = 'jian-ascension-state-vfinal-updated';

// ═══ FIREBASE REALTIME DATABASE — real-time sync antar device ═══
// Menggunakan REST API + SSE (Server-Sent Events) bawaan Firebase.
// Tidak perlu library/SDK tambahan.
const FIREBASE_DB_URL  = 'https://database-d9332-default-rtdb.asia-southeast1.firebasedatabase.app';
const FIREBASE_DATA_PATH = 'mysistem-jian-ascension';
let _fbSyncTimer   = null;
let _fbSyncing     = false;
let _fbErrNotified = false;
let _fbLastPushedTs = 0;   // cap timestamp terakhir yang kita push, biar tidak echo
let _fbEventSource  = null; // referensi SSE connection

function _fbUrl(){ return `${FIREBASE_DB_URL}/${FIREBASE_DATA_PATH}.json`; }

// ── PUSH: kirim state ke Firebase (debounced 800ms) ──
function firebasePush(snapshot){
  clearTimeout(_fbSyncTimer);
  _fbSyncTimer = setTimeout(async () => {
    if(_fbSyncing) return;
    _fbSyncing = true;
    try{
      const res = await fetch(_fbUrl(), {
        method : 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify(snapshot),
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      _fbLastPushedTs = (snapshot.meta && snapshot.meta.updatedAt) || 0;
      _fbErrNotified  = false;
    } catch(e){
      console.error('[FIREBASE] Gagal push:', e);
      if(!_fbErrNotified){
        _fbErrNotified = true;
        showToast('⚠️ Gagal sinkron ke cloud. Data tetap tersimpan di perangkat ini.', 'bad');
      }
    } finally { _fbSyncing = false; }
  }, 800);
}

// ── PULL: ambil snapshot sekali (untuk load awal) ──
async function firebasePull(){
  try{
    const res = await fetch(_fbUrl(), { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return (await res.json()) || null;
  } catch(e){ console.error('[FIREBASE] Gagal pull:', e); return null; }
}

// ── RESOLVE ON LOAD: bandingkan lokal vs cloud, pakai yang paling baru ──
async function firebaseResolveOnLoad(localState){
  const cloud = await firebasePull();
  if(!cloud)      return localState;
  if(!localState) return cloud;
  const localTs = (localState.meta && localState.meta.updatedAt) || 0;
  const cloudTs = (cloud.meta     && cloud.meta.updatedAt)      || 0;
  return cloudTs > localTs ? cloud : localState;
}

// ── REAL-TIME LISTENER: SSE Firebase → update UI otomatis dari device lain ──
function firebaseStartRealTimeSync(){
  if(_fbEventSource) _fbEventSource.close();

  // Firebase SSE endpoint — streaming perubahan secara real-time
  _fbEventSource = new EventSource(_fbUrl().replace('.json', '.json'));

  _fbEventSource.addEventListener('put', function(e){
    try{
      const payload = JSON.parse(e.data);
      const incoming = payload && payload.data;
      if(!incoming || !incoming.meta) return;

      const incomingTs = incoming.meta.updatedAt || 0;
      const currentTs  = (state && state.meta && state.meta.updatedAt) || 0;

      // Abaikan kalau ini echo dari push kita sendiri
      if(incomingTs === _fbLastPushedTs) return;
      // Abaikan kalau data yang masuk lebih lama dari state sekarang
      if(incomingTs <= currentTs) return;

      // Data dari device lain lebih baru → terapkan & render ulang
      state = migrateState(deepMerge(DEFAULT_STATE(), incoming));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      rollover(); recomputeLifeScore(); render();
      showToast('🔄 Disinkron dari perangkat lain', 'good');
    } catch(err){ console.error('[FIREBASE SSE] Error parse event:', err); }
  });

  _fbEventSource.addEventListener('patch', function(e){
    // patch event — perlakukan sama seperti put (full re-fetch lebih aman)
    firebasePull().then(cloud => {
      if(!cloud || !cloud.meta) return;
      const incomingTs = cloud.meta.updatedAt || 0;
      const currentTs  = (state && state.meta && state.meta.updatedAt) || 0;
      if(incomingTs === _fbLastPushedTs) return;
      if(incomingTs <= currentTs) return;
      state = migrateState(deepMerge(DEFAULT_STATE(), cloud));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      rollover(); recomputeLifeScore(); render();
      showToast('🔄 Disinkron dari perangkat lain', 'good');
    }).catch(()=>{});
  });

  _fbEventSource.onerror = function(){
    console.warn('[FIREBASE SSE] Koneksi terputus, mencoba reconnect...');
    // EventSource otomatis reconnect — tidak perlu tindakan manual
  };
}

// ═══════════════════════════════════
// SISTEM LEVEL GLOBAL TERPADU
// Qi Condensation: LV 1-15 (tanpa tahap)
// Foundation Establishment s/d Void Tribulant: 15 LV per realm, 3 tahap × 5 LV
//   Tahap Awal = LV 1-5, Tahap Menengah = LV 6-10, Tahap Akhir = LV 11-15 (per realm)
// Urutan global: QC LV 1-15, FE LV 16-30, CF LV 31-45, dst. (15 LV per realm)
// Total max level sebelum Heaven Trampling = 16 realm × 15 LV = 240
// Realm SELALU mengikuti c.level. c.level adalah satu-satunya sumber kebenaran.
// ═══════════════════════════════════
const LEVELS_PER_REALM = 15;
const LEVELS_PER_PHASE = 5;
const MAX_LEVEL = 240; // Level 240 = puncak Void Tribulant, sebelum Heaven Trampling

function getRealmLevelInfo(){
  const c = state.character;
  const lv = Math.max(1, c.level || 1);

  // Heaven Trampling: realm terakhir — bridge dan progress ditentukan dari level utama.
  // LV 241-339 = Normal (Bridge 0), LV 340-439 = Bridge 1, LV 440-539 = Bridge 2, dst. (per 100 LV)
  if(isHeavenTrampling()){
      const bridges = Math.max(0, Math.min(9, Math.floor((lv - 240) / 100)));
      const bridgeStart = 240 + bridges * 100;
      const bridgeFrac = bridges >= 9 ? 1 : Math.min(1, Math.max(0, (lv - bridgeStart) / 100));
      return { level: lv, realmIdx: state.realms.length - 1, phase: null, frac: bridgeFrac, levelsPerRealm: 100, usesLevel: true, displayName: null, globalLv: lv };
  }

  // QC: LV 1-15, tanpa tahap
  if(lv <= 15){
      const frac = Math.min(1, (lv - 1) / 14);
      return { level: lv, realmIdx: 0, phase: null, frac, levelsPerRealm: 15, usesLevel: true, displayName: String(lv), globalLv: lv };
  }

  // Foundation Establishment dan seterusnya: 15 LV per realm, 3 tahap × 5 LV
  const lvAfterQC = lv - 15; // 1-based offset setelah QC
  const realmOffset = Math.min(Math.floor((lvAfterQC - 1) / 15), DEFAULT_REALMS.length - 2); // 0=FE, 1=CF, ...
  const lvInRealm = ((lvAfterQC - 1) % 15) + 1; // 1-15 di dalam realm ini
  const phaseIdx = Math.min(2, Math.floor((lvInRealm - 1) / 5)); // 0=Awal, 1=Menengah, 2=Akhir
  const phases = ['Tahap Awal', 'Tahap Menengah', 'Tahap Akhir'];
  const phase = phases[phaseIdx];
  const frac = Math.min(1, (lvInRealm - 1) / 14);
  const realmIdx = realmOffset + 1;

  return { level: lv, realmIdx, phase, frac, levelsPerRealm: 15, usesLevel: true, displayName: phase, globalLv: lv };
}

    font-family: var(--font-epic);
    font-weight: 900;
    filter:
      drop-shadow(0 0 ${glow}px rgba(255,215,0,0.9))
      drop-shadow(0 0 ${glow2}px rgba(255,120,0,0.6))
      drop-shadow(0 0 ${glow3}px rgba(255,255,255,${(0.25 + n * 0.07).toFixed(2)}));
  `.replace(/\n\s+/g,' ').trim();
}

// Tier khusus 10 title "Mystic Immortal" (Heaven Trampling). n=1 (baru masuk Heaven
// Trampling) s/d n=10 (Jembatan 9, puncak) — font Mythic Immortal, aura dominan, agung, epik.
// Makin tinggi n → aura makin kosmis, animasi makin cepat, cahaya melampaui tier 'holo'.
function mysticTierStyle(n){
    const glow  = 14 + n * 5;         // text-shadow inti: 14→64px
    const glow2 = 24 + n * 8;         // text-shadow luar: 24→104px
    const glow3 = 34 + n * 11;        // halo immortal:   34→144px
    const bShadow = 16 + n * 6;       // box-shadow: 16→76px
    const speed = Math.max(0.6, 2.4 - n * 0.18);  // animasi: 2.4s → 0.6s
    const size  = 320 + n * 50;       // gradien makin lebar
    const ls    = (1.8 + n * 0.15).toFixed(1);    // letter-spacing Mythic
    const bAlpha = Math.min(0.95, 0.45 + n * 0.05).toFixed(2);
    // 10 palet khusus: Bridge 1=emas-api, Bridge 9=putih-kosmik total
    const palettes = [
        '#ffd700, #ff8a3d, #fff6c0, #ffd700',                                              // n=1: Emas Murni
        '#ffd700, #ff6a00, #fff, #ff4500, #ffd700',                                        // n=2: Api Surgawi
        '#fff, #ffd700, #ff4768, #a48bff, #fff',                                           // n=3: Crimson-Gold
        '#a48bff, #ffd700, #fff, #ff4768, #2dd4f4, #a48bff',                               // n=4: Empyrean
        '#2dd4f4, #ffd700, #fff, #ff4768, #a48bff, #34d399, #2dd4f4',                      // n=5: Celestial
        '#34d399, #2dd4f4, #ffd700, #fff, #ff4768, #a48bff, #34d399',                      // n=6: Divine
        '#fff, #34d399, #2dd4f4, #ffd700, #ff4768, #a48bff, #fff',                         // n=7: Eternal
        '#fff, #ffd700, #ff4768, #a48bff, #2dd4f4, #34d399, #fff6c0, #fff',                // n=8: Absolute
        '#fff, #ffd700, #fff, #ff4768, #fff, #a48bff, #fff, #2dd4f4, #fff',                // n=9: Supreme Near
        '#fff,#ffd700,#fff,#ff4768,#fff,#a48bff,#fff,#2dd4f4,#fff,#34d399,#ffd700,#fff'   // n=10: Supreme Absolute
    ];
    const grad = palettes[Math.min(9, Math.max(1, n)) - 1];
    return [
        `background:linear-gradient(90deg, ${grad})`,
        `background-size:${size}% 100%`,
        `-webkit-background-clip:text`,
        `-webkit-text-fill-color:transparent`,
        `background-clip:text`,
        `animation:none`,
        `font-family:var(--font-epic)`,
        `font-weight:900`,
        `letter-spacing:${ls}px`,
        `text-transform:uppercase`,
        `border:1px solid rgba(255,215,0,${bAlpha})`,
        `text-shadow:0 0 ${glow}px rgba(255,255,255,0.95), 0 0 ${glow2}px rgba(255,215,0,0.85), 0 0 ${glow3}px rgba(255,120,0,0.5)`,
        `box-shadow:0 0 ${bShadow}px rgba(255,215,0,0.6), 0 0 ${bShadow+20}px rgba(255,100,0,0.35), 0 0 ${bShadow+40}px rgba(255,255,255,0.15), inset 0 0 ${Math.round(bShadow*0.4)}px rgba(255,215,0,0.12)`,
        `padding:6px 18px`,
        `border-radius:20px`,
    ].join(';') + ';';
}
function tierStyle(tier){
    if(typeof tier === 'string' && tier.indexOf('mystic') === 0){
        return mysticTierStyle(parseInt(tier.slice(6), 10) || 1);
    }
    switch(tier){
        case 'common':
            return 'color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); font-weight:700; font-family: var(--font-system); letter-spacing:1px;';
        case 'uncommon':
            return 'background:linear-gradient(90deg, rgba(52,211,153,0.2), rgba(45,212,244,0.16)); color:var(--jade); border:1px solid rgba(52,211,153,0.45); font-weight:800; font-family: var(--font-classic); letter-spacing:1.2px; box-shadow:0 0 8px rgba(52,211,153,0.25);';
        case 'rare':
            return 'background:linear-gradient(90deg, rgba(124,92,255,0.28), rgba(164,139,255,0.16)); color:var(--arise-bright); border:1px solid rgba(164,139,255,0.55); font-weight:800; font-family: var(--font-display); letter-spacing:1.4px; box-shadow:0 0 10px rgba(124,92,255,0.3);';
        case 'epic':
            return 'background:linear-gradient(90deg, var(--gold), var(--orange)); color:#1a1206; border:none; font-weight:900; font-family: var(--font-epic); letter-spacing:1.6px; box-shadow:0 0 14px rgba(240,185,59,0.5), inset 0 1px 0 rgba(255,255,255,0.25); text-shadow:0 1px 1px rgba(255,255,255,0.3);';
        case 'legendary':
            return 'background:linear-gradient(90deg,#ff8a3d,#ff4768,#7C5CFF); background-size:220% 220%; color:#fff; border:1px solid rgba(255,255,255,0.35); font-weight:900; font-family: var(--font-epic); letter-spacing:1.8px; text-shadow:0 0 10px rgba(0,0,0,0.5), 0 0 16px rgba(255,71,104,0.5); box-shadow:0 0 18px rgba(255,71,104,0.45); text-transform:uppercase;';
        case 'mythic':
            return 'background:linear-gradient(90deg,#4b0082,#800080,#ff0844,#4b0082); background-size:300% 300%; color:#fff; border:1px solid #fff; font-weight:900; font-family: var(--font-epic); letter-spacing:2px; text-shadow:0 0 12px #fff, 0 0 22px rgba(128,0,128,0.8); box-shadow:0 0 22px rgba(128,0,128,0.6); text-transform:uppercase;';
        case 'holo':
            return 'background:linear-gradient(90deg, var(--cyan), var(--arise-bright), var(--jade), var(--gold-soft), var(--crimson), var(--cyan)); background-size:400% 400%; color:#fff; border:1px solid rgba(255,255,255,0.65); font-weight:900; font-family: var(--font-epic); letter-spacing:2.4px; text-shadow:0 0 14px rgba(255,255,255,0.9), 0 0 26px rgba(45,212,244,0.7); box-shadow:0 0 26px rgba(255,255,255,0.35), 0 0 40px rgba(124,92,255,0.4); text-transform:uppercase;';
        default:
            return 'color:var(--arise-bright); background:linear-gradient(135deg,rgba(124,92,255,0.12),rgba(164,139,255,0.08)); border: 1px solid rgba(164,139,255,0.35); font-weight:700; font-family: var(--font-display); letter-spacing:1.5px; box-shadow: 0 0 8px rgba(124,92,255,0.2), inset 0 1px 0 rgba(255,255,255,0.05);';
    }
}
function getTitleStyle(title) {
    return tierStyle(TITLE_TIERS[title] || 'default');
}

function _ensureSecCfg(tab, id) {
  if (!state.sectionConfig) state.sectionConfig = {};
  if (!state.sectionConfig[tab]) state.sectionConfig[tab] = {};
  if (!state.sectionConfig[tab][id]) {
    const defs = SECTION_DEFS[tab] || [];
    const idx = defs.findIndex(d => d.id === id);
    state.sectionConfig[tab][id] = { visible: true, order: idx >= 0 ? idx : 99 };
  }
}
function _getSecCfg(tab, id) {
  _ensureSecCfg(tab, id);
  return state.sectionConfig[tab][id];
}
function isSectionVisible(tab, id) {
  if (!state || !state.sectionConfig) return true;
  const cfg = (state.sectionConfig[tab] || {})[id];
  if (!cfg) return true;
  if (cfg.movedTo && cfg.movedTo !== tab) return false;
  return cfg.visible !== false;
}
// Wraps html in a section div with data-sec attributes; hides if invisible
function sec(tab, id, html) {
  if (!isSectionVisible(tab, id)) return '';
  return `<div data-sec-tab="${tab}" data-sec-id="${id}">${html}</div>`;
}
// After render(), sort [data-sec-tab] children by configured order AND apply visibility
function applySectionOrder(tab) {
  const container = document.getElementById('main');
  if (!container) return;
  if (!SECTION_DEFS[tab]) return;
  // Only target direct children to avoid pulling nested data-sec nodes out of their parent
  const secs = Array.from(container.querySelectorAll(`[data-sec-tab="${tab}"]`))
    .filter(el => el.parentNode === container);
  if (secs.length === 0) return;
  // Apply visibility (display:none for hidden sections)
  secs.forEach(s => {
    const id = s.dataset.secId;
    s.style.display = isSectionVisible(tab, id) ? '' : 'none';
  });
  if (secs.length < 2) return;
  // Sort visible and hidden sections alike by configured order
  const defs = SECTION_DEFS[tab];
  secs.sort((a, b) => {
    const idA = a.dataset.secId, idB = b.dataset.secId;
    const cfgA = (state.sectionConfig && state.sectionConfig[tab] && state.sectionConfig[tab][idA]) || {};
    const cfgB = (state.sectionConfig && state.sectionConfig[tab] && state.sectionConfig[tab][idB]) || {};
    const defOrdA = defs.findIndex(d => d.id === idA);
    const defOrdB = defs.findIndex(d => d.id === idB);
    const ordA = (cfgA.order !== undefined) ? cfgA.order : defOrdA;
    const ordB = (cfgB.order !== undefined) ? cfgB.order : defOrdB;
    return ordA - ordB;
  });
  secs.forEach(s => container.appendChild(s));
}

function toggleSectionVisible(tab, id) {
  _ensureSecCfg(tab, id);
  state.sectionConfig[tab][id].visible = !state.sectionConfig[tab][id].visible;

  if (state.ui.tab === tab) render();

function moveSectionOrder(tab, id, dir) {
  const defs = SECTION_DEFS[tab];
  if (!defs) return;
  // Ensure all section configs are initialized
  defs.forEach((def, i) => {
    _ensureSecCfg(tab, def.id);
    if (state.sectionConfig[tab][def.id].order === undefined) {
      state.sectionConfig[tab][def.id].order = i;
    }
  });
  // Get sorted list by current order
  const sorted = defs.slice().sort((a, b) =>
    state.sectionConfig[tab][a.id].order - state.sectionConfig[tab][b.id].order
  );
  const idx = sorted.findIndex(d => d.id === id);
  if (idx === -1) return; // unknown id – guard against corrupted state
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  // Swap orders
  const ordA = state.sectionConfig[tab][sorted[idx].id].order;
  const ordB = state.sectionConfig[tab][sorted[swapIdx].id].order;
  state.sectionConfig[tab][sorted[idx].id].order = ordB;
  state.sectionConfig[tab][sorted[swapIdx].id].order = ordA;
  save();
  if (state.ui.tab === tab) { render(); }
  _refreshSecMgr();
}
function setSectionMgrTab(tab) {
  _sectionMgrTab = tab;
  _refreshSecMgr();
}
function resetSectionConfig(tab) {
  if (!state.sectionConfig) state.sectionConfig = {};
  state.sectionConfig[tab] = {};
  save();
  if (state.ui.tab === tab) render();
  _refreshSecMgr();
  showToast('Layout '+tab+' direset ke default!', 'ach');
}

function deepMerge(def, loaded){
  if(Array.isArray(def)) return loaded!==undefined ? loaded : def;
  if(def && typeof def==='object'){
    const out = {}; for(const k in def){ out[k] = deepMerge(def[k], loaded ? loaded[k] : undefined); }
    if(loaded){ for(const k in loaded){ if(!(k in out)) out[k]=loaded[k]; } } return out;
  }
  return loaded!==undefined ? loaded : def;
}

// KURVA EXP EKSPONENSIAL TERSKALA — 5× per Realm
// Semakin tinggi Realm, kebutuhan EXP per level JAUH lebih besar.
// QC base=50, tiap Realm berikutnya 5× lipat.
// expNeeded(level) = REALM_BASE_EXP[realmIdx] × localLv (1–15)
//
// Rebalanced — total kumulatif LV 1→240: ~298 juta EXP
// Heaven Trampling dapat dicapai dengan ~300 juta EXP total
//
// Contoh kebutuhan per realm:
//   QC  (LV 1-15) : 20–300 EXP per level         | total: ~2.400
//   FE  (LV16-30) : 80–1.200 EXP per level        | total: ~9.600
//   CF  (LV31-45) : 300–4.500 EXP per level       | total: ~36.000
//   NS  (LV46-60) : 1.200–18.000 EXP per level    | total: ~144.000
//   SF  (LV61-75) : 5.000–75.000 EXP per level    | total: ~600.000
//   ST  (LV76-90) : 16.000–240.000 EXP per level  | total: ~1,92 juta
//   AS  (LV91-105): 50.000–750.000 EXP per level  | total: ~6 juta
//   IY (LV106-120): 100.000–1,5 juta per level    | total: ~12 juta
//   CY (LV121-135): 130.000–1,95 juta per level   | total: ~15,6 juta
//   NS (LV136-150): 160.000–2,4 juta per level    | total: ~19,2 juta
//   NC (LV151-165): 200.000–3 juta per level      | total: ~24 juta
//  NSh (LV166-180): 250.000–3,75 juta per level   | total: ~30 juta
//   VN (LV181-195): 300.000–4,5 juta per level    | total: ~36 juta
//   SV (LV196-210): 350.000–5,25 juta per level   | total: ~42 juta
//   AV (LV211-225): 420.000–6,3 juta per level    | total: ~50,4 juta
//   VT (LV226-240): 500.000–7,5 juta per level    | total: ~60 juta
//
// Kumulatif sampai LV 240: ~298 juta EXP
// Heaven Trampling: ~298 juta EXP
// Bridge 1 LV 100: ~5 miliar EXP tambahan (50 juta/LV × 100 LV)
// ═══════════════════════════════════════════════════════════════
const REALM_BASE_EXP = [
  20,        // 0: Qi Condensation       LV 1-15
  80,        // 1: Foundation Estab.     LV 16-30
  300,       // 2: Core Formation        LV 31-45
  1200,      // 3: Nascent Soul          LV 46-60
  5000,      // 4: Soul Formation        LV 61-75
  16000,     // 5: Soul Transformation   LV 76-90
  50000,     // 6: Ascendant             LV 91-105
  100000,    // 7: Illusory Yin          LV 106-120
  130000,    // 8: Corporeal Yang        LV 121-135
  160000,    // 9: Nirvana Scryer        LV 136-150
  200000,    // 10: Nirvana Cleanser     LV 151-165
  250000,    // 11: Nirvana Shatterer    LV 166-180
  300000,    // 12: Void Nirvana         LV 181-195
  350000,    // 13: Spirit Void          LV 196-210
  420000,    // 14: Arcane Void          LV 211-225
  500000,    // 15: Void Tribulant       LV 226-240
];

function expNeeded(level){
  const lv = Math.max(1, level || 1);
  const realmIdx = Math.min(Math.floor((lv - 1) / 15), REALM_BASE_EXP.length - 1);
  const localLv = ((lv - 1) % 15) + 1; // 1–15
  return REALM_BASE_EXP[realmIdx] * localLv;
}
// Total EXP kumulatif yang dibutuhkan untuk mencapai suatu level dari Level 1.
function cumulativeExpForLevel(level){
  let total = 0; const lvl = Math.max(1, level || 1);
  for(let l=1; l<lvl; l++){ total += expNeeded(l); }
  return total;
}
// ─────────────────────────────────────────────────────────────
// EXP REQUIREMENT CALCULATOR
// Menghitung total EXP kumulatif yang dibutuhkan untuk mencapai target tertentu.
// ─────────────────────────────────────────────────────────────
function getTotalExpEarned(){
  const c = state.character;
  return cumulativeExpForLevel(c.level) + (c.exp || 0);
}
// Menghitung EXP kumulatif yang dibutuhkan untuk MENCAPAI realm tertentu (index realm)
function calcExpToRealm(realmIdx){
  if(realmIdx <= 0) return 0;
  const startLv = Math.min(realmIdx, 16) * 15 + 1; // LV pertama realm ini
  return cumulativeExpForLevel(Math.min(startLv, MAX_LEVEL + 1));
}
// Menghitung EXP kumulatif ke target Bridge HT tertentu (bridgeNum 1-9)
// Bridge N dicapai saat LV = MAX_LEVEL + N×100 — sinkron dengan syncRealmWithLevel
function calcExpToHtBridge(bridgeNum){
  return cumulativeExpForLevel(MAX_LEVEL + Math.max(0, Math.min(bridgeNum, 9)) * 100);
}
function formatExpLarge(n){
  if(n >= 1e12) return (n/1e12).toFixed(2) + ' T';
  if(n >= 1e9)  return (n/1e9).toFixed(2) + ' M (Miliar)';
  if(n >= 1e6)  return (n/1e6).toFixed(2) + ' Jt';
  if(n >= 1e3)  return (n/1e3).toFixed(1) + ' K';
  return n.toLocaleString();
}
function renderExpCalculator(){
  if(!state.settings.showExpCalculator) return '';
  const earned = getTotalExpEarned();
  // Build milestone list
  const milestones = [];
  for(let i = 1; i < DEFAULT_REALMS.length; i++){
    const needed = calcExpToRealm(i);
    const remaining = Math.max(0, needed - earned);
    const done = earned >= needed;
    milestones.push({ label: DEFAULT_REALMS[i].nameID, needed, remaining, done, type: 'realm' });
  }
  for(let b = 1; b <= 9; b++){
    const needed = calcExpToHtBridge(b);
    const remaining = Math.max(0, needed - earned);
    const done = earned >= needed;
    milestones.push({ label: `Heaven Trampling — Bridge ${b}`, needed, remaining, done, type: 'ht' });
  }
  const rows = milestones.map((m, idx) => {
    const color = m.done ? 'var(--jade)' : (m.type === 'ht' ? 'var(--gold)' : 'var(--cyan)');
    const icon = m.done ? '✓' : (m.type === 'ht' ? '🌉' : '◆');
    return `<tr style="opacity:${m.done ? 0.5 : 1};">
      <td style="color:${color};font-weight:${m.type==='ht'?700:500};font-size:11px;">${icon} ${m.label}</td>
      <td style="text-align:right;font-family:var(--font-system);font-size:10.5px;color:var(--bone);">${formatExpLarge(m.needed)}</td>
      <td style="text-align:right;font-family:var(--font-system);font-size:10.5px;color:${m.done?'var(--jade)':'var(--orange)'};">${m.done ? '—' : formatExpLarge(m.remaining)}</td>
    </tr>`;
  }).join('');
  return `
  <div class="section-title">🧮 Kalkulator Kebutuhan EXP</div>
  <div class="card glass-panel">
    <div class="small muted" style="margin-bottom:8px;">EXP Kumulatif Kamu Saat Ini: <b style="color:var(--cyan);">${formatExpLarge(earned)}</b></div>
    <div style="overflow-x:auto;">
      <table class="stats-table" style="font-size:11px;">
        <thead><tr><th>Target</th><th style="text-align:right;">Total Dibutuhkan</th><th style="text-align:right;">Sisa</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="small muted" style="margin-top:8px; font-size:10px;">* Bridge 1-9 menghitung total EXP kumulatif dari awal (termasuk semua realm sebelumnya)</div>
  </div>`;
}

// Menyelaraskan kembali Tahapan (Realm) dengan Level karakter — memperbaiki data import/export
// yang tidak sinkron (mis. Level tinggi tapi Tahapan masih di awal seperti Qi Condensation).
function syncRealmWithLevel(s){
  // Realm selalu mengikuti level — level adalah satu-satunya sumber kebenaran.
  const c = s.character; const realms = s.realms || DEFAULT_REALMS; if(!c || !realms.length) return;
  // Heaven Trampling adalah realm terakhir (index paling akhir di array)
  const htIdx = realms.length - 1;
  // Jika sudah di HT, sinkronkan heavenBridges dari level utama lalu keluar
  if(c.realmIndex === htIdx && realms[htIdx].bridges != null){
    c.heavenBridges = Math.max(0, Math.min(9, Math.floor(((c.level || 1) - 240) / 100)));
    return;
  }
  const lv = Math.max(1, c.level || 1);
  let idx = 0;
  if(lv > 15){
    const lvAfterQC = lv - 15;
    const realmOffset = Math.min(Math.floor((lvAfterQC - 1) / 15), htIdx - 1);
    idx = realmOffset + 1;
  }
  // Izinkan masuk HT hanya jika level sudah mencapai MAX_LEVEL
  c.realmIndex = Math.min(idx, (c.level >= MAX_LEVEL) ? htIdx : htIdx - 1);
}
