  (state.historyArchive?.refleksi||[]).forEach(e => {
    if(e._sourceType==='principle') e.pinnedHome = e.id === lpId;
  });
  state.character.lifePrinciple = entry.text;

}

let _riwayatExpandedText = {};
const _RIWAYAT_TRUNC_LEN = 100;
function toggleRiwayatText(key){ _riwayatExpandedText[key] = !_riwayatExpandedText[key]; render(); }
function _riwayatTruncate(text){ text = text || ''; return text.length > _RIWAYAT_TRUNC_LEN ? text.slice(0, _RIWAYAT_TRUNC_LEN).trim()+'…' : text; }

// Tanggal "kejadian" tiap entri berbeda field-nya per kategori — disatukan jadi 1 Date object di sini.
function _riwayatEntryJsDate(cat, e){
  try{
    if(cat==='goal') return e.completedAt ? new Date(e.completedAt+'T00:00:00') : null;
    if(cat==='refleksi') return e._ts ? new Date(e._ts) : null;
    if(cat==='evaluasi') return e._ts ? new Date(e._ts) : (e.date ? new Date(e.date+'T00:00:00') : null);
    if(cat==='timeline') return e.ts ? new Date(e.ts) : (e.date ? new Date(e.date+'T00:00:00') : null);
    if(cat==='vitalitas') return e.ts ? new Date(e.ts) : (e.date ? new Date(e.date+'T00:00:00') : null);
    if(cat==='karakter') return _parseCharTs(e.ts);
    return e.date ? new Date(e.date+'T00:00:00') : null; // finansial, momentum, sedekah, jurnal
  }catch(err){ return null; }
}
function _riwayatFormatDateTime(cat, e){
  const d = _riwayatEntryJsDate(cat, e);
  if(!d || isNaN(d)) return e.date || '-';
  const hasTime = (cat==='refleksi') || (cat==='timeline' && e.ts) || (cat==='vitalitas' && e.ts) || (cat==='karakter' && (e._kType==='level'||e._kType==='realm'));
  const tgl = d.getDate()+' '+_RIWAYAT_MONTH_NAMES[d.getMonth()]+' '+d.getFullYear();
  if(!hasTime) return tgl;
  const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
  return tgl+', '+hh+':'+mm;
}

// Ringkasan 1 bulan, beda angka per kategori.
function _riwayatMonthSummary(cat, entries){
  if(cat==='finansial'){
    let masuk=0, keluar=0, transfer=0;
    entries.forEach(e=>{ if(e.type==='in') masuk += Number(e.amount||0); else if(e.type==='out') keluar += Number(e.amount||0); else if(e.type==='transfer') transfer += Number(e.amount||0); });
    return `${entries.length} transaksi · <span style="color:var(--jade);">+Rp${masuk.toLocaleString('id-ID')}</span> · <span style="color:var(--crimson);">-Rp${keluar.toLocaleString('id-ID')}</span>${transfer?` · <span style="color:var(--muted);">🔄 Rp${transfer.toLocaleString('id-ID')}</span>`:''}`;
  }
  if(cat==='momentum'){
    const avg = Math.round(entries.reduce((a,e)=>a+(e.lifeScore||0),0) / Math.max(1,entries.length));
    return `${entries.length} hari tercatat · Rata-rata Skor Hidup: ${avg}`;
  }
  if(cat==='goal') return `${entries.length} goal selesai`;
  if(cat==='sedekah'){
    const total = entries.reduce((a,e)=>a+Number(e.nominal||0),0);
    return `${entries.length} kali sedekah · Total Rp${total.toLocaleString('id-ID')}`;
  }
  if(cat==='evaluasi') return `${entries.length} entri evaluasi`;
  if(cat==='jurnal') return `${entries.length} hari menulis jurnal`;
  if(cat==='refleksi'){
    const jml = entries.filter(e=>e._sourceType!=='answer').length, jwb = entries.filter(e=>e._sourceType==='answer').length;
    return `${jml} jurnal refleksi · ${jwb} jawaban pertanyaan`;
  }
  if(cat==='vitalitas'){
    const hpN = entries.filter(e=>e._vType==='hp').length, manaN = entries.filter(e=>e._vType==='mana').length;
    return `${hpN} kejadian HP · ${manaN} kejadian Mana`;
  }
  if(cat==='karakter'){
    const lvlN = entries.filter(e=>e._kType==='level').length, hpN = entries.filter(e=>e._kType==='hp').length;
    const realmN = entries.filter(e=>e._kType==='realm').length, streakN = entries.filter(e=>e._kType==='streak').length;
    return `${lvlN} level naik · ${realmN} realm naik · ${hpN} catatan HP · ${streakN} update streak`;
  }
  return `${entries.length} peristiwa`; // timeline
}

// EVALUASI MINGGUAN — tab ke-6 di grup Quest. Ruang tinjau mingguan
// dengan 3 pertanyaan preset + pertanyaan kustom buatan user sendiri.
// Riwayat dikelompokkan per minggu; reward EXP+Mana setiap kali simpan.
// ═══════════════════════════════════════════════════════════════

const _EVAL_PRESET_QUESTIONS = [
  { id:'eq1', q:'Apa yang masih kurang minggu ini?' },
  { id:'eq2', q:'Apakah aku sudah lebih baik dari minggu sebelumnya? Buktinya apa?' },
  { id:'eq3', q:'Apa yang harus diperbaiki atau difokuskan minggu depan?' },
];

// Buat label "Minggu 28 · 7–13 Jul 2026" dari ISO date string (Senin pembuka minggu)
function _evalWeekLabel(wkStr){
  if(!wkStr) return '?';
  const start = new Date(wkStr + 'T00:00:00');
  const end   = new Date(start); end.setDate(start.getDate() + 6);
  const opts  = {day:'numeric', month:'short'};
  const yr    = start.getFullYear();
  // Hitung nomor minggu ISO
  const tmp = new Date(Date.UTC(start.getFullYear(), start.getMonth(), start.getDate()));
  const dow = tmp.getUTCDay() || 7; tmp.setUTCDate(tmp.getUTCDate() + 4 - dow);
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  const wNum = Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
  return `Minggu ${wNum} · ${start.toLocaleDateString('id-ID', opts)}–${end.toLocaleDateString('id-ID', opts)} ${yr}`;
}

function renderEvaluasiMingguan(){

  // ── Riwayat dikelompokkan per minggu ──
  const entries = (em.entries||[]).slice().sort((a,b)=>(b._ts||0)-(a._ts||0));
  const byWeek = {};
  entries.forEach(e => {

  const histHtml = Object.keys(byWeek).length === 0

            if(!txt) return '';
            return `<div style="margin-bottom:10px;">
              <div style="font-size:10px;font-weight:700;color:rgba(200,168,75,0.7);margin-bottom:3px;">${escapeHtml(q.q)}</div>
              <div style="font-size:12.5px;line-height:1.65;color:var(--bone);white-space:pre-wrap;word-break:break-word;">${escapeHtml(txt)}</div>
            </div>`;
          }).filter(Boolean).join('');
          return `<div style="padding:12px;border-radius:10px;background:rgba(200,168,75,0.04);border:1px solid rgba(200,168,75,0.12);margin-bottom:10px;">

function saveEvaluasiMingguan(){
  if(!state.evaluasiMingguan) state.evaluasiMingguan = {entries:[], customQuestions:[]};
  const em = state.evaluasiMingguan;
  const allQ = [..._EVAL_PRESET_QUESTIONS, ...(em.customQuestions||[])];

  // Kumpulkan jawaban preset
  const answers = {};
  _EVAL_PRESET_QUESTIONS.forEach(q => {
    const el = document.getElementById('eval-q-' + q.id);
    if(el) answers[q.id] = el.value.trim();
  });

  // Kumpulkan jawaban kustom (hanya yang diisi)
  const customAnswers = (em.customQuestions||[]).map(q => {
    const el = document.getElementById('eval-q-' + q.id);
    return { qId: q.id, text: el ? el.value.trim() : '' };
  }).filter(x => x.text);

  // Minimal satu jawaban diisi
  const hasAny = Object.values(answers).some(v => v) || customAnswers.length > 0;
  if(!hasAny){ showToast('Isi minimal satu jawaban dulu.', 'bad'); return; }

  const now = new Date();
  em.entries.unshift({
    id        : uid('ev'),
    weekKey   : weekKey(now),
    answers,
    customAnswers,
    date      : todayStr(),
    ts        : now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
    _ts       : now.getTime(),
  });

  // Sinkron realtime ke Sejarah Riwayat Permanen
  ensureHistoryArchive(state);
  _riwayatArchivePush('evaluasi', em.entries[0]);

  gainExp(15);
  gainMana(10, 'Evaluasi Mingguan');
  showFloatingExp(15);
  render(); save();
  showToast('✅ Evaluasi tersimpan! +15 EXP · +10 Mana', 'ach');
}

function addEvalCustomQuestion(){
  const el = document.getElementById('eval-new-q');
  const q = el ? el.value.trim() : '';
  if(!q){ showToast('Tulis pertanyaanmu dulu.', 'bad'); return; }
  if(!state.evaluasiMingguan) state.evaluasiMingguan = {entries:[], customQuestions:[]};
  state.evaluasiMingguan.customQuestions.push({ id: uid('ecq'), q });
  el.value = '';
  save(); render();
}

function deleteEvalCustomQuestion(id){
  if(!state.evaluasiMingguan) return;
  openConfirm('Hapus pertanyaan ini? Jawaban lama yang sudah tersimpan tetap ada di riwayat.', () => {
    state.evaluasiMingguan.customQuestions = (state.evaluasiMingguan.customQuestions||[]).filter(q => q.id !== id);
    save(); render();
  });
}

function deleteEvalEntry(id){
  if(!state.evaluasiMingguan) return;
  openConfirm('Hapus entri evaluasi ini?', () => {
    state.evaluasiMingguan.entries = (state.evaluasiMingguan.entries||[]).filter(e => e.id !== id);
    // Sinkron hapus dari historyArchive.evaluasi
    ensureHistoryArchive(state);
    state.historyArchive.evaluasi = (state.historyArchive.evaluasi||[]).filter(e => e.id !== id);
    save(); render();
  });
}

  } else {

    const groups = {};

      const expandKey = _riwayatCat+'|'+mk;
      // Bulan terbaru (mkIdx===0) terbuka secara default agar entri baru langsung terlihat.

function renderLifeTimeline(){
  const entries = (state.lifeTimeline || []).slice().sort((a,b) => {
    const da = a.date||'0000-00-00'; const db = b.date||'0000-00-00';
    if(db !== da) return db.localeCompare(da);
    return (b.ts||0) - (a.ts||0);
  });
  if(!entries.length) return `<div class="lt-empty">Belum ada momen tercatat.<br><span style="font-size:11px;">Selesaikan goal, naik level, atau buka achievement untuk memulai.</span></div>`;
  const byYear = {};
  entries.forEach(e => {
    const yr = (e.date||'????').slice(0,4);
    if(!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(e);
  });
  const years = Object.keys(byYear).sort((a,b) => b-a);
  const typeColor = { goal:'var(--jade)', ach:'var(--arise-bright)', title:'var(--gold)', realm:'var(--cyan)', heaven:'var(--gold-soft)', level:'var(--arise)' };
  const SHOW_LIMIT = 4;
  return years.map(yr => {
    const all = byYear[yr];
    const isExp = !!_ltExpanded[yr];
    const shown = isExp ? all : all.slice(0, SHOW_LIMIT);
    const hiddenN = all.length - SHOW_LIMIT;
    const items = shown.map(e => {
      const col = typeColor[e.type] || 'var(--bone)';
      const dayDisp = e.date ? e.date.slice(5).replace('-','/') : '';
      const timeDisp = e.ts ? new Date(e.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) : '';
      const dateStr = dayDisp + (timeDisp ? ' · ' + timeDisp : '');
      return `<div class="lt-entry type-${e.type}">
        <div class="lt-entry-top">
          <span class="lt-icon">${escapeHtml(e.icon||'📌')}</span>
          <span class="lt-desc" style="color:${col};">${escapeHtml(e.desc)}</span>
          <span class="lt-date">${dateStr}<span class="lt-time"></span></span>
        </div>
      </div>`;
    }).join('');
    let toggleBtn = '';
    if (!isExp && hiddenN > 0) {
      toggleBtn = `<button class="lt-show-more" onclick="toggleLtYear('${yr}')">+${hiddenN} momen lainnya di ${yr} — Lihat Semua ↓</button>`;
    } else if (isExp && all.length > SHOW_LIMIT) {
      toggleBtn = `<button class="lt-show-more" onclick="toggleLtYear('${yr}')">Sembunyikan ↑</button>`;
    }
    return `<div class="lt-year-block"><div class="lt-year-header">${yr}</div><div class="lt-spine">${items}</div>${toggleBtn}</div>`;
  }).join('');
}
function toggleLtYear(yr){ _ltExpanded[yr] = !_ltExpanded[yr]; render(); }

function calcHabitRateWeek(daysAgoStart, daysAgoEnd = 0) {
   if(!state.habits || state.habits.length === 0) return 0; let possible = 0; let done = 0;
   for(let i = daysAgoStart - 1; i >= daysAgoEnd; i--) { let d = new Date(); d.setDate(d.getDate() - i); let dStr = d.toLocaleDateString('en-CA'); state.habits.forEach(h => { possible++; if(h.log && h.log[dStr]) done++; }); }
   return possible === 0 ? 0 : Math.round((done/possible)*100);
}
function formatExpShort(n){
  if(n===0) return 'Awal';
  if(n>=1e12) return (n/1e12).toFixed(1).replace(/\.0$/,'')+'T';
  if(n>=1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'')+'M';
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'Jt';
  if(n>=1e3) return (n/1e3).toFixed(0)+'Rb';
  return String(n);
}

function renderHofMedalBar(maxShow=6, extraCls=''){

function renderRealmEncyclopedia(){
  const c = state.character;
  const currentIdx = c.realmIndex;
  const stepColors={1:'var(--muted)',2:'var(--arise)',3:'var(--cyan)',4:'var(--gold)'};
  const stepIcons={1:'🌱',2:'🌀',3:'🌌',4:'⚡'};

  // Current Realm Banner

  const crStep = REALM_STEPS[cr.step];
  html += `<div class="re-banner">

  // Group by step
  const realmGroups={1:[],2:[],3:[],4:[]};
  DEFAULT_REALMS.forEach((r,i)=>{ realmGroups[r.step].push({r,i}); });

  for(let t=1;t<=4;t++){

    const si = realmStepInfo(t);
    const sc = stepColors[t];
    const sIcon = stepIcons[t];
    html += `<div class="re-step-header" style="color:${sc};">${sIcon} ${si.label} <span style="opacity:0.6;margin-left:4px;">— ${si.realmID}</span></div>`;

    realmGroups[t].forEach(({r,i})=>{
      const isActive = i===currentIdx;

      const lvStart = r.bridges!=null ? 241 : i*LEVELS_PER_REALM+1;
      const lvEnd = r.bridges!=null ? '∞' : (i+1)*LEVELS_PER_REALM;
      const baseIdx = Math.min(i, REALM_BASE_EXP.length-1);
      const epvMin = REALM_BASE_EXP[baseIdx]*1;
      const epvMax = REALM_BASE_EXP[baseIdx]*LEVELS_PER_REALM;

      let cardClass = 're-card '+(isActive?'re-card-active':isDone?'re-card-done':'re-card-locked');
      let nameColor = isActive?'var(--arise-bright)':isDone?'var(--jade)':'var(--bone)';
      let badge = isActive
        ? `<span class="re-badge-active">AKTIF</span>`
        : isDone?`<span class="re-badge-done">✓ SELESAI</span>`:'';

      let expDetail = r.bridges!=null
        ? `<div class="re-exp-row" style="color:var(--gold-soft);">⚡ ${r.bridges} Jembatan Surgawi &nbsp;·&nbsp; 100 LV per Jembatan (LV 241–1.140)</div>`
        : `<div class="re-exp-row">EXP per Level: ${formatExpShort(epvMin)} – ${formatExpShort(epvMax)}</div>`;

      html += `<div class="${cardClass}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
              <span class="re-num" style="color:${sc};border:1px solid ${sc}30;">#${i+1}</span>
              ${badge}
            </div>
            <div class="re-name" style="color:${nameColor};">${escapeHtml(r.name)}</div>
            <div class="re-desc">${escapeHtml(r.desc)}</div>
            ${expDetail}
          </div>
          <div class="re-lv-block">
            <div class="re-lv-label">LV</div>
            <div class="re-lv-val" style="color:${sc};">${lvStart}–${lvEnd}</div>
            <div class="re-lv-label" style="margin-top:8px;">EXP Awal</div>
            <div class="re-exp-val">${formatExpShort(r.reqEnergy)}</div>
          </div>
        </div>
      </div>`;
    });
  }

  // Heaven Trampling bridge table — EXP dihitung dari rumus level (sinkron dengan syncRealmWithLevel)
  // Bridge N dimulai pada LV MAX_LEVEL + N×100, sehingga 1 bridge = 100 LV
  const _htThresh = Array.from({length:10}, (_,b) => cumulativeExpForLevel(MAX_LEVEL + b * 100));
  html += `<div class="card" style="margin-top:4px;margin-bottom:14px;border-color:rgba(255,200,50,0.3);background:rgba(20,10,0,0.5);">
    <div class="card-title" style="color:var(--gold);">⚡ Heaven Trampling — 9 Jembatan Surgawi</div>

  for(let bi=0;bi<9;bi++){
    const bNo = bi+1;
    const startLv = MAX_LEVEL + bi * 100 + 1;
    const endLv   = MAX_LEVEL + (bi+1) * 100;
    const expForBridge  = _htThresh[bi+1] - _htThresh[bi];       // EXP khusus bridge ini
    const expCumulative = _htThresh[bi+1];                        // EXP kumulatif dari LV 1
    const htActive = isHeavenTrampling();
    const reached  = htActive && c.heavenBridges > bi;
    const isCur    = htActive && c.heavenBridges === bi;
    const rowCls   = isCur ? 're-bridge-row re-bridge-active' : 're-bridge-row';
    const nameColor= reached?'var(--gold)':isCur?'var(--gold-soft)':'var(--muted)';
    const icon     = reached?'✓':isCur?'▶':'○';
    html += `<div class="${rowCls}">
      <div>
        <div style="font-family:var(--font-system);font-size:12.5px;font-weight:700;color:${nameColor};">${icon} Jembatan ${bNo}</div>
        <div style="font-size:10px;color:var(--muted-2);margin-top:2px;">LV ${startLv}–${endLv}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;color:var(--muted);">${formatExpShort(expForBridge)} EXP</div>
        <div style="font-size:10px;color:var(--muted-2);">Kumulatif: ${formatExpShort(expCumulative)}</div>
      </div>
    </div>`;
  }
  html += `</div>`;

  return html;
}

function generateWeeklyInsights() {
  const today = new Date();
  const weekAgoStr    = new Date(today - 7*86400000).toLocaleDateString('en-CA');
  const twoWeeksStr   = new Date(today - 14*86400000).toLocaleDateString('en-CA');
  const insights = [];

  // 1. Pengeluaran minggu ini vs minggu lalu
  const expThis = (state.financeLog||[]).filter(l=>l.type==='out'&&l.date>=weekAgoStr).reduce((s,l)=>s+l.amount,0);
  const expLast = (state.financeLog||[]).filter(l=>l.type==='out'&&l.date>=twoWeeksStr&&l.date<weekAgoStr).reduce((s,l)=>s+l.amount,0);
  if(expLast>0 && expThis!==expLast) {
    const pct=Math.round(Math.abs(expThis-expLast)/expLast*100);
    if(pct>0){ const turun=expThis<expLast; insights.push({icon:'💸',text:`Pengeluaran ${turun?'turun':'naik'} <b>${pct}%</b> dibanding minggu lalu`,col:turun?'var(--jade)':'var(--crimson)'}); }
  }

  // 2. Aktivitas/quest selesai minggu ini vs minggu lalu
  const actThis=Object.entries(state.meta.activityLog||{}).filter(([d])=>d>=weekAgoStr).reduce((s,[,v])=>s+v,0);
  const actLast=Object.entries(state.meta.activityLog||{}).filter(([d])=>d>=twoWeeksStr&&d<weekAgoStr).reduce((s,[,v])=>s+v,0);
  if(actLast>0 && actThis!==actLast) {
    const pct=Math.round(Math.abs(actThis-actLast)/actLast*100);
    if(pct>0){ const naik=actThis>actLast; insights.push({icon:'⚔️',text:`Quest selesai ${naik?'naik':'turun'} <b>${pct}%</b> dibanding minggu lalu`,col:naik?'var(--jade)':'var(--crimson)'}); }
  } else if(actLast===0&&actThis>0) {
    insights.push({icon:'⚔️',text:`<b>${actThis}</b> aktivitas tercatat minggu ini`,col:'var(--cyan)'});
  }

  // 3. Life Score naik/turun minggu ini
  const lmAll=state.lifeMomentum||[];
  const lmWeek=lmAll.filter(e=>e.date>=weekAgoStr);
  const lmPrev=lmAll.filter(e=>e.date>=twoWeeksStr&&e.date<weekAgoStr);
  if(lmWeek.length>0){
    const scoreNow=lmWeek[lmWeek.length-1].lifeScore;
    const scoreRef=lmWeek.length>1?lmWeek[0].lifeScore:(lmPrev.length?lmPrev[lmPrev.length-1].lifeScore:null);
    if(scoreRef!==null){
      const diff=scoreNow-scoreRef;
      if(Math.abs(diff)>0){ const naik=diff>0; insights.push({icon:'🌟',text:`Life Score ${naik?'naik':'turun'} <b>${Math.abs(diff)} poin</b> minggu ini`,col:naik?'var(--jade)':'var(--crimson)'}); }
    }
  }

  // 4. Streak terbaik minggu ini
  const streakPeak=lmWeek.length?Math.max(...lmWeek.map(e=>e.streak||0)):state.character.streak;
  if(streakPeak>0){
    const col=streakPeak>=7?'var(--gold)':streakPeak>=3?'var(--orange)':'var(--muted)';
    insights.push({icon:'🔥',text:`Streak terbaik minggu ini: <b>${streakPeak} hari</b>`,col});
  }

  // Fallback: pemasukan jika insights masih kosong
  if(insights.length===0){
    const incThis=_getAllFinanceEntries().filter(l=>l.type==='in'&&l.date>=weekAgoStr).reduce((s,l)=>s+l.amount,0);
    if(incThis>0) insights.push({icon:'💰',text:`Pemasukan minggu ini: <b>${typeof formatRupiah==='function'?formatRupiah(incThis):incThis}</b>`,col:'var(--gold)'});
    else insights.push({icon:'📅',text:'Belum cukup data minggu ini — terus catat aktivitasmu!',col:'var(--muted)'});
  }

  return insights.slice(0,4);
}

// ── LIFE MOMENTUM CHART — menggunakan state.lifeMomentum (snapshot harian dari data karakter yang sudah ada).
function initLifeMomentumChart(){
    if(typeof Chart === 'undefined') { const c=document.getElementById('lifeMomentumChart'); if(c){ const p=c.parentElement; p.innerHTML='<div class="small muted" style="text-align:center;padding:20px;">📊 Grafik tidak tersedia (perlu koneksi internet)</div>'; } return; }
    const ctx = document.getElementById('lifeMomentumChart'); if(!ctx) return; if(lifeMomentumChart) lifeMomentumChart.destroy();

    const isWeekly = lifeMomentumRange === 'weekly';
    const POINTS = isWeekly ? 7 : 30;
    const dayKeys = []; const dayLabels = [];
    for(let i=POINTS-1; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); dayKeys.push(d.toLocaleDateString('en-CA')); dayLabels.push(d.toLocaleDateString('id-ID', {day:'numeric', month:'short'})); }

    const snapshots = state.lifeMomentum || [];
    const byDate = {}; snapshots.forEach(s => byDate[s.date] = s);

    let lastKnown = null;
    for(const s of snapshots){ if(s.date <= dayKeys[0]) lastKnown = s; }
    const levelData = [], streakData = [], scoreData = [];
    dayKeys.forEach(k => {
        if(byDate[k]) lastKnown = byDate[k];
        levelData.push(lastKnown ? lastKnown.level : null);
        streakData.push(lastKnown ? lastKnown.streak : null);
        scoreData.push(lastKnown ? lastKnown.lifeScore : null);
    });

    Chart.defaults.color = '#9492AC'; Chart.defaults.font.family = "'Rajdhani', sans-serif";
    lifeMomentumChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dayLabels,
            datasets: [
                { label: 'Level', data: levelData, borderColor: '#37D6C4', backgroundColor: 'rgba(55,214,196,0.10)', borderWidth: 2, tension: 0.35, fill: false, spanGaps: true, yAxisID: 'y1', pointBackgroundColor: '#37D6C4', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 6 },
                { label: 'Streak', data: streakData, borderColor: '#F0B93B', backgroundColor: 'rgba(240,185,59,0.10)', borderWidth: 2, tension: 0.35, fill: false, spanGaps: true, yAxisID: 'y1', pointBackgroundColor: '#F0B93B', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 6 },
                { label: 'Life Score', data: scoreData, borderColor: '#9B6BFF', backgroundColor: 'rgba(155,107,255,0.12)', borderWidth: 2, tension: 0.35, fill: true, spanGaps: true, yAxisID: 'y', pointBackgroundColor: '#9B6BFF', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 6 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { position: 'left', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font:{size:10} }, title: { display: true, text: 'Life Score', font:{size:9} } },
                y1: { position: 'right', grid: { display: false }, ticks: { font:{size:10} }, title: { display: true, text: 'Level / Streak', font:{size:9} } },
                x: { grid: { display: false }, ticks: { font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit: isWeekly ? 7 : 10 } }
            },
            plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${c.raw==null?'-':c.raw}` } }
            },
            onClick: (evt, elements) => {
                const infoEl = document.getElementById('lm-point-info'); if(!infoEl) return;
                if(!elements || !elements.length) return;
                const el = elements[0]; const idx = el.index; const dateLabel = dayLabels[idx];
                const lv = levelData[idx], st = streakData[idx], sc = scoreData[idx];
                if(lv==null){ infoEl.innerHTML = `<span class="muted">Belum ada data pada ${dateLabel}</span>`; return; }
                infoEl.innerHTML = `<span style="font-weight:800;font-size:14px;color:var(--bone);">Level ${lv} · Streak ${st} · Life Score ${sc}</span><br><span class="muted">${dateLabel}</span>`;
            }
        }
    });
}

  const date = now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  const ts = now.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  c.lifePrincipleHistory.unshift({id:uid('lp'), text:newText, date, ts, _ts:now.getTime()});
  if(c.lifePrincipleHistory.length > 200) c.lifePrincipleHistory.length = 200;
  c.lifePrinciple = newText;
  el.value='';
  save(); render(); showToast('Prinsip Hidup disimpan! ✦', 'ach');
}
function editLifePrinciple(lpId){
  const c = state.character; if(!Array.isArray(c.lifePrincipleHistory)) return;
  // Cari di active array dulu; kalau tidak ada, cari di archive (prinsip archive-only)
  let entry = c.lifePrincipleHistory.find(h=>h.id===lpId);
  if(!entry) entry = (state.historyArchive?.refleksi||[]).find(e=>e._sourceType==='principle' && e.id===lpId);
  if(!entry) return;
  const el = document.getElementById('rf-life-principle'); if(!el) return;
  el.value = entry.text;
  el.scrollIntoView({behavior:'smooth', block:'center'});
  el.focus();
  showToast('Prinsip dipindah ke kotak — ubah lalu simpan.', 'ach');
}
function deleteLifePrincipleHistory(lpId){
  const c = state.character; if(!Array.isArray(c.lifePrincipleHistory)) return;
  c.lifePrincipleHistory = c.lifePrincipleHistory.filter(h=>h.id!==lpId);
  // Sinkron hapus dari archive agar tidak ada ghost entry di Sejarah Riwayat
  if(state.historyArchive && Array.isArray(state.historyArchive.refleksi))
    state.historyArchive.refleksi = state.historyArchive.refleksi.filter(e=>!(e._sourceType==='principle' && e.id===lpId));
  save(); render();
}

function resetPartial(type){
  const labels = { level:'Level & Realm', exp:'EXP aktif', quest:'semua Quest ke pending', uang:'Log Finansial & Target', day:'Hari ke Day 1' };
  const label = labels[type] || type;
  openConfirm(`Reset ${label}? Sistem lain tidak terpengaruh.`, () => {
    if(type === 'day'){
      state.meta.startDate = todayStr();
      state.character.streak = 1;
      save(); render();
      document.getElementById('settings-slot').innerHTML = renderSettingsModal();
      openModal('modal-settings');
      showToast('Hari direset ke Day 1!', 'ach');
      return;
    }
    if(type === 'level'){
      // Hanya reset Level & Realm — EXP aktif, Quest, Uang tidak tersentuh
      state.character.level = 1;
      state.character.realmIndex = 0;
      state.character.realmEnergy = 0;
      state.character.heavenBridges = 0;
      state.character.pendingBridgeTrial = false;
      state.character.htQiDeviation = false;
      state.character.htQuestCompletedToday = {};
      recomputeLifeScore();
    } else if(type === 'exp'){
      // Hanya reset bar EXP aktif — Level & Realm tidak berubah
      state.character.exp = 0;
    } else if(type === 'quest'){
      // Reset SEMUA quest ke pending (termasuk yang sudah done)
      state.quests.forEach(q => {
        q.status = 'pending';
        q.completionsToday = 0;
        q.lastCompletedDate = '';
      });
    } else if(type === 'uang'){
      state.financeLog = [];
      state.character.lifetimeIncome = 0;
      state.targets = DEFAULT_STATE().targets;
      state.completedTargets = [];
    }
    save(); render();
    document.getElementById('settings-slot').innerHTML = renderSettingsModal();
    openModal('modal-settings');
    showToast('Reset berhasil!', 'ach');
  });
}
function exportData(){ const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'mysistem-'+todayStr()+'.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); }
function importData(ev){ const file = ev.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = ()=>{ try{ const parsed = JSON.parse(reader.result); state = migrateState(deepMerge(DEFAULT_STATE(), parsed)); if(state.meta && state.meta.startDate){ const _impGap = state.meta.lastActiveDate ? diffDays(state.meta.lastActiveDate, todayStr()) : 999; if(_impGap <= 1){ const _correctStreak = diffDays(state.meta.startDate, todayStr()) + 1; state.character.streak = Math.max(state.character.streak||0, _correctStreak); state.character.longestStreak = Math.max(state.character.longestStreak||0, state.character.streak); } else { state.character.streak = 0; } const _itod=todayStr(); ensureCharHistory(state); if(state.character.streak>0 && !state.charHistory.streak.some(s=>s.ts===_itod)) state.charHistory.streak.push({ts:_itod, val:state.character.streak}); if(!state.charHistory.realm||!state.charHistory.realm.length){ const _ir=(state.realms||[])[state.character.realmIndex||0]; if(_ir) state.charHistory.realm.push({ts:_itod, val:_ir.nameID}); } state.meta.activityLog=state.meta.activityLog||{}; if(!state.meta.activityLog[_itod]) state.meta.activityLog[_itod]=1; state.meta.lastActiveDate=_itod; } rollover(); recomputeLifeScore(); render(); save(); showToast('Data berhasil diimpor','ach'); }catch(e){ showToast('Gagal impor: file tidak valid','bad'); } }; reader.readAsText(file); ev.target.value=''; }
function confirmResetData(){ openConfirm('Reset SEMUA progres? Karakter kembali ke Level 1.', ()=>{ state = DEFAULT_STATE(); localStorage.removeItem(STORAGE_KEY); rollover(); render(); save(); closeModal('modal-settings'); }); }

function spawnSedekahRewardFX(x, y, expGained, nominal){
  const flash = document.createElement('div');
  flash.className = 'sedekah-flash';
  flash.style.left = x + 'px'; flash.style.top = y + 'px';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 550);

  const aura = document.createElement('div');
  aura.className = 'sedekah-blessing-aura';
  aura.style.left = x + 'px'; aura.style.top = y + 'px';
  document.body.appendChild(aura);
  setTimeout(() => aura.remove(), 900);

  const particleCount = 10;
  for(let i = 0; i < particleCount; i++){
    const p = document.createElement('div');
    p.className = 'sedekah-particle';
    const angle = (Math.PI * 2 * i / particleCount) + (Math.random() * 0.4);
    const dist = 34 + Math.random() * 38;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist - 24).toFixed(1) + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }

  const virtueLabel = '+' + (Number.isFinite(expGained) && expGained > 0 ? expGained : '') + ' Virtue';
  const meritLabel = '+' + (Number.isFinite(nominal) && nominal > 0 ? Math.max(1, Math.floor(nominal / 1000)) : '') + ' Merit';
  [meritLabel, virtueLabel].forEach((label, i) => {
    const t = document.createElement('div');
    t.className = 'sedekah-float-text';
    t.textContent = label;
    t.style.left = (x + (i === 0 ? -18 : 18)) + 'px';
    t.style.top = (y - 6) + 'px';
    t.style.animationDelay = (i * 0.14) + 's';
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1000);
  });

  ['Blessing Received', 'Heaven Acknowledged'].forEach((label, i) => {
    const s = document.createElement('div');
    s.className = 'sedekah-sub-text';
    s.textContent = label;
    s.style.left = x + 'px'; s.style.top = (y + 22 + i * 16) + 'px';
    s.style.animationDelay = (0.32 + i * 0.22) + 's';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  });

  SFX.sedekahBlessing();
}

// JADWAL MINGGUAN PER HARI
// ═══════════════════════════════════
const _WD_DAYS = ['senin','selasa','rabu','kamis','jumat','sabtu','minggu'];
const _WD_LABEL = {senin:'Senin',selasa:'Selasa',rabu:'Rabu',kamis:'Kamis',jumat:'Jumat',sabtu:'Sabtu',minggu:'Minggu'};

function getTodayDayName(){ return _WD_DAYS[([0,1,2,3,4,5,6].map(i=>_WD_DAYS[[6,0,1,2,3,4,5][i]]))[new Date().getDay()]&&0] || _WD_DAYS[[6,0,1,2,3,4,5][new Date().getDay()]]; }

// Mengembalikan objek {tasks, lastReset} untuk template aktif + hari tertentu
function _wdGetDay(day){
  const tpl = _wdActiveTemplate || 'pagi';
  if(!state.weeklyDaySchedule[tpl]) state.weeklyDaySchedule[tpl] = {};
  if(!state.weeklyDaySchedule[tpl][day]) state.weeklyDaySchedule[tpl][day] = {tasks:[], lastReset:''};
  return state.weeklyDaySchedule[tpl][day];
}
function setWdTemplate(tpl){ _wdActiveTemplate = tpl; _wdExpanded = ''; render(); }

function autoResetWeeklySchedule(){
  if(!state.weeklyDaySchedule) return;
  const today = todayStr();
  const dayName = _WD_DAYS[[6,0,1,2,3,4,5][new Date().getDay()]];
  // Reset centang hari ini di semua template jika belum di-reset hari ini
  ['pagi','siang','custom'].forEach(tpl => {
    const day = state.weeklyDaySchedule[tpl]?.[dayName];
    if(day && day.lastReset !== today){
      day.tasks.forEach(t=>{ t.done=false; t.failed=false; });
      day.lastReset = today;
    }
  });
  save();
}

function addDayTask(dayName){
  const timeEl = document.getElementById('wt-time-'+dayName);
  const labelEl = document.getElementById('wt-label-'+dayName);
  if(!labelEl) return;
  const label = labelEl.value.trim(); if(!label){ showToast('Isi nama kegiatan dulu.','bad'); return; }
  const time = timeEl ? timeEl.value.trim() : '';
  _wdGetDay(dayName).tasks.push({id:uid('wt'), time, label, done:false, failed:false});
  save(); render();
}

function deleteDayTask(dayName, taskId){
  const d = _wdGetDay(dayName);
  d.tasks = d.tasks.filter(t=>t.id!==taskId);
  save(); render();
}

function updateDayTask(dayName, taskId, field, value){
  const t = _wdGetDay(dayName).tasks.find(x=>x.id===taskId);
  if(t) t[field] = value;
  save();
}

function checkDayTask(dayName, taskId){
  const t = _wdGetDay(dayName).tasks.find(x=>x.id===taskId); if(!t) return;
  if(t.done || t.failed) return;
  t.done = true;
  save(); render();
}

function failDayTask(dayName, taskId){
  const t = _wdGetDay(dayName).tasks.find(x=>x.id===taskId); if(!t) return;
  if(t.done || t.failed) return; // terkunci setelah dipilih
  t.failed = true;
  if(true){
    // BUGFIX: dulu HP langsung -15 tanpa cek Mana sama sekali. Sekarang disamakan dengan
    // quest biasa: Mana diserap dulu (kalau masih ada), HP cuma kena -3. Kalau Mana sudah
    // habis, HP kena penalti penuh -15 (sama seperti perilaku lama, dipertahankan sebagai fallback).
    if(typeof state.character.mana !== 'number') state.character.mana = 200;
    const prevMana = state.character.mana;
    const prev = state.character.hp;
    let hpLoss;
    if(state.character.mana > 0){
      state.character.mana = Math.max(0, state.character.mana - 25);
      logManaChange(state.character.mana - prevMana, 'Gagal jadwal: ' + t.label);
      hpLoss = 3;
    } else {
      hpLoss = 15;
    }
    state.character.hp = Math.max(0, state.character.hp - hpLoss);
    logHpChange(state.character.hp - prev, 'Gagal jadwal: ' + t.label);
    showToast(prevMana > 0
      ? `🛡️ Tameng Mana menyerap! Mana −25, HP −${hpLoss} karena gagal!`
      : `❤️ HP −${hpLoss} karena gagal (Mana habis)!`, 'bad');
  }
  save(); render();
}

function resetDaySchedule(dayName){
  openConfirm(`Reset centang hari ${_WD_LABEL[dayName]}?`, ()=>{
    const d = _wdGetDay(dayName);
    d.tasks.forEach(t=>{ t.done=false; t.failed=false; });
    d.lastReset = todayStr();
    save(); render();
  });
}

// Samakan jadwal: salin daftar kegiatan (jam+nama) dari satu hari ke semua hari lain.
// Centang (done/failed) TIDAK ikut disalin — setiap hari mulai dari status kosong/belum dicentang.
function copyDayScheduleToAll(dayName){
  const srcTasks = _wdGetDay(dayName).tasks;
  if(!srcTasks.length){ showToast('Isi dulu jadwal hari ini sebelum disamakan.', 'bad'); return; }
  openConfirm(`Samakan jadwal semua hari dengan jadwal ${_WD_LABEL[dayName]}? Jadwal hari lain akan ditimpa (centang tidak ikut disalin).`, ()=>{
    _WD_DAYS.forEach(d=>{
      if(d===dayName) return;
      _wdGetDay(d).tasks = srcTasks.map(t=>({ id: uid('wt'), time: t.time, label: t.label, done:false, failed:false }));
    });
    save(); render();
    showToast(`Jadwal ${_WD_LABEL[dayName]} berhasil disalin ke semua hari.`, 'good');
  });
}

let _wdActiveTemplate = 'pagi'; // template aktif: 'pagi' | 'siang' | 'custom'
let _wdExpanded = '';
let _wdEditing  = ''; // 'dayName:taskId'
function toggleWdDay(day){ _wdExpanded = (_wdExpanded===day) ? '' : day; _wdEditing=''; render(); }
function startEditDayTask(dayName,taskId){ _wdEditing = dayName+':'+taskId; render(); }

function saveEditDayTask(dayName,taskId){
  const t = document.getElementById('wt-edit-time-'+taskId);
  const l = document.getElementById('wt-edit-label-'+taskId);

  updateDayTask(dayName,taskId,'time', t?t.value.trim():'');

}

const _SVG_EDIT  = `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const _SVG_TRASH = `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>`;

function _wdTaskRow(day, t, forHome){
  const isEditing = !forHome && _wdEditing === day+':'+t.id;
  const timeBadge = t.time
    ? `<span style="font-size:10px;font-weight:800;color:rgba(200,168,75,0.85);margin-right:5px;font-family:var(--font-system);flex-shrink:0;">${escapeHtml(t.time)}</span>`
    : '';
  const rowBg   = t.done  ? 'rgba(52,211,153,0.04)'  : t.failed ? 'rgba(239,68,68,0.06)' : 'rgba(255,255,255,0.04)';
  const rowBdr  = t.done  ? 'rgba(52,211,153,0.18)'  : t.failed ? 'rgba(239,68,68,0.22)' : 'rgba(255,255,255,0.07)';
  const labelColor = t.done ? 'rgba(255,255,255,0.35)' : t.failed ? 'rgba(239,68,68,0.8)' : 'var(--bone)';
  const labelDeco  = t.done ? 'line-through' : 'none';

  if(isEditing){
    return `<div style="background:rgba(255,255,255,0.06);border:1px solid rgba(200,168,75,0.3);border-radius:10px;padding:9px 10px;">
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <input id="wt-edit-time-${t.id}" type="text" value="${escapeAttr(t.time||'')}" placeholder="Jam" class="input" style="width:80px;font-size:12px;flex-shrink:0;">
        <input id="wt-edit-label-${t.id}" type="text" value="${escapeAttr(t.label)}" placeholder="Nama kegiatan" class="input" style="flex:1;font-size:12px;" onkeydown="if(event.key==='Enter')saveEditDayTask('${day}','${t.id}')">
      </div>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-primary btn-sm" onclick="saveEditDayTask('${day}','${t.id}')">Simpan</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelEditDayTask()">Batal</button>
      </div>
    </div>`;
  }

  const _locked = t.done || t.failed;
  const checkBtn = _locked
    ? `<button class="btn btn-sm ${t.done?'btn-primary':'btn-secondary'}" disabled style="${t.done?'background:rgba(52,211,153,0.25);border-color:rgba(52,211,153,0.5);color:#34d399;':'opacity:0.25;'}font-size:11px;padding:0 9px;height:30px;white-space:nowrap;cursor:default;">✓ Selesai</button>`
    : `<button class="btn btn-sm btn-secondary" onclick="checkDayTask('${day}','${t.id}')" style="font-size:11px;padding:0 9px;height:30px;white-space:nowrap;">✓ Selesai</button>`;
  const failBtn = _locked
    ? `<button class="btn btn-sm ${t.failed?'btn-danger':'btn-secondary'}" disabled style="${t.failed?'background:rgba(239,68,68,0.2);border-color:rgba(239,68,68,0.5);color:#ef4444;':'opacity:0.25;'}font-size:11px;padding:0 9px;height:30px;cursor:default;">✕ Gagal</button>`
    : `<button class="btn btn-sm btn-secondary" onclick="failDayTask('${day}','${t.id}')" style="font-size:11px;padding:0 9px;height:30px;">✕ Gagal</button>`;
  const editBtn  = forHome ? '' : `<button class="icon-btn" onclick="startEditDayTask('${day}','${t.id}')" title="Edit">${_SVG_EDIT}</button>`;
  const delBtn   = forHome ? '' : `<button class="icon-btn" onclick="deleteDayTask('${day}','${t.id}')" title="Hapus">${_SVG_TRASH}</button>`;

  return `<div style="background:${rowBg};border:1px solid ${rowBdr};border-radius:10px;padding:9px 10px;${t.done?'opacity:0.6;':''}">
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:7px;min-width:0;">
      ${timeBadge}
      <span style="font-size:12.5px;color:${labelColor};text-decoration:${labelDeco};flex:1;min-width:0;">${escapeHtml(t.label)}</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
      ${checkBtn}${failBtn}${editBtn}${delBtn}
    </div>
  </div>`;
}

let _wdHomeDay = ''; // hari yang sedang dibuka di Home (default = hari ini)
function toggleWdHomeDay(day){
  const todayDay = _WD_DAYS[[6,0,1,2,3,4,5][new Date().getDay()]];
  _wdHomeDay = (_wdHomeDay===day && day!==todayDay) ? todayDay : day;
  render();
}

function renderTodayScheduleCard(){
  if(!state.settings?.showDailySchedule) return '';
  autoResetWeeklySchedule();
  const todayDay = _WD_DAYS[[6,0,1,2,3,4,5][new Date().getDay()]];
  if(!_wdHomeDay) _wdHomeDay = todayDay;
  const activeDay = _wdHomeDay;

  /* ── Roster header ── */
  const rosterCols = _WD_DAYS.map(day=>{
    const tasks     = _wdGetDay(day).tasks;
    const isToday   = day === todayDay;
    const isActive  = day === activeDay;
    const hasFailed = tasks.some(t=>t.failed);
    const done  = tasks.filter(t=>t.done).length;
    const count = tasks.length;
    const borderCol = isActive  ? 'rgba(200,168,75,0.7)'
                    : isToday   ? 'rgba(200,168,75,0.4)'
                    : 'rgba(255,255,255,0.09)';
    const bgCol     = isActive  ? 'rgba(200,168,75,0.1)'
                    : isToday   ? 'rgba(200,168,75,0.05)'
                    : 'rgba(255,255,255,0.03)';
    const nameCol   = (isActive||isToday) ? 'rgba(200,168,75,1)' : 'rgba(255,255,255,0.6)';
    const short = day.substring(0,3).toUpperCase();
    return `<button onclick="toggleWdHomeDay('${day}')" style="flex:1;min-width:0;background:${bgCol};border:1px solid ${borderCol};border-radius:10px;padding:9px 4px 8px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all 0.2s;">
      ${hasFailed?`<span style="position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:#ef4444;box-shadow:0 0 4px #ef4444;"></span>`:''}
      ${isToday?`<span style="font-size:7px;font-weight:900;color:rgba(200,168,75,1);letter-spacing:0.5px;line-height:1;">★</span>`:`<span style="font-size:7px;opacity:0;">&nbsp;</span>`}
      <span style="font-family:var(--font-display);font-weight:900;font-size:12px;color:${nameCol};line-height:1;">${short}</span>
      <span style="font-family:var(--font-system);font-size:${count>0?'13':'11'}px;font-weight:800;color:${count>0?(isActive||isToday?'rgba(200,168,75,0.9)':'rgba(255,255,255,0.5)'):'rgba(255,255,255,0.2)'};line-height:1;">${count>0?`${done}/${count}`:'–'}</span>
    </button>`;
  }).join('');

  /* ── Panel hari aktif ── */
  const label   = _WD_LABEL[activeDay];
  const isToday = activeDay === todayDay;
  const tasks   = _wdGetDay(activeDay).tasks;
  const done    = tasks.filter(t=>t.done).length;
  const failed  = tasks.filter(t=>t.failed).length;
  const pct     = tasks.length ? Math.round((done/tasks.length)*100) : 0;

  const taskHTML = tasks.length
    ? tasks.map(t=>_wdTaskRow(activeDay,t,true)).join('')
    : `<div style="text-align:center;padding:14px 0;font-size:12px;color:rgba(255,255,255,0.3);font-style:italic;">Belum ada jadwal hari ${label}.</div>`;

  const panel = `<div style="margin-top:10px;background:rgba(255,255,255,0.03);border:1px solid ${isToday?'rgba(200,168,75,0.35)':'rgba(255,255,255,0.08)'};border-radius:12px;overflow:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.06);">
      <div style="display:flex;align-items:center;gap:8px;">
        ${isToday?`<span style="font-size:8px;font-weight:900;letter-spacing:0.8px;background:rgba(200,168,75,0.15);color:rgba(200,168,75,1);border:1px solid rgba(200,168,75,0.35);border-radius:4px;padding:2px 7px;">HARI INI</span>`:''}
        <span style="font-family:var(--font-display);font-weight:900;font-size:14px;color:rgba(200,168,75,0.95);">${label}</span>
        ${tasks.length?`<span style="font-size:11px;color:rgba(255,255,255,0.35);">${done}/${tasks.length} selesai${failed>0?` · <span style="color:rgba(239,68,68,0.7);">${failed} gagal</span>`:''}</span>`:''}
      </div>
      <div style="font-family:var(--font-system);font-size:16px;font-weight:900;color:rgba(200,168,75,0.85);">${pct}%</div>
    </div>
    ${tasks.length?`<div style="padding:4px 12px;"><div style="background:rgba(255,255,255,0.07);border-radius:99px;height:3px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,rgba(200,168,75,0.7),rgba(200,168,75,1));border-radius:99px;transition:width 0.4s;"></div></div></div>`:''}
    <div style="padding:10px 12px;display:flex;flex-direction:column;gap:7px;">
      ${taskHTML}
    </div>
    <div style="padding:0 12px 12px;">
      <button class="btn btn-ghost btn-sm btn-block" onclick="setTab('profile')" style="font-size:11px;border-color:rgba(255,255,255,0.08);color:rgba(255,255,255,0.35);">📅 Edit Jadwal di Profil →</button>
    </div>

  return `<div class="card" style="padding:14px 16px;border-color:rgba(200,168,75,0.2);">
    <div class="section-title" style="margin-bottom:12px;">📋 Jadwal Mingguan</div>
    <div style="display:flex;gap:5px;">${rosterCols}</div>
    ${panel}

let _qDragId = null, _qDragAllowed = false;
function qHandleDown(){ _qDragAllowed = true; }
function qDragStart(id, e){
  if(!_qDragAllowed){ e.preventDefault(); return; }
  _qDragAllowed = false;
  _qDragId = id; e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{ const el=document.querySelector('[data-qid="'+id+'"]'); if(el) el.style.opacity='0.4'; },0);
}
function qDragEnd(e){
  _qDragId = null;
  document.querySelectorAll('.quest-card').forEach(c=>{ c.style.opacity=''; c.classList.remove('quest-drag-over'); });
}
function qDragOver(id, e){
  if(!_qDragId || _qDragId===id) return;
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.quest-card').forEach(c=>c.classList.remove('quest-drag-over'));
  const el=document.querySelector('[data-qid="'+id+'"]'); if(el) el.classList.add('quest-drag-over');
}
function qDrop(id, e){
  e.preventDefault();
  if(!_qDragId || _qDragId===id) return;
  const allIds = state.quests.filter(q=>q.type!=='heaven_trampling').map(q=>q.id);
  const qo = (state.meta.questOrder||[]).filter(i=>allIds.includes(i));
  allIds.forEach(i=>{ if(!qo.includes(i)) qo.push(i); });
  const fi=qo.indexOf(_qDragId), ti=qo.indexOf(id);
  if(fi===-1||ti===-1) return;
  qo.splice(fi,1); qo.splice(ti,0,_qDragId);
  state.meta.questOrder=qo; save(); render();
}

let _dragCardId = null;
function kDragStart(e, id) {
    _dragCardId = id;
    try { e.dataTransfer.setData('text/plain', id); } catch(_) {}
    setTimeout(() => { const el = document.querySelector(`[data-drag-id="${id}"]`); if(el) el.style.opacity='0.4'; }, 0);
}
function kDragEnd(e) {
    e.target.style.opacity = '1';
    _dragCardId = null;
    document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
}
function kDragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
}
function kDragLeave(e) {
    if(!e.currentTarget.contains(e.relatedTarget)) {
        e.currentTarget.classList.remove('drag-over');
    }
}
function kDrop(e, colId) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    let cardId;
    try { cardId = e.dataTransfer.getData('text/plain'); } catch(_) {}
    if(!cardId) cardId = _dragCardId;
    if(!cardId) return;
    const card = (state.kanban.cards||[]).find(c => c.id === cardId);
    if(!card || card.col === colId) return;
    const prevCol = card.col;
    card.col = colId;
    if(colId === 'selesai' && card.progress < 100) {
        card.progress = 100;
        card.completedAt = todayStr();
        const deadlineDays = getProjectDeadlineDays(card);
        const expGain = getProjectExpReward(deadlineDays);
        gainExp(expGain);
        showToast(`"${escapeHtml(card.title)}" Selesai! +${expGain} EXP`, 'ach');
        SFX.levelUp(); checkAchievements();
    } else {
        SFX.click();
    }
    render(); save();
}

    document.getElementById('km-id').value = '';
    document.getElementById('km-col').value = colId || 'mau_dipelajari';

    document.getElementById('km-dateStart').value = todayStr();

}
function openEditCard(id) {
    const c = (state.kanban.cards||[]).find(x => x.id === id);
    if(!c) return;
    document.getElementById('modal-card-title').textContent = 'Edit Materi / Projek';
    document.getElementById('km-id').value = c.id;
    document.getElementById('km-col').value = c.col;
    document.getElementById('km-title').value = c.title || '';
    document.getElementById('km-type').value = c.type || 'Buku';
    document.getElementById('km-dateStart').value = c.dateStart || '';
    document.getElementById('km-dateTarget').value = c.dateTarget || '';
    document.getElementById('km-progress').value = c.progress || 0;
    document.getElementById('card-prog-val').textContent = c.progress || 0;
    document.getElementById('card-modal-col').value = c.col;
    document.getElementById('km-notes').value = c.notes || '';
    openModal('modal-kanban-edit');
}
function submitCardModal() {
    const title = document.getElementById('km-title').value.trim();
    if(!title) { document.getElementById('km-title').focus(); SFX.error(); return; }
    const id = document.getElementById('km-id').value;
    const col = document.getElementById('card-modal-col').value;
    const type = document.getElementById('km-type').value;
    const dateStart = document.getElementById('km-dateStart').value;
    const dateTarget = document.getElementById('km-dateTarget').value;
    const progress = parseInt(document.getElementById('km-progress').value, 10) || 0;
    const notes = document.getElementById('km-notes').value.trim();
    if(id) {
        const c = (state.kanban.cards||[]).find(x => x.id === id);
        if(c) {
            const wasCompleted = c.progress === 100 || c.col === 'selesai';
            c.title=title; c.col=col; c.type=type; c.dateStart=dateStart; c.dateTarget=dateTarget; c.progress=progress; c.notes=notes;
            if(!wasCompleted && (c.progress === 100 || c.col === 'selesai')) {
                c.progress = 100; c.col = 'selesai';
                const expGain = getProjectExpReward(projectDurationDays(c));
                gainExp(expGain);

function init(){
  // Load dari localStorage dulu — app langsung siap, tidak nunggu Firebase.
  let loaded = loadState();
  state = loaded ? migrateState(deepMerge(DEFAULT_STATE(), loaded)) : DEFAULT_STATE();
  rollover();
  // sweepHistoryArchive dipanggil terpisah dari rollover agar berjalan setiap kali app dibuka,
  // bukan hanya saat pergantian hari — menangkap overflow aktif array dalam sesi yang sama.
  sweepHistoryArchive(state);
  recomputeLifeScore(); recordMomentumHistory(); buildModals(); spiritCompanionGreet(); render();
  showWelcomeToast();

  // Firebase sync di background — kalau cloud lebih baru, refresh UI otomatis.
  firebaseResolveOnLoad(loaded).then(cloud => {
    if(!cloud) return;
    const localTs  = (loaded && loaded.meta && loaded.meta.updatedAt) || 0;
    const cloudTs  = (cloud.meta && cloud.meta.updatedAt) || 0;
    if(cloudTs !== localTs){
      // Dulu: kalau cloud lebih baru, seluruh state lokal ditimpa total (last-write-wins per
      // dokumen) — entri yang baru ditambah di device lain sebelum cloud sempat lebih baru,
      // atau di device ini sebelum sempat ke-push, bisa hilang. Sekarang: gabungkan kedua sisi —
      // field skalar (character/meta/stats) ikut versi yang timestamp-nya lebih baru secara utuh
      // (supaya HP/EXP/level tidak campur dari 2 sumber), tapi koleksi entri (quest, transaksi,
      // goal, habit, kanban, sedekah, target) di-union per-id supaya tidak ada yang terbuang.
      // `cloud` dan `loaded` selalu dua objek berbeda di sini (lihat catatan di
      // firebaseResolveOnLoad), jadi cabang manapun yang dipakai tetap benar-benar menggabungkan
      // kedua sisi, bukan menggabungkan satu sisi dengan dirinya sendiri.
      const merged = cloudTs > localTs ? mergeRemoteState(cloud, loaded) : mergeRemoteState(loaded, cloud);
      // Rollover lokal sudah jalan di atas untuk hari ini — bawa penanda "sudah di-rollover"
      // itu ke state hasil merge sebelum di-apply, supaya rollover() kedua tidak menghitung ulang
      // penalti hari-berganti (HP/EXP/streak) yang sudah diterapkan sekali barusan.
      const _rolledDate = state.meta.lastActiveDate;
      const _rolledWeekKey = state.meta.lastWeekKey;
      const _rolledMonthKey = state.meta.lastMonthKey;
      // Simpan streak yg sudah dihitung rollover lokal — jangan sampai ditimpa cloud
      const _rolledStreak = state.character.streak || 0;
      const _rolledLongest = state.character.longestStreak || 0;
      state = migrateState(deepMerge(DEFAULT_STATE(), merged));
      if(_rolledDate === todayStr()){
        state.meta.lastActiveDate = _rolledDate;
        state.meta.lastWeekKey = _rolledWeekKey;
        state.meta.lastMonthKey = _rolledMonthKey;
        // Pastikan streak lokal (sudah di-rollover) tidak ditimpa data cloud yang lebih lama
        if(_rolledStreak > (state.character.streak || 0)){
          state.character.streak = _rolledStreak;
          state.character.longestStreak = Math.max(state.character.longestStreak || 0, _rolledLongest);
        }
      }
      rollover(); recomputeLifeScore(); recordMomentumHistory(); render();
      if(cloudTs > localTs) showToast('☁️ Data tersinkron dari cloud!', 'good');
      save();
    }
    // Mulai real-time listener setelah load awal selesai
    firebaseStartRealTimeSync();
  }).catch(()=>{ firebaseStartRealTimeSync(); }); // tetap mulai listener meski pull gagal

  // Auto-refresh interval (Midnight reset trigger + periodic sweep)
  setInterval(() => {
      updateTimeBlockUI();
      if(state.meta.lastActiveDate !== todayStr()) {
          rollover();
          recordMomentumHistory();
          render();
          save();
      } else {
          // Jalankan sweep setiap interval meski bukan pergantian hari —
          // menangkap overflow array aktif (>100 entri) yang terjadi dalam satu sesi panjang.
          sweepHistoryArchive(state);
      }
  }, 30000);
}
window.onload = function() { init(); };

// Move a section from its native tab to another tab (cross-tab move)
function moveSectionToTab(fromTab, id, toTab) {
  _ensureSecCfg(fromTab, id);
  const prevMovedTo = state.sectionConfig[fromTab][id].movedTo;
  if (!toTab) {
    // Restore: bersihkan slot tamu di tab tujuan sebelumnya
    if (prevMovedTo && state.sectionConfig[prevMovedTo]) {
      delete state.sectionConfig[prevMovedTo][id];
    }
    delete state.sectionConfig[fromTab][id].movedTo;
    state.sectionConfig[fromTab][id].visible = true;
  } else {
    // Pindah: bersihkan slot lama jika ganti tujuan
    if (prevMovedTo && prevMovedTo !== toTab && state.sectionConfig[prevMovedTo]) {
      delete state.sectionConfig[prevMovedTo][id];
    }
    state.sectionConfig[fromTab][id].movedTo = toTab;
    state.sectionConfig[fromTab][id].visible = false;
    // Inisialisasi slot order tamu di tab tujuan
    _ensureSecCfg(toTab, id);
    if (state.sectionConfig[toTab][id].order === undefined) {
      const maxOrd = Math.max(-1, ...Object.values(state.sectionConfig[toTab]).map(c => (c && c.order !== undefined) ? c.order : -1));
      state.sectionConfig[toTab][id].order = maxOrd + 1;
    }
  }
  save(); render(); _refreshSecMgr();
}

// Atur urutan unified (native + tamu) dalam satu tab
function moveUnifiedOrder(tab, id, dir) {
  if (!state.sectionConfig) state.sectionConfig = {};
  if (!state.sectionConfig[tab]) state.sectionConfig[tab] = {};
  const defs = SECTION_DEFS[tab] || [];
  // Kumpulkan semua ID aktif di tab ini (native yg belum dipindah + tamu yg dipindah ke sini)
  const activeIds = defs.filter(d => {
    const c = (state.sectionConfig[tab] || {})[d.id] || {};
    return !c.movedTo;
  }).map(d => d.id);
  Object.entries(SECTION_DEFS).forEach(([ft, fdefs]) => {
    if (ft === tab) return;
    fdefs.forEach(def => {
      const c = ((state.sectionConfig || {})[ft] || {})[def.id] || {};
      if (c.movedTo === tab) activeIds.push(def.id);
    });
  });
  // Pastikan semua punya order di sectionConfig[tab]
  activeIds.forEach((eid, i) => {
    if (!state.sectionConfig[tab][eid]) state.sectionConfig[tab][eid] = {};
    if (state.sectionConfig[tab][eid].order === undefined) state.sectionConfig[tab][eid].order = i * 10;
  });
  // Urutkan
  activeIds.sort((a, b) => state.sectionConfig[tab][a].order - state.sectionConfig[tab][b].order);
  const idx = activeIds.indexOf(id);
  const swapIdx = idx + dir;
  if (idx === -1 || swapIdx < 0 || swapIdx >= activeIds.length) return;
  const tmp = state.sectionConfig[tab][activeIds[idx]].order;
  state.sectionConfig[tab][activeIds[idx]].order = state.sectionConfig[tab][activeIds[swapIdx]].order;
  state.sectionConfig[tab][activeIds[swapIdx]].order = tmp;
  save();
  if (state.ui.tab === tab) render();
  _refreshSecMgr();
}

let _secMgrDragId = null;

function secMgrDragStart(tab, id, event) {
  _secMgrDragId = { tab: tab, id: id };
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', id);
  var el = event.currentTarget;
  setTimeout(function(){ el.style.opacity = '0.45'; }, 0);
}

function secMgrDragEnd(event) {
  event.currentTarget.style.opacity = '';
  event.currentTarget.style.background = '';
}

function secMgrDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  event.currentTarget.style.background = 'rgba(55,214,196,0.08)';
  event.currentTarget.style.borderTop = '2px solid var(--cyan)';
}

function secMgrDragLeave(event) {
  event.currentTarget.style.background = '';
  event.currentTarget.style.borderTop = '';
}

function secMgrDrop(tab, targetId, event) {
  event.preventDefault();
  event.currentTarget.style.background = '';
  event.currentTarget.style.borderTop = '';
  if (!_secMgrDragId || _secMgrDragId.tab !== tab || _secMgrDragId.id === targetId) {
    _secMgrDragId = null; return;
  }
  const dragId = _secMgrDragId.id;
  _secMgrDragId = null;
  const defs = SECTION_DEFS[tab]; if (!defs) return;
  // Ensure all sections have an order
  defs.forEach(function(def, i) {
    _ensureSecCfg(tab, def.id);
    if (state.sectionConfig[tab][def.id].order === undefined) {
      state.sectionConfig[tab][def.id].order = i;
    }
  });
  function getSorted() {
    return defs.slice().sort(function(a, b) {
      return state.sectionConfig[tab][a.id].order - state.sectionConfig[tab][b.id].order;
    });
  }
  var sorted = getSorted();
  var fromIdx = sorted.findIndex(function(d){ return d.id === dragId; });
  var toIdx   = sorted.findIndex(function(d){ return d.id === targetId; });
  if (fromIdx === -1 || toIdx === -1) return;
  var dir = fromIdx < toIdx ? 1 : -1;
  var steps = Math.abs(fromIdx - toIdx);
  for (var i = 0; i < steps; i++) {
    sorted = getSorted();
    var cur = sorted.findIndex(function(d){ return d.id === dragId; });
    if (cur === -1) break;
    var swap = cur + dir;
    if (swap < 0 || swap >= sorted.length) break;
    var ordA = state.sectionConfig[tab][sorted[cur].id].order;
    var ordB = state.sectionConfig[tab][sorted[swap].id].order;
    state.sectionConfig[tab][sorted[cur].id].order = ordB;
    state.sectionConfig[tab][sorted[swap].id].order = ordA;
  }
  save();
  if (state.ui.tab === tab) render();
  _refreshSecMgr();
}

// MOMENTUM SYSTEM — Character Tab
// Momentum dihitung dari: streak, quest, habit, goal, finansial
// Tidak mempengaruhi data utama. Hanya representasi laju berkembang.
// ═══════════════════════════════════════════════════════════════

const MOMENTUM_TIERS = [
  { level:0, name:'Dormant',            color:'#615F78', colorStart:'#3a3848', glow:'rgba(97,95,120,0.3)',  range:[0,15]  },
  { level:1, name:'Awakening',          color:'#A48BFF', colorStart:'#7C5CFF', glow:'rgba(124,92,255,0.4)', range:[16,30] },
  { level:2, name:'Flow State',         color:'#2DD4F4', colorStart:'#0ea5e9', glow:'rgba(45,212,244,0.4)', range:[31,50] },
  { level:3, name:'Focused',            color:'#34D399', colorStart:'#059669', glow:'rgba(52,211,153,0.4)', range:[51,65] },
  { level:4, name:'Unstoppable',        color:'#F0B93B', colorStart:'#f59e0b', glow:'rgba(240,185,59,0.5)', range:[66,80] },
  { level:5, name:'Legendary Momentum', color:'#FF4768', colorStart:'#FF8A3D', glow:'rgba(255,71,104,0.6)', range:[81,100]},
];

function getMomentumTier(pts) {
  for(let i = MOMENTUM_TIERS.length - 1; i >= 0; i--) {
    if(pts >= MOMENTUM_TIERS[i].range[0]) return MOMENTUM_TIERS[i];
  }
  return MOMENTUM_TIERS[0];
}

function calcMomentumPoints() {
  if(!state) return 0;
  const c = state.character;
  const today = todayStr();
  let pts = 0;

  // — Streak harian (max 30 pts) —
  const streak = c.streak || 0;
  if (streak >= 30) pts += 30;
  else if (streak >= 14) pts += 22;
  else if (streak >= 7)  pts += 15;
  else if (streak >= 3)  pts += 10;
  else if (streak >= 1)  pts += 5;

  // — Penyelesaian quest hari ini via activityLog (max 20 pts) —
  const todayAct = (state.meta.activityLog || {})[today] || 0;
  pts += Math.min(20, todayAct * 4);

  // — Quest total (bonus kumulatif, max 8 pts) —
  const totalQ = c.totalQuests || 0;
  if (totalQ >= 100) pts += 8;
  else if (totalQ >= 50) pts += 5;
  else if (totalQ >= 10) pts += 3;
  else if (totalQ >= 1)  pts += 1;

  // — Konsistensi habit (max 18 pts) —
  const habits = state.habits || [];
  let habitPts = 0;
  habits.forEach(h => { if(h.log && h.log[today]) habitPts += 3; });
  pts += Math.min(18, habitPts);

  // — Goal yang selesai (max 10 pts) —
  const goalsC = c.goalsCompleted || 0;
  if (goalsC >= 10) pts += 10;
  else if (goalsC >= 5) pts += 7;
  else if (goalsC >= 1) pts += 4;

  // — Aktivitas finansial positif (pemasukan 7 hari terakhir, max 8 pts) —
  const week = 7 * 24 * 3600 * 1000;
  const weekAgoStr = new Date(Date.now() - week).toLocaleDateString('en-CA');
  const recentIncome = _getAllFinanceEntries().filter(e => e.type === 'in' && e.date >= weekAgoStr);
  pts += Math.min(8, recentIncome.length * 2);

  // — Decay: jika lama tidak aktif —
  const lastActive = state.meta.lastActiveDate;
  if (lastActive) {
    const inactiveDays = diffDays(lastActive, today);
    if (inactiveDays > 3) {
      const decay = (inactiveDays - 3) * 8;
      pts = Math.max(0, pts - decay);
    }
  }

  return Math.min(100, Math.max(0, Math.round(pts)));
}

function recordMomentumHistory() {
  if(!state) return;
  if(!state.momentum) state.momentum = { history: [], lastRecordedDate: '' };
  const today = todayStr();
  const pts = calcMomentumPoints();
  const tier = getMomentumTier(pts);
  const todayEntry = state.momentum.history[0];
  if(todayEntry && todayEntry.date === today) {
    // Perbarui catatan hari ini secara live, jangan biarkan beku di nilai lama
    todayEntry.pts = pts; todayEntry.level = tier.level; todayEntry.name = tier.name;
    // Sinkron update ke archive — pakai pts/tierName (BUKAN level) agar tidak menimpa
    // character level yang sudah diisi captureLifeMomentumSnapshot di entri tanggal yang sama.
    _riwayatArchiveUpsert('momentum', 'date', { date: today, pts, tierName: tier.name });
  } else {
    // Arsipkan entri yang akan terdorong keluar (> 30) SEBELUM di-trim, supaya tidak hilang.
    if(state.momentum.history.length >= 30) {
      const excess = state.momentum.history.slice(29); // entri ke-30 dst akan tergeser
      excess.forEach(e => {
        _riwayatArchiveUpsert('momentum', 'date', { date: e.date, pts: e.pts, tierName: e.name });
      });
    }
    state.momentum.history.unshift({ date: today, pts, level: tier.level, name: tier.name });
    if(state.momentum.history.length > 30) state.momentum.history = state.momentum.history.slice(0, 30);
    // Arsipkan entri hari baru ke Sejarah Riwayat permanen.
    _riwayatArchiveUpsert('momentum', 'date', { date: today, pts, tierName: tier.name });
  }
  if(state.momentum.lastRecordedDate === today) return;
  state.momentum.lastRecordedDate = today;
  save();
}
