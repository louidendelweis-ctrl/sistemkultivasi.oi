// Mana didapat saat quest/ritual/jurnal/goal berhasil, dan jadi penyerap utama saat quest gagal.
// Selama Mana masih ada, HP cuma berkurang sedikit (maks 3). Begitu Mana habis, HP baru kena signifikan.
const MANA_GAIN_BY_DIFFICULTY       = {easy:10, normal:15, hard:20, epic:25};
const MANA_DRAIN_BY_DIFFICULTY      = {easy:10, normal:15, hard:20, epic:25};
const HP_LOSS_WITH_MANA_BY_DIFFICULTY = {easy:0,  normal:1,  hard:3,  epic:3};
const HP_LOSS_NO_MANA_BY_DIFFICULTY   = {easy:10, normal:18, hard:24, epic:30};
function manaGainForQuest(q){ return MANA_GAIN_BY_DIFFICULTY[q && q.difficulty] ?? MANA_GAIN_BY_DIFFICULTY.normal; }
function manaDrainForQuest(q){ return MANA_DRAIN_BY_DIFFICULTY[q && q.difficulty] ?? MANA_DRAIN_BY_DIFFICULTY.normal; }
function hpLossWithManaForQuest(q){ return HP_LOSS_WITH_MANA_BY_DIFFICULTY[q && q.difficulty] ?? HP_LOSS_WITH_MANA_BY_DIFFICULTY.normal; }
function hpLossNoManaForQuest(q){ return HP_LOSS_NO_MANA_BY_DIFFICULTY[q && q.difficulty] ?? HP_LOSS_NO_MANA_BY_DIFFICULTY.normal; }
// Nambah Mana + catat, dikunci di batas 0..maxMana.
function gainMana(amount, reason){
  if(!state || !state.character || !amount) return;
  if(typeof state.character.mana !== 'number') state.character.mana = 200;
  if(typeof state.character.maxMana !== 'number') state.character.maxMana = 200;
  state.character.mana = Math.max(0, Math.min(state.character.maxMana, state.character.mana + amount));
  logManaChange(amount, reason || 'Mana bertambah');
}
// Cek pemicu peringatan konsekuensi kustom: HP dan Mana dua-duanya benar-benar habis.
function checkConsequenceTrigger(){
  if(!state || !state.character) return;
  if(state.character.hp <= 0 && state.character.mana <= 0){
    state.character.consequencePending = true;
  }
}
function acceptConsequence(){
  if(!state || !state.character) return;
  state.character.consequencePending = false;
  gainMana(10, 'Terima konsekuensi');
  state.character.hp = Math.min(state.character.maxHp, state.character.hp + 20);
  logHpChange(20, 'Terima konsekuensi (jeda & napas)');
  save(); render();
}

// BUGFIX: hpEventLog/manaEventLog dulu dibatasi 100 entri dan entri lama yang kelebihan
// LANGSUNG DIBUANG PERMANEN (slice), beda dengan kategori riwayat lain (Finansial, Jurnal,
// Goal, dll) yang selalu diarsipkan dulu ke state.historyArchive sebelum dibuang dari daftar
// aktif. Helper ini menyamakan perlakuannya: begitu daftar aktif kelebihan 100 entri, sisa
// entri terlama yang belum pernah diarsipkan (belum bertanda _archived) dipindah dulu ke
// state.historyArchive.vitalitas (permanen, tanpa batas), baru dibuang dari daftar aktif.
function _trimVitalitasLog(arr){
  const LIMIT = 100;
  if(!Array.isArray(arr) || arr.length <= LIMIT) return arr;
  ensureHistoryArchive(state);
  const excess = arr.slice(0, arr.length - LIMIT); // arr[0] = terlama (push), jadi excess = yang paling lama
  const stay = arr.slice(arr.length - LIMIT);
  excess.filter(e => !e._archived).forEach(e => {
    e._archived = true;
    state.historyArchive.vitalitas.push({...e});
  });
  return stay;
}

// ═══ Riwayat perubahan HP (biar user bisa lihat kapan & kenapa HP berkurang/bertambah) ═══
function logHpChange(delta, reason){
  if(!state || !delta) return;
  if(!state.hpEventLog) state.hpEventLog = [];
  const entry = {
    ts: Date.now(),
    date: todayStr(),
    delta: Math.round(delta),
    reason: reason || '-',
    hpAfter: state.character ? state.character.hp : null,
    maxHp: state.character ? state.character.maxHp : null,
    _vType: 'hp'
  };
  state.hpEventLog.push(entry);
  // BUGFIX: arsipkan permanen SAAT DIBUAT (realtime), sama seperti Finansial/Goal/dll,
  // supaya riwayat vitalitas tidak pernah benar-benar hilang walau daftar aktif dibatasi 100.
  _riwayatArchivePush('vitalitas', entry);
  // Simpan maksimal 100 entri terakhir di daftar aktif biar data tidak membengkak
  // (sisanya sudah aman tersimpan permanen di state.historyArchive.vitalitas di atas).
  state.hpEventLog = _trimVitalitasLog(state.hpEventLog);
  // BUGFIX: catat juga ke grafik tren HP (charHistory.hp) SETIAP KALI HP berubah — naik ATAUPUN turun.
  // Sebelumnya charHistory.hp cuma diisi manual di completeQuest() (saat HP naik), jadi penurunan HP
  // (gagal quest, quest terlewat, gagal ritual, dll) tidak pernah tercatat di grafik tren — seolah
  // HP cuma naik terus padahal aslinya turun juga. Kalau sudah ada entri untuk hari ini, update
  // nilainya (bukan tambah entri baru) supaya grafik selalu menampilkan nilai HP terbaru hari itu.
  if(state.character){
    ensureCharHistory(state);
    const today = todayStr();
    const last = state.charHistory.hp[state.charHistory.hp.length-1];
    if(last && last.ts === today) last.val = state.character.hp;
    else state.charHistory.hp.push({ts: today, val: state.character.hp});
  }
}

// ═══ Riwayat perubahan Mana (sama seperti hpEventLog, biar user bisa lihat kapan & kenapa Mana berkurang/bertambah) ═══
function logManaChange(delta, reason){
  if(!state || !delta) return;
  if(!state.manaEventLog) state.manaEventLog = [];
  const entry = {
    ts: Date.now(),
    date: todayStr(),
    delta: Math.round(delta),
    reason: reason || '-',
    manaAfter: state.character ? state.character.mana : null,
    maxMana: state.character ? state.character.maxMana : null,
    _vType: 'mana'
  };
  state.manaEventLog.push(entry);
  // BUGFIX: arsipkan permanen SAAT DIBUAT (realtime) — sama seperti logHpChange di atas.
  _riwayatArchivePush('vitalitas', entry);
  // Simpan maksimal 100 entri terakhir di daftar aktif (sisanya aman di historyArchive.vitalitas).
  state.manaEventLog = _trimVitalitasLog(state.manaEventLog);
}

// Level rendah (Lv.1-20): maksimal -100 EXP
// Level menengah (Lv.21-50): maksimal -500 EXP

function getHpZeroExpPenalty(){
  const lvl = state.character.level || 1;
  if(lvl <= 20) return Math.min(100, lvl * 5);
  if(lvl <= 50) return Math.min(500, lvl * 10);
  return Math.min(1000, lvl * 15);
}

// Custom EXP TIDAK terkena skala ini — tetap bebas/tak terbatas sesuai permintaan user.
function getRealmExpScale(realmIndex){
  const idx = Math.max(0, Math.min(realmIndex || 0, MAX_QUEST_EXP_BY_REALM.length - 1));
  return MAX_QUEST_EXP_BY_REALM[idx] / MAX_QUEST_EXP_BY_REALM[0];

function getScaledDifficultyExp(difficulty){
  const cfg = state.settings || DEFAULT_SETTINGS();
  const base = (cfg.difficultyExp && cfg.difficultyExp[difficulty]) || DIFFICULTY_EXP[difficulty] || 25;
  const realmIndex = state && state.character ? state.character.realmIndex : 0;
  return Math.max(1, Math.round(base * getRealmExpScale(realmIndex)));
}

// ═══════════════════════════════════
// SISTEM LEVEL GLOBAL TERPADU
// Qi Condensation: LV 1-15 (tanpa tahap)
// Foundation Establishment s/d Void Tribulant: 15 LV per realm, 3 tahap × 5 LV
//   Tahap Awal = LV 1-5, Tahap Menengah = LV 6-10, Tahap Akhir = LV 11-15 (per realm)
// Urutan global: QC LV 1-15, FE LV 16-30, CF LV 31-45, dst. (15 LV per realm)
// Total max level sebelum Heaven Trampling = 16 realm × 15 LV = 240
// Realm SELALU mengikuti c.level. c.level adalah satu-satunya sumber kebenaran.
// ═══════════════════════════════════
const LEVELS_PER_REALM = 15;
const LEVELS_PER_PHASE = 5;
const MAX_LEVEL = 240; // Level 240 = puncak Void Tribulant, sebelum Heaven Trampling

function getRealmLevelInfo(){
  const c = state.character;
  const lv = Math.max(1, c.level || 1);

  // Heaven Trampling: realm terakhir — bridge dan progress ditentukan dari level utama.
  // LV 241-339 = Normal (Bridge 0), LV 340-439 = Bridge 1, LV 440-539 = Bridge 2, dst. (per 100 LV)
  if(isHeavenTrampling()){
      const bridges = Math.max(0, Math.min(9, Math.floor((lv - 240) / 100)));
      const bridgeStart = 240 + bridges * 100;
      const bridgeFrac = bridges >= 9 ? 1 : Math.min(1, Math.max(0, (lv - bridgeStart) / 100));
      return { level: lv, realmIdx: state.realms.length - 1, phase: null, frac: bridgeFrac, levelsPerRealm: 100, usesLevel: true, displayName: null, globalLv: lv };
  }

  // QC: LV 1-15, tanpa tahap
  if(lv <= 15){
      const frac = Math.min(1, (lv - 1) / 14);
      return { level: lv, realmIdx: 0, phase: null, frac, levelsPerRealm: 15, usesLevel: true, displayName: String(lv), globalLv: lv };
  }

  // Foundation Establishment dan seterusnya: 15 LV per realm, 3 tahap × 5 LV
  const lvAfterQC = lv - 15; // 1-based offset setelah QC
  const realmOffset = Math.min(Math.floor((lvAfterQC - 1) / 15), DEFAULT_REALMS.length - 2); // 0=FE, 1=CF, ...
  const lvInRealm = ((lvAfterQC - 1) % 15) + 1; // 1-15 di dalam realm ini
  const phaseIdx = Math.min(2, Math.floor((lvInRealm - 1) / 5)); // 0=Awal, 1=Menengah, 2=Akhir
  const phases = ['Tahap Awal', 'Tahap Menengah', 'Tahap Akhir'];
  const phase = phases[phaseIdx];
  const frac = Math.min(1, (lvInRealm - 1) / 14);
  const realmIdx = realmOffset + 1;

  return { level: lv, realmIdx, phase, frac, levelsPerRealm: 15, usesLevel: true, displayName: phase, globalLv: lv };
}

// Font khusus nama realm Heaven Trampling — makin bersinar & makin megah seiring Bridge bertambah.
// Bridge 0 = cahaya awal, Bridge 9 = aura immortal penuh, hologram legendaris, efek dominan.
function heavenTramplingNameStyle(bridges){
  const n = Math.max(0, Math.min(9, bridges || 0));
  const glow  = 22 + n * 6;      // semakin kuat: 22px → 76px
  const glow2 = 36 + n * 10;     // cahaya kedua: 36px → 126px
  const glow3 = 50 + n * 14;     // cahaya ketiga (halo immortal): 50px → 176px
  const speed = Math.max(0.7, 2.2 - n * 0.16); // animasi makin cepat per bridge
  const size  = 380 + n * 35;    // gradien makin lebar & kaya
  const ls    = (0.8 + n * 0.2).toFixed(1);  // letter-spacing makin dramatis
  // Palet makin kosmis saat bridge naik: awal emas-api, akhir putih-kosmik penuh
  const palettes = [
    '#f0b93b, #ff8a3d, #ffffff, #f0b93b',
    '#f0b93b, #ff8a3d, #ffffff, var(--arise-bright), #f0b93b',
    '#ffffff, var(--gold), var(--crimson), var(--arise-bright), #ffffff',
    '#ffffff, var(--gold), var(--crimson), var(--arise-bright), var(--cyan), #ffffff',
    'var(--cyan), var(--gold), #ffffff, var(--crimson), var(--arise-bright), var(--cyan)',
    'var(--arise-bright), var(--cyan), var(--gold), #ffffff, var(--crimson), var(--arise-bright)',
    '#ffffff, var(--cyan), var(--jade), var(--gold), var(--crimson), var(--arise-bright), #ffffff',
    '#ffffff, var(--gold-soft), var(--cyan), var(--jade), var(--crimson), var(--arise-bright), var(--gold), #ffffff',
    '#fff, var(--gold-soft), var(--gold), var(--orange), var(--crimson), var(--arise-bright), var(--cyan), var(--jade), #fff',
    '#fff, #ffd700, #fff, var(--crimson), #fff, var(--arise-bright), #fff, var(--cyan), var(--jade), #fff, #ffd700, #fff',
  ];
  const pal = palettes[Math.min(9, n)];
  return `
    background: linear-gradient(90deg, ${pal});
    background-size: ${size}% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: holoFlow ${speed}s linear infinite;
    letter-spacing: ${ls}px;
    font-family: var(--font-epic);
    font-weight: 900;
    filter:
      drop-shadow(0 0 ${glow}px rgba(255,215,0,0.9))
      drop-shadow(0 0 ${glow2}px rgba(255,120,0,0.6))
      drop-shadow(0 0 ${glow3}px rgba(255,255,255,${(0.25 + n * 0.07).toFixed(2)}));
  `.replace(/\n\s+/g,' ').trim();
}

// Tier khusus 10 title "Mystic Immortal" (Heaven Trampling). n=1 (baru masuk Heaven
// Trampling) s/d n=10 (Jembatan 9, puncak) — font Mythic Immortal, aura dominan, agung, epik.
// Makin tinggi n → aura makin kosmis, animasi makin cepat, cahaya melampaui tier 'holo'.
function mysticTierStyle(n){
    const glow  = 14 + n * 5;         // text-shadow inti: 14→64px
    const glow2 = 24 + n * 8;         // text-shadow luar: 24→104px
    const glow3 = 34 + n * 11;        // halo immortal:   34→144px
    const bShadow = 16 + n * 6;       // box-shadow: 16→76px
    const speed = Math.max(0.6, 2.4 - n * 0.18);  // animasi: 2.4s → 0.6s
    const size  = 320 + n * 50;       // gradien makin lebar
    const ls    = (1.8 + n * 0.15).toFixed(1);    // letter-spacing Mythic
    const bAlpha = Math.min(0.95, 0.45 + n * 0.05).toFixed(2);
    // 10 palet khusus: Bridge 1=emas-api, Bridge 9=putih-kosmik total
    const palettes = [
        '#ffd700, #ff8a3d, #fff6c0, #ffd700',                                              // n=1: Emas Murni
        '#ffd700, #ff6a00, #fff, #ff4500, #ffd700',                                        // n=2: Api Surgawi
        '#fff, #ffd700, #ff4768, #a48bff, #fff',                                           // n=3: Crimson-Gold
        '#a48bff, #ffd700, #fff, #ff4768, #2dd4f4, #a48bff',                               // n=4: Empyrean
        '#2dd4f4, #ffd700, #fff, #ff4768, #a48bff, #34d399, #2dd4f4',                      // n=5: Celestial
        '#34d399, #2dd4f4, #ffd700, #fff, #ff4768, #a48bff, #34d399',                      // n=6: Divine
        '#fff, #34d399, #2dd4f4, #ffd700, #ff4768, #a48bff, #fff',                         // n=7: Eternal
        '#fff, #ffd700, #ff4768, #a48bff, #2dd4f4, #34d399, #fff6c0, #fff',                // n=8: Absolute
        '#fff, #ffd700, #fff, #ff4768, #fff, #a48bff, #fff, #2dd4f4, #fff',                // n=9: Supreme Near
        '#fff,#ffd700,#fff,#ff4768,#fff,#a48bff,#fff,#2dd4f4,#fff,#34d399,#ffd700,#fff'   // n=10: Supreme Absolute
    ];
    const grad = palettes[Math.min(9, Math.max(1, n)) - 1];
    return [
        `background:linear-gradient(90deg, ${grad})`,
        `background-size:${size}% 100%`,
        `-webkit-background-clip:text`,
        `-webkit-text-fill-color:transparent`,
        `background-clip:text`,
        `animation:none`,
        `font-family:var(--font-epic)`,
        `font-weight:900`,
        `letter-spacing:${ls}px`,
        `text-transform:uppercase`,
        `border:1px solid rgba(255,215,0,${bAlpha})`,
        `text-shadow:0 0 ${glow}px rgba(255,255,255,0.95), 0 0 ${glow2}px rgba(255,215,0,0.85), 0 0 ${glow3}px rgba(255,120,0,0.5)`,
        `box-shadow:0 0 ${bShadow}px rgba(255,215,0,0.6), 0 0 ${bShadow+20}px rgba(255,100,0,0.35), 0 0 ${bShadow+40}px rgba(255,255,255,0.15), inset 0 0 ${Math.round(bShadow*0.4)}px rgba(255,215,0,0.12)`,
        `padding:6px 18px`,
        `border-radius:20px`,
    ].join(';') + ';';
}
function tierStyle(tier){
    if(typeof tier === 'string' && tier.indexOf('mystic') === 0){
        return mysticTierStyle(parseInt(tier.slice(6), 10) || 1);
    }
    switch(tier){
        case 'common':
            return 'color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); font-weight:700; font-family: var(--font-system); letter-spacing:1px;';
        case 'uncommon':
            return 'background:linear-gradient(90deg, rgba(52,211,153,0.2), rgba(45,212,244,0.16)); color:var(--jade); border:1px solid rgba(52,211,153,0.45); font-weight:800; font-family: var(--font-classic); letter-spacing:1.2px; box-shadow:0 0 8px rgba(52,211,153,0.25);';
        case 'rare':
            return 'background:linear-gradient(90deg, rgba(124,92,255,0.28), rgba(164,139,255,0.16)); color:var(--arise-bright); border:1px solid rgba(164,139,255,0.55); font-weight:800; font-family: var(--font-display); letter-spacing:1.4px; box-shadow:0 0 10px rgba(124,92,255,0.3);';
        case 'epic':
            return 'background:linear-gradient(90deg, var(--gold), var(--orange)); color:#1a1206; border:none; font-weight:900; font-family: var(--font-epic); letter-spacing:1.6px; box-shadow:0 0 14px rgba(240,185,59,0.5), inset 0 1px 0 rgba(255,255,255,0.25); text-shadow:0 1px 1px rgba(255,255,255,0.3);';
        case 'legendary':
            return 'background:linear-gradient(90deg,#ff8a3d,#ff4768,#7C5CFF); background-size:220% 220%; color:#fff; border:1px solid rgba(255,255,255,0.35); font-weight:900; font-family: var(--font-epic); letter-spacing:1.8px; text-shadow:0 0 10px rgba(0,0,0,0.5), 0 0 16px rgba(255,71,104,0.5); box-shadow:0 0 18px rgba(255,71,104,0.45); text-transform:uppercase;';
        case 'mythic':
            return 'background:linear-gradient(90deg,#4b0082,#800080,#ff0844,#4b0082); background-size:300% 300%; color:#fff; border:1px solid #fff; font-weight:900; font-family: var(--font-epic); letter-spacing:2px; text-shadow:0 0 12px #fff, 0 0 22px rgba(128,0,128,0.8); box-shadow:0 0 22px rgba(128,0,128,0.6); text-transform:uppercase;';
        case 'holo':
            return 'background:linear-gradient(90deg, var(--cyan), var(--arise-bright), var(--jade), var(--gold-soft), var(--crimson), var(--cyan)); background-size:400% 400%; color:#fff; border:1px solid rgba(255,255,255,0.65); font-weight:900; font-family: var(--font-epic); letter-spacing:2.4px; text-shadow:0 0 14px rgba(255,255,255,0.9), 0 0 26px rgba(45,212,244,0.7); box-shadow:0 0 26px rgba(255,255,255,0.35), 0 0 40px rgba(124,92,255,0.4); text-transform:uppercase;';
        default:
            return 'color:var(--arise-bright); background:linear-gradient(135deg,rgba(124,92,255,0.12),rgba(164,139,255,0.08)); border: 1px solid rgba(164,139,255,0.35); font-weight:700; font-family: var(--font-display); letter-spacing:1.5px; box-shadow: 0 0 8px rgba(124,92,255,0.2), inset 0 1px 0 rgba(255,255,255,0.05);';
    }
}
function getTitleStyle(title) {
    return tierStyle(TITLE_TIERS[title] || 'default');
}

function _ensureSecCfg(tab, id) {
  if (!state.sectionConfig) state.sectionConfig = {};
  if (!state.sectionConfig[tab]) state.sectionConfig[tab] = {};
  if (!state.sectionConfig[tab][id]) {
    const defs = SECTION_DEFS[tab] || [];
    const idx = defs.findIndex(d => d.id === id);
    state.sectionConfig[tab][id] = { visible: true, order: idx >= 0 ? idx : 99 };
  }
}
function _getSecCfg(tab, id) {
  _ensureSecCfg(tab, id);
  return state.sectionConfig[tab][id];
}
function isSectionVisible(tab, id) {
  if (!state || !state.sectionConfig) return true;
  const cfg = (state.sectionConfig[tab] || {})[id];
  if (!cfg) return true;
  if (cfg.movedTo && cfg.movedTo !== tab) return false;
  return cfg.visible !== false;
}
// Wraps html in a section div with data-sec attributes; hides if invisible
function sec(tab, id, html) {
  if (!isSectionVisible(tab, id)) return '';
  return `<div data-sec-tab="${tab}" data-sec-id="${id}">${html}</div>`;
}
// After render(), sort [data-sec-tab] children by configured order AND apply visibility
function applySectionOrder(tab) {
  const container = document.getElementById('main');
  if (!container) return;
  if (!SECTION_DEFS[tab]) return;
  // Only target direct children to avoid pulling nested data-sec nodes out of their parent
  const secs = Array.from(container.querySelectorAll(`[data-sec-tab="${tab}"]`))
    .filter(el => el.parentNode === container);
  if (secs.length === 0) return;
  // Apply visibility (display:none for hidden sections)
  secs.forEach(s => {
    const id = s.dataset.secId;
    s.style.display = isSectionVisible(tab, id) ? '' : 'none';
  });
  if (secs.length < 2) return;
  // Sort visible and hidden sections alike by configured order
  const defs = SECTION_DEFS[tab];
  secs.sort((a, b) => {
    const idA = a.dataset.secId, idB = b.dataset.secId;
    const cfgA = (state.sectionConfig && state.sectionConfig[tab] && state.sectionConfig[tab][idA]) || {};
    const cfgB = (state.sectionConfig && state.sectionConfig[tab] && state.sectionConfig[tab][idB]) || {};
    const defOrdA = defs.findIndex(d => d.id === idA);
    const defOrdB = defs.findIndex(d => d.id === idB);
    const ordA = (cfgA.order !== undefined) ? cfgA.order : defOrdA;
    const ordB = (cfgB.order !== undefined) ? cfgB.order : defOrdB;
    return ordA - ordB;
  });
  secs.forEach(s => container.appendChild(s));
}

function toggleSectionVisible(tab, id) {
  _ensureSecCfg(tab, id);
  state.sectionConfig[tab][id].visible = !state.sectionConfig[tab][id].visible;
  save();
  if (state.ui.tab === tab) render();
  _refreshSecMgr();
}
function moveSectionOrder(tab, id, dir) {
  const defs = SECTION_DEFS[tab];
  if (!defs) return;
  // Ensure all section configs are initialized
  defs.forEach((def, i) => {
    _ensureSecCfg(tab, def.id);
    if (state.sectionConfig[tab][def.id].order === undefined) {
      state.sectionConfig[tab][def.id].order = i;
    }
  });
  // Get sorted list by current order
  const sorted = defs.slice().sort((a, b) =>
    state.sectionConfig[tab][a.id].order - state.sectionConfig[tab][b.id].order
  );
  const idx = sorted.findIndex(d => d.id === id);
  if (idx === -1) return; // unknown id – guard against corrupted state
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  // Swap orders
  const ordA = state.sectionConfig[tab][sorted[idx].id].order;
  const ordB = state.sectionConfig[tab][sorted[swapIdx].id].order;
  state.sectionConfig[tab][sorted[idx].id].order = ordB;
  state.sectionConfig[tab][sorted[swapIdx].id].order = ordA;
  save();
  if (state.ui.tab === tab) { render(); }
  _refreshSecMgr();
}
function setSectionMgrTab(tab) {
  _sectionMgrTab = tab;
  _refreshSecMgr();
}
function resetSectionConfig(tab) {
  if (!state.sectionConfig) state.sectionConfig = {};
  state.sectionConfig[tab] = {};
  save();
  if (state.ui.tab === tab) render();
  _refreshSecMgr();
  showToast('Layout '+tab+' direset ke default!', 'ach');
}

// Pastikan state.charHistory selalu punya bentuk {level:[],hp:[],realm:[],streak:[]} yang valid.

// mengulang inisialisasi manual di tiap titik — cukup panggil ensureCharHistory(state) lalu pakai.
function ensureCharHistory(s){
  if(!s.charHistory) s.charHistory = {level:[],hp:[],realm:[],streak:[]};
  if(!Array.isArray(s.charHistory.level))  s.charHistory.level  = [];
  if(!Array.isArray(s.charHistory.hp))     s.charHistory.hp     = [];
  if(!Array.isArray(s.charHistory.realm))  s.charHistory.realm  = [];
  if(!Array.isArray(s.charHistory.streak)) s.charHistory.streak = [];
  return s.charHistory;
}
// Pastikan state.historyArchive selalu punya bentuk {finansial:[], momentum:[], goal:[], sedekah:[], jurnal:[], refleksi:[], timeline:[]}
// yang valid. Dipakai saat migrasi data lama & oleh fungsi pemindah arsip harian, sama seperti pola ensureCharHistory.
function ensureHistoryArchive(s){
  if(!s.historyArchive) s.historyArchive = {};
  ['finansial','momentum','goal','sedekah','jurnal','refleksi','timeline','vitalitas','evaluasi','projek'].forEach(k=>{
    if(!Array.isArray(s.historyArchive[k])) s.historyArchive[k] = [];
  });
  // De-dup refleksi: entri lama bisa dobel karena bug spread di saveJournal/saveRefleksiAnswer.
  // Pertahankan entri pertama per kombinasi id+_sourceType, buang duplikat berikutnya.
  if(Array.isArray(s.historyArchive.refleksi)){
    const seen = new Set();
    s.historyArchive.refleksi = s.historyArchive.refleksi.filter(e => {
      const k = (e.id||'') + '|' + (e._sourceType||'');
      if(seen.has(k)) return false;
      seen.add(k); return true;
    });
  }
  return s.historyArchive;
}
// Pindahkan entri yang usianya sudah lewat 30 hari dari riwayat aktif ke historyArchive
// (permanen, tidak pernah dihapus). Dipanggil sekali saat load (migrasi data lama) dan
// setiap hari saat rollover (pemindah otomatis harian). Semua kategori riwayat pakai
// aturan 30 hari yang sama.
// Entri baru (sejak update ini) sudah disalin ke historyArchive SAAT DIBUAT (realtime) via
// _riwayatArchivePush/_riwayatArchiveUpsert di bawah, dan langsung diberi tanda _archived:true.
// Jadi sweepHistoryArchive() sekarang punya 2 tugas beda tergantung tandanya:
//  - Entri lama TANPA tanda _archived (dibuat sebelum update ini) → masih perlu disalin dulu
//    ke archive (migrasi data lama), baru dibuang dari halaman aktif.
//  - Entri BARU yang sudah bertanda _archived (sudah punya salinan permanen sejak dibuat)
//    → tinggal dibuang dari halaman aktif, TANPA disalin ulang (supaya tidak dobel di archive).
function sweepHistoryArchive(s){
  if(!s) return;
  ensureHistoryArchive(s);
  const LIMIT = 100; // Batas maksimal entri aktif per kategori

  // Helper: ambil entri yang belum di-archive, arsipkan ke historyArchive, lalu kembalikan sisa yang disimpan
  function trimNewestFirst(arr, archiveCat, mapFn){
    // arr[0] = terbaru (unshift). Simpan 100 terbaru, sisanya arsipkan.
    if(!Array.isArray(arr) || arr.length <= LIMIT) return arr;
    const stay = arr.slice(0, LIMIT);
    const excess = arr.slice(LIMIT);
    const fresh = excess.filter(e=>!e._archived);
    if(fresh.length) s.historyArchive[archiveCat].push(...(mapFn ? fresh.map(mapFn) : fresh));
    return stay;
  }
  function trimOldestFirst(arr, archiveCat, mapFn){
    // arr[0] = terlama (push). Simpan 100 terbaru, sisanya arsipkan.
    if(!Array.isArray(arr) || arr.length <= LIMIT) return arr;
    const excess = arr.slice(0, arr.length - LIMIT);
    const stay   = arr.slice(arr.length - LIMIT);
    const fresh  = excess.filter(e=>!e._archived);
    if(fresh.length) s.historyArchive[archiveCat].push(...(mapFn ? fresh.map(mapFn) : fresh));
    return stay;
  }

  // Finansial (unshift = terbaru duluan)
  if(Array.isArray(s.financeLog)) s.financeLog = trimNewestFirst(s.financeLog, 'finansial');

  // Momentum (push = terlama duluan)
  if(Array.isArray(s.lifeMomentum)) s.lifeMomentum = trimOldestFirst(s.lifeMomentum, 'momentum');

  // Goal (unshift = terbaru duluan)
  if(Array.isArray(s.goalHistory)) s.goalHistory = trimNewestFirst(s.goalHistory, 'goal');

  // Sedekah (unshift = terbaru duluan)
  if(s.sedekah && Array.isArray(s.sedekah.entries))
    s.sedekah.entries = trimNewestFirst(s.sedekah.entries, 'sedekah');

  // Jurnal Harian (object keyed by date) — simpan 100 tanggal terbaru
  if(s.dailyJournal){
    const dates = Object.keys(s.dailyJournal).sort().reverse(); // terbaru duluan
    if(dates.length > LIMIT){
      dates.slice(LIMIT).forEach(d => {
        const already = s.historyArchive.jurnal.some(e=>e.date===d);
        if(!already) s.historyArchive.jurnal.push({ date: d, content: s.dailyJournal[d] });
        delete s.dailyJournal[d];
      });
    }
  }

  // Refleksi jurnal (push = terlama duluan)
  if(s.refleksi && Array.isArray(s.refleksi.journals))
    s.refleksi.journals = trimOldestFirst(s.refleksi.journals, 'refleksi', e=>({...e, _sourceType:'journal'}));

  // Refleksi jawaban pertanyaan (push = terlama duluan, per pertanyaan maks 50)
  if(s.refleksi && Array.isArray(s.refleksi.questions)){
    s.refleksi.questions.forEach(q => {
      if(!Array.isArray(q.answers) || q.answers.length <= 50) return;
      const excess = q.answers.slice(0, q.answers.length - 50);
      const stay   = q.answers.slice(q.answers.length - 50);
      excess.filter(a=>!a._archived).forEach(a =>
        s.historyArchive.refleksi.push({...a, _sourceType:'answer', questionId:q.id, questionText:q.q||''})
      );
      q.answers = stay;
    });
  }

  // lifePrincipleHistory (unshift = terbaru duluan)
  if(s.character && Array.isArray(s.character.lifePrincipleHistory))
    s.character.lifePrincipleHistory = trimNewestFirst(s.character.lifePrincipleHistory, 'refleksi', e=>({...e, _sourceType:'principle'}));

  // Timeline Kehidupan (unshift = terbaru duluan di index-0)
  if(Array.isArray(s.lifeTimeline)) s.lifeTimeline = trimNewestFirst(s.lifeTimeline, 'timeline');

  // Vitalitas (HP/Mana log, push = terlama duluan) — jaring pengaman tambahan, normalnya sudah
  // langsung diarsipkan realtime tiap kali logHpChange/logManaChange dipanggil (lihat _trimVitalitasLog).
  if(Array.isArray(s.hpEventLog)) s.hpEventLog = trimOldestFirst(s.hpEventLog, 'vitalitas');
  if(Array.isArray(s.manaEventLog)) s.manaEventLog = trimOldestFirst(s.manaEventLog, 'vitalitas');
}
// Salin entri baru ke Sejarah Riwayat SAAT DIBUAT (realtime). Dipanggil dari titik-titik
// pembuatan entri (transaksi, sedekah, goal selesai, timeline, jurnal, refleksi, momentum).
function _riwayatArchivePush(cat, entry){
  if(!state) return;
  ensureHistoryArchive(state);
  entry._archived = true; // tandai supaya sweepHistoryArchive tidak menyalin ulang nanti
  state.historyArchive[cat].push({...entry});
}
// Sama seperti di atas, tapi untuk kategori yang isinya "1 entri per tanggal" (Jurnal Harian,
// Momentum) — kalau tanggal yang sama sudah ada di archive, update isinya, bukan tambah baris baru.
function _riwayatArchiveUpsert(cat, dateField, entry){
  if(!state) return;
  ensureHistoryArchive(state);
  entry._archived = true;
  const arr = state.historyArchive[cat];
  const existing = arr.find(e => e[dateField] === entry[dateField]);
  if(existing) Object.assign(existing, entry);
  else arr.push({...entry});
}

function deepMerge(def, loaded){
  if(Array.isArray(def)) return loaded!==undefined ? loaded : def;
  if(def && typeof def==='object'){
    const out = {}; for(const k in def){ out[k] = deepMerge(def[k], loaded ? loaded[k] : undefined); }
    if(loaded){ for(const k in loaded){ if(!(k in out)) out[k]=loaded[k]; } } return out;
  }
  return loaded!==undefined ? loaded : def;
}

// ── TOMBSTONE: catatan id yang sudah sengaja dihapus, per koleksi yang ikut di-sync ──
// Union-by-id (di bawah) cuma tahu cara MENAMBAH, tidak tahu soal PENGHAPUSAN — kalau device A
// menghapus sebuah quest sementara device B belum sempat sinkron (masih punya salinan lama quest
// itu), union polos akan menghidupkan lagi quest yang sudah dihapus. Tombstone mencegah itu:
// setiap kali sebuah item dihapus, id-nya dicatat permanen di state.meta.tombstones supaya proses
// merge tahu id itu harus tetap dibuang meski masih muncul di sisi yang lebih lama.
const TOMBSTONE_COLLECTIONS = ['quests','financeLog','goals','habits','targets','completedTargets','customRituals','customStats','kanbanCards','sedekahEntries'];
function ensureTombstones(s){
  if(!s.meta) s.meta = {};
  if(!s.meta.tombstones || typeof s.meta.tombstones !== 'object') s.meta.tombstones = {};
  TOMBSTONE_COLLECTIONS.forEach(k=>{
    if(!s.meta.tombstones[k] || typeof s.meta.tombstones[k] !== 'object') s.meta.tombstones[k] = {};
  });
  return s.meta.tombstones;
}
// Panggil ini di SETIAP tempat yang menghapus/memindahkan-keluar item dari salah satu koleksi
// di atas (quest, transaksi, goal, habit, target, kanban card, dst), SEBELUM atau SESUDAH item
// dibuang dari array-nya — supaya penghapusan itu tetap "menang" walau device lain belum sinkron.
function markDeleted(collectionKey, id){
  if(id==null || !TOMBSTONE_COLLECTIONS.includes(collectionKey)) return;
  ensureTombstones(state);
  state.meta.tombstones[collectionKey][String(id)] = Date.now();
}

// Gabungkan dua array of objects berdasarkan field id (default `id`, bisa dikustom lewat idKey
// misalnya `key` untuk customStats) — bukan pilih salah satu utuh. Item yang cuma ada di sisi
// `older` tetap dipertahankan (disisipkan di belakang), item yang ada di kedua sisi memakai versi
// dari `newer`, dan id yang tercatat di `deadIds` (tombstone) selalu dibuang dari hasil akhir.
function _unionById(newerArr, olderArr, deadIds, idKey){
  idKey = idKey || 'id';
  const a = Array.isArray(newerArr) ? newerArr : [];
  const b = Array.isArray(olderArr) ? olderArr : [];
  const dead = deadIds || {};
  const isDead = v => v!=null && Object.prototype.hasOwnProperty.call(dead, String(v));
  const seen = new Set(a.filter(x=>x && x[idKey]!=null).map(x=>x[idKey]));
  const onlyInOlder = b.filter(x=>x && x[idKey]!=null && !seen.has(x[idKey]) && !isDead(x[idKey]));
  return a.concat(onlyInOlder).filter(x=>!(x && x[idKey]!=null && isDead(x[idKey])));
}

// Gabungkan state `newer` (dianggap sumber kebenaran untuk field skalar seperti character/meta/stats,
// supaya angka HP/EXP/level tidak tercampur dari 2 sumber berbeda) dengan `older` — tapi untuk
// koleksi yang isinya "entri yang ditambah user" (quest, transaksi keuangan, goal, habit, kanban,
// sedekah, target, dst), lakukan UNION per-id (dikurangi id yang sudah di-tombstone di salah satu
// sisi) supaya entri yang cuma ditambahkan di sisi yang "kalah" (older) tidak ikut hilang, dan entri
// yang sudah sengaja dihapus tidak ikut dihidupkan kembali.
function mergeRemoteState(newer, older){
  if(!older) return newer;
  if(!newer) return older;
  const merged = JSON.parse(JSON.stringify(newer));
  const newerTomb = (newer.meta && newer.meta.tombstones) || {};
  const olderTomb = (older.meta && older.meta.tombstones) || {};
  const tomb = {};
  TOMBSTONE_COLLECTIONS.forEach(k=>{ tomb[k] = Object.assign({}, olderTomb[k]||{}, newerTomb[k]||{}); });
  if(!merged.meta) merged.meta = {};
  merged.meta.tombstones = tomb;

  merged.quests           = _unionById(merged.quests, older.quests, tomb.quests);
  merged.financeLog       = _unionById(merged.financeLog, older.financeLog, tomb.financeLog);
  merged.goals            = _unionById(merged.goals, older.goals, tomb.goals);
  merged.habits           = _unionById(merged.habits, older.habits, tomb.habits);
  merged.targets          = _unionById(merged.targets, older.targets, tomb.targets);
  merged.completedTargets = _unionById(merged.completedTargets, older.completedTargets, tomb.completedTargets);
  merged.customRituals    = _unionById(merged.customRituals, older.customRituals, tomb.customRituals);
  merged.customStats      = _unionById(merged.customStats, older.customStats, tomb.customStats, 'key');
  if(merged.kanban && older.kanban) merged.kanban.cards = _unionById(merged.kanban.cards, older.kanban.cards, tomb.kanbanCards);
  if(merged.sedekah && older.sedekah) merged.sedekah.entries = _unionById(merged.sedekah.entries, older.sedekah.entries, tomb.sedekahEntries);
  return merged;
}

// KURVA EXP EKSPONENSIAL TERSKALA — 5× per Realm
// Semakin tinggi Realm, kebutuhan EXP per level JAUH lebih besar.
// QC base=50, tiap Realm berikutnya 5× lipat.
// expNeeded(level) = REALM_BASE_EXP[realmIdx] × localLv (1–15)
//
// Rebalanced — total kumulatif LV 1→240: ~298 juta EXP
// Heaven Trampling dapat dicapai dengan ~300 juta EXP total
//
// Contoh kebutuhan per realm:
//   QC  (LV 1-15) : 20–300 EXP per level         | total: ~2.400
//   FE  (LV16-30) : 80–1.200 EXP per level        | total: ~9.600
//   CF  (LV31-45) : 300–4.500 EXP per level       | total: ~36.000
//   NS  (LV46-60) : 1.200–18.000 EXP per level    | total: ~144.000
//   SF  (LV61-75) : 5.000–75.000 EXP per level    | total: ~600.000
//   ST  (LV76-90) : 16.000–240.000 EXP per level  | total: ~1,92 juta
//   AS  (LV91-105): 50.000–750.000 EXP per level  | total: ~6 juta
//   IY (LV106-120): 100.000–1,5 juta per level    | total: ~12 juta
//   CY (LV121-135): 130.000–1,95 juta per level   | total: ~15,6 juta
//   NS (LV136-150): 160.000–2,4 juta per level    | total: ~19,2 juta
//   NC (LV151-165): 200.000–3 juta per level      | total: ~24 juta
//  NSh (LV166-180): 250.000–3,75 juta per level   | total: ~30 juta
//   VN (LV181-195): 300.000–4,5 juta per level    | total: ~36 juta
//   SV (LV196-210): 350.000–5,25 juta per level   | total: ~42 juta
//   AV (LV211-225): 420.000–6,3 juta per level    | total: ~50,4 juta
//   VT (LV226-240): 500.000–7,5 juta per level    | total: ~60 juta
//
// Kumulatif sampai LV 240: ~298 juta EXP
// Heaven Trampling: ~298 juta EXP
// Bridge 1 LV 100: ~5 miliar EXP tambahan (50 juta/LV × 100 LV)
// ═══════════════════════════════════════════════════════════════
const REALM_BASE_EXP = [
  20,        // 0: Qi Condensation       LV 1-15
  80,        // 1: Foundation Estab.     LV 16-30
  300,       // 2: Core Formation        LV 31-45
  1200,      // 3: Nascent Soul          LV 46-60
  5000,      // 4: Soul Formation        LV 61-75
  16000,     // 5: Soul Transformation   LV 76-90
  50000,     // 6: Ascendant             LV 91-105
  100000,    // 7: Illusory Yin          LV 106-120
  130000,    // 8: Corporeal Yang        LV 121-135
  160000,    // 9: Nirvana Scryer        LV 136-150
  200000,    // 10: Nirvana Cleanser     LV 151-165
  250000,    // 11: Nirvana Shatterer    LV 166-180
  300000,    // 12: Void Nirvana         LV 181-195
  350000,    // 13: Spirit Void          LV 196-210
  420000,    // 14: Arcane Void          LV 211-225
  500000,    // 15: Void Tribulant       LV 226-240
];

function expNeeded(level){
  const lv = Math.max(1, level || 1);
  const realmIdx = Math.min(Math.floor((lv - 1) / 15), REALM_BASE_EXP.length - 1);
  const localLv = ((lv - 1) % 15) + 1; // 1–15
  return REALM_BASE_EXP[realmIdx] * localLv;
}
// Total EXP kumulatif yang dibutuhkan untuk mencapai suatu level dari Level 1.
function cumulativeExpForLevel(level){
  let total = 0; const lvl = Math.max(1, level || 1);
  for(let l=1; l<lvl; l++){ total += expNeeded(l); }
  return total;
}

// EXP REQUIREMENT CALCULATOR
// Menghitung total EXP kumulatif yang dibutuhkan untuk mencapai target tertentu.
// ─────────────────────────────────────────────────────────────
function getTotalExpEarned(){
  const c = state.character;
  return cumulativeExpForLevel(c.level) + (c.exp || 0);
}
// Menghitung EXP kumulatif yang dibutuhkan untuk MENCAPAI realm tertentu (index realm)
function calcExpToRealm(realmIdx){
  if(realmIdx <= 0) return 0;
  const startLv = Math.min(realmIdx, 16) * 15 + 1; // LV pertama realm ini
  return cumulativeExpForLevel(Math.min(startLv, MAX_LEVEL + 1));
}
// Menghitung EXP kumulatif ke target Bridge HT tertentu (bridgeNum 1-9)
// Bridge N dicapai saat LV = MAX_LEVEL + N×100 — sinkron dengan syncRealmWithLevel
function calcExpToHtBridge(bridgeNum){
  return cumulativeExpForLevel(MAX_LEVEL + Math.max(0, Math.min(bridgeNum, 9)) * 100);
}
function formatExpLarge(n){
  if(n >= 1e12) return (n/1e12).toFixed(2) + ' T';
  if(n >= 1e9)  return (n/1e9).toFixed(2) + ' M (Miliar)';
  if(n >= 1e6)  return (n/1e6).toFixed(2) + ' Jt';
  if(n >= 1e3)  return (n/1e3).toFixed(1) + ' K';
  return n.toLocaleString();
}
function renderExpCalculator(){
  if(!state.settings.showExpCalculator) return '';
  const earned = getTotalExpEarned();
  // Build milestone list
  const milestones = [];
  for(let i = 1; i < DEFAULT_REALMS.length; i++){
    const needed = calcExpToRealm(i);
    const remaining = Math.max(0, needed - earned);
    const done = earned >= needed;
    milestones.push({ label: DEFAULT_REALMS[i].nameID, needed, remaining, done, type: 'realm' });
  }
  for(let b = 1; b <= 9; b++){
    const needed = calcExpToHtBridge(b);
    const remaining = Math.max(0, needed - earned);
    const done = earned >= needed;
    milestones.push({ label: `Heaven Trampling — Bridge ${b}`, needed, remaining, done, type: 'ht' });
  }
  const rows = milestones.map((m, idx) => {
    const color = m.done ? 'var(--jade)' : (m.type === 'ht' ? 'var(--gold)' : 'var(--cyan)');
    const icon = m.done ? '✓' : (m.type === 'ht' ? '🌉' : '◆');
    return `<tr style="opacity:${m.done ? 0.5 : 1};">
      <td style="color:${color};font-weight:${m.type==='ht'?700:500};font-size:11px;">${icon} ${m.label}</td>
      <td style="text-align:right;font-family:var(--font-system);font-size:10.5px;color:var(--bone);">${formatExpLarge(m.needed)}</td>
      <td style="text-align:right;font-family:var(--font-system);font-size:10.5px;color:${m.done?'var(--jade)':'var(--orange)'};">${m.done ? '—' : formatExpLarge(m.remaining)}</td>
    </tr>`;
  }).join('');
  return `
  <div class="section-title">🧮 Kalkulator Kebutuhan EXP</div>
  <div class="card glass-panel">
    <div class="small muted" style="margin-bottom:8px;">EXP Kumulatif Kamu Saat Ini: <b style="color:var(--cyan);">${formatExpLarge(earned)}</b></div>
    <div style="overflow-x:auto;">
      <table class="stats-table" style="font-size:11px;">
        <thead><tr><th>Target</th><th style="text-align:right;">Total Dibutuhkan</th><th style="text-align:right;">Sisa</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="small muted" style="margin-top:8px; font-size:10px;">* Bridge 1-9 menghitung total EXP kumulatif dari awal (termasuk semua realm sebelumnya)</div>
  </div>`;
}

// Menyelaraskan kembali Tahapan (Realm) dengan Level karakter — memperbaiki data import/export
// yang tidak sinkron (mis. Level tinggi tapi Tahapan masih di awal seperti Qi Condensation).
function syncRealmWithLevel(s){
  // Realm selalu mengikuti level — level adalah satu-satunya sumber kebenaran.
  const c = s.character; const realms = s.realms || DEFAULT_REALMS; if(!c || !realms.length) return;
  // Heaven Trampling adalah realm terakhir (index paling akhir di array)
  const htIdx = realms.length - 1;
  // Jika sudah di HT, sinkronkan heavenBridges dari level utama lalu keluar
  if(c.realmIndex === htIdx && realms[htIdx].bridges != null){
    c.heavenBridges = Math.max(0, Math.min(9, Math.floor(((c.level || 1) - 240) / 100)));
    return;
  }
  const lv = Math.max(1, c.level || 1);
  let idx = 0;
  if(lv > 15){
    const lvAfterQC = lv - 15;
    const realmOffset = Math.min(Math.floor((lvAfterQC - 1) / 15), htIdx - 1);
    idx = realmOffset + 1;
  }
  // Izinkan masuk HT hanya jika level sudah mencapai MAX_LEVEL
  c.realmIndex = Math.min(idx, (c.level >= MAX_LEVEL) ? htIdx : htIdx - 1);
}
function spiritualNeeded(level){ return Math.round(30 * Math.pow(level, 1.3)); }

function recomputeLifeScore(){
  if(!state) return; const c = state.character; const statSum = Object.values(state.stats).reduce((a,b)=>a+b,0);
  c.lifeScore = Math.max(0, (c.level-1)*10 + statSum*2 + c.streak*5 + c.realmIndex*50 + (state.spiritual.level-1)*8);
  captureLifeMomentumSnapshot();
}

// ── LIFE MOMENTUM — snapshot harian Level/Streak/Life Score (memakai data yang sudah ada, tanpa database baru).
function captureLifeMomentumSnapshot(){
  if(!state || !state.character) return;
  if(!Array.isArray(state.lifeMomentum)) state.lifeMomentum = [];
  const today = todayStr(); const c = state.character;
  const arr = state.lifeMomentum;
  const last = arr[arr.length-1];
  if(last && last.date === today){ last.level = c.level; last.streak = c.streak; last.lifeScore = c.lifeScore; }
  else { arr.push({ date: today, level: c.level, streak: c.streak, lifeScore: c.lifeScore }); }
  // Catatan: array tidak lagi dipotong di sini — riwayat aktif tetap 30 hari terakhir via
  // sweepHistoryArchive() (dijalankan tiap rollover harian), entri lebih lama diarsipkan permanen.
  // Disalin realtime ke Sejarah Riwayat juga (upsert per tanggal, supaya tidak dobel tiap snapshot hari ini).
  _riwayatArchiveUpsert('momentum', 'date', { date: today, level: c.level, streak: c.streak, lifeScore: c.lifeScore });
}

function gainExp(amount){
  try {
    const c = state.character; const mult = state.settings.expMultiplier || 1.0; amount = Math.round(amount * mult);
    if(amount > 0 && state.spiritual?.sunnahBonusDate === todayStr()) amount = Math.round(amount * 1.1);
    if (amount > 0) {
        c.exp += amount;
        (state.meta.dailyExpLog=state.meta.dailyExpLog||{})[todayStr()] = ((state.meta.dailyExpLog||{})[todayStr()]||0) + amount;
    } else {
        const oldLevel = c.level;
        c.exp += amount;
        if (c.exp < 0) {
            let remainingNeg = Math.abs(c.exp); c.exp = 0;
            while(remainingNeg > 0 && c.level > 1) {
                if (oldLevel - c.level >= 3) break; // MAX DROP 3 LEVELS
                c.level -= 1;
                const expN = expNeeded(c.level);
                if(remainingNeg > expN) { remainingNeg -= expN; }
                else { c.exp = expN - remainingNeg; remainingNeg = 0; }
            }
            showToast(`LEVEL DOWN! Kini Lv.${c.level}`, 'bad'); SFX.error();
        }
    }
    const prevRealmIdx = c.realmIndex;
    const prevBridges = c.heavenBridges || 0;
    const prevLevel = c.level;
    let leveled=false;
    // Level bisa naik tanpa batas — tidak ada cap di sini
    while(c.exp >= expNeeded(c.level)){ c.exp -= expNeeded(c.level); c.level += 1; leveled=true; }
    // Sinkronkan realm (dan heavenBridges di HT) setiap kali c.level berubah
    syncRealmWithLevel(state);
    if(leveled){
      SFX.levelUp(); showLevelUp(c.level);
      ensureCharHistory(state);
      const _chTs = new Date().toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      state.charHistory.level.push({ts:_chTs, val:c.level});
      // Jika realm naik (masuk HT pertama kali), tampilkan animasi breakthrough
      if(c.realmIndex > prevRealmIdx){
        const newRealm = state.realms[c.realmIndex];
        if(newRealm){ SFX.breakthrough(); triggerBreakthrough(newRealm.nameID); addTimelineEvent('realm', 'Naik ke Realm: ' + newRealm.nameID, '⛰️'); gainBondExp(50); spiritSay(getSpiritBreakthroughLine(newRealm.nameID), true); ensureCharHistory(state); state.charHistory.realm.push({ts:_chTs||todayStr(), val:newRealm.nameID}); }
      }
      // Jika sudah di HT dan bridge naik (tiap 100 level), tampilkan notifikasi
      if(isHeavenTrampling() && c.heavenBridges > prevBridges){
        SFX.breakthrough();
        addActivityLog(`Jembatan Surga ke-${c.heavenBridges} ditembus!`);
        showToast(`🌉 Jembatan ${c.heavenBridges} Ditembus!`, 'ach');
        addTimelineEvent('heaven', `Jembatan Surga ke-${c.heavenBridges} Ditembus`, '🌉');
        if(c.heavenBridges === 9){
          addActivityLog('🌟 TA TIAN SEMPURNA');
          showTrophy('TA TIAN SEMPURNA', 'Penguasa Kehampaan', '🌌');
        }
      }
      // Level milestones — check every level crossed, not just final (handles multi-level jumps)
      const _MILESTONES = new Set([5,10,15,25,35,45,50,60,70,100,150,200,300,500,700,1000]);
      for(let _lv = prevLevel + 1; _lv <= c.level; _lv++){
        if(_MILESTONES.has(_lv)) addTimelineEvent('level', 'Mencapai Level ' + _lv, '⭐');
      }
    }
    recomputeLifeScore();
  } catch(e) {
    console.error('[MYSISTEM] Error di gainExp():', e);
    try { showToast('⚠️ Terjadi kesalahan saat memproses EXP.', 'bad'); } catch(e2) {}
  }
}

function bumpStat(key, amount){ if(!(key in state.stats)) return; state.stats[key] = Math.max(0, (state.stats[key]||0) + amount); recomputeLifeScore(); }
function addRealmEnergy(amount){
  const c = state.character; c.realmEnergy = Math.max(0, c.realmEnergy + amount);
  // Bridge di HT sekarang ditentukan dari level utama — energy tidak digunakan untuk progression.
}

function submitBridgeTrial(success){

    // Gagal trial: kehilangan 30% energy bridge saat ini, HP -20%, notifikasi
    const bridgeEnergy = getHtBridgeEnergy(c.heavenBridges);
    const energyLoss = Math.floor(bridgeEnergy * 0.3);
    c.realmEnergy = Math.max(0, c.realmEnergy - energyLoss);
    const hpLoss = Math.floor(c.maxHp * 0.2);
    c.hp = Math.max(0, c.hp - hpLoss);

    addActivityLog(`Gagal Trial Bridge ${c.heavenBridges + 1} — Kehilangan Energi!`);
    showToast(`Trial Gagal! HP -${hpLoss}, Energy -${energyLoss.toLocaleString()}`, 'bad');
    SFX.error();
    if(c.hp <= 0){ applyHtQiDeviation(); }
  }
  render(); save();
}

function applyHtQiDeviation(){
  const c = state.character;

  gainExp(-Math.floor(expNeeded(c.level) * 0.5));

function recoverFromQiDeviation(){
  state.character.htQiDeviation = false;

// Selesaikan HT Quest (reward EXP skala besar, bypass daily cap karena HT adalah sistem khusus)
function completeHtQuest(id){
  const q = HT_QUEST_DEFS.find(x=>x.id===id);
  if(!q) return;
  if(!isHeavenTrampling()){ showToast('Quest ini hanya bisa diselesaikan di Heaven Trampling!', 'bad'); return; }
  const today = todayStr();
  if(!state.character.htQuestCompletedToday) state.character.htQuestCompletedToday = {};
  if(state.character.htQuestCompletedToday[id] === today){ showToast('Quest HT ini sudah diselesaikan hari ini.', 'bad'); return; }
  const bridgesNeeded = Math.max(0, HT_QUEST_DEFS.indexOf(q));
  if((state.character.heavenBridges || 0) < bridgesNeeded){ showToast(`Quest ini butuh Bridge ${bridgesNeeded}+.`, 'bad'); return; }
  state.character.htQuestCompletedToday[id] = today;
  // Bypass daily EXP cap — HT reward adalah sistem kultivasi khusus
  const c = state.character;
  const mult = state.settings.expMultiplier || 1.0;
  const htExp = Math.round(q.htExp * mult);
  // HT Quest EXP: bypass daily cap, tidak double-multiply — langsung ke exp, level naik alami
  const prevBridgesHQ = c.heavenBridges || 0;
  c.exp += htExp;
  while(c.exp >= expNeeded(c.level)){ c.exp -= expNeeded(c.level); c.level += 1; }
  syncRealmWithLevel(state);
  if(isHeavenTrampling() && c.heavenBridges > prevBridgesHQ){
    SFX.breakthrough();
    addActivityLog(`Jembatan Surga ke-${c.heavenBridges} ditembus!`);
    showToast(`🌉 Jembatan ${c.heavenBridges} Ditembus!`, 'ach');
    addTimelineEvent('heaven', `Jembatan Surga ke-${c.heavenBridges} Ditembus`, '🌉');
    if(c.heavenBridges === 9){ addActivityLog('🌟 TA TIAN SEMPURNA'); showTrophy('TA TIAN SEMPURNA', 'Penguasa Kehampaan', '🌌'); }
  }
  recomputeLifeScore();
  addActivityLog(`HT Quest Selesai: ${q.title} (+${htExp.toLocaleString()} EXP)`);
  if(state.settings.showFloatingExp) showToast(`+${htExp.toLocaleString()} EXP`, 'exp');
  showToast(`🌉 Quest HT "${q.title}" Selesai!`, 'ach');
  SFX.levelUp(); checkAchievements(); render(); save();
}

function rewardFor(q){
  const cfg = state.settings || DEFAULT_SETTINGS();
  let base = (cfg.difficultyExp && cfg.difficultyExp[q.difficulty]) || DIFFICULTY_EXP[q.difficulty] || 25;
  // Skala otomatis mengikuti Realm saat ini (hanya untuk tipe reguler)
  if(q.type!=='legendary' && q.type!=='mythic' && q.type!=='heaven_trampling'){ base = base * getRealmExpScale(state.character.realmIndex); }
  if(q.type==='mythic') {
      base = 25000;
  } else if(q.type==='legendary') {
      base = 5000;
  } else if(q.type==='heaven_trampling') {
      base = q.htExp ? q.htExp : 100000;
  } else if(q.type==='special') {
      base = Math.round(base*1.3);
  }
  const comboBonus = cfg.comboBonus ? 1 + Math.min(state.meta.completedTodayCount || 0, cfg.comboBonusCap) * cfg.comboBonusStep : 1;
  const streakBonus = cfg.streakBonus ? 1 + Math.min(state.character.streak, cfg.streakBonusCap) * cfg.streakBonusStep : 1;
  const realmBonus = cfg.realmBonus ? 1 + Math.min(state.character.realmIndex, cfg.realmBonusCap ?? 16) * cfg.realmBonusStep : 1;
  return Math.max(1, Math.round(base * comboBonus * streakBonus * realmBonus));
}

function canCompleteQuestToday(q){ if(!q.dailyLimit) return true; const todayCount = q.lastCompletedDate === todayStr() ? (q.completionsToday || 0) : 0; return todayCount < q.dailyLimit; }
function getRemainingCompletions(q){ if(!q.dailyLimit) return '∞'; const todayCount = q.lastCompletedDate === todayStr() ? (q.completionsToday || 0) : 0; return Math.max(0, q.dailyLimit - todayCount); }
function afterQuestComplete(q){ q.completionsToday = (q.completionsToday || 0) + 1; q.lastCompletedDate = todayStr(); }

function completeQuest(id){

    afterQuestComplete(q); addActivityLog(`Quest Selesai: ${q.title}`); state.questSuccessLog = state.questSuccessLog || {}; state.questSuccessLog[todayStr()] = (state.questSuccessLog[todayStr()]||0)+1; gainExp(exp); addRealmEnergy(Math.round(exp*0.5));
    const _prevHp631 = state.character.hp;
    state.character.hp = Math.min(state.character.maxHp, state.character.hp + hpGainForQuest(q)); // Restore HP (skala kesulitan)
    logHpChange(state.character.hp - _prevHp631, `Selesai Quest: ${q.title}`);
    gainMana(manaGainForQuest(q), `Selesai Quest: ${q.title}`);
    if(state.settings.showFloatingExp) showFloatingExp(exp); SFX.success(); showToast(`Selamat, kamu menyelesaikan quest: ${q.title}`, 'ach'); checkAchievements(); render(); save();
    gainBondExp(2);

    }

  } catch(e) {

    try { showToast('⚠️ Gagal menyelesaikan quest karena error. Coba lagi.', 'bad'); } catch(e2) {}
  }
}

function failQuest(id){
  try {
    const q = state.quests.find(x=>x.id===id); if(!q) return;
    let penalty = 0;
    if (state.character.level > 20) {
        penalty = Math.max(50, Math.round(rewardFor(q) * 1.5 * (state.character.level / 10)));
    }

    q.status='failed';
    state.questFailLog = state.questFailLog || {}; state.questFailLog[todayStr()] = (state.questFailLog[todayStr()]||0)+1;
    const _failExpMult = state.settings.expMultiplier || 1.0;
    const _actualPenalty = penalty > 0 ? Math.round(penalty * _failExpMult) : 0;
    if(penalty > 0) gainExp(-penalty);
    bumpStat('discipline', -3);

    state.character.realmEnergy = Math.max(0, state.character.realmEnergy-10);
    state.character.failedQuests = (state.character.failedQuests || 0) + 1;

    // Mana bertindak sebagai tameng: selama masih ada, HP cuma kena sedikit (maks 3).
    // Begitu Mana habis, HP baru kena dampak signifikan.
    if(typeof state.character.mana !== 'number') state.character.mana = 200;
    let hpLoss; let manaDrained = 0; let manaWasUsed = false;
    if(state.character.mana > 0){
      const manaDrain = manaDrainForQuest(q);
      const manaBeforeDrain = state.character.mana;
      state.character.mana = Math.max(0, state.character.mana - manaDrain);
      manaDrained = manaBeforeDrain - state.character.mana;
      hpLoss = hpLossWithManaForQuest(q);
      manaWasUsed = true;
    } else {
      hpLoss = hpLossNoManaForQuest(q);
    }
    state.character.hp = Math.max(0, state.character.hp - hpLoss);
    if(hpLoss > 0) logHpChange(-hpLoss, `Gagal Quest: ${q.title}`);
    if(manaDrained > 0) logManaChange(-manaDrained, `Gagal Quest: ${q.title}`);
    checkConsequenceTrigger();
    if (state.character.hp <= 0) {
        if(isHeavenTrampling()){
            // HT specific: HP=0 triggers Qi Deviation (-3 LV, massive EXP loss)
            applyHtQiDeviation();
            showToast(`☠️ QI DEVIATION! HP Habis di Heaven Trampling — Level -3, EXP terkuras!`, 'bad');
        } else {
            const hpZeroPenalty = getHpZeroExpPenalty();
            const _actualHpZeroPenalty = Math.round(hpZeroPenalty * (state.settings.expMultiplier || 1.0));
            gainExp(-hpZeroPenalty);
            showToast(`Energi Anda Habis. Selesaikan Quest untuk Memulihkan HP. (-${_actualHpZeroPenalty} EXP)`, 'bad');
        }
    } else if(manaWasUsed) {
        const hpPart = hpLoss > 0 ? `, HP -${hpLoss}` : '';
        const expPart = _actualPenalty > 0 ? `, EXP -${_actualPenalty}` : '';
        showToast(`🛡️ Tameng Mana! Mana -${manaDrained}${hpPart}${expPart}`,'bad');
    } else {
        if(_actualPenalty > 0) showToast(`Quest Gagal! HP -${hpLoss} & EXP -${_actualPenalty}`,'bad');
        else showToast(`Quest Gagal! HP -${hpLoss}`,'bad');
    }
    SFX.error(); render(); save();
  } catch(e) {
    console.error('[MYSISTEM] Error di failQuest():', e);
    try { showToast('⚠️ Terjadi kesalahan saat menggagalkan quest.', 'bad'); } catch(e2) {}
  }
}

function duplicateQuest(id){
  const q = state.quests.find(x=>x.id===id); if(!q) return;
  const copy = JSON.parse(JSON.stringify(q));
  copy.id = uid('q');
  copy.title = q.title + ' (Salinan)';
  copy.status = 'pending';
  copy.lastCompletedAt = null;
  copy.createdAt = Date.now();
  copy.completionsToday = 0;
  const idx = state.quests.findIndex(x=>x.id===id);
  state.quests.splice(idx+1, 0, copy);
  // Sinkronkan urutan tampilan (questOrder) supaya duplikat muncul tepat setelah quest asal, bukan terlempar ke ujung list.
  if(!Array.isArray(state.meta.questOrder)) state.meta.questOrder = [];

  if(orderIdx !== -1) state.meta.questOrder.splice(orderIdx+1, 0, copy.id);
  else state.meta.questOrder.push(copy.id);
  render(); save();
  showToast('Quest "'+q.title+'" berhasil diduplikat.', 'good');
}

function getTodayActiveShift() { const map = ['minggu','senin','selasa','rabu','kamis','jumat','sabtu']; const todayName = map[new Date().getDay()]; return state.weeklyShiftPlan[todayName] || 'libur'; }

function rollover(){
  const today = todayStr();
  // BUG #3 FIX: path first-open sebelumnya return tanpa save() → _localSeq tetap 0
  // → Firebase data dengan _localSeq lebih tinggi selalu menang di _isNewer(), menimpa
  // streak=1 yang baru saja diset. Sekarang save() dipanggil sebelum return agar state
  // first-open langsung persist + _localSeq naik + Firebase dapat push yang benar.
  if(!state.meta.lastActiveDate){ state.meta.lastActiveDate = today; state.meta.lastWeekKey = weekKey(new Date()); state.meta.lastMonthKey = monthKey(new Date()); state.character.streak = (state.character.streak > 0) ? state.character.streak + 1 : 1; state.character.longestStreak = Math.max(state.character.longestStreak||0, state.character.streak); ensureCharHistory(state); if(!state.charHistory.streak.some(s=>s.ts===today)) state.charHistory.streak.push({ts:today, val:state.character.streak}); if(!state.charHistory.realm||!state.charHistory.realm.length){ const _fr=state.realms&&state.realms[state.character.realmIndex||0]; if(_fr) state.charHistory.realm.push({ts:today, val:_fr.nameID}); } state.meta.activityLog=state.meta.activityLog||{}; if(!state.meta.activityLog[today]) state.meta.activityLog[today]=1; save(); return; }
  const activeShift = getTodayActiveShift(); if(activeShift !== 'libur' && activeShift !== 'custom') state.character.shift = activeShift;
  if(state.meta.lastActiveDate === today) return;

  sweepHistoryArchive(state); // pemindah arsip otomatis harian — entri >30 hari pindah ke Sejarah Riwayat

  const gap = Math.max(1, diffDays(state.meta.lastActiveDate, today));
  const dailyQuests = state.quests.filter(q=>q.type==='daily'); const coreQuests = dailyQuests.filter(q=>q.isCore);
  const checklist = coreQuests.length ? coreQuests : dailyQuests; const allDone = checklist.length>0 && checklist.every(q=>q.status==='done');

  // ENTROPY WARNING (hanya peringatan, tidak mereset otomatis)
  if(gap >= 3) {
      setTimeout(() => {
          showToast(`⚠️ ${gap} hari tidak aktif! Jaga konsistensimu.`, 'bad');
      }, 800);
  }
  if(gap >= 1) {
      // Normal penalties if less than 3 days
      let missedCount = 0;
      dailyQuests.forEach(q => { if(q.status !== 'done' && q.status !== 'postponed') missedCount++; });
      if(missedCount > 0 && gap >= 1) {
          // ══ HEAVEN TRAMPLING specific daily penalties (lebih berat) ══
          if(isHeavenTrampling()){
              // HP berkurang 50% setiap hari melewatkan target
              const htHpLoss = Math.floor(state.character.maxHp * 0.5);
              state.character.hp = Math.max(0, state.character.hp - htHpLoss);
              logHpChange(-htHpLoss, `Heaven Trampling Punishment: ${missedCount} quest terlewat`);
              // Kehilangan 1 LV — drop tepat -1, tidak lewat gainExp agar tidak trigger cascade level-down tambahan
              if(isHeavenTrampling()){
                  state.character.level = Math.max(1, state.character.level - 1);
                  state.character.exp = 0;
              }
              // EXP loss: 20% dari EXP yang dibutuhkan untuk level saat ini.
              // Dipotong langsung ke c.exp (bukan via gainExp) agar tidak memicu level-down kedua.
              const htExpLoss = Math.floor(expNeeded(state.character.level) * 0.2);
              const _actualHtExpLoss = Math.round(htExpLoss * (state.settings.expMultiplier || 1.0));
              state.character.exp = Math.max(0, state.character.exp - _actualHtExpLoss);
              syncRealmWithLevel(state);
              showToast(`⚠️ HEAVEN TRAMPLING PUNISHMENT! HP -50%, Level -1, EXP -${_actualHtExpLoss.toLocaleString()} (${missedCount} quest terlewat)`, 'bad');
              addActivityLog(`HT Punishment: ${missedCount} quest terlewat — HP -50%, Level -1`);
              SFX.error();
              // HP = 0 → Qi Deviation (turun -3 LV)
              if(state.character.hp <= 0){
                  state.character.hp = 0;
                  applyHtQiDeviation();
              }
          } else {
              // BUGFIX: quest yang terlewat (gagal karena reset harian) sekarang lewat tameng Mana
              // dulu juga, persis seperti gagal quest manual (failQuest). Sebelumnya di sini HP
              // langsung dipotong penuh tanpa cek Mana sama sekali — jadi walau Mana masih penuh,
              // HP tetap kena penuh saat quest terlewat gara-gara refresh/reset harian.
              let totalHpLoss = 0, totalManaDrained = 0, manaWasUsedAny = false;
              dailyQuests.forEach(q => {
                  if(q.status === 'done' || q.status === 'postponed') return;
                  if(typeof state.character.mana !== 'number') state.character.mana = 200;
                  let hpLoss;
                  if(state.character.mana > 0){
                      const manaDrain = manaDrainForQuest(q);
                      const manaBeforeDrain = state.character.mana;
                      state.character.mana = Math.max(0, state.character.mana - manaDrain);
                      totalManaDrained += (manaBeforeDrain - state.character.mana);
                      hpLoss = hpLossWithManaForQuest(q);
                      manaWasUsedAny = true;
                  } else {
                      hpLoss = hpLossNoManaForQuest(q);
                  }
                  totalHpLoss += hpLoss;
              });
              if(totalManaDrained > 0) logManaChange(-totalManaDrained, `Quest terlewat saat reset harian (${missedCount} quest)`);
              state.character.hp = Math.max(0, state.character.hp - totalHpLoss);
              if(totalHpLoss > 0) logHpChange(-totalHpLoss, `Quest terlewat saat reset harian (${missedCount} quest)`);
              checkConsequenceTrigger();
              if (state.character.level > 20) {
                  const penalty = missedCount * 50 * Math.max(1, state.character.level / 10);
                  const _actualRolloverPenalty = Math.round(penalty * (state.settings.expMultiplier || 1.0));
                  gainExp(-penalty);
                  showToast(manaWasUsedAny
                      ? `🛡️ Tameng Mana menyerap! Mana -${totalManaDrained}, HP -${totalHpLoss} & EXP -${_actualRolloverPenalty} (${missedCount} Quest terlewat)`
                      : `Disiplin Mengendur: HP -${totalHpLoss} & EXP -${_actualRolloverPenalty} (${missedCount} Quest terlewat)`, 'bad');
              } else {
                  showToast(manaWasUsedAny
                      ? `🛡️ Tameng Mana menyerap! Mana -${totalManaDrained}, HP -${totalHpLoss} (${missedCount} Quest terlewat)`
                      : `Disiplin Mengendur: HP -${totalHpLoss} (${missedCount} Quest terlewat)`, 'bad');
              }
              if (state.character.hp <= 0) {
                  state.character.hp = 0;
                  const hpZeroPenalty = getHpZeroExpPenalty();
                  const _actualHpZeroPenalty = Math.round(hpZeroPenalty * (state.settings.expMultiplier || 1.0));
                  gainExp(-hpZeroPenalty);
                  showToast(`Energi Anda Habis. Selesaikan Quest untuk Memulihkan HP. (-${_actualHpZeroPenalty} EXP)`, 'bad');
              }
          }
          state.character.failedQuests = (state.character.failedQuests||0) + missedCount;
      }
  }

  state.goals.forEach(g => {
      if(g.status === 'active' && g.deadline && g.deadline < today) {
          g.status = 'failed'; state.character.failedGoals = (state.character.failedGoals||0)+1;
          gainExp(-1000 * Math.max(1, state.character.level));
          showToast(`Goal Gagal (Deadline): ${g.title} - EXP Terkuras!`, 'bad');
          // BUGFIX: dulu goal yang gagal (lewat deadline) cuma ditandai status='failed' lalu
          // "hilang" dari daftar aktif tanpa jejak — cuma goal yang SUKSES yang tercatat permanen
          // di goalHistory/Riwayat. Sekarang goal gagal juga dicatat permanen, sama seperti sukses,
          // supaya riwayat Goal tidak cuma menampilkan cerita sukses.
          if(!Array.isArray(state.goalHistory)) state.goalHistory = [];
          const _goalFailed = {
              id: g.id,
              title: g.title,
              notes: g.notes || '',
              createdAt: g.createdAt,
              deadline: g.deadline || '',
              completedAt: today,
              rewardExp: 0,
              rewardMoney: 0,
              status: 'failed',
              target: g.target,
              current: g.current,
              unit: g.unit
          };
          state.goalHistory.unshift(_goalFailed);
          _riwayatArchivePush('goal', _goalFailed);
          addTimelineEvent('goal', 'Goal "' + g.title + '" gagal (lewat deadline)', '💀');
      }
  });
  // Hapus semua goal yang sudah gagal dari daftar aktif — sudah tercatat di goalHistory.
  state.goals = state.goals.filter(g => g.status !== 'failed');

  (state.kanban.cards || []).forEach(c => {
      if(c.col !== 'selesai' && c.dateTarget && c.dateTarget < today && !c.failed) {
          c.failed = true; state.character.failedProjects = (state.character.failedProjects||0)+1;
          gainExp(-500 * Math.max(1, state.character.level));
          showToast(`Project Overdue: ${c.title} - EXP Turun!`, 'bad');
      }
  });

  // Streak naik cukup dengan membuka app hari berikutnya (login-like),
  // tidak perlu semua quest selesai. Penalty quest (HP/EXP) tetap berjalan terpisah di atas.
  if(gap===1){ state.character.streak += 1; state.character.failStreak = 0; } 
  else { state.character.streak = 0; state.character.failStreak += gap; }
  state.character.longestStreak = Math.max(state.character.longestStreak, state.character.streak);
  if(state.character.streak > 0){ ensureCharHistory(state); const _stD=todayStr(); if(!state.charHistory.streak.length||state.charHistory.streak[state.charHistory.streak.length-1].ts!==_stD) state.charHistory.streak.push({ts:_stD, val:state.character.streak}); }

  (state.quests || []).forEach(q => { if(q.type==='daily'){ q.status='pending'; q.completionsToday = 0; } });
  state.meta.completedTodayCount = 0; state.meta.hardQuestsToday = 0;
  // Reset HT quest completion tracking setiap hari
  state.character.htQuestCompletedToday = {};
  if(!state.spiritual.dailyLog) state.spiritual.dailyLog = {}; state.spiritual.dailyLog[today] = {};

  const wk = weekKey(new Date()); if(wk !== state.meta.lastWeekKey){ state.quests.filter(q=>q.type==='weekly').forEach(q=>q.status='pending'); state.meta.lastWeekKey = wk; }
  const mk = monthKey(new Date()); if(mk !== state.meta.lastMonthKey){ state.quests.filter(q=>q.type==='monthly').forEach(q=>q.status='pending'); state.meta.lastMonthKey = mk; }
  recordMomentumHistory();
  state.meta.activityLog=state.meta.activityLog||{}; if(!state.meta.activityLog[today]) state.meta.activityLog[today]=1;
  state.meta.lastActiveDate = today; checkAchievements(); save();
}

function logSpiritual(key, isSuccess, isCustom = false){
  const today = todayStr();
  state.spiritual.dailyLog = state.spiritual.dailyLog || {};
  if(!state.spiritual.dailyLog[today]) state.spiritual.dailyLog[today] = {};
  if(state.spiritual.dailyLog[today][key]) { showToast('Sudah dicatat hari ini!', 'bad'); SFX.error(); return; }
  
  let item = isCustom ? state.customRituals.find(x=>x.id===key) : SPIRITUAL_ACTIONS.find(x=>x.key===key);
  if(!item) return;

  state.spiritual.dailyLog[today][key] = isSuccess ? 'success' : 'fail';
  addActivityLog(`Ritual: ${item.label} (${isSuccess?'Berhasil':'Gagal'})`);

  if(isSuccess) {
      state.spiritual.exp += item.exp; bumpStat('spirituality',2);
      gainMana(item.wajib ? MANA_GAIN_BY_DIFFICULTY.hard : MANA_GAIN_BY_DIFFICULTY.normal, `Ritual: ${item.label}`);
      if(item.sunnah) state.spiritual.sunnahBonusDate = today;
      let leveled=false;
      while(state.spiritual.exp >= spiritualNeeded(state.spiritual.level)){ state.spiritual.exp -= spiritualNeeded(state.spiritual.level); state.spiritual.level += 1; leveled = true; }
      if(leveled) {
        const spTitle = getSpiritualTitle(state.spiritual.level);
        showToast(`Spiritual Level Up! Lv.${state.spiritual.level} — ${spTitle.icon} ${spTitle.title}`,'ach'); SFX.levelUp();
      } else { showToast('+'+item.exp+' Spiritual EXP'+(item.sunnah?' (+10% EXP Hari Ini 🌟)':''),'exp'); SFX.success(); }
  } else {
      if(item.wajib){
        state.spiritual.exp = Math.max(0, state.spiritual.exp - 10);
        const _ritualExpLoss = Math.round(50 * (state.settings.expMultiplier || 1.0));
        gainExp(-50);
        // BUGFIX: dulu Mana & HP selalu dipotong BERSAMAAN (-40 Mana DAN -3 HP tanpa syarat),
        // jadi Mana tidak benar-benar berfungsi sebagai tameng — HP tetap kena walau Mana penuh.
        // Sekarang disamakan dengan quest biasa: kalau masih ada Mana, Mana diserap dulu dan HP
        // cuma kena penalti kecil (-3, sama seperti sebelumnya). Kalau Mana sudah habis, HP kena
        // penalti penuh (-24) karena tidak ada lagi yang melindungi.
        if(typeof state.character.mana !== 'number') state.character.mana = 200;
        const _prevMana = state.character.mana;
        const _prevHpW = state.character.hp;
        let _ritualHpLoss; let _manaDrained = 0;
        if(state.character.mana > 0){
          state.character.mana = Math.max(0, state.character.mana - 40);
          _manaDrained = _prevMana - state.character.mana;
          logManaChange(-_manaDrained, `Gagal Ritual Wajib: ${item.label}`);
          _ritualHpLoss = 3;
        } else {
          _ritualHpLoss = 24;
        }
        state.character.hp = Math.max(0, (typeof state.character.hp === 'number' ? state.character.hp : 100) - _ritualHpLoss);
        logHpChange(state.character.hp - _prevHpW, `Gagal Ritual Wajib: ${item.label}`);
        checkConsequenceTrigger();
        bumpStat('discipline', -1);
        showToast(_manaDrained > 0
          ? `Gagal ${item.label}: -${_ritualExpLoss} EXP, -${_ritualHpLoss} HP, -${_manaDrained} Mana, -10 Spiritual EXP`
          : `Gagal ${item.label}: -${_ritualExpLoss} EXP, -${_ritualHpLoss} HP (Mana habis!), -10 Spiritual EXP`, 'bad');
      } else {
        const penalty = Math.round(item.exp * 0.5);
        state.spiritual.exp = Math.max(0, state.spiritual.exp - penalty);
        bumpStat('discipline', -1);
        showToast('Gagal Ritual (-'+penalty+' Spiritual EXP)','bad');
      }
      SFX.error();
  }
  recomputeLifeScore(); render(); save();
}

function habitConsecutiveDays(h, fromDate) {
  let count = 0; const d = new Date(fromDate);
  while(true) { const s = d.toLocaleDateString('en-CA'); if(h.log && h.log[s]) { count++; d.setDate(d.getDate()-1); } else break; }
  return count;
}
function habitExpByStreak(streak) {
  if(streak >= 61) return 300;
  if(streak >= 22) return 200;
  if(streak >= 8)  return 100;
  return 50;
}
function toggleHabit(id, dateStr){
  const h = state.habits.find(x=>x.id===id); if(!h) return;
  if(!h.log) h.log = {}; const isDone = !!h.log[dateStr];
  if(isDone){
    // Terkunci: habit yang sudah dicentang tidak bisa dibatalkan lagi.
    return;
  } else {
    h.log[dateStr] = true; addActivityLog(`Habit Complete: ${h.title}`);
    const streak = habitConsecutiveDays(h, dateStr);
    const exp = habitExpByStreak(streak);
    gainExp(exp); bumpStat('discipline', 1); showFloatingExp(exp); SFX.success();
  } render(); save();
  checkAllHabitsDoneToday(dateStr);
}
function checkAllHabitsDoneToday(dateStr){
  if(dateStr !== todayStr()) return;
  const habits = state.habits || [];
  if(habits.length > 0 && habits.every(h => h.log && h.log[dateStr])){
    SFX.levelUp();
    showToast('🎉 Semua Habit Hari Ini Selesai!', 'ach');
    // Setelah efek selesai tampil, habit di-refresh (dikosongkan lagi) agar bisa
    // dicentang ulang di hari yang sama — sesi berulang, bukan sekali per hari.
    setTimeout(() => {
      habits.forEach(h => { if(h.log && h.log[dateStr]) delete h.log[dateStr]; });
      render(); save();
    }, 1600);
  }
}

// ── SUMBER DATA FINANSIAL LENGKAP ────────────────────────────────────────────
// historyArchive.finansial = semua transaksi baru (di-push realtime via _riwayatArchivePush).
// financeLog entri tanpa _archived = entri lama sebelum sistem archive ada.
// Gabungan keduanya = ledger lengkap tanpa double-count.
function _getAllFinanceEntries(){
  const archived = (state.historyArchive && state.historyArchive.finansial) || [];
  const legacy   = (state.financeLog || []).filter(e => !e._archived);
  return [...archived, ...legacy];
}

// Total pengeluaran (seluruh riwayat transaksi bertipe 'out', lintas kantong Cash & Saldo)
function getTotalExpense(){ return _getAllFinanceEntries().filter(l => l.type === 'out').reduce((sum, l) => sum + l.amount, 0); }
// Total Uang = Cash + Saldo — dihitung dari ledger lengkap agar selalu sinkron.
function getSaldo(){ return getTotalUang(); }

// ── CASH & SALDO — dua kantong terpisah ─────────────────────────────────────
// Setiap transaksi in/out punya field `akun` ('cash' atau 'saldo'). Entri lama (sebelum fitur
// ini ada) tidak punya field ini — dianggap default 'cash'. Transaksi 'transfer' punya `dari`/`ke`
// dan memindahkan nominal antar kantong tanpa dihitung sebagai pemasukan/pengeluaran.
function getCashBalance(){
  let bal = 0;
  _getAllFinanceEntries().forEach(l=>{
    const akun = l.akun || 'cash';
    if(l.type === 'in' && akun === 'cash') bal += l.amount;
    else if(l.type === 'out' && akun === 'cash') bal -= l.amount;
    else if(l.type === 'transfer'){
      if(l.dari === 'cash') bal -= l.amount;
      if(l.ke === 'cash') bal += l.amount;
    }
  });
  return bal;
}
function getSaldoAccountBalance(){
  let bal = 0;
  _getAllFinanceEntries().forEach(l=>{
    const akun = l.akun || 'cash';
    if(l.type === 'in' && akun === 'saldo') bal += l.amount;
    else if(l.type === 'out' && akun === 'saldo') bal -= l.amount;
    else if(l.type === 'transfer'){
      if(l.dari === 'saldo') bal -= l.amount;
      if(l.ke === 'saldo') bal += l.amount;
    }
  });
  return bal;
}
// Total Uang = Cash + Saldo (transfer saling meniadakan, tidak mempengaruhi total)
function getTotalUang(){ return getCashBalance() + getSaldoAccountBalance(); }

// Saran kategori cepat: default umum + kategori custom yang pernah dipakai user, terbaru duluan
const DEFAULT_FIN_CATEGORIES = ['Gaji/Upah','Freelance','Bisnis','Investasi','Makan','Transport','Tagihan','Belanja','Hiburan','Kesehatan','Pendidikan'];
function getCategorySuggestions(){
  const used = [];
  // Gunakan _getAllFinanceEntries() agar kategori custom dari transaksi lama (sudah di-archive)
  // tetap muncul sebagai saran — bukan hanya dari financeLog aktif (maks 100 entri).
  _getAllFinanceEntries().forEach(l=>{
    if(l.type!=='transfer' && l.cat && l.cat!=='Lainnya' && !used.includes(l.cat)) used.push(l.cat);
  });
  const merged = [...used];
  DEFAULT_FIN_CATEGORIES.forEach(c=>{ if(!merged.includes(c)) merged.push(c); });
  return merged.slice(0, 12);
}

// Financial Rank — hanya membaca state, tidak mengubah data apapun
function getFinancialRank(){
  const income  = state.character.lifetimeIncome || 0;
  const expense = getTotalExpense();
  const saldo   = getTotalUang();
  const savingsRate = income > 0 ? saldo / income : 0;

  const RANKS = [
    { id:'poor',     name:'Poor',     icon:'🪨', color:'var(--crimson)',    glow:'rgba(255,71,104,0.4)',   minIncome:0,          minSaldo:-Infinity, minRate:-Infinity, desc:'Mulai mencatat pemasukan untuk membangun fondasi finansialmu.' },
    { id:'stable',   name:'Stable',   icon:'🛡️', color:'var(--cyan)',       glow:'rgba(45,212,244,0.4)',   minIncome:1,          minSaldo:0,         minRate:0,         desc:'Pengeluaran terkendali. Jaga rasio tabunganmu tetap positif.' },
    { id:'growing',  name:'Growing',  icon:'📈', color:'var(--jade)',       glow:'rgba(52,211,153,0.4)',   minIncome:5000000,    minSaldo:1000000,   minRate:0.10,      desc:'Pemasukan tumbuh dan tabungan menguat. Terus konsisten!' },
    { id:'investor', name:'Investor', icon:'💎', color:'var(--arise-bright)', glow:'rgba(164,139,255,0.5)',minIncome:25000000,   minSaldo:10000000,  minRate:0.20,      desc:'Kamu memiliki aset untuk diinvestasikan. Kapital bekerja untukmu.' },
    { id:'tycoon',   name:'Tycoon',   icon:'👑', color:'var(--gold)',       glow:'rgba(240,185,59,0.6)',   minIncome:100000000,  minSaldo:50000000,  minRate:0.30,      desc:'Penguasa finansial. Cashflow-mu cukup kuat untuk bebas finansial.' },
  ];

  let rank = RANKS[0];
  for(let i = RANKS.length - 1; i >= 0; i--){
    const r = RANKS[i];
    if(income >= r.minIncome && saldo >= r.minSaldo && savingsRate >= r.minRate){ rank = r; break; }
  }

  const rankIdx   = RANKS.indexOf(rank);
  const nextRank  = RANKS[rankIdx + 1] || null;
  let pct = 0;
  if(nextRank){
    const rateScore = nextRank.minRate > 0 ? Math.min(1, savingsRate / nextRank.minRate) : 1;
    const incScore  = nextRank.minIncome > 0 ? Math.min(1, income / nextRank.minIncome) : 1;
    const salScore  = nextRank.minSaldo > 0 ? Math.min(1, saldo / nextRank.minSaldo) : 1;
    pct = Math.round(Math.min(incScore, salScore, rateScore) * 100);
  } else { pct = 100; }

  return { rank, rankIdx, nextRank, pct, income, expense, saldo, savingsRate };
}

// Terapkan progress ke satu Target Finansial (dipakai baik oleh input manual maupun auto-sync pemasukan)
function applyTargetDamage(target, amount){
  if(!target || target.currentHp <= 0 || amount <= 0) return;
  target.currentHp = Math.max(0, target.currentHp - amount);
  if(target.currentHp <= 0){
      triggerBossDefeat(target.name);
      const reward = 10000 + Math.round(target.maxHp / 5000);
      gainExp(reward);
      showToast(`Target "${target.name}" Tercapai! +${reward} EXP`, 'ach');
      if(!state.completedTargets) state.completedTargets = [];
      state.completedTargets.unshift({ id: uid('ct'), name: target.name, maxHp: target.maxHp, completedAt: todayStr(), reward });
      if(state.completedTargets.length > 20) state.completedTargets.length = 20;
      markDeleted('targets', target.id);
      state.targets = state.targets.filter(t => t.id !== target.id);
  }
}

// Setiap kali ada pemasukan baru, otomatis dianggap sebagai progress menuju SEMUA Target Finansial yang masih aktif
function applyIncomeToTargets(amount){
  if(!state.targets || !state.targets.length) return;
  state.targets.slice().forEach(t => { if(t.currentHp > 0) applyTargetDamage(t, amount); });
}

// Setiap kali ada pengeluaran baru, progress target berkurang (currentHp naik, min maxHp = 0% progress)
function applyExpenseToTargets(amount){
  if(!state.targets || !state.targets.length) return;
  state.targets.forEach(t => {
    // currentHp tidak boleh melebihi maxHp (progress tidak bisa minus dari 0%)
    t.currentHp = Math.min(t.maxHp, (t.currentHp || 0) + amount);
  });
}

function addGoal(){
  const title = document.getElementById('ag-title').value.trim(); if(!title) return; 
  let target = parseFloat(document.getElementById('ag-target').value);
  const deadline = document.getElementById('ag-deadline').value || ''; 
  const notes = document.getElementById('ag-notes').value.trim();

  if(isNaN(target) || target <= 0) {
      if(deadline) { target = Math.max(1, diffDays(todayStr(), deadline)); } 
      else { target = 100; }
  }
  const unit = document.getElementById('ag-unit').value.trim() || (deadline && !document.getElementById('ag-target').value ? 'hari' : 'poin'); 
  
  if(_editingGoalId) {
      const g = state.goals.find(x=>x.id===_editingGoalId);
      if(g) { g.title=title; g.target=target; g.unit=unit; g.deadline=deadline; g.notes=notes; }
  } else {
      state.goals.push({id:uid('g'), title, target, unit, current:0, deadline, notes, status:'active', createdAt:Date.now()});
  }
  closeModal('modal-add-goal'); render(); save();
}
