function recomputeLifeScore(){
  if(!state) return; const c = state.character; const statSum = Object.values(state.stats).reduce((a,b)=>a+b,0);
  c.lifeScore = Math.max(0, (c.level-1)*10 + statSum*2 + c.streak*5 + c.realmIndex*50 + (state.spiritual.level-1)*8);
  captureLifeMomentumSnapshot();
}

// ── LIFE MOMENTUM — snapshot harian Level/Streak/Life Score (memakai data yang sudah ada, tanpa database baru).
function captureLifeMomentumSnapshot(){
  if(!state || !state.character) return;
  if(!Array.isArray(state.lifeMomentum)) state.lifeMomentum = [];
  const today = todayStr(); const c = state.character;
  const arr = state.lifeMomentum;
  const last = arr[arr.length-1];
  if(last && last.date === today){ last.level = c.level; last.streak = c.streak; last.lifeScore = c.lifeScore; }
  else { arr.push({ date: today, level: c.level, streak: c.streak, lifeScore: c.lifeScore }); }
  if(arr.length > 400) arr.splice(0, arr.length - 400);
}

function gainExp(amount){
  const c = state.character; const mult = state.settings.expMultiplier || 1.0; amount = Math.round(amount * mult);
  if(amount > 0 && state.spiritual?.sunnahBonusDate === todayStr()) amount = Math.round(amount * 1.1);
  if (amount > 0) {
      if (state.settings.dailyExpCapEnabled === true && state.meta.dailyExpEarned >= state.settings.dailyExpCap) { showToast('Batas EXP harian (' + state.settings.dailyExpCap + ') telah tercapai!', 'muted'); return; }
      const allowedExp = state.settings.dailyExpCapEnabled === true ? Math.min(amount, state.settings.dailyExpCap - state.meta.dailyExpEarned) : amount;
      state.meta.dailyExpEarned += allowedExp; c.exp += allowedExp;
      (state.meta.dailyExpLog=state.meta.dailyExpLog||{})[todayStr()] = ((state.meta.dailyExpLog||{})[todayStr()]||0) + allowedExp;
  } else {
      const oldLevel = c.level;
      c.exp += amount;
      if (c.exp < 0) {
          let remainingNeg = Math.abs(c.exp); c.exp = 0;
          while(remainingNeg > 0 && c.level > 1) {
              if (oldLevel - c.level >= 3) break; // MAX DROP 3 LEVELS
              c.level -= 1;
              const expN = expNeeded(c.level);
              if(remainingNeg > expN) { remainingNeg -= expN; }
              else { c.exp = expN - remainingNeg; remainingNeg = 0; }
          }
          showToast(`LEVEL DOWN! Kini Lv.${c.level}`, 'bad'); SFX.error();
      }
  }
  const prevRealmIdx = c.realmIndex;
  const prevBridges = c.heavenBridges || 0;
  const prevLevel = c.level;
  let leveled=false;
  // Level bisa naik tanpa batas — tidak ada cap di sini
  while(c.exp >= expNeeded(c.level)){ c.exp -= expNeeded(c.level); c.level += 1; leveled=true; }
  // Sinkronkan realm (dan heavenBridges di HT) setiap kali c.level berubah
  syncRealmWithLevel(state);
  if(leveled){
    SFX.levelUp(); showLevelUp(c.level);
    if(!state.charHistory) state.charHistory={level:[],hp:[],realm:[],streak:[]};
    const _chTs = new Date().toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    state.charHistory.level.push({ts:_chTs, val:c.level});
    // Jika realm naik (masuk HT pertama kali), tampilkan animasi breakthrough
    if(c.realmIndex > prevRealmIdx){
      const newRealm = state.realms[c.realmIndex];
      if(newRealm){ SFX.breakthrough(); triggerBreakthrough(newRealm.nameID); addTimelineEvent('realm', 'Naik ke Realm: ' + newRealm.nameID, '⛰️'); gainBondExp(50); spiritSay(getSpiritBreakthroughLine(newRealm.nameID), true); if(!state.charHistory) state.charHistory={level:[],hp:[],realm:[],streak:[]}; state.charHistory.realm.push({ts:_chTs||todayStr(), val:newRealm.nameID}); }
    }
    // Jika sudah di HT dan bridge naik (tiap 100 level), tampilkan notifikasi
    if(isHeavenTrampling() && c.heavenBridges > prevBridges){
      SFX.breakthrough();
      addActivityLog(`Jembatan Surga ke-${c.heavenBridges} ditembus!`);
      showToast(`🌉 Jembatan ${c.heavenBridges} Ditembus!`, 'ach');
      addTimelineEvent('heaven', `Jembatan Surga ke-${c.heavenBridges} Ditembus`, '🌉');
      if(c.heavenBridges === 9){
        addActivityLog('🌟 TA TIAN SEMPURNA');
        showTrophy('TA TIAN SEMPURNA', 'Penguasa Kehampaan', '🌌');
      }
    }
    // Level milestones — check every level crossed, not just final (handles multi-level jumps)
    const _MILESTONES = new Set([5,10,15,25,35,45,50,60,70,100,150,200,300,500,700,1000]);
    for(let _lv = prevLevel + 1; _lv <= c.level; _lv++){
      if(_MILESTONES.has(_lv)) addTimelineEvent('level', 'Mencapai Level ' + _lv, '⭐');
    }
  }
  recomputeLifeScore();
}

function submitBridgeTrial(success){
  closeModal('modal-bridge-trial');
  const c = state.character;
  c.pendingBridgeTrial = false;
  if(success){
    // Berhasil: maju ke bridge berikutnya
    const prevBridge = c.heavenBridges;
    c.realmEnergy -= getHtBridgeEnergy(prevBridge);
    c.heavenBridges = Math.min(9, c.heavenBridges + 1);
    addActivityLog(`Jembatan Surga ke-${c.heavenBridges} ditembus!`);
    showToast(`🌉 Jembatan ${c.heavenBridges} Ditembus! Lanjut!`, 'ach');
    addTimelineEvent('heaven', `Jembatan Surga ke-${c.heavenBridges} Ditembus (Trial)`, '🌉');
    SFX.levelUp();
    if(c.heavenBridges === 9){
      addActivityLog('🌟 TA TIAN SEMPURNA');
      showTrophy('TA TIAN SEMPURNA', 'Penguasa Kehampaan', '🌌');
    }
  } else {
    // Gagal trial: kehilangan 30% energy bridge saat ini, HP -20%, notifikasi
    const bridgeEnergy = getHtBridgeEnergy(c.heavenBridges);
    const energyLoss = Math.floor(bridgeEnergy * 0.3);
    c.realmEnergy = Math.max(0, c.realmEnergy - energyLoss);
    const hpLoss = Math.floor(c.maxHp * 0.2);
    c.hp = Math.max(0, c.hp - hpLoss);
    logHpChange(-hpLoss, `Gagal Trial Jembatan Surga ke-${c.heavenBridges + 1}`);
    addActivityLog(`Gagal Trial Bridge ${c.heavenBridges + 1} — Kehilangan Energi!`);
    showToast(`Trial Gagal! HP -${hpLoss}, Energy -${energyLoss.toLocaleString()}`, 'bad');
    SFX.error();
    if(c.hp <= 0){ applyHtQiDeviation(); }
  }
  render(); save();

function rewardFor(q){
  const cfg = state.settings || DEFAULT_SETTINGS();
  let base = (cfg.difficultyExp && cfg.difficultyExp[q.difficulty]) || DIFFICULTY_EXP[q.difficulty] || 25;
  // Skala otomatis mengikuti Realm saat ini (hanya untuk tipe reguler)
  if(q.type!=='legendary' && q.type!=='mythic' && q.type!=='heaven_trampling'){ base = base * getRealmExpScale(state.character.realmIndex); }
  if(q.type==='mythic') {
      base = 25000;
  } else if(q.type==='legendary') {
      base = 5000;
  } else if(q.type==='heaven_trampling') {
      base = q.htExp ? q.htExp : 100000;
  } else if(q.type==='special') {
      base = Math.round(base*1.3);
  }
  const comboBonus = cfg.comboBonus ? 1 + Math.min(state.meta.completedTodayCount || 0, cfg.comboBonusCap) * cfg.comboBonusStep : 1;
  const streakBonus = cfg.streakBonus ? 1 + Math.min(state.character.streak, cfg.streakBonusCap) * cfg.streakBonusStep : 1;
  const realmBonus = cfg.realmBonus ? 1 + state.character.realmIndex * cfg.realmBonusStep : 1;
  return Math.max(1, Math.round(base * comboBonus * streakBonus * realmBonus));
}

function failQuest(id){
  const q = state.quests.find(x=>x.id===id); if(!q) return; 
  let penalty = 0;
  if (state.character.level > 20) {
      penalty = Math.max(50, Math.round(rewardFor(q) * 1.5 * (state.character.level / 10))); 
  }
  
  q.status='failed';
  state.questFailLog = state.questFailLog || {}; state.questFailLog[todayStr()] = (state.questFailLog[todayStr()]||0)+1;
  if(penalty > 0) gainExp(-penalty);

  state.character.failedQuests = (state.character.failedQuests || 0) + 1;

function rollover(){
  const today = todayStr();
  // BUG #3 FIX: path first-open sebelumnya return tanpa save() → _localSeq tetap 0
  // → Firebase data dengan _localSeq lebih tinggi selalu menang di _isNewer(), menimpa
  // streak=1 yang baru saja diset. Sekarang save() dipanggil sebelum return agar state
  // first-open langsung persist + _localSeq naik + Firebase dapat push yang benar.
  if(!state.meta.lastActiveDate){ state.meta.lastActiveDate = today; state.meta.lastWeekKey = weekKey(new Date()); state.meta.lastMonthKey = monthKey(new Date()); state.character.streak = Math.max(state.character.streak||0, 1); state.character.longestStreak = Math.max(state.character.longestStreak||0, state.character.streak); if(!state.charHistory) state.charHistory={level:[],hp:[],realm:[],streak:[]}; if(!state.charHistory.streak.some(s=>s.ts===today)) state.charHistory.streak.push({ts:today, val:state.character.streak}); if(!state.charHistory.realm||!state.charHistory.realm.length){ const _fr=state.realms&&state.realms[state.character.realmIndex||0]; if(_fr) state.charHistory.realm.push({ts:today, val:_fr.nameID}); } state.meta.activityLog=state.meta.activityLog||{}; if(!state.meta.activityLog[today]) state.meta.activityLog[today]=1; save(); return; }
  const activeShift = getTodayActiveShift(); if(activeShift !== 'libur' && activeShift !== 'custom') state.character.shift = activeShift;
  if(state.meta.lastActiveDate === today) return;

  const gap = Math.max(1, diffDays(state.meta.lastActiveDate, today));
  const dailyQuests = state.quests.filter(q=>q.type==='daily'); const coreQuests = dailyQuests.filter(q=>q.isCore);
  const checklist = coreQuests.length ? coreQuests : dailyQuests; const allDone = checklist.length>0 && checklist.every(q=>q.status==='done');

  // ENTROPY WARNING (hanya peringatan, tidak mereset otomatis)
  if(gap >= 3) {
      setTimeout(() => {
          showToast(`⚠️ ${gap} hari tidak aktif! Jaga konsistensimu.`, 'bad');
      }, 800);
  }
  if(gap >= 1) {
      // Normal penalties if less than 3 days
      let missedCount = 0; let missedHpLoss = 0;
      dailyQuests.forEach(q => { if(q.status !== 'done' && q.status !== 'postponed') { missedCount++; missedHpLoss += hpLossForQuest(q); } });
      if(missedCount > 0 && gap >= 1) {
          // ══ HEAVEN TRAMPLING specific daily penalties (lebih berat) ══
          if(isHeavenTrampling()){
              // HP berkurang 50% setiap hari melewatkan target
              const htHpLoss = Math.floor(state.character.maxHp * 0.5);
              state.character.hp = Math.max(0, state.character.hp - htHpLoss);
              logHpChange(-htHpLoss, `Heaven Trampling Punishment: ${missedCount} quest terlewat`);
              // Kehilangan 1 LV — level global turun, realm ikut sync otomatis via gainExp
              if(isHeavenTrampling()){
                  state.character.level = Math.max(MAX_LEVEL, state.character.level - 1);
                  state.character.exp = 0;
              }
              // EXP loss: 20% dari EXP yang dibutuhkan untuk level saat ini
              const htExpLoss = Math.floor(expNeeded(state.character.level) * 0.2);
              gainExp(-htExpLoss);
              showToast(`⚠️ HEAVEN TRAMPLING PUNISHMENT! HP -50%, Level -1, EXP -${htExpLoss.toLocaleString()} (${missedCount} quest terlewat)`, 'bad');
              addActivityLog(`HT Punishment: ${missedCount} quest terlewat — HP -50%, Level -1`);
              SFX.error();
              // HP = 0 → Qi Deviation (turun -3 LV)
              if(state.character.hp <= 0){
                  state.character.hp = 0;
                  applyHtQiDeviation();
              }
          } else {
              state.character.hp -= missedHpLoss;
              logHpChange(-missedHpLoss, `Quest terlewat saat reset harian (${missedCount} quest)`);
              if (state.character.level > 20) {
                  const penalty = missedCount * 50 * Math.max(1, state.character.level / 10);
                  gainExp(-penalty);
                  showToast(`Disiplin Mengendur: HP Turun & -${penalty} EXP (${missedCount} Quest terlewat)`, 'bad');
              } else {
                  showToast(`Disiplin Mengendur: HP Turun (${missedCount} Quest terlewat)`, 'bad');
              }
              if (state.character.hp <= 0) {
                  state.character.hp = 0;
                  const hpZeroPenalty = getHpZeroExpPenalty();
                  gainExp(-hpZeroPenalty);
                  showToast(`Energi Anda Habis. Selesaikan Quest untuk Memulihkan HP. (-${hpZeroPenalty} EXP)`, 'bad');
              }
          }
          state.character.failedQuests = (state.character.failedQuests||0) + missedCount;
      }
  }

  state.goals.forEach(g => {
      if(g.status === 'active' && g.deadline && g.deadline < today) {
          g.status = 'failed'; state.character.failedGoals = (state.character.failedGoals||0)+1;
          gainExp(-1000 * Math.max(1, state.character.level));
          showToast(`Goal Gagal (Deadline): ${g.title} - EXP Terkuras!`, 'bad');
      }
  });

  (state.kanban.cards || []).forEach(c => {
      if(c.col !== 'selesai' && c.dateTarget && c.dateTarget < today && !c.failed) {
          c.failed = true; state.character.failedProjects = (state.character.failedProjects||0)+1;
          gainExp(-500 * Math.max(1, state.character.level));
          showToast(`Project Overdue: ${c.title} - EXP Turun!`, 'bad');
      }
  });

  // Streak naik cukup dengan membuka app hari berikutnya (login-like),
  // tidak perlu semua quest selesai. Penalty quest (HP/EXP) tetap berjalan terpisah di atas.
  if(gap===1){ state.character.streak += 1; state.character.failStreak = 0; } 
  else { state.character.streak = 0; state.character.failStreak += gap; }
  state.character.longestStreak = Math.max(state.character.longestStreak, state.character.streak);
  if(state.character.streak > 0){ if(!state.charHistory) state.charHistory={level:[],hp:[],realm:[],streak:[]}; const _stD=todayStr(); if(!state.charHistory.streak.length||state.charHistory.streak[state.charHistory.streak.length-1].ts!==_stD) state.charHistory.streak.push({ts:_stD, val:state.character.streak}); }

  (state.quests || []).forEach(q => { if(q.type==='daily'){ q.status='pending'; q.completionsToday = 0; } });
  state.meta.completedTodayCount = 0; state.meta.dailyExpEarned = 0;

  state.character.htQuestCompletedToday = {};
  if(state.sip) { state.sip.pagi.status = 'pending'; state.sip.siang.status = 'pending'; }
  if(!state.spiritual.dailyLog) state.spiritual.dailyLog = {}; state.spiritual.dailyLog[today] = {};

  const wk = weekKey(new Date()); if(wk !== state.meta.lastWeekKey){ state.quests.filter(q=>q.type==='weekly').forEach(q=>q.status='pending'); state.meta.lastWeekKey = wk; }
  const mk = monthKey(new Date()); if(mk !== state.meta.lastMonthKey){ state.quests.filter(q=>q.type==='monthly').forEach(q=>q.status='pending'); state.meta.lastMonthKey = mk; }
  recordMomentumHistory();
  state.meta.activityLog=state.meta.activityLog||{}; if(!state.meta.activityLog[today]) state.meta.activityLog[today]=1;
  state.meta.lastActiveDate = today; checkAchievements(); save();
}

function logSpiritual(key, isSuccess, isCustom = false){
  const today = todayStr();
  state.spiritual.dailyLog = state.spiritual.dailyLog || {};
  if(!state.spiritual.dailyLog[today]) state.spiritual.dailyLog[today] = {};
  if(state.spiritual.dailyLog[today][key]) { showToast('Sudah dicatat hari ini!', 'bad'); SFX.error(); return; }
  
  let item = isCustom ? state.customRituals.find(x=>x.id===key) : SPIRITUAL_ACTIONS.find(x=>x.key===key);
  if(!item) return;

  state.spiritual.dailyLog[today][key] = isSuccess ? 'success' : 'fail';
  addActivityLog(`Ritual: ${item.label} (${isSuccess?'Berhasil':'Gagal'})`);

  if(isSuccess) {
      state.spiritual.exp += item.exp; bumpStat('spirituality',2);
      if(item.sunnah) state.spiritual.sunnahBonusDate = today;
      let leveled=false;
      while(state.spiritual.exp >= spiritualNeeded(state.spiritual.level)){ state.spiritual.exp -= spiritualNeeded(state.spiritual.level); state.spiritual.level += 1; leveled = true; }
      if(leveled) {
        const spTitle = getSpiritualTitle(state.spiritual.level);
        showToast(`Spiritual Level Up! Lv.${state.spiritual.level} — ${spTitle.icon} ${spTitle.title}`,'ach'); SFX.levelUp();
      } else { showToast('+'+item.exp+' Spiritual EXP'+(item.sunnah?' (+10% EXP Hari Ini 🌟)':''),'exp'); SFX.success(); }
  } else {
      if(item.wajib){
        state.spiritual.exp = Math.max(0, state.spiritual.exp - 10);
        gainExp(-50);
        state.character.hp = Math.max(0, (state.character.hp||100) - 20);
        logHpChange(-20, `Gagal Ritual Wajib: ${item.label}`);
        bumpStat('discipline', -1);
        showToast(`Gagal ${item.label}: -50 EXP, -20 HP, -10 Spiritual EXP`, 'bad');
      } else {
        const penalty = Math.round(item.exp * 0.5);
        state.spiritual.exp = Math.max(0, state.spiritual.exp - penalty);
        bumpStat('discipline', -1);
        showToast('Gagal Ritual (-'+penalty+' Spiritual EXP)','bad');
      }
      SFX.error();
  }
  recomputeLifeScore(); render(); save();
}

function habitConsecutiveDays(h, fromDate) {
  let count = 0; const d = new Date(fromDate);
  while(true) { const s = d.toLocaleDateString('en-CA'); if(h.log && h.log[s]) { count++; d.setDate(d.getDate()-1); } else break; }
  return count;
}
function habitExpByStreak(streak) {
  if(streak >= 61) return 300;
  if(streak >= 22) return 200;
  if(streak >= 8)  return 100;
  return 50;
}
function toggleHabit(id, dateStr){
  const h = state.habits.find(x=>x.id===id); if(!h) return;
  if(!h.log) h.log = {}; const isDone = !!h.log[dateStr];
  if(isDone){
    // Terkunci: habit yang sudah dicentang tidak bisa dibatalkan lagi.
    return;
  } else {
    h.log[dateStr] = true; addActivityLog(`Habit Complete: ${h.title}`);
    const streak = habitConsecutiveDays(h, dateStr);
    const exp = habitExpByStreak(streak);
    gainExp(exp); bumpStat('discipline', 1); showFloatingExp(exp); SFX.success();
  } render(); save();
  checkAllHabitsDoneToday(dateStr);
}
function checkAllHabitsDoneToday(dateStr){
  if(dateStr !== todayStr()) return;
  const habits = state.habits || [];
  if(habits.length > 0 && habits.every(h => h.log && h.log[dateStr])){
    SFX.levelUp();
    showToast('🎉 Semua Habit Hari Ini Selesai!', 'ach');
    // Setelah efek selesai tampil, habit di-refresh (dikosongkan lagi) agar bisa
    // dicentang ulang di hari yang sama — sesi berulang, bukan sekali per hari.
    setTimeout(() => {
      habits.forEach(h => { if(h.log && h.log[dateStr]) delete h.log[dateStr]; });
      render(); save();
    }, 1600);
  }
}

function getSaldo(){ return (state.character.lifetimeIncome||0) - getTotalExpense(); }

// Financial Rank — hanya membaca state, tidak mengubah data apapun
function getFinancialRank(){
  const income  = state.character.lifetimeIncome || 0;
  const expense = getTotalExpense();
  const saldo   = income - expense;
  const savingsRate = income > 0 ? saldo / income : 0;

  const RANKS = [
    { id:'poor',     name:'Poor',     icon:'🪨', color:'var(--crimson)',    glow:'rgba(255,71,104,0.4)',   minIncome:0,          minSaldo:-Infinity, minRate:-Infinity, desc:'Mulai mencatat pemasukan untuk membangun fondasi finansialmu.' },
    { id:'stable',   name:'Stable',   icon:'🛡️', color:'var(--cyan)',       glow:'rgba(45,212,244,0.4)',   minIncome:1,          minSaldo:0,         minRate:0,         desc:'Pengeluaran terkendali. Jaga rasio tabunganmu tetap positif.' },
    { id:'growing',  name:'Growing',  icon:'📈', color:'var(--jade)',       glow:'rgba(52,211,153,0.4)',   minIncome:5000000,    minSaldo:1000000,   minRate:0.10,      desc:'Pemasukan tumbuh dan tabungan menguat. Terus konsisten!' },
    { id:'investor', name:'Investor', icon:'💎', color:'var(--arise-bright)', glow:'rgba(164,139,255,0.5)',minIncome:25000000,   minSaldo:10000000,  minRate:0.20,      desc:'Kamu memiliki aset untuk diinvestasikan. Kapital bekerja untukmu.' },
    { id:'tycoon',   name:'Tycoon',   icon:'👑', color:'var(--gold)',       glow:'rgba(240,185,59,0.6)',   minIncome:100000000,  minSaldo:50000000,  minRate:0.30,      desc:'Penguasa finansial. Cashflow-mu cukup kuat untuk bebas finansial.' },
  ];

  let rank = RANKS[0];
  for(let i = RANKS.length - 1; i >= 0; i--){
    const r = RANKS[i];
    if(income >= r.minIncome && saldo >= r.minSaldo && savingsRate >= r.minRate){ rank = r; break; }
  }

  const rankIdx   = RANKS.indexOf(rank);
  const nextRank  = RANKS[rankIdx + 1] || null;
  let pct = 0;
  if(nextRank){
    const rateScore = nextRank.minRate > 0 ? Math.min(1, savingsRate / nextRank.minRate) : 1;
    const incScore  = nextRank.minIncome > 0 ? Math.min(1, income / nextRank.minIncome) : 1;
    const salScore  = nextRank.minSaldo > 0 ? Math.min(1, saldo / nextRank.minSaldo) : 1;
    pct = Math.round(Math.min(incScore, salScore, rateScore) * 100);
  } else { pct = 100; }

  return { rank, rankIdx, nextRank, pct, income, expense, saldo, savingsRate };
}

// Terapkan progress ke satu Target Finansial (dipakai baik oleh input manual maupun auto-sync pemasukan)
function applyTargetDamage(target, amount){
  if(!target || target.currentHp <= 0 || amount <= 0) return;
  target.currentHp = Math.max(0, target.currentHp - amount);
  if(target.currentHp <= 0){
      triggerBossDefeat(target.name);
      const reward = 10000 + Math.round(target.maxHp / 5000);
      gainExp(reward);
      showToast(`Target "${target.name}" Tercapai! +${reward} EXP`, 'ach');
      if(!state.completedTargets) state.completedTargets = [];
      state.completedTargets.unshift({ id: uid('ct'), name: target.name, maxHp: target.maxHp, completedAt: todayStr(), reward });
      if(state.completedTargets.length > 20) state.completedTargets.length = 20;
      state.targets = state.targets.filter(t => t.id !== target.id);
  }
}

// Setiap kali ada pemasukan baru, otomatis dianggap sebagai progress menuju SEMUA Target Finansial yang masih aktif
function applyIncomeToTargets(amount){
  if(!state.targets || !state.targets.length) return;
  state.targets.slice().forEach(t => { if(t.currentHp > 0) applyTargetDamage(t, amount); });
}

function getCurrentTimeBlockInfo() {
    const shift = getTodayActiveShift() === 'libur' ? state.character.shift : getTodayActiveShift();
    const blocks = state.schedule[shift] || []; if (!blocks.length) return null;
    const now = new Date(); const currentMins = now.getHours() * 60 + now.getMinutes();
    for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i]; if (!b.time) continue; const parts = b.time.split(/\s*[-–—]\s*/);
        if (parts.length === 2) {
            const [sh, sm] = parts[0].split(':').map(Number); const [eh, em] = parts[1].split(':').map(Number);
            if (isNaN(sh) || isNaN(eh)) continue; let startMins = sh * 60 + (sm || 0); let endMins = eh * 60 + (em || 0);
            if (endMins < startMins) { if (currentMins >= startMins || currentMins < endMins) return { current: b, next: blocks[(i + 1) % blocks.length] }; } 
            else { if (currentMins >= startMins && currentMins < endMins) return { current: b, next: blocks[(i + 1) % blocks.length] }; }
        }
    } return null;
}

function getTimeRemainingMins(block) {
    if(!block || !block.time) return null;
    const parts = block.time.split(/\s*[-–—]\s*/);
    if(parts.length !== 2) return null;
    const [eh, em] = parts[1].split(':').map(Number);
    if(isNaN(eh)) return null;
    const now = new Date();
    const endMins = eh * 60 + (isNaN(em) ? 0 : em);
    const curMins = now.getHours() * 60 + now.getMinutes();
    const rem = endMins - curMins;
    return rem > 0 ? rem : null;
}
function completeCurrentBlock() {
    const info = getCurrentTimeBlockInfo();
    if(!info) return;
    const blockKey = (info.current.time || '') + '|' + (info.current.label || '');
    const today = todayStr();
    if(!state.completedBlocks) state.completedBlocks = {};
    if(!state.completedBlocks[today]) state.completedBlocks[today] = [];
    if(!state.completedBlocks[today].includes(blockKey)) {
        state.completedBlocks[today].push(blockKey);
        gainExp(25); showFloatingExp(25); SFX.success();
        showToast('⏱ Blok "' + info.current.label + '" selesai! +25 EXP', 'ach');
        gainBondExp(2);
    }
    save(); updateTimeBlockUI();
}
function getTodayBlockAdherence() {
    const today = todayStr();
    const done = (state.completedBlocks && state.completedBlocks[today]) ? state.completedBlocks[today].length : 0;
    const shift = getTodayActiveShift() === 'libur' ? state.character.shift : getTodayActiveShift();

    return { done, total };
}

function renderDailyTimeline() {
  const shift = getTodayActiveShift() === 'libur' ? state.character.shift : getTodayActiveShift();
  const blocks = state.schedule[shift] || [];
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nowStr = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
  const today = todayStr();

  function parseMins(s) { const [h,m] = (s||'').split(':').map(Number); return isNaN(h) ? null : h*60+(m||0); }
  function fmtDur(m) { return m>=60 ? Math.floor(m/60)+'j'+(m%60?(' '+(m%60)+'m'):'') : m+'m'; }

  if (!blocks.length) return `<div class="section-title">🕐 Time Blocking Harian</div><div class="card glass-panel" style="text-align:center;padding:24px;color:var(--muted);">Belum ada jadwal untuk shift ini.<br><button class="btn btn-ghost mt-10" onclick="setTab('profile')">Atur Jadwal di Profil →</button></div>`;

  const rowsHTML = blocks.map((b, i) => {
    const parts = (b.time||'').split(/\s*[-–—]\s*/);
    const startMins = parts[0] ? parseMins(parts[0]) : null;
    const endMins   = parts[1] ? parseMins(parts[1]) : null;
    let durMins = null;
    let isNow   = false;
    if (startMins !== null && endMins !== null) {
      durMins = endMins > startMins ? endMins - startMins : 1440 - startMins + endMins;
      isNow   = endMins > startMins
        ? (nowMins >= startMins && nowMins < endMins)
        : (nowMins >= startMins || nowMins < endMins);
    }
    const blockKey = (b.time||'') + '|' + (b.label||'');
    const isDone = !!(state.completedBlocks && state.completedBlocks[today] && state.completedBlocks[today].includes(blockKey));
    const col        = isNow ? 'var(--cyan)' : isDone ? 'var(--jade)' : 'var(--muted)';
    const barStyle   = isNow ? 'background:var(--cyan);box-shadow:0 0 5px var(--cyan);'
                     : isDone ? 'background:rgba(52,211,153,0.4);' : 'background:rgba(255,255,255,0.1);';
    const boxing     = b.boxing;
    const boxStr     = boxing ? `<span class="tb-boxing-badge">📦 ${typeof boxing==='number'&&boxing<1 ? Math.round(boxing*60)+'m' : boxing+'j'} fokus</span>` : '';
    const durStr     = durMins ? `<span class="tb-dur">${fmtDur(durMins)}</span>` : '';
    const nowDot     = isNow ? `<span class="tb-now-pulse"></span>` : '';
    return `<div class="tb-row ${isNow?'tb-row-active':''} ${isDone&&!isNow?'tb-row-done':''}">
      <div class="tb-time-col">
        <div class="tb-time-start" style="color:${col};">${escapeHtml(parts[0]||b.time)}</div>
        ${parts[1] ? `<div class="tb-time-end">${escapeHtml(parts[1])}</div>` : ''}
      </div>
      <div class="tb-indicator" style="${barStyle}"></div>
      <div class="tb-content">
        <div class="tb-label" style="color:${isNow?'var(--bone)':isDone?'var(--jade)':'var(--muted-2)'};">${nowDot}${isDone&&!isNow?'✓ ':''}${escapeHtml(b.label)}</div>
        <div class="tb-meta">${durStr}${boxStr}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="section-title row-between">🕐 Time Blocking Harian<span class="small muted">${shift.toUpperCase()} · ${nowStr}</span></div>
  <div class="card glass-panel tb-container">${rowsHTML}</div>`;
}

function questCardHTML(q, compact){
  const tmeta = TYPE_META[q.type] || TYPE_META.daily; const exp = rewardFor(q);
  const statsHtml = (q.stats||[]).map(s=> statDef(s) ? `<span class="stat-chip">${statDef(s).label}${STAT_ID_LABELS[s] ? `<span style="font-size:8.5px;color:var(--muted);font-weight:400;display:block;line-height:1.3;">${STAT_ID_LABELS[s]}</span>` : ''}</span>` : '').join('');
  let actions = ''; const remaining = getRemainingCompletions(q); const isDailyDone = q.dailyLimit && !canCompleteQuestToday(q);
  const badgeHTML = isDailyDone ? `<span class="pill" style="background:rgba(52,211,153,0.15);color:var(--jade);">✓ Selesai Hari Ini</span>` : (q.dailyLimit ? `<span class="pill" style="background:rgba(255,255,255,0.05);color:var(--muted);">Sisa: ${remaining}x</span>` : '');
  const btnDisabled = isDailyDone ? 'disabled' : '';

  // Deadline display untuk Heaven Quest manual
  let deadlineHtml = '';
  if(q.type === 'heaven_trampling' && q.deadline && q.status !== 'done'){
    const dLeft = diffDays(todayStr(), q.deadline);
    if(dLeft < 0) deadlineHtml = `<div class="small mt-10" style="color:var(--crimson);font-weight:700;">🚨 TERLAMBAT ${Math.abs(dLeft)} hari</div>`;
    else if(dLeft === 0) deadlineHtml = `<div class="small mt-10" style="color:var(--orange);font-weight:700;animation:pulseOpacity 1s infinite;">⚠️ DEADLINE HARI INI!</div>`;
    else deadlineHtml = `<div class="small mt-10" style="color:var(--muted);">⏳ Sisa: ${dLeft} hari</div>`;
  }

  if(q.status==='pending'){
    actions = `<button class="btn btn-primary btn-sm" ${btnDisabled} onclick="completeQuest('${q.id}')">✓ Selesai</button><button class="btn btn-ghost btn-sm" onclick="postponeQuest('${q.id}')">Tunda</button><button class="btn btn-danger btn-sm" onclick="failQuest('${q.id}')">Gagal</button>`;
  } else if(q.status==='done'){ actions = `<span class="pill" style="background:rgba(52,211,153,0.15);color:var(--jade);">✓ Selesai</span>`; } 
  else if(q.status==='failed'){ actions = `<button class="btn btn-ghost btn-sm" onclick="resetQuestStatus('${q.id}')">↺ Coba Lagi</button>`; } 
  else if(q.status==='postponed'){ actions = `<button class="btn btn-ghost btn-sm" onclick="resetQuestStatus('${q.id}')">↺ Aktifkan</button>`; }
  const editFn = q.type === 'heaven_trampling' ? `openEditHeavenQuestModal('${q.id}')` : `openEditQuest('${q.id}')`;
  const _dragAttrs = compact ? '' : `draggable="true" data-qid="${q.id}" ondragstart="qDragStart('${q.id}',event)" ondragover="qDragOver('${q.id}',event)" ondrop="qDrop('${q.id}',event)" ondragend="qDragEnd(event)"`;
  return `
  <div class="quest-card ${tmeta.cls} status-${q.status} ${q.type==='legendary'||q.type==='heaven_trampling'?'is-legendary':q.type==='mythic'?'is-mythic':''}" ${_dragAttrs}>
    <div class="quest-title-row">
      <div class="quest-title">${escapeHtml(q.title)}${q.isCore?'<div class="quest-core-tag">CORE HABIT</div>':''}</div>
      <div>
        ${compact ? '' : `<button class="icon-btn quest-drag-handle" title="Seret untuk reorder" style="cursor:grab;color:var(--muted);font-size:15px;padding:2px 4px;" onmousedown="qHandleDown()">☰</button>`}
        <button class="icon-btn" onclick="${editFn}" title="Edit"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="icon-btn" onclick="deleteQuestConfirm('${q.id}')" title="Hapus"><svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg></button>
      </div>
    </div>
    <div class="quest-meta"><span class="pill" style="background:rgba(124,92,255,0.12);color:var(--arise-bright);">${tmeta.label}</span><span class="quest-reward">+${exp} EXP</span> ${badgeHTML}</div>
    ${statsHtml ? `<div class="quest-stats">${statsHtml}</div>` : ''} ${q.notes ? `<div class="quest-notes">${escapeHtml(q.notes)}</div>` : ''}
    ${deadlineHtml}
    <div class="quest-actions">${actions}</div>
  </div>`;
}

function renderQuests(){
  const filter = state.ui.questFilter || 'all';
  const baseFilters = [['all','Semua'],['daily','Daily · Harian'],['weekly','Weekly · Mingguan'],['monthly','Monthly · Bulanan'],['special','Special · Spesial'],['mythic','⚔️ Mythic'],['legendary','👑 Legendary']];
  // Filter Heaven Trampling hanya tampil saat sudah di HT
  const htActive = isHeavenTrampling();
  const filters = htActive ? [...baseFilters, ['heaven_trampling','🌉 Heaven Trampling']] : baseFilters;
  // Pisahkan quest buatan user tipe HT dari normalQuests — hanya tampil di htSection (HT realm)
  let list = state.quests.slice().filter(q=>q.type!=='heaven_trampling');
  if(filter!=='all') list = list.filter(q=>q.type===filter);
  let htSection = '';
  if(htActive && (filter==='all' || filter==='heaven_trampling')){
    const today = todayStr();
    // Heaven Quest buatan user manual
    const userHtList = state.quests.filter(q=>q.type==='heaven_trampling');
    const ord2 = {pending:0,postponed:1,failed:2,done:3};
    userHtList.sort((a,b)=>(ord2[a.status]-ord2[b.status])||(b.createdAt-a.createdAt));
    const userHtHtml = userHtList.length > 0
      ? `<div class="section-title" style="color:var(--gold);font-size:12.5px;margin-top:14px;">🌟 Heaven Quest (Manual)</div>${userHtList.map(q=>questCardHTML(q,false)).join('')}`
      : '';
    htSection = `<button class="btn btn-gold btn-block" style="margin:10px 0 4px;" onclick="openAddHeavenQuestModal()">+ Tambah Heaven Quest</button>${userHtHtml}`;
  }
  const order = {pending:0, postponed:1, failed:2, done:3}; const _qo = state.meta.questOrder || []; list.sort((a,b)=>{ const sd=order[a.status]-order[b.status]; if(sd!==0) return sd; const ia=_qo.indexOf(a.id),ib=_qo.indexOf(b.id); if(ia===-1&&ib===-1) return b.createdAt-a.createdAt; if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib; });
  const normalQuests = list.length===0 && filter==='heaven_trampling' ? '' : (list.length===0 ? `<div class="empty-state card"><span class="big">Tidak ada quest</span>Coba filter lain atau tambahkan quest baru.</div>` : list.map(q=>questCardHTML(q,false)).join(''));
  return `<div data-sec-tab="quests" data-sec-id="quest-list"><div class="quest-filters">${filters.map(([key,label])=>`<button class="chip ${filter===key?'active':''}" onclick="setQuestFilter('${key}')">${label}</button>`).join('')}</div><button class="btn btn-primary btn-block" style="margin-bottom:16px;" onclick="openAddQuestModal()">+ Tambah Quest</button>${htSection}${normalQuests}</div><div data-sec-tab="quests" data-sec-id="todos">${renderTodos()}</div>`;
}
function setQuestFilter(key){ state.ui.questFilter = key; save(); render(); }

    <div style="position:relative;width:100%;height:80px;"><canvas id="goalBarChart"></canvas></div>
  </div>

    <div class="card-title" style="margin-bottom:6px;font-size:11px;">Proporsi Goal</div>

    const pct = Math.max(0,Math.min(100, Math.round(100*g.current/(g.target||1)))); const dots = [25,50,75,100].map(m=>`<div class="mini-dot ${pct>=m?'done':''}"></div>`).join('');
    let deadlineHtml = ''; if(g.deadline) { const dLeft = diffDays(todayStr(), g.deadline); if(dLeft > 0) deadlineHtml = `<div class="small mt-10" style="color:var(--orange); font-weight:700;">⏳ Sisa: ${dLeft} Hari</div>`; else if(dLeft === 0) deadlineHtml = `<div class="small mt-10" style="color:var(--crimson); font-weight:700; animation:pulseOpacity 1s infinite;">⚠️ DEADLINE HARI INI!</div>`; else deadlineHtml = `<div class="small mt-10" style="color:var(--crimson); font-weight:700;">🚨 TERLAMBAT ${Math.abs(dLeft)} HARI</div>`; }

              <button class="icon-btn" onclick="deleteGoalConfirm('${g.id}')"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg></button>
            </div>
        </div>
        ${g.notes ? `<div class="quest-notes">${escapeHtml(g.notes)}</div>` : ''}
        <div class="row-between small mt-10"><span class="muted">${g.current} / ${g.target} ${escapeHtml(g.unit)}</span><span class="muted">${pct}%</span></div>
        <div class="stat-track mt-10"><div class="stat-fill" style="width:${pct}%;background:var(--arise)"></div></div>
        <div class="mini-dot-row">${dots}</div>${deadlineHtml}${failedBadge}
        <div style="display:flex; gap:6px; margin-top:10px;"><button class="btn btn-primary" style="flex:1;" onclick="openUpdateGoal('${g.id}')">Update</button><button class="btn btn-secondary" style="flex:0 0 auto; width:40px; padding:0;" onclick="quickAddGoal('${g.id}')" title="Quick +1">+1</button></div>
    </div>`;
  }).join('');
  const activeSection = goalChartsHtml + `<div class="section-title">Tujuan / Goals</div><button class="btn btn-primary btn-block" style="margin-bottom:16px;" onclick="openAddGoal()">+ Tambah Goal</button>${activeGoals.length===0 ? `<div class="empty-state card"><span class="big">Belum ada goal aktif</span>Tambahkan goal baru atau lihat riwayat di bawah.</div>` : cards}`;
  return '<div data-sec-tab="goals" data-sec-id="active-goals">'+activeSection+'</div>'+'<div data-sec-tab="goals" data-sec-id="goal-history">'+renderGoalHistory()+'</div>';

let _goalDetailId = null;
function openGoalDetail(id) {
  const h = (state.goalHistory || []).find(x => x.id === id);

  openModal('modal-goal-detail');
}

function initFinancialMomentumChart() {
    if(typeof Chart === 'undefined') { const c=document.getElementById('financialMomentumChart'); if(c){ const p=c.parentElement; p.innerHTML='<div class="small muted" style="text-align:center;padding:20px;">📊 Grafik tidak tersedia (perlu koneksi internet)</div>'; } return; }
    const ctx = document.getElementById('financialMomentumChart'); if(!ctx) return; if(financialMomentumChart) financialMomentumChart.destroy();

    const DAYS = 14;
    const dayKeys = []; const dayLabels = [];
    for(let i=DAYS-1; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); dayKeys.push(d.toLocaleDateString('en-CA')); dayLabels.push(d.toLocaleDateString('id-ID', {day:'numeric', month:'short'})); }

    const perDay = {}; dayKeys.forEach(k => perDay[k] = { in: 0, out: 0, inNotes: [], outNotes: [] });
    (state.financeLog||[]).forEach(l => {
        if(!perDay[l.date]) return;
        if(l.type === 'out') { perDay[l.date].out += l.amount; perDay[l.date].outNotes.push(l.note || 'Tanpa kategori'); }
        else { perDay[l.date].in += l.amount; perDay[l.date].inNotes.push(l.note || 'Tanpa kategori'); }
    });

    const incomeData = dayKeys.map(k => perDay[k].in);
    const expenseData = dayKeys.map(k => -perDay[k].out);
    const trendData = dayKeys.map(k => perDay[k].in - perDay[k].out);

    Chart.defaults.color = '#9492AC'; Chart.defaults.font.family = "'Rajdhani', sans-serif";
    financialMomentumChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dayLabels,
            datasets: [
                { label: 'Pemasukan', data: incomeData, borderColor: '#34D399', backgroundColor: 'rgba(52,211,153,0.12)', borderWidth: 2, tension: 0.35, fill: true, pointBackgroundColor: '#34D399', pointBorderColor: '#fff', pointRadius: 4, pointHoverRadius: 6 },
                { label: 'Pengeluaran', data: expenseData, borderColor: '#FF4768', backgroundColor: 'rgba(255,71,104,0.10)', borderWidth: 2, tension: 0.35, fill: true, pointBackgroundColor: '#FF4768', pointBorderColor: '#fff', pointRadius: 4, pointHoverRadius: 6 },
                { label: 'Tren Harian (Net)', data: trendData, borderColor: '#F0B93B', backgroundColor: 'transparent', borderWidth: 2, borderDash: [5,4], tension: 0.35, fill: false, pointBackgroundColor: '#F0B93B', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 5 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { callback: function(value) { if(Math.abs(value) >= 1000000) return (value / 1000000).toFixed(1) + 'M'; if(Math.abs(value) >= 1000) return (value / 1000).toFixed(1) + 'K'; return value; }, font:{size:10} } },
                x: { grid: { display: false }, ticks: { font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:7 } }
            },
            plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${c.datasetIndex===1 ? '-'+formatRupiah(Math.abs(c.raw)) : (c.datasetIndex===0 ? '+' : (c.raw>=0?'+':'-'))+formatRupiah(Math.abs(c.raw))}` } }
            },
            onClick: (evt, elements) => {
                const infoEl = document.getElementById('fm-point-info'); if(!infoEl) return;
                if(!elements || !elements.length) return;
                const el = elements[0];
                const dayKey = dayKeys[el.index];
                const info = perDay[dayKey];
                const dateLabel = dayLabels[el.index];
                let nominal, kategori, colorVar;
                if(el.datasetIndex === 0){ nominal = info.in; kategori = info.inNotes.length ? info.inNotes.join(', ') : '-'; colorVar = 'var(--jade)'; nominal = '+' + formatRupiah(nominal); }

function renderBlueprintSection() {
    const bp = state.kanban.blueprint || [];

        'building': { label: '🔨 Sedang Dibangun', cls: 'status-building' },

        'high':   { label: '🔴 Tinggi', color: 'var(--crimson)' },

                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;">

// ═══════════════════════════════════
// PATCH 2 — Reward EXP Project berdasarkan durasi pengerjaan (saat Project selesai)
// 1–3 Hari: +100 | 4–7 Hari: +300 | 8–14 Hari: +700 | 15–30 Hari: +1500 | >30 Hari: +3000
// ═══════════════════════════════════
function projectDurationDays(card){
  const start = (card && (card.dateStart || card.createdAt)) || todayStr();
  return Math.max(1, diffDays(start, todayStr()));
}
function getProjectExpReward(days){
  const d = Math.max(1, days || 1);
  const ri = Math.max(0, state.character.realmIndex || 0);
  const mult = 1 + ri * 0.15;
  return Math.round(d * 20 * mult);
}
function getProjectDeadlineDays(card){
  if(!card) return 1;
  const start = card.dateStart || (card.createdAt ? new Date(card.createdAt).toLocaleDateString('en-CA') : todayStr());
  const deadline = card.dateTarget;
  if(deadline && deadline > start) return Math.max(1, diffDays(start, deadline));
  return projectDurationDays(card);
}

function addProjectProgress(id) {
    const c = state.kanban.cards.find(x=>x.id===id); if(!c) return;
    c.progress = Math.min(100, c.progress + 10);
    state.projectProgressLog = state.projectProgressLog || {}; state.projectProgressLog[todayStr()] = (state.projectProgressLog[todayStr()]||0)+1;
    gainExp(10); 
    if(c.progress === 100 && c.col !== 'selesai') {
        c.col = 'selesai';
        c.completedAt = todayStr();
        const deadlineDays = getProjectDeadlineDays(c);
        const expGain = getProjectExpReward(deadlineDays);
        gainExp(expGain);
        showToast('Project Selesai! +'+expGain+' EXP', 'ach');
        SFX.success();
    } else {
        SFX.click();
    }
    render(); save();
}

function openBlueprintModal(editId) {
    const titleEl = document.getElementById('bp-modal-title');
    if(titleEl) titleEl.textContent = editId ? '✏️ Edit Tahapan Blueprint' : '📐 Tambah Tahapan Blueprint';
    document.getElementById('bp-edit-id').value = editId || '';
    if(editId) {
        const item = (state.kanban.blueprint||[]).find(x=>x.id===editId);
        if(!item) return;
        document.getElementById('bp-label').value = item.label||'';
        document.getElementById('bp-desc').value = item.desc||'';
        document.getElementById('bp-dateStart').value = item.dateStart||'';
        document.getElementById('bp-deadline').value = item.deadline||'';
        document.getElementById('bp-priority').value = item.priority||'medium';
        document.getElementById('bp-status').value = item.status||'planning';
        document.getElementById('bp-notes').value = item.notes||'';
    } else {
        document.getElementById('bp-label').value = '';
        document.getElementById('bp-desc').value = '';
        document.getElementById('bp-dateStart').value = '';
        document.getElementById('bp-deadline').value = '';
        document.getElementById('bp-priority').value = 'medium';
        document.getElementById('bp-status').value = 'planning';
        document.getElementById('bp-notes').value = '';
    }
    openModal('modal-blueprint');
}
function submitBlueprintItem() {
    const label = document.getElementById('bp-label').value.trim();
    if (!label) { showToast('Judul tahapan wajib diisi', 'bad'); return; }
    if (!Array.isArray(state.kanban.blueprint)) state.kanban.blueprint = [];
    const editId = document.getElementById('bp-edit-id').value;
    const data = {
        label,
        desc: document.getElementById('bp-desc').value.trim(),
        status: document.getElementById('bp-status').value,
        dateStart: document.getElementById('bp-dateStart').value,
        deadline: document.getElementById('bp-deadline').value,
        priority: document.getElementById('bp-priority').value || 'medium',
        notes: document.getElementById('bp-notes').value.trim(),
    };
    if(editId) {
        const idx = state.kanban.blueprint.findIndex(x=>x.id===editId);
        if(idx >= 0) state.kanban.blueprint[idx] = {...state.kanban.blueprint[idx], ...data};
        showToast('Tahapan diperbarui! ✓', 'ach');
    } else {
        state.kanban.blueprint.push({id: 'bp_' + Date.now(), ...data});
        showToast('Tahapan ditambahkan! ✓', 'ach');
    }
    closeModal('modal-blueprint'); render(); save(); SFX.success();
}
function cycleBlueprintStatus(id) {
    const order = ['planning', 'building', 'done'];
    const item = (state.kanban.blueprint || []).find(x => x.id === id);
    if (!item) return;
    const prevStatus = item.status;
    item.status = order[(order.indexOf(item.status) + 1) % order.length];
    if(item.status === 'done' && prevStatus !== 'done') {
        gainExp(200);
        showToast('📐 Tahapan Blueprint Selesai! +200 EXP 🏆', 'ach');
        SFX.levelUp();
    } else {
        SFX.click();
    }
    render(); save();
}
function deleteBlueprintItem(id) {
    state.kanban.blueprint = (state.kanban.blueprint || []).filter(x => x.id !== id);
    render(); save(); SFX.click();
}

function saveJournal(){
  const el = document.getElementById('rf-journal-input'); if(!el) return;
  const content = el.value.trim(); if(!content){ showToast('Tulis dulu isi jurnalmu.','bad'); return; }
  if(!state.refleksi) state.refleksi={journals:[],questions:[]};
  const now = new Date(); const ts = now.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const date = now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  state.refleksi.journals.push({id:uid('rf'), date, content, ts, pinnedHome:false});
  el.value=''; save(); render(); showToast('Jurnal tersimpan! ✦','ach');
}
function deleteRefleksiJournal(jId){
  if(!state.refleksi) return;
  state.refleksi.journals = state.refleksi.journals.filter(j=>j.id!==jId);
  save(); render();
}
function pinJournalHome(jId){
  if(!state.refleksi) return;
  state.refleksi.journals.forEach(j=>{ j.pinnedHome = j.id===jId ? !j.pinnedHome : false; });
  save(); render(); showToast(state.refleksi.journals.find(j=>j.id===jId)?.pinnedHome ? '✅ Dipakai di Home!':'↩️ Dilepas dari Home','ach');
}
function addRefleksiQuestion(){
  const el = document.getElementById('rf-new-question'); if(!el) return;
  const q = el.value.trim(); if(!q){ showToast('Tulis pertanyaanmu dulu.','bad'); return; }
  if(!state.refleksi) state.refleksi={journals:[],questions:[]};
  state.refleksi.questions.push({id:uid('rq'), q, answer:'', ts:'', pinnedProfile:false, answers:[]});
  el.value=''; save(); render(); showToast('Pertanyaan ditambahkan! ✦','ach');
}
function saveRefleksiAnswer(qId){
  if(!state.refleksi) return;
  const el = document.getElementById('rf-ans-'+qId); if(!el) return;
  const answer = el.value.trim(); if(!answer){ showToast('Jawaban tidak boleh kosong.','bad'); return; }
  const q = state.refleksi.questions.find(x=>x.id===qId); if(!q) return;
  const now = new Date();
  const ts = now.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const date = now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  // Simpan jawaban lama ke riwayat sebelum overwrite
  if(!Array.isArray(q.answers)) q.answers = [];
  if(q.answer && q.answer.trim() && q.answer.trim() !== answer) {
    q.answers.push({text: q.answer, ts: q.ts||'', date: q.date||''});
    if(q.answers.length > 50) q.answers = q.answers.slice(-50); // max 50 riwayat
  }
  q.answer = answer; q.ts = ts;
  if(!q.date) q.date = date;
  save(); render(); showToast('Jawaban tersimpan! ✦','ach');
}
function deleteRefleksiQuestion(qId){
  if(!state.refleksi) return;
  state.refleksi.questions = state.refleksi.questions.filter(q=>q.id!==qId);
  save(); render();
}
function pinQuestionProfile(qId){
  if(!state.refleksi) return;
  const q = state.refleksi.questions.find(x=>x.id===qId); if(!q) return;
  if(!q.answer){ showToast('Jawab pertanyaan dulu sebelum dipajang.','bad'); return; }
  state.refleksi.questions.forEach(x=>{ x.pinnedProfile = x.id===qId ? !x.pinnedProfile : false; });
  save(); render(); showToast(state.refleksi.questions.find(x=>x.id===qId)?.pinnedProfile ? '✅ Dipakai di Profil!':'↩️ Dilepas dari Profil','ach');
}
function renderRefleksiProfileChip(){
  if(!state.settings?.showRefleksiProfile) return '';
  const rf = state.refleksi || {};
  const q = (rf.questions||[]).find(x=>x.pinnedProfile && x.answer);
  if(!q) return '';
  const short = q.answer.slice(0,80)+(q.answer.length>80?'…':'');
  return `<div style="margin-top:7px;">
    <div class="refleksi-profile-chip" style="cursor:default;"><span>✦</span><span>${escapeHtml(short)}</span></div>
    <button class="btn btn-ghost btn-sm" onclick="openRefleksiFullModal()" style="margin-top:5px;font-size:10px;padding:3px 10px;letter-spacing:0.3px;">📖 Baca Selengkapnya</button>
  </div>`;
}

function openRefleksiFullModal(){
  const rf = state.refleksi || {};
  const q = (rf.questions||[]).find(x=>x.pinnedProfile && x.answer);
  if(!q) return;
  document.getElementById('rfm-question').textContent = q.q;

function renderLifeTimeline(){
  const entries = (state.lifeTimeline || []).slice().sort((a,b) => {
    const da = a.date||'0000-00-00'; const db = b.date||'0000-00-00';
    if(db !== da) return db.localeCompare(da);
    return (b.ts||0) - (a.ts||0);
  });
  if(!entries.length) return `<div class="lt-empty">Belum ada momen tercatat.<br><span style="font-size:11px;">Selesaikan goal, naik level, atau buka achievement untuk memulai.</span></div>`;
  const byYear = {};
  entries.forEach(e => {
    const yr = (e.date||'????').slice(0,4);
    if(!byYear[yr]) byYear[yr] = [];
    byYear[yr].push(e);
  });
  const years = Object.keys(byYear).sort((a,b) => b-a);
  const typeColor = { goal:'var(--jade)', ach:'var(--arise-bright)', title:'var(--gold)', realm:'var(--cyan)', heaven:'var(--gold-soft)', level:'var(--arise)' };
  const SHOW_LIMIT = 4;
  return years.map(yr => {
    const all = byYear[yr];
    const isExp = !!_ltExpanded[yr];
    const shown = isExp ? all : all.slice(0, SHOW_LIMIT);
    const hiddenN = all.length - SHOW_LIMIT;
    const items = shown.map(e => {
      const col = typeColor[e.type] || 'var(--bone)';
      const dayDisp = e.date ? e.date.slice(5).replace('-','/') : '';
      const timeDisp = e.ts ? new Date(e.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) : '';
      const dateStr = dayDisp + (timeDisp ? ' · ' + timeDisp : '');
      return `<div class="lt-entry type-${e.type}">
        <div class="lt-entry-top">
          <span class="lt-icon">${escapeHtml(e.icon||'📌')}</span>
          <span class="lt-desc" style="color:${col};">${escapeHtml(e.desc)}</span>
          <span class="lt-date">${dateStr}<span class="lt-time"></span></span>
        </div>
      </div>`;
    }).join('');
    let toggleBtn = '';
    if (!isExp && hiddenN > 0) {
      toggleBtn = `<button class="lt-show-more" onclick="toggleLtYear('${yr}')">+${hiddenN} momen lainnya di ${yr} — Lihat Semua ↓</button>`;
    } else if (isExp && all.length > SHOW_LIMIT) {
      toggleBtn = `<button class="lt-show-more" onclick="toggleLtYear('${yr}')">Sembunyikan ↑</button>`;
    }
    return `<div class="lt-year-block"><div class="lt-year-header">${yr}</div><div class="lt-spine">${items}</div>${toggleBtn}</div>`;
  }).join('');
}
function toggleLtYear(yr){ _ltExpanded[yr] = !_ltExpanded[yr]; render(); }

function calcHabitRateWeek(daysAgoStart, daysAgoEnd = 0) {
   if(!state.habits || state.habits.length === 0) return 0; let possible = 0; let done = 0;
   for(let i = daysAgoStart - 1; i >= daysAgoEnd; i--) { let d = new Date(); d.setDate(d.getDate() - i); let dStr = d.toLocaleDateString('en-CA'); state.habits.forEach(h => { possible++; if(h.log && h.log[dStr]) done++; }); }
   return possible === 0 ? 0 : Math.round((done/possible)*100);
}
function formatExpShort(n){
  if(n===0) return 'Awal';
  if(n>=1e12) return (n/1e12).toFixed(1).replace(/\.0$/,'')+'T';
  if(n>=1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'')+'M';
  if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'Jt';
  if(n>=1e3) return (n/1e3).toFixed(0)+'Rb';
  return String(n);
}

          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
              <span class="re-num" style="color:${sc};border:1px solid ${sc}30;">#${i+1}</span>
              ${badge}
            </div>
            <div class="re-name" style="color:${nameColor};">${escapeHtml(r.name)}</div>
            <div class="re-desc">${escapeHtml(r.desc)}</div>
            ${expDetail}
          </div>
          <div class="re-lv-block">
            <div class="re-lv-label">LV</div>
            <div class="re-lv-val" style="color:${sc};">${lvStart}–${lvEnd}</div>
            <div class="re-lv-label" style="margin-top:8px;">EXP Awal</div>
            <div class="re-exp-val">${formatExpShort(r.reqEnergy)}</div>
          </div>
        </div>
      </div>`;
    });
  }

  // Heaven Trampling bridge table — EXP dihitung dari rumus level (sinkron dengan syncRealmWithLevel)
  // Bridge N dimulai pada LV MAX_LEVEL + N×100, sehingga 1 bridge = 100 LV
  const _htThresh = Array.from({length:10}, (_,b) => cumulativeExpForLevel(MAX_LEVEL + b * 100));
  html += `<div class="card" style="margin-top:4px;margin-bottom:14px;border-color:rgba(255,200,50,0.3);background:rgba(20,10,0,0.5);">
    <div class="card-title" style="color:var(--gold);">⚡ Heaven Trampling — 9 Jembatan Surgawi</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Setelah LV 240, kultivasi berlanjut melewati 9 Jembatan Surgawi. Setiap jembatan membutuhkan 100 Level.</div>`;
  for(let bi=0;bi<9;bi++){
    const bNo = bi+1;
    const startLv = MAX_LEVEL + bi * 100 + 1;
    const endLv   = MAX_LEVEL + (bi+1) * 100;
    const expForBridge  = _htThresh[bi+1] - _htThresh[bi];       // EXP khusus bridge ini
    const expCumulative = _htThresh[bi+1];                        // EXP kumulatif dari LV 1
    const htActive = isHeavenTrampling();
    const reached  = htActive && c.heavenBridges > bi;
    const isCur    = htActive && c.heavenBridges === bi;
    const rowCls   = isCur ? 're-bridge-row re-bridge-active' : 're-bridge-row';
    const nameColor= reached?'var(--gold)':isCur?'var(--gold-soft)':'var(--muted)';
    const icon     = reached?'✓':isCur?'▶':'○';
    html += `<div class="${rowCls}">
      <div>
        <div style="font-family:var(--font-system);font-size:12.5px;font-weight:700;color:${nameColor};">${icon} Jembatan ${bNo}</div>
        <div style="font-size:10px;color:var(--muted-2);margin-top:2px;">LV ${startLv}–${endLv}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;color:var(--muted);">${formatExpShort(expForBridge)} EXP</div>
        <div style="font-size:10px;color:var(--muted-2);">Kumulatif: ${formatExpShort(expCumulative)}</div>
      </div>
    </div>`;
  }
  html += `</div>`;

  return html;
}

function generateWeeklyInsights() {
  const today = new Date();
  const weekAgoStr    = new Date(today - 7*86400000).toLocaleDateString('en-CA');
  const twoWeeksStr   = new Date(today - 14*86400000).toLocaleDateString('en-CA');
  const insights = [];

  // 1. Pengeluaran minggu ini vs minggu lalu
  const expThis = (state.financeLog||[]).filter(l=>l.type==='out'&&l.date>=weekAgoStr).reduce((s,l)=>s+l.amount,0);
  const expLast = (state.financeLog||[]).filter(l=>l.type==='out'&&l.date>=twoWeeksStr&&l.date<weekAgoStr).reduce((s,l)=>s+l.amount,0);
  if(expLast>0 && expThis!==expLast) {
    const pct=Math.round(Math.abs(expThis-expLast)/expLast*100);
    if(pct>0){ const turun=expThis<expLast; insights.push({icon:'💸',text:`Pengeluaran ${turun?'turun':'naik'} <b>${pct}%</b> dibanding minggu lalu`,col:turun?'var(--jade)':'var(--crimson)'}); }
  }

  // 2. Aktivitas/quest selesai minggu ini vs minggu lalu
  const actThis=Object.entries(state.meta.activityLog||{}).filter(([d])=>d>=weekAgoStr).reduce((s,[,v])=>s+v,0);
  const actLast=Object.entries(state.meta.activityLog||{}).filter(([d])=>d>=twoWeeksStr&&d<weekAgoStr).reduce((s,[,v])=>s+v,0);
  if(actLast>0 && actThis!==actLast) {
    const pct=Math.round(Math.abs(actThis-actLast)/actLast*100);
    if(pct>0){ const naik=actThis>actLast; insights.push({icon:'⚔️',text:`Quest selesai ${naik?'naik':'turun'} <b>${pct}%</b> dibanding minggu lalu`,col:naik?'var(--jade)':'var(--crimson)'}); }
  } else if(actLast===0&&actThis>0) {
    insights.push({icon:'⚔️',text:`<b>${actThis}</b> aktivitas tercatat minggu ini`,col:'var(--cyan)'});
  }

  // 3. Life Score naik/turun minggu ini
  const lmAll=state.lifeMomentum||[];
  const lmWeek=lmAll.filter(e=>e.date>=weekAgoStr);
  const lmPrev=lmAll.filter(e=>e.date>=twoWeeksStr&&e.date<weekAgoStr);
  if(lmWeek.length>0){
    const scoreNow=lmWeek[lmWeek.length-1].lifeScore;
    const scoreRef=lmWeek.length>1?lmWeek[0].lifeScore:(lmPrev.length?lmPrev[lmPrev.length-1].lifeScore:null);
    if(scoreRef!==null){
      const diff=scoreNow-scoreRef;
      if(Math.abs(diff)>0){ const naik=diff>0; insights.push({icon:'🌟',text:`Life Score ${naik?'naik':'turun'} <b>${Math.abs(diff)} poin</b> minggu ini`,col:naik?'var(--jade)':'var(--crimson)'}); }
    }
  }

  // 4. Streak terbaik minggu ini
  const streakPeak=lmWeek.length?Math.max(...lmWeek.map(e=>e.streak||0)):state.character.streak;
  if(streakPeak>0){
    const col=streakPeak>=7?'var(--gold)':streakPeak>=3?'var(--orange)':'var(--muted)';
    insights.push({icon:'🔥',text:`Streak terbaik minggu ini: <b>${streakPeak} hari</b>`,col});
  }

  // Fallback: pemasukan jika insights masih kosong
  if(insights.length===0){
    const incThis=(state.financeLog||[]).filter(l=>l.type==='in'&&l.date>=weekAgoStr).reduce((s,l)=>s+l.amount,0);
    if(incThis>0) insights.push({icon:'💰',text:`Pemasukan minggu ini: <b>${typeof formatRupiah==='function'?formatRupiah(incThis):incThis}</b>`,col:'var(--gold)'});
    else insights.push({icon:'📅',text:'Belum cukup data minggu ini — terus catat aktivitasmu!',col:'var(--muted)'});
  }

  return insights.slice(0,4);
}

// ── LIFE MOMENTUM CHART — menggunakan state.lifeMomentum (snapshot harian dari data karakter yang sudah ada).
function initLifeMomentumChart(){
    if(typeof Chart === 'undefined') { const c=document.getElementById('lifeMomentumChart'); if(c){ const p=c.parentElement; p.innerHTML='<div class="small muted" style="text-align:center;padding:20px;">📊 Grafik tidak tersedia (perlu koneksi internet)</div>'; } return; }
    const ctx = document.getElementById('lifeMomentumChart'); if(!ctx) return; if(lifeMomentumChart) lifeMomentumChart.destroy();

    const isWeekly = lifeMomentumRange === 'weekly';
    const POINTS = isWeekly ? 7 : 30;
    const dayKeys = []; const dayLabels = [];
    for(let i=POINTS-1; i>=0; i--) { let d = new Date(); d.setDate(d.getDate() - i); dayKeys.push(d.toLocaleDateString('en-CA')); dayLabels.push(d.toLocaleDateString('id-ID', {day:'numeric', month:'short'})); }

    const snapshots = state.lifeMomentum || [];
    const byDate = {}; snapshots.forEach(s => byDate[s.date] = s);

    let lastKnown = null;
    for(const s of snapshots){ if(s.date <= dayKeys[0]) lastKnown = s; }
    const levelData = [], streakData = [], scoreData = [];
    dayKeys.forEach(k => {
        if(byDate[k]) lastKnown = byDate[k];
        levelData.push(lastKnown ? lastKnown.level : null);
        streakData.push(lastKnown ? lastKnown.streak : null);
        scoreData.push(lastKnown ? lastKnown.lifeScore : null);
    });

    Chart.defaults.color = '#9492AC'; Chart.defaults.font.family = "'Rajdhani', sans-serif";
    lifeMomentumChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dayLabels,
            datasets: [
                { label: 'Level', data: levelData, borderColor: '#37D6C4', backgroundColor: 'rgba(55,214,196,0.10)', borderWidth: 2, tension: 0.35, fill: false, spanGaps: true, yAxisID: 'y1', pointBackgroundColor: '#37D6C4', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 6 },
                { label: 'Streak', data: streakData, borderColor: '#F0B93B', backgroundColor: 'rgba(240,185,59,0.10)', borderWidth: 2, tension: 0.35, fill: false, spanGaps: true, yAxisID: 'y1', pointBackgroundColor: '#F0B93B', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 6 },
                { label: 'Life Score', data: scoreData, borderColor: '#9B6BFF', backgroundColor: 'rgba(155,107,255,0.12)', borderWidth: 2, tension: 0.35, fill: true, spanGaps: true, yAxisID: 'y', pointBackgroundColor: '#9B6BFF', pointBorderColor: '#fff', pointRadius: 3, pointHoverRadius: 6 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
                y: { position: 'left', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { font:{size:10} }, title: { display: true, text: 'Life Score', font:{size:9} } },
                y1: { position: 'right', grid: { display: false }, ticks: { font:{size:10} }, title: { display: true, text: 'Level / Streak', font:{size:9} } },
                x: { grid: { display: false }, ticks: { font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit: isWeekly ? 7 : 10 } }
            },
            plugins: {
                legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                tooltip: { callbacks: { label: (c) => `${c.dataset.label}: ${c.raw==null?'-':c.raw}` } }
            },
            onClick: (evt, elements) => {
                const infoEl = document.getElementById('lm-point-info'); if(!infoEl) return;
                if(!elements || !elements.length) return;
                const el = elements[0]; const idx = el.index; const dateLabel = dayLabels[idx];
                const lv = levelData[idx], st = streakData[idx], sc = scoreData[idx];
                if(lv==null){ infoEl.innerHTML = `<span class="muted">Belum ada data pada ${dateLabel}</span>`; return; }
                infoEl.innerHTML = `<span style="font-weight:800;font-size:14px;color:var(--bone);">Level ${lv} · Streak ${st} · Life Score ${sc}</span><br><span class="muted">${dateLabel}</span>`;
            }
        }
    });
}

function setSetting(key, value){ if(!state.settings) state.settings = DEFAULT_SETTINGS(); state.settings[key] = value; save(); render(); const _sEl = document.getElementById('modal-settings'); const _isOpen = _sEl && _sEl.classList.contains('open'); document.getElementById('settings-slot').innerHTML = renderSettingsModal(); if(_isOpen) openModal('modal-settings'); }
function saveLifePrinciple(){
  const el = document.getElementById('rf-life-principle'); if(!el) return;
  const newText = el.value.trim(); if(!newText){ showToast('Tulis dulu prinsip hidupmu.','bad'); return; }
  const c = state.character;
  if(!Array.isArray(c.lifePrincipleHistory)) c.lifePrincipleHistory = [];
  const old = (c.lifePrinciple||'').trim();
  if(old && old !== newText){
    const now = new Date();
    c.lifePrincipleHistory.unshift({id:uid('lp'), text:old, date: now.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}), ts: now.toLocaleString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})});
    if(c.lifePrincipleHistory.length > 200) c.lifePrincipleHistory.length = 200;
  }
  c.lifePrinciple = newText;
  save(); render(); showToast('Prinsip Hidup disimpan!', 'ach');
}
function useLifePrincipleHistory(lpId){
  const c = state.character; if(!Array.isArray(c.lifePrincipleHistory)) return;
  const entry = c.lifePrincipleHistory.find(h=>h.id===lpId); if(!entry) return;
  const current = (c.lifePrinciple||'').trim();
  c.lifePrincipleHistory = c.lifePrincipleHistory.filter(h=>h.id!==lpId);
  if(current) c.lifePrincipleHistory.unshift({id:uid('lp'), text:current, date: entry.date, ts: entry.ts});
  c.lifePrinciple = entry.text;
  save(); render(); showToast('✅ Prinsip lama dipakai kembali!','ach');
}
function deleteLifePrincipleHistory(lpId){
  const c = state.character; if(!Array.isArray(c.lifePrincipleHistory)) return;
  c.lifePrincipleHistory = c.lifePrincipleHistory.filter(h=>h.id!==lpId);
  save(); render();
}
function saveSettingsProfile(){ state.character.name = document.getElementById('s-char-name').value.trim() || 'Jian'; state.character.job = document.getElementById('s-char-job').value.trim(); state.character.age = parseInt(document.getElementById('s-char-age').value) || 22; state.settings.characterAvatar = document.getElementById('s-char-avatar').value.trim() || '⚔️'; const lpEl = document.getElementById('s-char-life-principle'); if(lpEl) state.character.lifePrinciple = lpEl.value.trim(); save(); render(); showToast('Profil disimpan!', 'ach'); }
function setNameHoloStyle(style){ state.settings.nameHoloStyle = style; save(); render(); const slot = document.getElementById('settings-slot'); if(slot){ slot.innerHTML = renderSettingsModal(); openModal('modal-settings'); } showToast('Warna hologram nama diperbarui', 'ach'); }
function resetModule(module){ const map = { todos: () => state.todos = [], kanban: () => state.kanban = { cards:[] }, sedekah: () => state.sedekah = { entries:[], totalLifetime:0, dailyExpGained:0, lastExpDate:'' }, habits: () => state.habits = DEFAULT_STATE().habits, }; if(!map[module]) return; openConfirm(`Reset modul "${module}"? Data karakter aman.`, () => { map[module](); save(); render(); document.getElementById('settings-slot').innerHTML = renderSettingsModal(); openModal('modal-settings'); showToast('Modul direset', 'ach'); }); }

function resetPartial(type){
  const labels = { level:'Level & Realm', exp:'EXP aktif', quest:'semua Quest ke pending', uang:'Log Finansial & Target', day:'Hari ke Day 1' };
  const label = labels[type] || type;
  openConfirm(`Reset ${label}? Sistem lain tidak terpengaruh.`, () => {
    if(type === 'day'){
      state.meta.startDate = todayStr();
      state.character.streak = 1;
      save(); render();
      document.getElementById('settings-slot').innerHTML = renderSettingsModal();
      openModal('modal-settings');
      showToast('Hari direset ke Day 1!', 'ach');
      return;
    }
    if(type === 'level'){
      // Hanya reset Level & Realm — EXP aktif, Quest, Uang tidak tersentuh
      state.character.level = 1;
      state.character.realmIndex = 0;
      state.character.realmEnergy = 0;
      state.character.heavenBridges = 0;
      state.character.pendingBridgeTrial = false;
      state.character.htQiDeviation = false;
      state.character.htQuestCompletedToday = {};
      recomputeLifeScore();
    } else if(type === 'exp'){
      // Hanya reset bar EXP aktif — Level & Realm tidak berubah
      state.character.exp = 0;
      state.meta.dailyExpEarned = 0;
    } else if(type === 'quest'){
      // Reset SEMUA quest ke pending (termasuk yang sudah done)
      state.quests.forEach(q => {
        q.status = 'pending';
        q.completionsToday = 0;
        q.lastCompletedDate = '';
      });
    } else if(type === 'uang'){
      state.financeLog = [];
      state.character.lifetimeIncome = 0;
      state.targets = DEFAULT_STATE().targets;
      state.completedTargets = [];
    }
    save(); render();
    document.getElementById('settings-slot').innerHTML = renderSettingsModal();
    openModal('modal-settings');
    showToast('Reset berhasil!', 'ach');
  });
}
function exportData(){ const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'mysistem-'+todayStr()+'.json'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); }
function importData(ev){ const file = ev.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = ()=>{ try{ const parsed = JSON.parse(reader.result); state = migrateState(deepMerge(DEFAULT_STATE(), parsed)); if(state.meta && state.meta.startDate){ const _impGap = state.meta.lastActiveDate ? diffDays(state.meta.lastActiveDate, todayStr()) : 999; if(_impGap <= 1){ const _correctStreak = diffDays(state.meta.startDate, todayStr()) + 1; state.character.streak = Math.max(state.character.streak||0, _correctStreak); state.character.longestStreak = Math.max(state.character.longestStreak||0, state.character.streak); } else { state.character.streak = 0; } const _itod=todayStr(); if(!state.charHistory) state.charHistory={level:[],hp:[],realm:[],streak:[]}; if(state.character.streak>0 && !state.charHistory.streak.some(s=>s.ts===_itod)) state.charHistory.streak.push({ts:_itod, val:state.character.streak}); if(!state.charHistory.realm||!state.charHistory.realm.length){ const _ir=(state.realms||[])[state.character.realmIndex||0]; if(_ir) state.charHistory.realm.push({ts:_itod, val:_ir.nameID}); } state.meta.activityLog=state.meta.activityLog||{}; if(!state.meta.activityLog[_itod]) state.meta.activityLog[_itod]=1; state.meta.lastActiveDate=_itod; } rollover(); recomputeLifeScore(); render(); save(); showToast('Data berhasil diimpor','ach'); }catch(e){ showToast('Gagal impor: file tidak valid','bad'); } }; reader.readAsText(file); ev.target.value=''; }
function confirmResetData(){ openConfirm('Reset SEMUA progres? Karakter kembali ke Level 1.', ()=>{ state = DEFAULT_STATE(); localStorage.removeItem(STORAGE_KEY); rollover(); render(); save(); closeModal('modal-settings'); }); }

function limitStatChecks(el){ const checked = document.querySelectorAll('.aq-stat:checked'); if(checked.length>2){ el.checked=false; } }
function openModal(id){ const el = document.getElementById(id); if(el) { el.classList.add('open'); SFX.click(); } }
function closeModal(id){ const el = document.getElementById(id); if(el) el.classList.remove('open'); SFX.click(); }
function openConfirm(message, cb){ document.getElementById('confirm-message').textContent = message; confirmCallback = cb; openModal('modal-confirm'); }
function runConfirm(){ closeModal('modal-confirm'); if(confirmCallback){ confirmCallback(); confirmCallback=null; } }

function submitSIPPagi() { const items = state.sip.config.pagi; state.sip.pagi.status = 'done'; state.sip.pagi.checkedCount = items.filter((_, i) => document.getElementById('sp'+i)?.checked).length; gainExp(30); bumpStat('discipline', 2); addActivityLog('SIP Pagi'); if(state.settings.showFloatingExp) showToast('+30 EXP', 'exp'); closeModal('modal-sip-pagi'); showToast('SIP Pagi Selesai. Semangat!', 'ach'); SFX.success(); render(); save(); }
function submitSIPSiang() { const items = state.sip.config.siang; state.sip.siang.status = 'done'; state.sip.siang.progress = Math.max(0, Math.min(100, parseInt(document.getElementById('sip-siang-prog').value, 10) || 0)); state.sip.siang.checkedCount = items.filter((_, i) => document.getElementById('ss'+i)?.checked).length; gainExp(30); bumpStat('focus', 2); addActivityLog('SIP Siang'); if(state.settings.showFloatingExp) showToast('+30 EXP', 'exp'); closeModal('modal-sip-siang'); showToast('SIP Siang Selesai. Tetap fokus!', 'ach'); SFX.success(); render(); save(); }
function showFloatingExp(amount){ showToast((amount>=0?'+':'')+amount+' EXP', 'exp'); }
function spawnSedekahRewardFX(x, y, expGained, nominal){
  const flash = document.createElement('div');
  flash.className = 'sedekah-flash';
  flash.style.left = x + 'px'; flash.style.top = y + 'px';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 550);

  const aura = document.createElement('div');
  aura.className = 'sedekah-blessing-aura';
  aura.style.left = x + 'px'; aura.style.top = y + 'px';
  document.body.appendChild(aura);
  setTimeout(() => aura.remove(), 900);

  const particleCount = 10;
  for(let i = 0; i < particleCount; i++){
    const p = document.createElement('div');
    p.className = 'sedekah-particle';
    const angle = (Math.PI * 2 * i / particleCount) + (Math.random() * 0.4);
    const dist = 34 + Math.random() * 38;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.style.setProperty('--dx', (Math.cos(angle) * dist).toFixed(1) + 'px');
    p.style.setProperty('--dy', (Math.sin(angle) * dist - 24).toFixed(1) + 'px');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 950);
  }

  const virtueLabel = '+' + (Number.isFinite(expGained) && expGained > 0 ? expGained : '') + ' Virtue';
  const meritLabel = '+' + (Number.isFinite(nominal) && nominal > 0 ? Math.max(1, Math.floor(nominal / 1000)) : '') + ' Merit';
  [meritLabel, virtueLabel].forEach((label, i) => {
    const t = document.createElement('div');

function init(){
  // Load dari localStorage dulu — app langsung siap, tidak nunggu Firebase.
  let loaded = loadState();
  state = loaded ? migrateState(deepMerge(DEFAULT_STATE(), loaded)) : DEFAULT_STATE();
  rollover(); recomputeLifeScore(); recordMomentumHistory(); buildModals(); spiritCompanionGreet(); render();
  showWelcomeToast();

  // Firebase sync di background — kalau cloud lebih baru, refresh UI otomatis.
  firebaseResolveOnLoad(loaded).then(resolved => {
    if(!resolved) return;
    const localTs  = (loaded && loaded.meta && loaded.meta.updatedAt) || 0;
    const cloudTs  = (resolved.meta && resolved.meta.updatedAt) || 0;
    if(cloudTs > localTs){
      state = migrateState(deepMerge(DEFAULT_STATE(), resolved));
      rollover(); recomputeLifeScore(); recordMomentumHistory(); render();
      showToast('☁️ Data tersinkron dari cloud!', 'good');
      save();
    }
    // Mulai real-time listener setelah load awal selesai
    firebaseStartRealTimeSync();
  }).catch(()=>{ firebaseStartRealTimeSync(); }); // tetap mulai listener meski pull gagal

  // Auto-refresh interval (Midnight reset trigger)
  setInterval(() => {
      updateTimeBlockUI();
      if(state.meta.lastActiveDate !== todayStr()) {
          rollover();
          recordMomentumHistory();
          render();
          save();
      }
  }, 30000);
}
window.onload = function() { init(); };
